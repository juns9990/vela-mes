const NC_STATUS_STYLE = {
  '접수':   { bg:'rgba(251,191,36,.14)',  color:'var(--amber)' },
  '재작업': { bg:'rgba(125,211,252,.14)', color:'var(--blue)'  },
  '폐기':   { bg:'rgba(248,113,113,.14)', color:'var(--red)'   },
  '특채':   { bg:'rgba(74,222,128,.14)',  color:'var(--green)' },
  '반품':   { bg:'rgba(139,144,156,.16)', color:'var(--sub)'   },
  '완료':   { bg:'rgba(139,144,156,.16)', color:'var(--sub)'   },
};
function ncStatusBadge(status){
  const s = NC_STATUS_STYLE[status] || NC_STATUS_STYLE['완료'];
  return `<span style="font-size:10px;font-weight:800;padding:2px 9px;border-radius:99px;background:${s.bg};color:${s.color};display:inline-block">${_esc(status||'—')}</span>`;
}
// 같은 실적(record_id)에 이미 등록된 NC 수량 합 · void 제외 · 실적 초과 등록 차단 검증에 사용
function ncSumByRecord(record_id){
  if(!record_id) return 0;
  return DB.query('nc_records', n => n.record_id === record_id).reduce((s,n)=>s+(+n.qty||0), 0);
}
// NC 등록 — G1 준수 (원장 무변) · 실적 초과 등록 차단
function qcRegisterNc({ date, item_code, lot_id, record_id, process, equipment, worker, defect_type, qty, memo }){
  if(!defect_type) throw new Error('불량 유형 필수');
  const q = +qty || 0;
  if(q <= 0) throw new Error('수량은 1 이상');
  const dtype = DB.get('defect_types', defect_type);
  if(!dtype) throw new Error(`불량 유형 미등록 — ${defect_type}`);
  if(dtype.active === false) throw new Error(`비활성 불량 유형 — ${dtype.name}`);
  if(record_id){
    const rec = DB.get('records', record_id);
    if(!rec) throw new Error('연결 실적 없음');
    if(rec.void) throw new Error('취소된 실적에는 부적합 등록 불가');
    const already = ncSumByRecord(record_id);
    const cap = (+rec.defect||0);
    if(cap <= 0) throw new Error('실적에 불량 수량 없음');
    if(already + q > cap){
      throw new Error(`실적 불량 초과 — 실적 ${cap}ea · 기 등록 ${already}ea · 추가 가능 ${Math.max(0, cap-already)}ea`);
    }
  }
  const id = nextDocNo('NC');
  if(DB.get('nc_records', id)) throw new Error(`NC 번호 중복 — ${id}`);
  const doc = {
    id, date: date || fmtDate(Date.now()),
    item_code: item_code || null,
    lot_id: lot_id || null,
    record_id: record_id || null,
    process: process || null,
    equipment: equipment || null,
    worker: worker || null,
    defect_type, qty: q, memo: memo || '',
    status: NC_STATUS.RCV,
    handle: null,
    rework_record_id: null,
    ts: Date.now(),
    by: SESSION.user || 'system',
    void: null,
  };
  DB.set('nc_records', id, doc);
  return doc;
}
// NC 처리 (재작업/폐기/특채/반품) — 상태 전이 · G1 원장 무변
function qcProcessNc(nc_id, kind, handle){
  const nc = DB.get('nc_records', nc_id);
  if(!nc) throw new Error('NC 없음');
  if(nc.void) throw new Error('취소된 NC 는 처리 불가');
  if(nc.status !== NC_STATUS.RCV) throw new Error('접수 상태에서만 처리 가능');
  let next;
  if(kind === 'rework')         next = NC_STATUS.RW;
  else if(kind === 'scrap')     next = NC_STATUS.SCRAP;
  else if(kind === 'deviation') next = NC_STATUS.DEV;
  else if(kind === 'return')    next = NC_STATUS.RET;
  else throw new Error('처리 유형 오류');
  DB.set('nc_records', nc_id, { status: next, handle: { kind, ...(handle||{}), ts: Date.now(), by: SESSION.user||'system' } });
  return DB.get('nc_records', nc_id);
}
// 재작업 실적 연결 → 완료
function qcLinkReworkRecord(nc_id, record_id){
  const nc = DB.get('nc_records', nc_id);
  if(!nc) throw new Error('NC 없음');
  if(nc.void) throw new Error('취소된 NC');
  if(nc.status !== NC_STATUS.RW) throw new Error('재작업 상태에서만 연결 가능');
  const rec = DB.get('records', record_id);
  if(!rec) throw new Error('실적 없음');
  DB.set('nc_records', nc_id, { rework_record_id: record_id, status: NC_STATUS.DONE });
  return DB.get('nc_records', nc_id);
}
// 폐기/특채/반품 후 [완료 처리]
function qcCompleteNc(nc_id){
  const nc = DB.get('nc_records', nc_id);
  if(!nc) throw new Error('NC 없음');
  if(nc.void) throw new Error('취소된 NC');
  if(nc.status === NC_STATUS.DONE) return nc;
  if(nc.status === NC_STATUS.RCV) throw new Error('처리 결정 없이 완료 불가');
  DB.set('nc_records', nc_id, { status: NC_STATUS.DONE });
  return DB.get('nc_records', nc_id);
}
// 파레토 (유형별 · 기간)
function ncParetoByType(startTs, endTs){
  const rows = DB.query('nc_records', n => n.ts >= startTs && n.ts <= endTs);
  const map = {};
  rows.forEach(n => {
    const key = n.defect_type;
    if(!map[key]) map[key] = { code:key, name: DB.get('defect_types', key)?.name || key, qty:0, count:0 };
    map[key].qty   += (+n.qty||0);
    map[key].count += 1;
  });
  return Object.values(map).sort((a,b) => b.qty - a.qty);
}

// ─────────────────────────────────────────────────────────────
// VIEWS._qcRegister(prefill) — 부적합 등록 모달 (실적현황 + 품질 화면 공용)
//   lockedRecord (prefill.record_id 있음): 실적 잠금 · 유형·수량·메모만 입력
//   free: LOT/실적 선택 (실적 무관 등록 허용)
// ─────────────────────────────────────────────────────────────
VIEWS._qcRegister = (prefill) => {
  prefill = prefill || {};
  const types = getActiveDefectTypes();
  if(!types.length){
    toast('활성 불량 유형 없음 — 기준정보 › 불량 유형 등록 먼저', 'warn');
    return;
  }
  const lockedRecord = !!prefill.record_id;
  const lots = DB.all('production_lots').slice().sort((a,b)=>(a.plot_no||'').localeCompare(b.plot_no||''));
  const capInfo = lockedRecord ? (() => {
    const cap = +prefill.defect_qty_source || 0;
    const already = +prefill.already_qty || 0;
    return { cap, already, remaining: Math.max(0, cap - already) };
  })() : null;

  openModal(`
    <h2>부적합 등록 <button class="x" onclick="closeModal()">${ico('x')}</button></h2>
    <div class="body">
      <div style="font-size:11px;color:var(--sub);background:var(--bg2);border:1px solid var(--line);border-radius:8px;padding:9px 12px;margin-bottom:10px;line-height:1.55">
        <b style="color:var(--amber)">원칙</b> 부적합 등록은 <b>기록·추적</b>만 — 재고·실적 원장은 그대로. 수량 이동은 기존 실적 경로만.
      </div>
      ${lockedRecord ? `
        <div style="padding:11px 13px;border:1px solid var(--line);border-radius:9px;background:var(--panel2);margin-bottom:10px">
          <div style="font-size:11.5px;color:var(--sub);margin-bottom:4px">연결 실적 <span class="pill cyan" style="font-size:9.5px;margin-left:4px">${_esc(prefill.record_id)}</span></div>
          <div style="font-size:12.5px"><b>${_esc(prefill.item_code||'—')}</b> · LOT <span style="font-family:'JetBrains Mono',monospace">${_esc(prefill.lot_id||'—')}</span> · 공정 ${_esc(DB.get('processes',prefill.process)?.name||prefill.process||'—')} · 설비 ${_esc(prefill.equipment||'—')} · 작업자 ${_esc(prefill.worker?.name||prefill.worker||'—')}</div>
          <div style="font-size:11px;color:var(--dim);margin-top:5px">실적 불량 <b>${capInfo.cap}ea</b> · 기 등록 <b>${capInfo.already}ea</b> · 추가 가능 <b style="color:var(--cyan)">${capInfo.remaining}ea</b></div>
        </div>
      ` : `
        <div class="grid g2">
          <div><label>LOT (선택) <span style="color:var(--dim);font-weight:400">— 없으면 실적 무관 등록</span></label>
            <select id="nc-lot">
              <option value="">— 실적 무관 (수입 소재 불량 등) —</option>
              ${lots.map(l => `<option value="${_esc(l.plot_no)}" ${prefill.lot_id===l.plot_no?'selected':''}>${_esc(l.plot_no)} (${_esc(l.itemCode)})</option>`).join('')}
            </select></div>
          <div><label>연결 실적 (선택)</label>
            <select id="nc-rec"><option value="">— 실적 무관 —</option></select></div>
        </div>
        <div id="nc-rec-hint" style="font-size:11px;color:var(--dim);margin-top:-4px;margin-bottom:6px"></div>
      `}
      <div class="grid g2">
        <div><label>불량 유형 <span style="color:var(--dim);font-weight:400">— 마스터 활성만</span></label>
          <select id="nc-type">${types.map(t => `<option value="${_esc(t.code)}">${_esc(t.name)}</option>`).join('')}</select></div>
        <div><label>수량 (ea)</label>
          <input id="nc-qty" type="number" min="1" step="1" placeholder="${lockedRecord ? Math.max(1, capInfo.remaining) : 1}" style="font-family:'JetBrains Mono',monospace;text-align:right"></div>
      </div>
      <div><label>현상 메모 (선택)</label>
        <textarea id="nc-memo" rows="3" placeholder="예: 오른쪽 상단 3mm 크랙 · 재발 우려" style="width:100%;resize:vertical;font-family:inherit"></textarea></div>
      <div class="actions">
        <button class="btn" onclick="closeModal()">취소</button>
        <button class="btn primary" id="nc-save">${ico('save')}등록</button>
      </div>
    </div>
  `);
  if(!lockedRecord){
    const refreshRec = () => {
      const lotId = document.getElementById('nc-lot').value;
      const sel   = document.getElementById('nc-rec');
      const hint  = document.getElementById('nc-rec-hint');
      if(!lotId){ sel.innerHTML = '<option value="">— 실적 무관 —</option>'; hint.textContent = ''; return; }
      const recs = DB.query('records', r => r.plot_no === lotId && (+r.defect||0) > 0).slice().sort((a,b)=>b.ts-a.ts);
      sel.innerHTML = '<option value="">— 실적 무관 —</option>' + recs.map(r => {
        const p = DB.get('processes', r.proc);
        const already = ncSumByRecord(r.id);
        const cap = +r.defect||0;
        const rem = Math.max(0, cap-already);
        return `<option value="${_esc(r.id)}" ${rem<=0?'disabled':''}>${fmtDate(r.ts)} ${fmtTime(r.ts).slice(0,5)} · ${_esc(p?.name||r.proc)} · 불량 ${cap}ea (남은 ${rem}ea)${rem<=0?' · 소진':''}</option>`;
      }).join('');
      hint.textContent = recs.length ? `불량>0 실적 ${recs.length}건 표시` : '이 LOT 에 불량 실적 없음 — 실적 무관 등록으로 진행';
    };
    document.getElementById('nc-lot').onchange = refreshRec;
    refreshRec();
  }
  document.getElementById('nc-save').onclick = () => {
    const defect_type = document.getElementById('nc-type').value;
    const qty  = +document.getElementById('nc-qty').value || 0;
    const memo = document.getElementById('nc-memo').value.trim();
    let payload;
    if(lockedRecord){
      payload = {
        record_id: prefill.record_id,
        lot_id: prefill.lot_id || null,
        item_code: prefill.item_code || null,
        process: prefill.process || null,
        equipment: prefill.equipment || null,
        worker: prefill.worker || null,
        defect_type, qty, memo,
      };
    } else {
      const lotId = document.getElementById('nc-lot').value || null;
      const recId = document.getElementById('nc-rec').value || null;
      const rec = recId ? DB.get('records', recId) : null;
      const lot = lotId ? DB.get('production_lots', lotId) : null;
      payload = {
        record_id: recId || null,
        lot_id: lotId || null,
        item_code: lot?.itemCode || null,
        process: rec?.proc || null,
        equipment: rec?.equipment || null,
        worker: rec?.worker || (rec?.by ? { name: rec.by } : null),
        defect_type, qty, memo,
      };
    }
    try {
      const nc = qcRegisterNc(payload);
      toast(`부적합 등록 — ${nc.id}`, 'ok');
      closeModal(); router();
    } catch(e){ toast(e.message, 'err'); }
  };
};

// ─────────────────────────────────────────────────────────────
// VIEWS._qcDetail(nc_id) — NC 상세 · 처리 이력 타임라인 · 액션 진입
// ─────────────────────────────────────────────────────────────
VIEWS._qcDetail = (nc_id) => {
  const nc = DB.get('nc_records', nc_id);
  if(!nc){ toast('NC 없음','err'); return; }
  const dtype  = DB.get('defect_types', nc.defect_type);
  const proc   = nc.process ? DB.get('processes', nc.process) : null;
  const item   = nc.item_code ? DB.get('items', nc.item_code) : null;
  const rework = nc.rework_record_id ? DB.get('records', nc.rework_record_id) : null;
  const isVoid = !!nc.void;
  const isDone = nc.status === NC_STATUS.DONE;
  const isRcv  = nc.status === NC_STATUS.RCV;
  const isRw   = nc.status === NC_STATUS.RW;

  const timeline = [];
  timeline.push({ ts: nc.ts, by: nc.by, label: `접수 등록 · ${(+nc.qty||0).toLocaleString()}ea ${dtype?.name||nc.defect_type}` });
  if(nc.handle && nc.handle.kind){
    const kMap = { rework:'재작업 결정', scrap:'폐기 결정', deviation:'특채 결정', return:'반품 접수' };
    timeline.push({
      ts: nc.handle.ts, by: nc.handle.by_name || nc.handle.by,
      label: kMap[nc.handle.kind] || nc.handle.kind,
      memo: nc.handle.memo, approver: nc.handle.approver, cust_ref: nc.handle.cust_ref, reason: nc.handle.reason,
    });
  }
  if(nc.rework_record_id){
    timeline.push({ ts: rework?.ts || Date.now(), by:'system', label: `재작업 실적 연결 · ${nc.rework_record_id} (양품 ${(+rework?.good||0).toLocaleString()}ea) → 완료` });
  }
  if(isVoid){
    timeline.push({ ts: nc.void.ts, by: nc.void.by, label: `NC 취소 · ${nc.void.reason||''}` });
  }

  const actions = [];
  if(!isVoid && isRcv) actions.push(`<button class="btn primary" id="nc-proc">${ico('save')}처리</button>`);
  if(!isVoid && isRw)  actions.push(`<button class="btn primary" id="nc-link">${ico('save')}재작업 실적 연결</button>`);
  if(!isVoid && (nc.status === NC_STATUS.SCRAP || nc.status === NC_STATUS.DEV || nc.status === NC_STATUS.RET)){
    actions.push(`<button class="btn primary" id="nc-done">${ico('check')}완료 처리</button>`);
  }
  if(!isVoid && !isDone) actions.push(`<button class="btn" id="nc-void" style="color:var(--red)">${ico('x')}NC 취소</button>`);
  actions.push(`<button class="btn" id="nc-print">${ico('print')}인쇄</button>`);

  openModal(`
    <h2>부적합 상세 <span style="font-family:'JetBrains Mono',monospace;color:var(--cyan);margin-left:6px">${_esc(nc.id)}</span> ${ncStatusBadge(nc.status)} ${isVoid?'<span class="pill" style="background:rgba(248,113,113,.15);color:var(--red);font-size:9.5px;margin-left:4px">취소</span>':''} <button class="x" onclick="closeModal()">${ico('x')}</button></h2>
    <div class="body">
      <div style="display:grid;grid-template-columns:130px 1fr;gap:8px 12px;font-size:12.5px;padding:11px 13px;background:var(--panel2);border:1px solid var(--line);border-radius:9px;margin-bottom:10px">
        <div style="color:var(--sub)">일자</div><div style="font-family:'JetBrains Mono',monospace">${_esc(nc.date||fmtDate(nc.ts))}</div>
        <div style="color:var(--sub)">품번</div><div><b>${_esc(nc.item_code||'—')}</b> ${item?`<span style="color:var(--sub);font-size:11px">${_esc(item.name||'')}</span>`:''}</div>
        <div style="color:var(--sub)">LOT</div><div style="font-family:'JetBrains Mono',monospace">${_esc(nc.lot_id||'—')}</div>
        <div style="color:var(--sub)">공정 · 설비</div><div>${_esc(proc?.name||nc.process||'—')} · ${_esc(nc.equipment||'—')}</div>
        <div style="color:var(--sub)">작업자</div><div>${_esc(nc.worker?.name||nc.worker||'—')}</div>
        <div style="color:var(--sub)">유형 · 수량</div><div><b>${_esc(dtype?.name||nc.defect_type)}</b> · <span style="font-family:'JetBrains Mono',monospace">${(+nc.qty||0).toLocaleString()}ea</span></div>
        <div style="color:var(--sub)">연결 실적</div><div>${nc.record_id ? `<span style="font-family:'JetBrains Mono',monospace">${_esc(nc.record_id)}</span>` : '<span style="color:var(--dim)">실적 무관</span>'}</div>
        ${nc.memo ? `<div style="color:var(--sub)">현상</div><div style="white-space:pre-wrap">${_esc(nc.memo)}</div>` : ''}
        ${nc.rework_record_id ? `<div style="color:var(--sub)">재작업 실적</div><div><span style="font-family:'JetBrains Mono',monospace">${_esc(nc.rework_record_id)}</span> · 양품 ${(+rework?.good||0).toLocaleString()}ea</div>` : ''}
      </div>
      <div style="font-size:11.5px;color:var(--sub);margin-bottom:6px"><b>처리 이력</b></div>
      <div style="border:1px solid var(--line);border-radius:9px;padding:8px 12px;background:var(--bg2);font-size:11.5px;line-height:1.7">
        ${timeline.map(t => `<div style="display:flex;gap:9px;align-items:baseline;padding:3px 0">
          <span style="font-family:'JetBrains Mono',monospace;color:var(--dim);font-size:10.5px;min-width:110px">${fmtDate(t.ts)} ${fmtTime(t.ts).slice(0,5)}</span>
          <span style="flex:1"><b>${_esc(t.label)}</b>${t.reason?` <span style="color:var(--sub)">— ${_esc(t.reason)}</span>`:''}${t.approver?` <span style="color:var(--sub)">· 승인 ${_esc(t.approver)}</span>`:''}${t.cust_ref?` <span style="color:var(--sub)">· ${_esc(t.cust_ref)}</span>`:''}${t.memo?` <span style="color:var(--sub)">— ${_esc(t.memo)}</span>`:''}</span>
          <span style="color:var(--dim);font-size:10.5px">${_esc(t.by||'')}</span>
        </div>`).join('')}
      </div>
      ${isDone||isVoid ? `<div style="font-size:11px;color:var(--dim);margin-top:8px;line-height:1.55">${isDone?'· 완료된 NC 는 수정 불가 (상세 열람만) · 되돌리기는 취소 후 재등록.':'· 취소된 NC · 이력 보존.'}</div>` : ''}
      <div class="actions">
        <button class="btn" onclick="closeModal()">닫기</button>
        ${actions.join(' ')}
      </div>
    </div>
  `);
  const bP = document.getElementById('nc-proc');
  if(bP) bP.onclick = () => { closeModal(); VIEWS._qcProcess(nc_id); };
  const bL = document.getElementById('nc-link');
  if(bL) bL.onclick = () => { closeModal(); VIEWS._qcLinkRework(nc_id); };
  const bD = document.getElementById('nc-done');
  if(bD) bD.onclick = () => {
    try { qcCompleteNc(nc_id); toast('완료 처리','ok'); closeModal(); router(); }
    catch(e){ toast(e.message,'err'); }
  };
  const bV = document.getElementById('nc-void');
  if(bV) bV.onclick = () => {
    const reason = prompt('취소 사유(선택)', '오입력') || '오입력';
    voidDoc('nc_records', nc_id, reason);
    toast('NC 취소 (이력 보존)','ok');
    closeModal(); router();
  };
  const bPrn = document.getElementById('nc-print');
  if(bPrn) bPrn.onclick = () => _qcPrintNc(nc_id);
};

// ─────────────────────────────────────────────────────────────
// VIEWS._qcProcess(nc_id) — 처리 모달 (재작업/폐기/특채/반품)
// ─────────────────────────────────────────────────────────────
VIEWS._qcProcess = (nc_id) => {
  const nc = DB.get('nc_records', nc_id);
  if(!nc){ toast('NC 없음','err'); return; }
  if(nc.status !== NC_STATUS.RCV){ toast('접수 상태에서만 처리 가능','warn'); return; }
  openModal(`
    <h2>NC 처리 <span style="font-family:'JetBrains Mono',monospace;color:var(--cyan);margin-left:6px">${_esc(nc.id)}</span> <button class="x" onclick="closeModal()">${ico('x')}</button></h2>
    <div class="body">
      <div style="font-size:11px;color:var(--sub);background:var(--bg2);border:1px solid var(--line);border-radius:8px;padding:9px 12px;margin-bottom:10px;line-height:1.55">
        <b style="color:var(--amber)">원칙</b> 처리 기록은 <b>추적·안내</b>만 — 재고·실적 원장 무변. 수량 복귀가 필요하면 <b>재작업 실적 등록</b> 경로.
      </div>
      <div class="grid g2">
        <div><label>처리 유형</label>
          <select id="ncp-kind">
            <option value="rework">재작업 (Rework)</option>
            <option value="scrap">폐기 (Scrap)</option>
            <option value="deviation">특채 (Deviation)</option>
            <option value="return">반품 (Return)</option>
          </select></div>
        <div><label>처리일</label>
          <input id="ncp-date" type="date" value="${_esc(fmtDate(Date.now()))}"></div>
      </div>
      <div><label>처리자</label>
        <input id="ncp-by" value="${_esc(SESSION.user||'')}" placeholder="이름"></div>
      <div id="ncp-extra"></div>
      <div class="actions">
        <button class="btn" onclick="closeModal()">취소</button>
        <button class="btn primary" id="ncp-save">${ico('save')}처리 기록</button>
      </div>
    </div>
  `);
  const extra  = document.getElementById('ncp-extra');
  const kindEl = document.getElementById('ncp-kind');
  const renderExtra = () => {
    const k = kindEl.value;
    if(k === 'rework'){
      extra.innerHTML = `<div><label>재작업 계획 메모 (선택)</label>
        <textarea id="ncp-memo" rows="3" placeholder="예: 재연마 · 프레스 2호 재작업 예정" style="width:100%;resize:vertical;font-family:inherit"></textarea></div>
        <div style="font-size:11px;color:var(--dim);line-height:1.55">· 저장 후 목록에 [재작업 실적 등록] 버튼 표시 — 기존 실적 등록 화면(프리필)으로 이어집니다.</div>`;
    } else if(k === 'scrap'){
      extra.innerHTML = `<div><label>폐기 사유 <span style="color:var(--red)">*</span></label>
        <input id="ncp-reason" placeholder="예: 크랙 · 재가공 불가"></div>
        <div><label>비고 (선택)</label><textarea id="ncp-memo" rows="2" style="width:100%;resize:vertical;font-family:inherit"></textarea></div>
        <div style="font-size:11px;color:var(--dim);line-height:1.55">· 불량품은 애초 양품 재고에 없으므로 원장 무변 (기록만).</div>`;
    } else if(k === 'deviation'){
      extra.innerHTML = `<div class="grid g2">
          <div><label>승인자 <span style="color:var(--red)">*</span></label><input id="ncp-approver" placeholder="예: 홍길동 (품질팀장)"></div>
          <div><label>고객 승인 근거 <span style="color:var(--red)">*</span></label><input id="ncp-cust" placeholder="예: 이메일 2026-07-15 · C001"></div>
        </div>
        <div><label>비고 (선택)</label><textarea id="ncp-memo" rows="2" style="width:100%;resize:vertical;font-family:inherit"></textarea></div>
        <div style="font-size:11px;color:var(--dim);line-height:1.55">· 수량의 양품 전환이 필요하면 <b>기존 실적 수정</b> 경로 (품질 모듈은 원장 무수정).</div>`;
    } else if(k === 'return'){
      extra.innerHTML = `<div><label>접수 메모 (선택)</label><textarea id="ncp-memo" rows="2" style="width:100%;resize:vertical;font-family:inherit"></textarea></div>
        <div style="font-size:11px;color:var(--dim);line-height:1.55">· 반품 접수만 기록 · 출하 연계는 후속 버전 (범위 밖).</div>`;
    }
  };
  kindEl.onchange = renderExtra;
  renderExtra();
  document.getElementById('ncp-save').onclick = () => {
    const kind = kindEl.value;
    const date = document.getElementById('ncp-date').value || fmtDate(Date.now());
    const by   = document.getElementById('ncp-by').value.trim() || (SESSION.user||'system');
    const handle = { date, by_name: by };
    if(kind === 'rework'){
      handle.memo = document.getElementById('ncp-memo')?.value.trim() || '';
    } else if(kind === 'scrap'){
      const reason = document.getElementById('ncp-reason')?.value.trim() || '';
      if(!reason){ toast('폐기 사유 필수','warn'); return; }
      handle.reason = reason;
      handle.memo = document.getElementById('ncp-memo')?.value.trim() || '';
    } else if(kind === 'deviation'){
      const approver = document.getElementById('ncp-approver')?.value.trim() || '';
      const cust_ref = document.getElementById('ncp-cust')?.value.trim() || '';
      if(!approver){ toast('승인자 필수','warn'); return; }
      if(!cust_ref){ toast('고객 승인 근거 필수','warn'); return; }
      handle.approver = approver;
      handle.cust_ref = cust_ref;
      handle.memo = document.getElementById('ncp-memo')?.value.trim() || '';
    } else if(kind === 'return'){
      handle.memo = document.getElementById('ncp-memo')?.value.trim() || '';
    }
    try {
      qcProcessNc(nc_id, kind, handle);
      const kMap = { rework:'재작업', scrap:'폐기', deviation:'특채', return:'반품' };
      toast(`처리 기록 — ${kMap[kind]}`, 'ok');
      closeModal(); router();
    } catch(e){ toast(e.message,'err'); }
  };
};

// ─────────────────────────────────────────────────────────────
// VIEWS._qcLinkRework(nc_id) — 재작업 실적 연결 · 프리필 등록 진입
//   후보 실적: 같은 LOT · 같은 공정 · NC 접수 이후 등록 · 미연결
// ─────────────────────────────────────────────────────────────
VIEWS._qcLinkRework = (nc_id) => {
  const nc = DB.get('nc_records', nc_id);
  if(!nc){ toast('NC 없음','err'); return; }
  if(nc.status !== NC_STATUS.RW){ toast('재작업 상태에서만 연결 가능','warn'); return; }
  const linkedIds = new Set(
    DB.query('nc_records', n => n.id !== nc_id && n.rework_record_id).map(n => n.rework_record_id)
  );
  const candidates = DB.query('records', r =>
    r.plot_no === nc.lot_id && r.proc === nc.process && r.ts >= nc.ts && !linkedIds.has(r.id)
  ).slice().sort((a,b)=>b.ts-a.ts);
  openModal(`
    <h2>재작업 실적 연결 <span style="font-family:'JetBrains Mono',monospace;color:var(--cyan);margin-left:6px">${_esc(nc.id)}</span> <button class="x" onclick="closeModal()">${ico('x')}</button></h2>
    <div class="body">
      <div style="font-size:11px;color:var(--sub);background:var(--bg2);border:1px solid var(--line);border-radius:8px;padding:9px 12px;margin-bottom:10px;line-height:1.55">
        <b style="color:var(--amber)">원칙</b> 수량 이동은 <b>실적 경로</b>만 — 여기선 <b>연결(추적)</b>만 기록. 실적 없으면 <b>[실적 등록 프리필]</b> 로 이동 → 등록 후 다시 이 창에서 연결.
      </div>
      <div style="display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap">
        <button class="btn primary" id="ncl-prefill">${ico('plus')}실적 등록 (프리필)</button>
        <span style="font-size:11px;color:var(--dim);align-self:center">→ 등록 후 이 창을 다시 열어 연결</span>
      </div>
      <div style="font-size:11.5px;color:var(--sub);margin-bottom:6px"><b>연결 가능 실적</b> — 같은 LOT · 같은 공정 · NC 접수 이후 · 미연결 (${candidates.length}건)</div>
      ${candidates.length ? `
        <div class="tbl-wrap"><table style="font-size:12px">
          <thead><tr><th>선택</th><th>실적</th><th>일시</th><th class="num">양품</th><th class="num">불량</th><th>설비</th></tr></thead>
          <tbody>${candidates.map((r,i) => {
            const p = DB.get('processes', r.proc);
            return `<tr>
              <td><input type="radio" name="ncl-rec" value="${_esc(r.id)}" ${i===0?'checked':''} style="width:auto;margin:0"></td>
              <td><span style="font-family:'JetBrains Mono',monospace;font-size:11px">${_esc(r.id)}</span></td>
              <td style="font-family:'JetBrains Mono',monospace;font-size:11px">${fmtDate(r.ts)} ${fmtTime(r.ts).slice(0,5)}</td>
              <td class="num" style="color:var(--green)">${(+r.good||0).toLocaleString()}</td>
              <td class="num" style="color:${(+r.defect||0)>0?'var(--red)':'var(--dim)'}">${(+r.defect||0).toLocaleString()}</td>
              <td style="font-size:11px">${_esc(r.equipment||'—')}</td>
            </tr>`;
          }).join('')}</tbody>
        </table></div>
      ` : `<div style="font-size:11.5px;color:var(--dim);padding:8px 0">연결 가능한 실적 없음 — 위 [실적 등록 (프리필)] 로 먼저 등록.</div>`}
      <div class="actions">
        <button class="btn" onclick="closeModal()">닫기</button>
        ${candidates.length ? `<button class="btn primary" id="ncl-save">${ico('save')}선택 실적 연결 → 완료</button>` : ''}
      </div>
    </div>
  `);
  document.getElementById('ncl-prefill').onclick = () => {
    closeModal();
    VIEWS._perfAddPC({
      plot_no: nc.lot_id,
      proc: nc.process,
      equipment: nc.equipment,
      _from_nc: nc.id,
    });
  };
  const sv = document.getElementById('ncl-save');
  if(sv) sv.onclick = () => {
    const sel = document.querySelector('input[name="ncl-rec"]:checked');
    if(!sel){ toast('연결할 실적 선택','warn'); return; }
    try {
      qcLinkReworkRecord(nc_id, sel.value);
      toast('재작업 실적 연결 → 완료 처리','ok');
      closeModal(); router();
    } catch(e){ toast(e.message,'err'); }
  };
};

// ─────────────────────────────────────────────────────────────
// VIEWS.qc — 품질 관리 화면 (19번째 페이지)
// 기간(월) · KPI 4 · NC 목록 · 파레토 · 공정/설비/작업자별 통계
// ─────────────────────────────────────────────────────────────
VIEWS.qc = () => {
  if(!getFlags().qc){
    document.getElementById('view').innerHTML = `<div class="card">품질 관리 모듈 OFF — 설정에서 켜세요.</div>`;
    return;
  }
  const st = (window._qcState = window._qcState || { month: fmtDate(Date.now()).slice(0,7), q:'', status:'', voidView:false });
  if(!st.month) st.month = fmtDate(Date.now()).slice(0,7);
  const [yy, mm] = st.month.split('-').map(Number);
  const first = new Date(yy, (mm||1)-1, 1);
  const last  = new Date(yy, (mm||1),   0);
  const startTs = first.getTime();
  const endTs   = last.getTime() + 86400000 - 1;

  const ncAll = (st.voidView ? DB.allRaw('nc_records') : DB.all('nc_records'))
    .filter(n => n.ts >= startTs && n.ts <= endTs)
    .slice().sort((a,b) => b.ts - a.ts);
  const ncFiltered = ncAll.filter(n => {
    if(st.status && n.status !== st.status) return false;
    if(st.q){
      const q = st.q.toLowerCase();
      const dt = DB.get('defect_types', n.defect_type);
      const hay = `${n.id||''} ${n.lot_id||''} ${n.item_code||''} ${dt?.name||''} ${n.process||''} ${n.equipment||''}`.toLowerCase();
      if(!hay.includes(q)) return false;
    }
    return true;
  });

  // KPI (실적 집계 재사용 · buildReportData 방식과 동일)
  const recsInPeriod = DB.query('records', r => r.ts >= startTs && r.ts <= endTs);
  const totalIn = recsInPeriod.reduce((s,r)=>s+(+r.good||0)+(+r.defect||0)+(+r.scrap||0)+(+r.rework||0), 0);
  const defQty  = recsInPeriod.reduce((s,r)=>s+(+r.defect||0)+(+r.scrap||0), 0);
  const defRate = totalIn > 0 ? (defQty/totalIn*100) : 0;
  const ncCount   = ncAll.filter(n => !n.void).length;
  const ncWaiting = ncAll.filter(n => !n.void && n.status === NC_STATUS.RCV).length;
  const reworkReturned = ncAll
    .filter(n => !n.void && n.rework_record_id)
    .reduce((s,n) => s + (+DB.get('records', n.rework_record_id)?.good||0), 0);

  const pareto = ncParetoByType(startTs, endTs);
  const paretoMax = pareto.length ? pareto[0].qty : 1;
  const procMap = {};
  recsInPeriod.forEach(r => {
    const p = r.proc || '__';
    if(!procMap[p]) procMap[p] = { proc:p, name: DB.get('processes',p)?.name||p, produced:0, defect:0 };
    procMap[p].produced += (+r.good||0) + (+r.defect||0) + (+r.scrap||0) + (+r.rework||0);
    procMap[p].defect   += (+r.defect||0) + (+r.scrap||0);
  });
  const byProc = Object.values(procMap).filter(x => x.produced > 0)
    .map(x => ({ ...x, rate: x.produced>0 ? x.defect/x.produced*100 : 0 }))
    .sort((a,b) => b.rate - a.rate);
  const eqMap = {}, wkMap = {};
  ncAll.filter(n => !n.void).forEach(n => {
    if(n.equipment){
      if(!eqMap[n.equipment]) eqMap[n.equipment] = { name:n.equipment, count:0, qty:0 };
      eqMap[n.equipment].count += 1;
      eqMap[n.equipment].qty   += (+n.qty||0);
    }
    const wname = n.worker?.name || (typeof n.worker==='string' ? n.worker : '');
    if(wname){
      if(!wkMap[wname]) wkMap[wname] = { name:wname, count:0, qty:0 };
      wkMap[wname].count += 1;
      wkMap[wname].qty   += (+n.qty||0);
    }
  });
  const byEq = Object.values(eqMap).sort((a,b)=>b.qty-a.qty).slice(0, 6);
  const byWk = Object.values(wkMap).sort((a,b)=>b.qty-a.qty).slice(0, 6);

  const qcIcon = PAGES.find(p=>p.id==='qc')?.icon || '';
  const voidInPeriod = ncAll.filter(n => !!n.void).length;
  document.getElementById('view').innerHTML = `
    <div class="pghead">
      <div class="pgtitle"><svg class="ic" viewBox="0 0 24 24">${qcIcon}</svg>품질 관리 <span class="pill cyan">${APP_VERSION}</span></div>
      <div class="pgtools">
        <input id="qc-month" type="month" value="${_esc(st.month)}" style="width:160px">
        <label class="chk-toggle" style="display:inline-flex;align-items:center;gap:6px;font-size:11px;color:var(--sub);padding:6px 10px;border:1px solid var(--line);border-radius:8px;cursor:pointer;background:${st.voidView?'rgba(248,113,113,.08)':'var(--bg2)'}"><input type="checkbox" id="qc-void-view" ${st.voidView?'checked':''} style="width:auto;margin:0"> 취소 포함 보기${voidInPeriod>0?` <span style="color:var(--red);font-weight:700">(${voidInPeriod})</span>`:''}</label>
        <button class="btn" id="qc-xlsx">${ico('excel')}엑셀</button>
        <button class="btn primary" id="qc-new">${ico('plus')}부적합 등록</button>
      </div>
    </div>
    <div style="font-size:11px;color:var(--dim);margin-bottom:14px;line-height:1.6">
      부적합 관리 · ISO 8.7 실무 최소형 — 원칙: 재고·실적 원장 <b>직접 수정 없음</b>. 수량 이동은 기존 실적 경로만. 불량 유형은 <a href="#masters" style="color:var(--cyan)">기준정보 › 불량 유형</a> 마스터에서 관리.
    </div>

    <div class="grid g4" style="margin-bottom:14px">
      <div class="kpi-mini"><div class="lab">기간 불량률</div><div class="val" style="color:${defRate>=3?'var(--red)':(defRate>0?'var(--amber)':'var(--green)')}">${defRate.toFixed(1)}<span style="font-size:12px">%</span></div><div class="sub">실적 집계 재사용</div></div>
      <div class="kpi-mini"><div class="lab">부적합 건</div><div class="val">${ncCount}<span style="font-size:12px;color:var(--sub)">건</span></div><div class="sub">${_esc(st.month)}</div></div>
      <div class="kpi-mini"><div class="lab">처리 대기</div><div class="val" style="color:${ncWaiting>0?'var(--amber)':'var(--dim)'}">${ncWaiting}<span style="font-size:12px;color:var(--sub)">건</span></div><div class="sub">접수 상태</div></div>
      <div class="kpi-mini"><div class="lab">재작업 복귀량</div><div class="val" style="color:var(--blue)">${reworkReturned.toLocaleString()}<span style="font-size:12px;color:var(--sub)">ea</span></div><div class="sub">연결 실적 양품 합</div></div>
    </div>

    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px">
        <h3 style="margin:0">부적합 목록 <span class="tag">${ncFiltered.length}건 / 전체 ${ncAll.length}건 · 최신 위</span></h3>
        <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">
          <input id="qc-q" placeholder="검색 — NC · LOT · 품번 · 유형 · 공정" value="${_esc(st.q)}" style="width:240px;padding:6px 10px">
          <select id="qc-status" style="width:120px">
            <option value="">상태 ▾</option>
            ${['접수','재작업','폐기','특채','반품','완료'].map(s => `<option value="${s}" ${st.status===s?'selected':''}>${s}</option>`).join('')}
          </select>
        </div>
      </div>
      <div class="tbl-wrap"><table>
        <thead><tr><th>NC 번호</th><th>일자</th><th>품번·LOT</th><th>공정</th><th>유형</th><th class="num">수량</th><th>상태</th><th></th></tr></thead>
        <tbody>${ncFiltered.length ? ncFiltered.map(n => {
          const dt = DB.get('defect_types', n.defect_type);
          const p  = n.process ? DB.get('processes', n.process) : null;
          const isVoid = !!n.void;
          const rowStyle = isVoid ? 'opacity:.6;background:rgba(248,113,113,.05);text-decoration:line-through' : '';
          let actBtn = '';
          if(!isVoid){
            if(n.status === NC_STATUS.RCV) actBtn = `<button class="btn sm" data-nc-proc="${_esc(n.id)}">처리</button>`;
            else if(n.status === NC_STATUS.RW) actBtn = `<button class="btn sm primary" data-nc-link="${_esc(n.id)}">재작업 실적 등록</button>`;
            else actBtn = `<button class="btn sm ghost" data-nc-detail="${_esc(n.id)}">상세</button>`;
          } else {
            actBtn = `<button class="btn sm ghost" data-nc-detail="${_esc(n.id)}">상세</button>`;
          }
          const voidBadge = isVoid ? ` <span class="pill" style="background:rgba(248,113,113,.15);color:var(--red);font-size:9px;margin-left:4px;text-decoration:none">「취소」</span>` : '';
          return `<tr style="${rowStyle}">
            <td style="font-family:'JetBrains Mono',monospace;cursor:pointer" data-nc-detail="${_esc(n.id)}"><b style="color:var(--cyan)">${_esc(n.id)}</b>${voidBadge}</td>
            <td style="font-family:'JetBrains Mono',monospace">${_esc(n.date||fmtDate(n.ts))}</td>
            <td><b>${_esc(n.item_code||'—')}</b>${n.lot_id?` · <span style="font-family:'JetBrains Mono',monospace;font-size:11px">${_esc(n.lot_id)}</span>`:''}</td>
            <td>${_esc(p?.name||n.process||'—')}</td>
            <td>${_esc(dt?.name||n.defect_type||'—')}</td>
            <td class="num" style="font-family:'JetBrains Mono',monospace">${(+n.qty||0).toLocaleString()}</td>
            <td>${ncStatusBadge(n.status)}</td>
            <td style="text-align:right">${actBtn}</td>
          </tr>`;
        }).join('') : '<tr><td colspan="8" class="empty">부적합 없음 — [+ 부적합 등록] 또는 실적현황의 불량 실적에서 등록</td></tr>'}</tbody>
      </table></div>
    </div>

    <div class="grid g2" style="margin-top:14px">
      <div class="card">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px">
          <h3 style="font-size:13px;margin:0">불량 유형 파레토 <span class="tag">기간 · 유형은 기준정보 마스터</span></h3>
        </div>
        ${pareto.length ? `

// NC 상세 인쇄 (F2 — 부적합 보고서 · 기본 세로 · _openPrint 방향 토글)
function _qcPrintNc(nc_id){
  const nc = DB.get('nc_records', nc_id);
  if(!nc){ toast('NC 없음','err'); return; }
  const dtype  = DB.get('defect_types', nc.defect_type);
  const proc   = nc.process ? DB.get('processes', nc.process) : null;
  const item   = nc.item_code ? DB.get('items', nc.item_code) : null;
  const rework = nc.rework_record_id ? DB.get('records', nc.rework_record_id) : null;
  const co = getCompany();
  const kMap = { rework:'재작업', scrap:'폐기', deviation:'특채', return:'반품' };
  const body = `<div class="page">
    <div style="display:flex;justify-content:space-between;align-items:baseline;border-bottom:2px solid #16181d;padding-bottom:6px;margin-bottom:12px">
      <div><b style="font-size:16px">부적합 보고서</b> <span style="color:#666;font-size:11px;margin-left:6px">${_esc(nc.id)}</span></div>
      <div style="font-size:11px;color:#333">${_esc(co?.name||'')} · ${fmtDate(Date.now())}</div>
    </div>
    <table style="width:100%;border-collapse:collapse;margin-bottom:10px">
      <tr><th>일자</th><td class="v">${_esc(nc.date||fmtDate(nc.ts))}</td><th>상태</th><td class="v">${_esc(nc.status)}</td></tr>
      <tr><th>품번</th><td class="v">${_esc(nc.item_code||'—')} ${item?`(${_esc(item.name||'')})`:''}</td><th>LOT</th><td class="v">${_esc(nc.lot_id||'—')}</td></tr>
      <tr><th>공정 · 설비</th><td class="v" colspan="3">${_esc(proc?.name||nc.process||'—')} · ${_esc(nc.equipment||'—')}</td></tr>
      <tr><th>작업자</th><td class="v" colspan="3">${_esc(nc.worker?.name||nc.worker||'—')}</td></tr>
      <tr><th>유형</th><td class="v">${_esc(dtype?.name||nc.defect_type||'—')}</td><th>수량</th><td class="v">${(+nc.qty||0).toLocaleString()} ea</td></tr>
      <tr><th>연결 실적</th><td class="v">${_esc(nc.record_id||'—')}</td><th>재작업 실적</th><td class="v">${nc.rework_record_id?`${_esc(nc.rework_record_id)} · 양품 ${(+rework?.good||0).toLocaleString()}ea`:'—'}</td></tr>
      <tr><th>현상</th><td class="v" colspan="3" style="white-space:pre-wrap">${_esc(nc.memo||'—')}</td></tr>
    </table>
    ${nc.handle ? `
    <div style="margin-top:14px"><b style="font-size:13px">처리 결정</b></div>
    <table style="width:100%;border-collapse:collapse;margin-top:6px">
      <tr><th style="width:120px">유형</th><td class="v">${_esc(kMap[nc.handle.kind]||nc.handle.kind)}</td></tr>
      <tr><th>처리일 · 처리자</th><td class="v">${_esc(nc.handle.date||'')} · ${_esc(nc.handle.by_name||nc.handle.by||'')}</td></tr>
      ${nc.handle.reason  ? `<tr><th>사유</th><td class="v">${_esc(nc.handle.reason)}</td></tr>` : ''}
      ${nc.handle.approver? `<tr><th>승인자</th><td class="v">${_esc(nc.handle.approver)}</td></tr>` : ''}
      ${nc.handle.cust_ref? `<tr><th>고객 승인 근거</th><td class="v">${_esc(nc.handle.cust_ref)}</td></tr>` : ''}
      ${nc.handle.memo    ? `<tr><th>비고</th><td class="v" style="white-space:pre-wrap">${_esc(nc.handle.memo)}</td></tr>` : ''}
    </table>` : ''}
    <div style="margin-top:18px;font-size:10.5px;color:#666;text-align:right">MADE BY JUNS · VELA SYSTEM · ${_esc(APP_VERSION)}</div>
  </div>`;
  const css = `
    .page{width:794px;min-height:800px;background:#fff;padding:28px 34px;color:#16181d}
    table th{background:#f5f5f5;padding:6px 8px;font-size:11.5px;text-align:left;border:1px solid #ddd;width:120px}
    table td{padding:6px 8px;font-size:12px;border:1px solid #ddd}
    .v{font-family:'JetBrains Mono','Consolas',monospace;font-weight:600;font-size:12px}
  `;
  _openPrint(`부적합 보고서 ${nc.id}`, body, css, { formKey:'nc' });
}

          jobs.push({ col, id, doc });

      for(const j of jobs){

  function renderFlags(){
    if(!document.getElementById('flag-list')) return;
    const cur = getFlags();
    document.getElementById('flag-list').innerHTML = MODULE_DEFS.map(m=>`
      <div class="flag-mod">
        <h4>${m.title} <span class="desc">${m.desc}</span></h4>
        <div class="flag-items">
          ${m.items.map(([k,label,_,locked])=>`
            <span class="toggle ${cur[k]?'on':''} ${locked?'locked':''}" data-k="${k}" data-locked="${locked?1:0}">
              <span class="sw"></span>${label}
            </span>
          `).join('')}
        </div>
      </div>
    `).join('');
    document.querySelectorAll('.toggle').forEach(t=>t.onclick = () => {
      if(t.dataset.locked==='1'){ toast('코어 기능은 잠금','warn'); return; }
      const k = t.dataset.k;
      const cur = getFlags();
      const nextVal = !cur[k];
      // 의존성 체크
      if(nextVal && FEATURE_DEPS[k]?.needs){
        FEATURE_DEPS[k].needs.forEach(n=>{
          if(!cur[n]){ setFlag(n, true); toast(`필요 기능 자동 ON: ${n}`,'warn'); }
        });
      }
      if(!nextVal){
        // 끌 때 — 이 기능을 needs로 가진 다른 기능 경고
        const deps = Object.entries(FEATURE_DEPS).filter(([_,d])=>d.needs?.includes(k)).map(([key])=>key).filter(key=>getFlags()[key]);
        if(deps.length){ toast(`경고: ${deps.join(', ')}가 ${k}에 의존`,'warn',3000); }
      }
      setFlag(k, nextVal);
      renderNav(); renderFlags();
    });
    // 프리셋 칩
    document.querySelectorAll('[data-preset]').forEach(c=>c.onclick=()=>applyPreset(c.dataset.preset));
  }
  function applyPreset(name){
    const f = defaultFlags();
    if(name==='mvp'){ /* 그대로 (default가 MVP) */ }
    else if(name==='forging'){
      // v0.8.0 — 단조팩 = BOM·라우팅·원가·견적 + 금형·CAPA·자동계획
      Object.assign(f, {a_mold:true, a_tool:true, a_gauge:true, capa:true, q_inspect:true, pl_bom:true, pl_net:true, pl_auto:true, quote:true, cost:true});
    } else if(name==='machining'){
      Object.assign(f, {a_tool:true, capa:true, q_inspect:true, pl_bom:true, p_drawing:true, p_nc:true, cost:true});
    } else if(name==='heat'){
      Object.assign(f, {os_consigned:true, q_inspect:true});
    } else if(name==='iso'){
      Object.assign(f, {q_inspect:true, q_capa:true, q_doc:true, q_audit:true, q_review:true, q_train:true, q_supeval:true, q_risk:true});
    } else if(name==='full'){
      Object.keys(f).forEach(k=>f[k]=true);
    }
    DB.set('settings','features',{flags:f});
    toast(`프리셋 적용: ${name}`,'ok');
    renderNav(); renderFlags();
  }
  renderFlags();

  /* ★ v0.15.5 — 개발자 PIN 변경 (기능 플래그 카드 하단 · vendor 전용 DOM 안이라 게이팅 자동)
     ★ v0.22.1 — 신 정책(checkPwPolicy) + SHA-256+salt('VENDOR') 해시 저장. */
  const vpSave = document.getElementById('vp-save');
  if(vpSave){
    vpSave.onclick = async () => {
      const p1 = document.getElementById('vp-pin').value;
      const p2 = document.getElementById('vp-pin2').value;
      const chk = checkPwPolicy(p1, 'juns');
      if(!chk.ok){ toast(chk.reason,'warn'); return; }
      if(p1 !== p2){ toast('비밀번호 확인이 일치하지 않습니다','err'); return; }
      try {
        const hash = await hashPassword(p1, 'VENDOR');
        DB.set('settings','vendor', { pin: hash });
        document.getElementById('vp-pin').value  = '';
        document.getElementById('vp-pin2').value = '';
        toast('개발자 비밀번호 변경됨 — 다음 접속부터 적용','ok');
      } catch(e){
        console.error('[VELA] vendor pw save failed', e);
        toast('저장 실패 — 콘솔 확인','err');
      }
    };
  }

  /* ★ v0.16.24 — 메뉴 순서 편집 (개발자 전용 · 기능 플래그 카드 안이라 게이팅 자동)
     동작: ↑↓ 눌러 즉시 저장 → renderNav() → 이 목록 재렌더. [기본값 복원] = settings/menu.order 삭제. */
  const moList = document.getElementById('mo-list');
  if(moList){
    const flagsNow = () => getFlags();
    function renderMenuOrderList(){
      const order = getMenuOrder();
      const fl = flagsNow();
      moList.innerHTML = order.map((id, i) => {
        const p = PAGES.find(pp => pp.id === id);
        if(!p) return '';
        const off = !fl[p.flag];
        return `<div style="display:flex;align-items:center;gap:8px;padding:7px 10px;background:var(--bg2);border:1px solid var(--line);border-radius:8px;${off?'opacity:.55':''}">
          <span style="font-family:'JetBrains Mono',monospace;font-size:10.5px;color:var(--sub);width:24px;text-align:right">${i+1}</span>
          <svg viewBox="0 0 24 24" style="width:14px;height:14px;stroke:var(--cyan);fill:none;stroke-width:2;flex-shrink:0">${p.icon}</svg>
          <span style="flex:1;font-size:12.5px">${_esc(p.title)}${off?' <span style="font-size:10px;color:var(--dim)">(플래그 OFF)</span>':''}</span>
          <button class="btn ghost" data-mo-up="${id}" ${i===0?'disabled':''} title="위로" style="padding:4px 9px">↑</button>
          <button class="btn ghost" data-mo-dn="${id}" ${i===order.length-1?'disabled':''} title="아래로" style="padding:4px 9px">↓</button>
        </div>`;
      }).join('');
      document.querySelectorAll('[data-mo-up]').forEach(b => b.onclick = () => moMove(b.dataset.moUp, -1));
      document.querySelectorAll('[data-mo-dn]').forEach(b => b.onclick = () => moMove(b.dataset.moDn, +1));
    }
    function moMove(id, delta){
      const cur = getMenuOrder();
      const i = cur.indexOf(id);
      const j = i + delta;
      if(i < 0 || j < 0 || j >= cur.length) return;
      [cur[i], cur[j]] = [cur[j], cur[i]];
      saveMenuOrder(cur);
      renderNav();
      renderMenuOrderList();
    }
    document.getElementById('mo-reset').onclick = () => {
      // 기본값 복원 = settings/menu.order 를 코드 기본값으로 덮어씀 (deleteDoc 금지 · 병합 저장)
      saveMenuOrder(defaultMenuOrder());
      renderNav();
      renderMenuOrderList();
      toast('메뉴 순서 · 기본값 복원','ok');
    };
    renderMenuOrderList();
  }

  /* ★ v0.15.2 — 사용자·PIN 관리 (인증 계정) — increment-only, PIN 평문 비노출
     ※ 인증 흐름(renderGate/showRecognition/enterAsUser) 로직은 수정 금지 — 별도 CRUD 카드로 관리.
     ※ users(인증)와 workers(작업자 마스터)는 통합 금지 — 통합은 백엔드 설계에서 검토. */
  function activeManagerCount(){
    return DB.all('users').filter(x => x.active !== false && x.role === 'manager').length;
  }
  function renderUsers(){
    const users = DB.all('users').sort((a,b)=>{
      const aa = a.active !== false, ba = b.active !== false;
      if(aa !== ba) return aa ? -1 : 1;                 // 활성 먼저
      if((a.role==='manager') !== (b.role==='manager')) return a.role==='manager' ? -1 : 1;
      return (a.created_at||0) - (b.created_at||0);
    });
    document.getElementById('usr-rows').innerHTML = users.length ? users.map(u=>{
      const active = u.active !== false;
      const isMgr  = u.role === 'manager';
      const badge  = !active
        ? `<span class="pill gray">퇴사</span>`
        : (isMgr ? `<span class="pill amber">관리책임자</span>` : `<span class="pill gray">일반</span>`);
      const last = u.last_login ? `${fmtDate(u.last_login)} ${fmtTime(u.last_login)}` : '<span style="color:var(--dim)">—</span>';
      const stateBtn = active
        ? `<button class="btn ghost usr-quit" data-usr-quit="${u.id}">퇴사</button>`
        : `<button class="btn ghost" data-usr-reactivate="${u.id}">재활성</button>`;
      return `<tr class="${active?'':'usr-off'}">
        <td><b>${_esc(u.name)}</b>${SESSION.userId===u.id?' <span class="pill cyan" style="margin-left:4px">본인</span>':''}</td>
        <td style="font-family:'JetBrains Mono',monospace;color:var(--sub);letter-spacing:3px">••••••</td>
        <td>${badge}</td>
        <td class="muted">${last}</td>
        <td style="text-align:right">
          <div style="display:inline-flex;gap:6px;flex-wrap:wrap;justify-content:flex-end">
            <button class="btn ghost" data-usr-pin="${u.id}">PIN 재설정</button>
            <button class="btn ghost" data-usr-edit="${u.id}">수정</button>
            ${stateBtn}
          </div>
        </td>
      </tr>`;
    }).join('') : `<tr><td colspan="5" class="empty">사용자 없음</td></tr>`;
    document.querySelectorAll('[data-usr-pin]').forEach(b=>b.onclick       = ()=>usrResetPin(b.dataset.usrPin));
    document.querySelectorAll('[data-usr-edit]').forEach(b=>b.onclick      = ()=>usrEdit(b.dataset.usrEdit));
    document.querySelectorAll('[data-usr-quit]').forEach(b=>b.onclick      = ()=>usrQuit(b.dataset.usrQuit));
    document.querySelectorAll('[data-usr-reactivate]').forEach(b=>b.onclick= ()=>usrReactivate(b.dataset.usrReactivate));
  }
  function usrAdd(){
    openModal(`
      <h2>사용자 등록 <button class="x" onclick="closeModal()">${ico('x')}</button></h2>
      <div class="body">
        <div><label>이름 · 동명이인 등록 불가</label><input id="ua-name" placeholder="예: 홍길동" autocomplete="off"></div>
        <!-- ★ v0.16.22 — PIN 입력 제거. 초기 비밀번호 000000 자동 부여 → 최초 접속 시 강제 변경. -->
        <div style="background:var(--bg2);border:1px solid var(--line);border-radius:9px;padding:12px 14px;font-size:11.5px;color:var(--sub);line-height:1.7">
          <b style="color:var(--amber)">초기 비밀번호 000000 자동 부여</b> · 최초 접속 시 비밀번호 변경을 강제합니다.<br>
          <span style="color:var(--dim)">동명이인은 이름을 구분 표기(예: 김철수B). '개발자'·'juns' 등 예약어는 사용할 수 없습니다.</span>
        </div>
        <div style="display:flex;align-items:center;justify-content:space-between;background:var(--bg2);border:1px solid var(--line);border-radius:9px;padding:12px 14px;gap:10px">
          <div>
            <div style="font-size:13px;font-weight:700">관리책임자 권한</div>
            <div style="font-size:11px;color:var(--dim);margin-top:2px">켜면 설정 · 기준정보 접근 가능 · 끄면 실적 등록·조회만</div>
          </div>
          <label class="usr-sw"><input type="checkbox" id="ua-mgr"><span></span></label>
        </div>
        <div class="actions">
          <button class="btn" onclick="closeModal()">취소</button>
          <button class="btn primary" id="ua-ok">${ico('save')}저장</button>
        </div>
      </div>
    `);
    document.getElementById('ua-ok').onclick = ()=>{
      const name = document.getElementById('ua-name').value.trim();
      const mgr  = document.getElementById('ua-mgr').checked;
      if(!name){ toast('이름을 입력하세요','warn'); return; }
      // ★ v0.16.22 — 예약어 차단 (개발자 이름 도용 방지)
      if(isReservedName(name)){ toast('예약된 이름은 사용할 수 없습니다','err'); return; }
      // ★ v0.16.22 — 동명 차단 (이름=식별자 · trim 비교)
      if(nameDupExists(name, null)){ toast('이미 등록된 이름 — 동명이인은 구분 표기(예: 김철수B)','err',3200); return; }
      // U-XXX 채번 — 기존 최대 번호 + 1 (퇴사자 포함해 idx 안 겹치게)
      const nums = DB.all('users').map(u=>parseInt(String(u.id||'').replace(/^U-/,''),10)||0);
      const next = (nums.length? Math.max(...nums) : 0) + 1;
      const id = `U-${String(next).padStart(3,'0')}`;
      DB.set('users', id, { id, name, pin:'000000', role: mgr?'manager':'operator', active:true, created_at:Date.now(), last_login:null });
      toast(`사용자 등록 — ${name} · 초기 비밀번호 000000`,'ok',3200);
      closeModal(); renderUsers();
    };
  }
  function usrEdit(id){
    const u = DB.get('users', id); if(!u) return;
    openModal(`
      <h2>사용자 수정 — ${_esc(u.name)} <button class="x" onclick="closeModal()">${ico('x')}</button></h2>
      <div class="body">
        <div><label>이름</label><input id="ue-name" value="${_esc(u.name)}"></div>
        <div style="display:flex;align-items:center;justify-content:space-between;background:var(--bg2);border:1px solid var(--line);border-radius:9px;padding:12px 14px;gap:10px">
          <div>
            <div style="font-size:13px;font-weight:700">관리책임자 권한</div>
            <div style="font-size:11px;color:var(--dim);margin-top:2px">현재 <b style="color:${u.role==='manager'?'var(--amber)':'var(--sub)'}">${u.role==='manager'?'관리책임자':'일반'}</b> · 마지막 관리책임자 강등 시 차단</div>
          </div>
          <label class="usr-sw"><input type="checkbox" id="ue-mgr" ${u.role==='manager'?'checked':''}><span></span></label>
        </div>
        <div style="font-size:11px;color:var(--sub)">※ PIN 변경은 [PIN 재설정] 버튼으로 별도 진행</div>
        <div class="actions">
          <button class="btn" onclick="closeModal()">취소</button>
          <button class="btn primary" id="ue-ok">${ico('save')}저장</button>
        </div>
      </div>
    `);
    document.getElementById('ue-ok').onclick = ()=>{
      const name = document.getElementById('ue-name').value.trim();
      const mgr  = document.getElementById('ue-mgr').checked;
      if(!name){ toast('이름을 입력하세요','warn'); return; }
      // ★ v0.16.22 — 예약어 · 동명 차단 (이름=식별자)
      if(isReservedName(name)){ toast('예약된 이름은 사용할 수 없습니다','err'); return; }
      if(nameDupExists(name, id)){ toast('이미 등록된 이름 — 동명이인은 구분 표기(예: 김철수B)','err',3200); return; }
      // 마지막 활성 관리책임자 강등 차단
      if(u.active !== false && u.role === 'manager' && !mgr && activeManagerCount() <= 1){
        toast('후임 관리책임자를 먼저 승격하세요','err',3000); return;
      }
      DB.set('users', id, { name, role: mgr?'manager':'operator' });
      // 본인 편집이면 SESSION 표시 갱신
      if(SESSION.userId === id){
        SESSION.user = name;
        SESSION.role = mgr?'manager':'operator';
        renderNav();
        // 스스로 강등 → 현재 페이지가 MANAGER_ONLY 면 대시보드로
        const cur = (location.hash||'#dash').replace('#','');
        if(!mgr && MANAGER_ONLY.includes(cur)){ location.hash = '#dash'; }
      }
      toast('저장','ok'); closeModal(); renderUsers();
    };
  }
  function usrResetPin(id){
    const u = DB.get('users', id); if(!u) return;
    // ★ v0.16.22 — 분실 대응 = '000000 으로 초기화'로 단순화. 대상자는 다음 로그인 때 강제 변경.
    openModal(`
      <h2>PIN 재설정 — ${_esc(u.name)} <button class="x" onclick="closeModal()">${ico('x')}</button></h2>
      <div class="body">
        <div style="color:var(--sub);font-size:11.5px;line-height:1.7">
          분실 대응 — 비밀번호를 <b style="color:var(--amber)">000000</b> 으로 초기화합니다.<br>
          대상자는 다음 로그인 때 새 비밀번호 설정을 강제받습니다.
        </div>
        <div class="actions">
          <button class="btn" onclick="closeModal()">취소</button>
          <button class="btn primary" id="up-ok">${ico('save')}000000 으로 초기화</button>
        </div>
      </div>
    `);
    document.getElementById('up-ok').onclick = ()=>{
      DB.set('users', id, { pin:'000000' });
      toast(`PIN 초기화 — ${u.name} · 다음 로그인 시 강제 변경`,'ok',3200);
      closeModal(); renderUsers();
    };
  }
  function usrQuit(id){
    const u = DB.get('users', id); if(!u) return;
    // 마지막 관리책임자 퇴사 차단
    if(u.role === 'manager' && activeManagerCount() <= 1){
      toast('후임 관리책임자를 먼저 승격하세요','err',3000); return;
    }
    const isSelf = SESSION.userId === id;
    openModal(`
      <h2>퇴사 처리 <button class="x" onclick="closeModal()">${ico('x')}</button></h2>
      <div class="body">
        <div><b>${_esc(u.name)}</b>님을 <b style="color:var(--red)">비활성(퇴사)</b> 처리합니다.</div>
        <div style="font-size:11.5px;color:var(--sub)">과거 실적·로그 이력은 그대로 보존되며, 필요 시 [재활성]으로 복귀 가능합니다. 물리 삭제는 없습니다.</div>
        ${isSelf ? '<div style="color:var(--amber);font-size:12px;background:rgba(251,191,36,.08);border:1px solid rgba(251,191,36,.25);border-radius:8px;padding:8px 10px">※ 본인 퇴사 → 확인 후 즉시 로그아웃됩니다.</div>' : ''}
        <div class="actions">
          <button class="btn" onclick="closeModal()">취소</button>
          <button class="btn warn" id="uq-ok">${ico('trash')}퇴사</button>
        </div>
      </div>
    `);
    document.getElementById('uq-ok').onclick = ()=>{
      DB.set('users', id, { active:false });
      toast(`퇴사 처리 — ${u.name}`,'ok');
      closeModal();
      if(isSelf){ doLogoutNow(); return; }
      renderUsers();
    };
  }
  function usrReactivate(id){
    const u = DB.get('users', id); if(!u) return;
    DB.set('users', id, { active:true });
    toast(`재활성 — ${u.name}`,'ok');
    renderUsers();
  }
  document.getElementById('usr-add').onclick = usrAdd;
  renderUsers();

  // ★ v0.11.0 — 작업자 마스터
  function renderWorkers(){
    const ws = DB.all('workers').sort((a,b)=>(a.emp_no||'').localeCompare(b.emp_no||''));
    document.getElementById('wk-rows').innerHTML = ws.length? ws.map(w=>`
      <tr>
        <td><b>${w.emp_no||w.id}</b></td>
        <td>${w.name}</td>
        <td class="muted">${w.dept||''}</td>
        <td>${w.active!==false? '<span class="pill green">활성</span>' : '<span class="pill gray">비활성</span>'}</td>
        <td><button class="btn ghost" data-edit-wk="${w.id}">${ico('save')}</button></td>
      </tr>`).join('') : `<tr><td colspan="5" class="empty">작업자 없음 — 추가하세요</td></tr>`;
    document.querySelectorAll('[data-edit-wk]').forEach(b=>b.onclick=()=>editWorker(b.dataset.editWk));
  }
  function editWorker(id){
    const w = id? DB.get('workers', id) : {id:'', emp_no:'', name:'', dept:'', active:true};
    openModal(`
      <h2>${id?'작업자 편집':'작업자 추가'} <button class="x" onclick="closeModal()">${ico('x')}</button></h2>
      <div class="body">
        <div class="grid g2">
          <div><label>사번</label><input id="wk-emp" value="${w.emp_no||''}" ${id?'readonly':''} placeholder="예: OP-099"></div>
          <div><label>이름</label><input id="wk-name" value="${w.name||''}"></div>
        </div>
        <div class="grid g2">
          <div><label>부서</label><input id="wk-dept" value="${w.dept||''}" placeholder="예: 단조반"></div>
          <div><label>활성</label>
            <select id="wk-act"><option value="1"${w.active!==false?' selected':''}>활성</option><option value="0"${w.active===false?' selected':''}>비활성</option></select></div>
        </div>
        <div class="actions">
          <button class="btn" onclick="closeModal()">취소</button>
          <button class="btn primary" id="wk-ok">${ico('save')}저장</button>
        </div>
      </div>
    `);
    document.getElementById('wk-ok').onclick = ()=>{
      const emp = document.getElementById('wk-emp').value.trim();
      const name= document.getElementById('wk-name').value.trim();
      const dept= document.getElementById('wk-dept').value.trim();
      const act = document.getElementById('wk-act').value==='1';
      if(!emp || !name){ toast('사번/이름 입력','warn'); return; }
      DB.set('workers', emp, {id:emp, emp_no:emp, name, dept, active:act});
      toast('저장','ok'); closeModal(); renderWorkers();
    };
  }
  document.getElementById('wk-add').onclick = ()=>editWorker(null);
  renderWorkers();
};

/* -------------------------------------------------------------------------------------------------
   v0.14.0 — 스플래시 → 게이트 부트스트랩
   ------------------------------------------------------------------------------------------------- */
(function bootSplashAndGate(){
  // v0.15.1 — fail-safe 순서 재배치:
  //   ① 스플래시 제거 타이머는 renderGate() 실행 전에 등록 → renderGate가 던져도 스플래시는 반드시 걷힘.
  //   ② renderGate() 는 try/catch 로 감싸 게이트 영역에 에러 배너 표시.
  // ★ v0.22.3 — DOM 자가 점검: 배지 표시 상태를 플래그와 일치시킨다 (실모드 잔재 방지)
  {
    const b = document.getElementById('demo-badge');
    if(b) b.hidden = !isDemoMode();
  }
  const bar = document.getElementById('sp-load');
  const sp  = document.getElementById('splash');
  // ① 스플래시 애니메이션·제거 타이머 먼저 등록
  requestAnimationFrame(()=>{ if(bar) bar.classList.add('go'); });
  setTimeout(()=>{
    if(sp){
      sp.classList.add('gone');
      setTimeout(()=>{ sp.style.display = 'none'; }, 600);
    }
  }, 1500);

  // 스플래시에 회사명·사이트 반영 (실패해도 무해)
  try {
    const co = getCompany();
    const sn = document.getElementById('sp-co-name');
    const ss = document.getElementById('sp-co-site');
    if(sn && co?.name && co.name.trim()){ sn.textContent = co.name; sn.hidden = false; }
    if(ss && co?.site && co.site.trim()){ ss.textContent = co.site; ss.hidden = false; }
  } catch(_){}

  // ★ v0.22.0 — 데모 모드 자동 로그인 (게이트 생략 · 스플래시는 위 타이머로 걷힘)
  if(isDemoMode()){
    try { autoLoginDemo(); return; }
    catch(e){ console.error('[VELA] demo auto-login failed', e); /* 폴백: 아래 게이트 진행 */ }
  }
  // ② 게이트 렌더 — 실패 시 배너로 대체(스플래시는 위 타이머로 이미 걷힘 예약됨)
  try {
    renderGate();
  } catch(e){
    console.error('[VELA] renderGate failed:', e);
    const box = document.getElementById('pin-box');
    if(box){
      box.innerHTML = `
        <div style="max-width:320px;text-align:center;padding:22px 18px;background:rgba(248,113,113,.08);border:1px solid rgba(248,113,113,.35);border-radius:14px;color:var(--red);font-size:12.5px;line-height:1.6">
          <div style="font-weight:800;margin-bottom:8px">초기화 오류</div>
          <div style="color:var(--sub);font-size:11.5px">콘솔 확인:</div>
          <div style="color:var(--ink);font-family:'JetBrains Mono',monospace;font-size:11px;margin-top:6px;word-break:break-all">${(e && e.message ? e.message : String(e)).replace(/[<>&]/g, c => ({'<':'&lt;','>':'&gt;','&':'&amp;'}[c]))}</div>
        </div>
      `;
    }
  }
})();

/* PWA: 서비스워커는 단일 파일 환경에선 생략. manifest는 인라인 base64. */

/* 디버그 핸들 */
window.VELA = { DB, LOT, getFlags, setFlag, MODULE_DEFS, VIEWS, SESSION };
</script>
