        <div>견적금액 = <b style="color:var(--heat2);font-size:14px">₩${Math.round(totalAmt).toLocaleString()}</b> (수량 ${qty.toLocaleString()})</div>
      `;
      okBtn.disabled = !(qty>0 && mp>=0);
      okBtn._payload = { code, qty, mp, c, unitPrice, totalAmt, usedTotal };
    }
    // 품번/수량/마진 변경 시 override 해제하지 않음 (사용자 명시 반영 유지 — 필요 시 표준 다시 계산)
    ['q-item','q-qty','q-margin'].forEach(id=>document.getElementById(id).oninput = preview);
    document.getElementById('q-item').onchange = ()=>{ overrideCostTotal = null; preview(); };
    preview();
    document.getElementById('q-ok').onclick = ()=>{
      const p = document.getElementById('q-ok')._payload;
      if(!p){ toast('미리보기 오류','err'); return; }
      const cust = document.getElementById('q-cust').value;
      const valid = document.getElementById('q-valid').value;
      const qNo = resolveDocNo('q-id', 'Q');
      if(qNo.dup){ toast(`견적번호 중복 — ${qNo.id}`,'err'); return; }
      const id = qNo.id;
      // ★ v0.16.24 — cost_breakdown 구조화: {cat, name, qty, unit, price, amt}. 금액>0 행만 저장.
      //   qty·price 둘 다 있는 행은 amt = qty×price 로 확정 저장 (표시 = 저장 = 합계 일관).
      const cost_breakdown = breakdownRows.map(r => {
        const qty   = (r.qty  !=null && +r.qty  >0) ? +r.qty   : null;
        const price = (r.price!=null && +r.price>0) ? +r.price : null;
        const auto  = (qty!=null && price!=null);
        const amt   = auto ? Math.round(qty*price) : Math.round(+r.amt||0);
        return {
          cat: r.cat||'기타',
          name: (r.name || r.basis || '').trim(),
          qty, unit: r.unit || '', price, amt,
        };
      }).filter(r => r.amt > 0);
      DB.set('quotes', id, {
        id, cust, itemCode:p.code, qty:p.qty,
        mat_cost:Math.round(p.c.material), os_cost:Math.round(p.c.outsource),
        proc_cost:Math.round(p.c.process), overhead:Math.round(p.c.overhead),
        cost_total:Math.round(p.usedTotal),   // 반영된 원가(override 시 breakdown 합)
        margin_pct:p.mp, unit_price:Math.round(p.unitPrice), total_amount:Math.round(p.totalAmt),
        valid_until:valid, status:'draft', so_id:null, lost_reason:'',
        cost_breakdown,
        created:Date.now(), by:SESSION.user,
      });
      toast(`견적 생성 — ${id}${cost_breakdown.length?` · 산출 내역 ${cost_breakdown.length}행`:''}`,'ok');
      closeModal(); router();
    };
  };

/* -------------------------------------------------------------------------------------------------
   §CAPA / 순소요 / 자동계획 헬퍼 — v0.8.0
   ------------------------------------------------------------------------------------------------- */
// 설비 부하 (공정별)
//  · 외주 공정(type='out')은 자사 CAPA 산정 제외
//  · assigned = 현재 LOT들의 해당 공정 잔량 합(대기물량)
//  · 색 규칙(CLAUDE.md §14): <85% 여유 / 85~100% 적정 / >100% 초과
function loadColorOf(pct){
  if(pct < 85)  return 'green';
  if(pct <=100) return 'cyan';
  return 'red';
}
function loadArrowOf(pct){
  if(pct < 85)  return '▼';
  if(pct >100)  return '▲';
  return '';
}
/* ★ v0.10.0 — 진도/수주/설비현황 헬퍼
   ──────────────────────────────────────────────────────────────
   · lotCompletedQty: 그 LOT의 '출하 직전 공정' 양품 (= 완성수량). 484% 버그 방지.
   · periodRange: 일/주/월/년 시간 범위 (이번 주 = 월요일~오늘)
   · computeProgress: 진도 = Σ min(완성, 지시) / Σ 지시 (≤100% 보장)
   · computeOrderStages: 주문→출하완료/생산중(재공)/미착수 금액 3단계
   · computeEqStatus: 설비별 상태·실적(주/야)·달성·부하·생산성 (외주 제외)
*/
function lotCompletedQty(plot_no, itemCode){
  if(!plot_no || !itemCode) return 0;
  const route = getRoute(itemCode);
  if(!route.length) return 0;
  // 최종 공정 = 출하(SHIP) 직전 양품 공정. SHIP 없으면 마지막 공정.
  const finalProc = route.length>1 ? route[route.length-2].proc : route[0].proc;
  if(!finalProc) return 0;
  return LOT.totalGood(plot_no, finalProc);
}
function periodRange(period){
  const now = new Date();
  const start = new Date(now); start.setHours(0,0,0,0);
  const end = new Date(now); end.setHours(0,0,0,0); end.setDate(end.getDate()+1); // 내일 00시 (exclusive)
  if(period==='week'){
    // 월요일(0) ~ 일요일(6) 기준 — 이번주 월요일부터 오늘까지
    const dow = (start.getDay()+6)%7;
    start.setDate(start.getDate()-dow);
  } else if(period==='month'){
    start.setDate(1);
  } else if(period==='year'){
    start.setMonth(0,1);
  }
  return { start:start.getTime(), end:end.getTime(), label:periodLabel(period, start, end) };
}
function periodLabel(period, start /*Date*/, end){
  const p = x=>String(x).padStart(2,'0');
  const ds = `${start.getFullYear()}-${p(start.getMonth()+1)}-${p(start.getDate())}`;
  if(period==='day')   return `${ds} (오늘)`;
  if(period==='week')  return `${ds} ~ 오늘`;
  if(period==='month') return `${start.getFullYear()}-${p(start.getMonth()+1)} (이번달)`;
  if(period==='year')  return `${start.getFullYear()} (올해)`;
  return ds;
}
function computeProgress(period){
  const range = periodRange(period);
  const wos = DB.all('work_orders').filter(w=>w.created>=range.start && w.created<range.end);
  let totalDone=0, totalTarget=0;
  wos.forEach(w=>{
    const done = lotCompletedQty(w.plot_no, w.itemCode);
    const eff = Math.min(done, w.qty||0);     // ★ 각 항목 ≤ 지시수량 (484% 버그 방지)
    totalDone += eff;
    totalTarget += w.qty||0;
  });
  const pct = totalTarget>0 ? (totalDone/totalTarget*100) : 0;
  return { good:totalDone, target:totalTarget, pct:Math.min(100,pct), count:wos.length, label:range.label };
}
function computeOrderStages(){
  const orders = DB.all('orders');
  if(!orders.length) return { total:0, done:0, prog:0, wait:0, hasData:false };
  // 품번별 집계 (주문은 같은 품번 여러 건 가능)
  const byItem = {};
  orders.forEach(o=>{
    const code = o.itemCode;
    if(!byItem[code]) byItem[code] = { orderQty:0, price:0, shippedQty:0, producedQty:0 };
    byItem[code].orderQty += o.qty||0;
    if(o.price) byItem[code].price = o.price;
  });
  DB.all('shipments').forEach(sh=>{
    if(!byItem[sh.itemCode]) return; // 주문 없는 출하는 제외
    byItem[sh.itemCode].shippedQty += sh.qty||0;
  });
  Object.keys(byItem).forEach(code=>{
    const route = getRoute(code);
    if(!route.length) return;
    const fp = route.length>1 ? route[route.length-2].proc : route[0].proc;
    const produced = DB.query('production_lots', l=>l.itemCode===code).reduce((s,l)=>s+LOT.totalGood(l.plot_no, fp), 0);
    byItem[code].producedQty = produced;
  });
  let total=0, done=0, prog=0, wait=0;
  Object.values(byItem).forEach(it=>{
    if(it.orderQty<=0) return;
    const price = it.price||0;
    total += it.orderQty * price;
    const shipped = Math.min(it.shippedQty, it.orderQty);
    done += shipped * price;
    const remainQty = it.orderQty - shipped;
    // 재공(생산중) = 출하완료 이후 양품 보유분 (생산은 했으나 미출하)
    const producedNotShipped = Math.max(0, (it.producedQty||0) - it.shippedQty);
    const progQty = Math.min(remainQty, producedNotShipped);
    prog += progQty * price;
    wait += (remainQty - progQty) * price;
  });
  return { total, done, prog, wait, hasData: total>0 };
}
function computeEqStatus(period){
  const range = periodRange(period);
  // ★ v0.16.7 — 설비 목록 소스만 승격 (buildEquipmentList) · 이하 집계·필드 구조 불변
  const eqs = buildEquipmentList();
  const procs = getProcesses();
  return eqs.map(eq=>{
    const proc = DB.get('processes', eq.proc);
    const isOutsource = proc?.type==='out';
    // 기간 내 실적 (해당 설비)
    const recs = DB.query('records', r=>r.equipment===eq.name && r.ts>=range.start && r.ts<range.end);
    const goodDay   = recs.filter(r=>(r.shift||'day')==='day').reduce((s,r)=>s+(r.good||0),0);
    const goodNight = recs.filter(r=>r.shift==='night').reduce((s,r)=>s+(r.good||0),0);
    const total = goodDay + goodNight;
    // 지시 (해당 공정의 기간 WO 총 qty를 공정 설비 수로 균등 분배 — 간이)
    let procTarget = 0;
    DB.all('work_orders').filter(w=>w.created>=range.start && w.created<range.end).forEach(w=>{
      const route = getRoute(w.itemCode);
      if(route.some(r=>r.proc===eq.proc)) procTarget += w.qty||0;
    });
    const procEqs = eqs.filter(e=>e.proc===eq.proc);
    const target = procEqs.length>0 ? Math.round(procTarget / procEqs.length) : 0;
    // 일 능력 × 기간 일수
    const dailyCapa = (eq.hourly_capa||0) * (eq.working_hours||0);
    const periodDays = Math.max(1, Math.ceil((range.end - range.start)/86400000));
    const periodCapa = dailyCapa * periodDays;
    const loadPct = periodCapa>0 ? (target/periodCapa*100) : 0;
    const achievement = target>0 ? Math.min(100, total/target*100) : (total>0?100:0);
    // 상태: explicit eq.status 우선, 없으면 실적 유무로 추론
    let status = eq.status;
    if(!status) status = recs.length>0 ? 'run' : 'idle';
    // 생산성: BOM route productivity 또는 hourly_capa
    // (BOM route productivity는 다음 단계에 입력 — 현재는 hourly_capa 표시)
    let productivity = null;
    if(eq.hourly_capa) productivity = `${eq.hourly_capa}/시`;
    return {
      ...eq,
      procName: proc?.name || eq.proc, isOutsource,
      goodDay, goodNight, total, target, achievement, loadPct, status,
      periodCapa, periodDays, productivity,
      // 아이템별 분해 (실적 기준)
      itemBreakdown: (()=>{
        const byItem = {};
        recs.forEach(r=>{
          const lot = DB.get('production_lots', r.plot_no);
          if(!lot) return;
          const code = lot.itemCode;
          if(!byItem[code]) byItem[code] = { code, name:DB.get('items',code)?.name||'', day:0, night:0, total:0 };
          if((r.shift||'day')==='day') byItem[code].day += r.good||0;
          else byItem[code].night += r.good||0;
          byItem[code].total += r.good||0;
        });
        return Object.values(byItem);
      })(),
    };
  });
}

function computeCapa(){
  const procs = getProcesses().filter(p=>p.type!=='out' && p.code!=='SHIP');
  return procs.map(p=>{
    const eqs = DB.query('equipment', e=>e.proc===p.code);
    const dailyCapa = eqs.reduce((s,e)=>s + (e.hourly_capa||0) * (e.working_hours||0), 0);
    const assigned = DB.all('production_lots').reduce((s,l)=>{
      const route = getRoute(l.itemCode);
      if(!route.some(r=>r.proc===p.code)) return s;
      return s + Math.max(0, LOT.balance(l.plot_no, p.code));
    },0);
    const loadPct = dailyCapa? (assigned/dailyCapa)*100 : 0;
    const overflow = Math.max(0, assigned - dailyCapa);
    return { proc:p, dailyCapa, assigned, loadPct, overflow, eqs };
  });
}
// 품번별 순소요 (CLAUDE.md §7) — 수주잔량 − 완제품재고 (+안전재고 옵션)
function computeNetDemand(itemCode){
  const item = DB.get('items', itemCode);
  if(!item) return { netDemand:0, orderQty:0, stock:0, safety:0, due:'' };
  const opts = DB.get('settings','auto_plan') || {};
  // 수주 잔량 (출하 차감)
  const orders = DB.query('orders', o=>o.itemCode===itemCode);
  let orderQty=0, earliestDue='';
  orders.forEach(o=>{
    const ship = DB.query('shipments', x=>x.so_id===o.id).reduce((s,r)=>s+(r.qty||0),0);
    const rem = Math.max(0, (o.qty||0) - ship);
    orderQty += rem;
    if(rem>0 && o.due){
      if(!earliestDue || o.due < earliestDue) earliestDue = o.due;
    }
  });
  // 완제품 재고 (출하 직전공정 양품 누계 − 출하 누계)
  const route = getRoute(itemCode);
  const lastProd = route.length>1 ? route[route.length-2].proc : route[0]?.proc;
  const made = DB.query('production_lots', l=>l.itemCode===itemCode)
                 .reduce((s,l)=>s+LOT.totalGood(l.plot_no, lastProd),0);
  const shipped = DB.query('shipments', s=>s.itemCode===itemCode).reduce((s,r)=>s+(r.qty||0),0);
  const stock = Math.max(0, made - shipped);
  const safety = opts.use_safety ? (item.safety||0) : 0;
  const netDemand = Math.max(0, orderQty - stock + safety);
  return { netDemand, orderQty, stock, safety, due: earliestDue };
}
// 자동계획 엔진
function generateAutoPlan(){
  const opts = DB.get('settings','auto_plan') || {};
  const items = getItems().map(i=>{
    const nd = computeNetDemand(i.code);
    if(nd.netDemand<=0) return null;
    const bom = getBOM(i.code);
    const matKey = bom?.material?.type ? `${bom.material.type} Ø${bom.material.dia||0}` : (i.mat||'');
    return {
      code:i.code, name:i.name,
      netDemand: nd.netDemand, orderQty: nd.orderQty, stock: nd.stock, safety: nd.safety,
      due: nd.due || '',
      matKey, weight: bom?.material?.weight||i.weight||0,
    };
  }).filter(Boolean);
  // 같은 소재 묶음 (group_material on)
  const groups = {};
  if(opts.group_material!==false){
    items.forEach(p=>{
      if(!groups[p.matKey]) groups[p.matKey] = [];
      groups[p.matKey].push(p);
    });
  }
  // 납기순 정렬 (없으면 끝)
  items.sort((a,b)=> (a.due||'9999-12-31').localeCompare(b.due||'9999-12-31'));
  // 금형 경고 + CAPA 경고
  const capaByProc = {}; computeCapa().forEach(c=>capaByProc[c.proc.code]=c);
  // 누적 FORGE 부하 계산 (계획상 추가될 양)
  let cumForgeAdd = 0;
  items.forEach(p=>{
    // 금형 경고
    const molds = DB.query('molds', m=>m.itemCodes?.includes(p.code));
    let moldWarn = null;
    if(molds.length){
      const m = molds[0];
      const remain = Math.max(0, (m.life_limit||0) - (m.cum_strokes||0));
      if(remain < p.netDemand){
        moldWarn = `금형 ${m.id} 잔여 ${remain}타 < 계획 ${p.netDemand}타`;
      } else if(remain < p.netDemand*1.5){
        moldWarn = `금형 ${m.id} 임박(잔여 ${remain}타)`;
      }
    }
    // CAPA 경고 (FORGE 기준 — 단조 병목)
    let capaWarn = null;
    const fc = capaByProc['FORGE'];
    if(fc){
      cumForgeAdd += p.netDemand;
      const projected = fc.assigned + cumForgeAdd;
      const pct = fc.dailyCapa? (projected / fc.dailyCapa * 100) : 0;
      if(pct > 100) capaWarn = `FORGE 부하 ${pct.toFixed(0)}% (초과 ${(projected-fc.dailyCapa).toFixed(0)}ea)`;
    }
    p.moldWarn = moldWarn;
    p.capaWarn = capaWarn;
  });
  return { items, groups, capaByProc };
}

/* -------------------- 설비현황 (v0.10.0, 구 CAPA 흡수) --------------------
   eq-detail(소규모) + eq-large(대규모) 시안 자동 적응.
   - 설비 수 ≤ DETAIL_THRESHOLD → 카드 모드 (아이템별 표 포함)
   - 그 외 → 그룹+행 모드 (검색·필터·정렬)
   --------------------------------------------------------------------------- */
const ES_DETAIL_THRESHOLD = 10;

  if(!getFlags().capa){

  // 진입 시 기간 (대시보드 진도 4칸에서 전달)
  if(window._eqPeriod){ ES_STATE.period = window._eqPeriod; window._eqPeriod = null; }

  const period = ES_STATE.period;

  // 모드 결정
  const useDetailMode = (ES_STATE.mode==='detail') || (ES_STATE.mode==null && inHouse.length <= ES_DETAIL_THRESHOLD);
  const range = periodRange(period);

  const periodSeg = ['day','week','month','year'].map(p=>{

      </div>
    </div>

    <!-- 요약 스트립 -->

      <div class="sumc"><div class="sl">정지</div><div class="sv" style="color:var(--red)">${stopN}</div><div class="ss">점검·고장</div></div>
      <div class="sumc"><div class="sl">부하 초과</div><div class="sv" style="color:var(--red)">${overN}<span style="font-size:12px;color:var(--sub)">대</span></div><div class="ss">100% 초과</div></div>
    </div>

    ${useDetailMode ? esRenderDetail(inHouse, outHouse) : esRenderLarge(inHouse, outHouse)}

    ES_STATE.mode = useDetailMode? 'large' : 'detail';

  // 컨트롤(대규모 모드)
  const sInput = document.getElementById('es-search-input');

  }
  document.querySelectorAll('.fchip[data-filter]').forEach(c=>c.onclick=()=>{
    ES_STATE.filter = c.dataset.filter;
    esRender();

  const sortSel = document.getElementById('es-sortby');
  if(sortSel) sortSel.onchange = e=>{ ES_STATE.sort = e.target.value; esRender(); };

  document.querySelectorAll('.ghead[data-grp]').forEach(g=>g.onclick=()=>{

// 소규모 (상세) — eq-detail.html 톤
function esRenderDetail(inHouse, outHouse){
  if(!inHouse.length && !outHouse.length){
    return '<div class="card"><div class="empty">설비 마스터 없음 — 설비 편집 모달에서 등록</div></div>';
  }
  const renderCard = e=>{
    const isHot = e.loadPct>100;
    const ld = isHot? 'hot' : (e.loadPct<85? 'ok' : 'ok');
    const totalColor = e.achievement>=100? 'var(--cyan)' : e.achievement>=50? 'var(--amber)' : 'var(--dim)';
    const hasWork = e.target>0 || e.total>0;
    return `<div class="eqcard ${e.status==='idle'?'idle':''}">
      <div class="eqhead">
        <div>
          <div class="eqname">${e.name} <span class="eqpill ${e.status}">● ${({run:'가동중',idle:'유휴',stop:'정지'})[e.status]||e.status}</span></div>
          <div class="eqmeta">${e.procName}${e.productivity?` · ${e.productivity}`:''}${e.isOutsource?' · ◇ 외주':''}</div>
        </div>
        <div class="eqtotal">
          <div class="et" style="color:${totalColor}">${e.total.toLocaleString()} / ${e.target.toLocaleString()}</div>
          <div class="es">${e.target>0? `지시 대비 ${e.achievement.toFixed(0)}%` : '지시 없음'}</div>
        </div>
      </div>
      ${hasWork && e.itemBreakdown.length? `
        <table class="eqitem-table">
          <thead><tr><th>아이템</th><th class="num">지시</th><th class="num">주간 · 야간</th><th class="num">실적</th><th class="num">달성</th><th>생산성</th></tr></thead>
          <tbody>${e.itemBreakdown.map(it=>{
            const itPct = e.target>0? Math.min(100, it.total/e.target*100) : 0;
            const pctClr = itPct>=100?'var(--green)':itPct>=50?'var(--amber)':'var(--dim)';
            return `<tr>
              <td class="item-name">${it.code} <span>${it.name||''}</span></td>
              <td class="num">${e.target.toLocaleString()}</td>
              <td class="num shift-cell"><span class="day">${it.day.toLocaleString()}</span><span class="sep">·</span><span class="night">${it.night.toLocaleString()}</span></td>
              <td class="num">${it.total.toLocaleString()}</td>
              <td class="num"><span class="ct-bar"><i class="${itPct>=100?'full':''}" style="width:${itPct.toFixed(1)}%"></i></span><span class="ct-pct" style="color:${pctClr}">${itPct.toFixed(0)}%</span></td>
              <td class="productivity">${e.productivity||'—'}</td>
            </tr>`;
          }).join('')}</tbody>
        </table>
      ` : `<div class="no-work">${e.target>0?'주·야 실적 없음':'배정된 작업 없음'}</div>`}
      <div style="margin-top:10px;display:flex;justify-content:flex-end;gap:6px">
        <button class="btn ghost" data-edit-eq="${e.id}">${ico('save')}편집</button>
      </div>
    </div>`;
  };
  let html = inHouse.map(renderCard).join('');
  if(outHouse.length){
    html += `<div class="card" style="margin-bottom:14px;border-color:var(--cyan-dim);background:rgba(94,234,212,.04)">
      <h3>외주 공정 <span class="tag">자사 부하 산정 제외</span></h3>
      <div style="display:flex;flex-wrap:wrap;gap:8px;margin-top:10px">${outHouse.map(e=>`<span class="pill heat">${e.name} <span style="color:var(--sub);font-weight:500">(${e.procName})</span></span>`).join('')}</div>
    </div>`;
  }
  return html;
}

// 대규모 (그룹+행) — eq-large.html 톤
function esRenderLarge(inHouse, outHouse){
  // 필터/검색 적용
  let filtered = inHouse;
  if(ES_STATE.search){
    const q = ES_STATE.search.toLowerCase();
    filtered = filtered.filter(e=> e.name.toLowerCase().includes(q) || (e.id||'').toLowerCase().includes(q));
  }
  if(ES_STATE.filter==='run')   filtered = filtered.filter(e=>e.status==='run');
  else if(ES_STATE.filter==='idle')  filtered = filtered.filter(e=>e.status==='idle');
  else if(ES_STATE.filter==='over')  filtered = filtered.filter(e=>e.loadPct>100);
  // 정렬
  const sortFn = {
    load:  (a,b)=>b.loadPct - a.loadPct,
    achv:  (a,b)=>a.achievement - b.achievement,
    name:  (a,b)=>(a.id||'').localeCompare(b.id||''),
  }[ES_STATE.sort] || ((a,b)=>b.loadPct-a.loadPct);
  filtered.sort(sortFn);
  // 그룹핑 (공정별)
  const groups = {};
  filtered.forEach(e=>{ if(!groups[e.proc]) groups[e.proc]=[]; groups[e.proc].push(e); });
  // 컨트롤
  const fChip = (k,lab,extra='') => `<span class="fchip ${extra} ${ES_STATE.filter===k?'on':''}" data-filter="${k}">${lab}</span>`;

  let html = `
    <div class="es-controls">
      <div class="es-search">
        <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg>
        <input id="es-search-input" placeholder="설비명·번호 검색 (예: EQ-FORGE-1)">
      </div>
      <div class="es-filt">
        ${fChip('all','전체')}
        ${fChip('run','가동중')}
        ${fChip('idle','유휴')}
        ${fChip('over','초과만','hot')}
      </div>
      <select class="es-sortby" id="es-sortby">
        <option value="load" ${ES_STATE.sort==='load'?'selected':''}>부하 높은순</option>
        <option value="achv" ${ES_STATE.sort==='achv'?'selected':''}>달성률 낮은순</option>
        <option value="name" ${ES_STATE.sort==='name'?'selected':''}>설비번호순</option>
      </select>
    </div>
  `;

  if(!Object.keys(groups).length){
    html += '<div class="card"><div class="empty">조건에 맞는 설비 없음 — 필터/검색 확인</div></div>';
  }

  Object.entries(groups).forEach(([procCode, eqs])=>{
    const proc = DB.get('processes', procCode);
    const runC = eqs.filter(e=>e.status==='run').length;
    const avgLoad = eqs.length>0 ? eqs.reduce((s,e)=>s+e.loadPct,0)/eqs.length : 0;
    const glClass = avgLoad<85?'g':avgLoad<=100?'a':'h';
    const glColor = avgLoad<85?'var(--green)':avgLoad<=100?'var(--amber)':'var(--red)';
    const glBg = avgLoad<85?'linear-gradient(90deg,#16a34a,var(--green))':avgLoad<=100?'linear-gradient(90deg,#d97706,var(--amber))':'linear-gradient(90deg,var(--heat),var(--red))';
    const isCollapsed = !!ES_STATE.collapsed[procCode];
    html += `<div class="pgroup ${isCollapsed?'collapsed':''}">
      <div class="ghead" data-grp="${procCode}">
        <span class="gname">${proc?.name||procCode}</span>
        <span class="gcount">${eqs.length}대 · 가동 ${runC}</span>
        <div class="gload">
          <span style="font-size:11px;color:var(--sub)">그룹 평균 부하</span>
          <div class="gl-bar"><i style="width:${Math.min(100,avgLoad).toFixed(1)}%;background:${glBg}"></i></div>
          <span class="gl-pct" style="color:${glColor}">${avgLoad.toFixed(0)}%</span>
        </div>
        <span class="gchev">${isCollapsed?'▶':'▼'}</span>
      </div>
      <div class="eqtable">
        <div class="eqrow head">
          <span>설비</span>
          <span class="num">지시</span>
          <span class="num">실적(주·야)</span>
          <span class="num">달성</span>
          <span style="text-align:right">부하율</span>
          <span style="text-align:right">생산성</span>
        </div>
        ${eqs.map(e=>{
          const isHot = e.loadPct>100;
          const ld = isHot? 'h' : (e.loadPct<85? 'g' : 'a');
          const isStop = e.status==='stop';
          const isIdle = e.status==='idle';
          return `<div class="eqrow ${isIdle?'muted':''}">
            <span class="en"><span class="statusdot ${e.status}"></span>${e.name}</span>
            <span class="num">${e.target.toLocaleString()}</span>
            <span class="num">${e.total>0? `${e.goodDay.toLocaleString()}·${e.goodNight.toLocaleString()}` : '—'}</span>
            <span class="num">${e.total>0? e.total.toLocaleString() : '—'}</span>
            <span class="ld ${isStop?'h':ld}">${isStop? '<span class="ld-pct">정지</span>' : isIdle? '<span class="ld-pct" style="color:var(--dim)">유휴</span>' : `<span class="ld-bar"><i style="width:${Math.min(100,e.loadPct).toFixed(1)}%"></i></span><span class="ld-pct">${e.loadPct.toFixed(0)}%</span>`}</span>
            <span class="prod">${e.productivity||'—'}</span>

        }).join('')}

  // 외주 그룹 (접힘 가능)
  if(outHouse.length){
    const outCol = !!ES_STATE.collapsed['_outsource'];
    html += `<div class="pgroup ${outCol?'collapsed':''}">
      <div class="ghead" data-grp="_outsource">
        <span class="gname">${outHouse[0].procName} <span class="out-tag">◇ 외주</span></span>
        <span class="gcount">${outHouse.length}대 · 외주 처리 · 부하 산정 제외</span>
        <span class="gchev" style="margin-left:auto">${outCol?'▶':'▼'}</span>
      </div>
      <div class="eqtable">
        ${outHouse.map(e=>`<div class="eqrow muted">
          <span class="en"><span class="statusdot idle"></span>${e.name}</span>
          <span class="num">—</span><span class="num">—</span><span class="num">—</span>
          <span class="ld"><span class="ld-pct" style="color:var(--cyan-dim)">외주</span></span>
          <span class="prod">${e.productivity||'—'}</span>
        </div>`).join('')}
      </div>
    </div>`;
  }
  return html;
}

/* ================================================================================================
   ★ v0.23.0 — 일괄 발행 헬퍼 (계획 → 지시 · 모달 없이 프리필 값 그대로 · WO 3 STEP 무수정)
   splitPlansForWo(planIds) : 선택 건을 ready / hold(사유)로 분리 — 소재 부족·부하 초과·품번 미등록·이미 발행 검사
   issueWoFromPlan(plan)    : WO 3 STEP 저장 스키마(line 5462~ 참조)와 동일 필드로 1건 발행 + plan.wo_id 병합
   · 두 함수 모두 wo_id 재발행 차단(이중 검사)
   · SESSION.user 를 by 로 그대로 기록
   · 자동 발행·설정·배너는 도입하지 않음 (범위 밖) — 후속 확장 여지만 남김
   ================================================================================================ */
function splitPlansForWo(planIds){
  const ready = [];
  const hold  = [];
  (planIds || []).forEach(id => {
    const p = DB.get('production_plans', id);
    if(!p){          hold.push({ planId:id, plan:null, reason:'계획 없음' }); return; }
    if(p.void){      hold.push({ planId:id, plan:p,   reason:'취소된 계획' }); return; }
    if(p.wo_id){     hold.push({ planId:id, plan:p,   reason:`이미 발행 (${p.wo_id})` }); return; }
    const it = DB.get('items', p.itemCode);
    if(!it){         hold.push({ planId:id, plan:p,   reason:`품번 미등록 (${p.itemCode||'—'})` }); return; }
    const qty = +p.qty || 0;
    if(qty <= 0){    hold.push({ planId:id, plan:p,   reason:'수량 0 이하' }); return; }
    // 소재 부족 (calcPlanMaterial red 만 hold · 미등록(null)은 통과 — 대시보드 표시 규칙과 동일)
    const mat = calcPlanMaterial(p);
    if(mat && !mat.ok){
      hold.push({ planId:id, plan:p, reason:`소재 부족 ${Math.round(mat.shortage).toLocaleString()}kg (필요 ${Math.round(mat.need).toLocaleString()}kg / 재고 ${Math.round(mat.stock).toLocaleString()}kg)` });
      return;
    }
    // 부하 초과 (설비·CT 있는 건만 · calcDayLoad 재사용 · p 는 이미 저장돼 있어 그대로 합산)
    if(p.equipment){
      const procCode = getEqProcCode(p.equipment);
      const ct = procCode ? +(it?.proc_times?.[procCode]?.ct) : 0;
      if(procCode && ct > 0){
        const load = calcDayLoad(p.date, p.equipment);
        if(load.pct > 100){
          hold.push({ planId:id, plan:p, reason:`부하 초과 ${load.pct.toFixed(0)}% (${load.usedH.toFixed(1)}h / ${load.capH}h)` });
          return;
        }
      }
    }
    ready.push({ planId:id, plan:p });
  });
  return { ready, hold };
}

// WO 3 STEP 모달 저장부(line 5462~5472)와 동일 스키마로 1건 발행 · 사용자 확인 없이 즉시 저장.
// 필드가 어긋나면 수동 경로와 결과가 달라지므로, _woNew 수정 시 여기도 동기해야 함.
function issueWoFromPlan(plan){
  if(!plan)         return { ok:false, reason:'계획 없음' };
  if(plan.void)     return { ok:false, reason:'취소된 계획' };
  if(plan.wo_id)    return { ok:false, reason:`이미 발행 (${plan.wo_id})` };
  const qty = +plan.qty || 0;
  if(qty <= 0)      return { ok:false, reason:'수량 0 이하' };
  const it = DB.get('items', plan.itemCode);
  if(!it)           return { ok:false, reason:`품번 미등록 (${plan.itemCode||'—'})` };
  try {
    const woId   = nextDocNo('WO');
    if(DB.get('work_orders', woId))    return { ok:false, reason:`지시번호 중복 — ${woId}` };
    const plotNo = nextDocNo('PL');
    if(DB.get('production_lots', plotNo)) return { ok:false, reason:`LOT 번호 중복 — ${plotNo}` };
    // 프리필 기본값: 소재 heat 미선택 · 공정별 계획 설비 미지정 (수동 경로에서도 그대로 저장 가능한 조합)
    LOT.create({ plot_no: plotNo, itemCode: plan.itemCode, materialLots: [], qty_initial: qty });
    const wo = {
      id: woId,
      itemCode: plan.itemCode,
      plot_no:  plotNo,
      qty,
      so_id:    plan.so_id || null,
      plan_eq:  {},
      created:  Date.now(),
      by:       SESSION.user,
    };
    DB.set('work_orders', woId, wo);
    DB.correct('production_plans', plan.id, { wo_id: woId }, `WO ${woId} 발행 (일괄)`);
    return { ok:true, wo_id:woId, plot_no:plotNo };
  } catch(e){
    return { ok:false, reason: e.message || '발행 실패' };
  }
}

/* ================================================================================================
   ★ v0.20.1 — 생산계획 (board) · 수주 → 계획 → 지시 발행 → 실적
   plans 컬렉션 = production_plans (기존 auto plan 문서는 plan_type 미지정, 신규 board 는 plan_type='board').
   상태 저장 금지 → calcPlanProgress 로 파생만. 지시 로직 신규 작성 금지 — VIEWS._woNew(pre) 프리필 호출.
   ================================================================================================ */
VIEWS.plan = () => {
  if(!getFlags().plan){
    document.getElementById('view').innerHTML = `<div class="card">생산계획 모듈 OFF — 설정에서 켜세요.</div>`;
    return;
  }
  // ★ v0.23.2 — 구 자동계획 헤더가 있으면 board 행으로 이관 (guard 로 1회만)
  migrateAutoPlanToBoard();
  const state = (window._planFilter = window._planFilter || {
    tab:'week', axis:'item', anchor: fmtDate(Date.now()),
    q:'', eq:'', status:'', origin:''
  });
  // 이전 세션(v0.23.1)에서 origin 필드가 없던 경우 방어
  if(state.origin === undefined) state.origin = '';
  const today = fmtDate(Date.now());
  // 활성 설비 (사내 공정만)
  const equipmentList = buildEquipmentList();
  const eqNames = equipmentList.map(e=>e.name);
  // ★ v0.23.3 — 목록 기준 1벌 (getLivePlans) · plan_type 무관 · 자동/수동/구형 미지정 모두 포함
  const allPlans = getLivePlans();

  // 필터 함수
  const matchesFilter = (p) => {
    if(state.eq){
      if(state.eq==='__none__'){ if(p.equipment) return false; }
      else if(p.equipment !== state.eq) return false;
    }
    if(state.status){
      const pr = calcPlanProgress(p);
      if(pr.state !== state.status) return false;
    }
    // ★ v0.23.2 — 출처 필터 (전체 / 자동 / 수동). 수동 = origin 미지정 또는 'manual'.
    if(state.origin){
      const isAuto = p.origin === 'auto';
      if(state.origin === 'auto' && !isAuto) return false;
      if(state.origin === 'manual' &&  isAuto) return false;
    }
    if(state.q){
      const q = state.q.toLowerCase();
      const it = DB.get('items', p.itemCode);
      const so = p.so_id ? DB.get('orders', p.so_id) : null;
      const text = `${p.itemCode} ${it?.name||''} ${p.so_id||''} ${so?.id||''} ${p.note||''}`.toLowerCase();
      if(!text.includes(q)) return false;
    }
    return true;
  };

  // 기간 범위 산정 (일/주/월)
  function periodOf(){
    const d = new Date(state.anchor + 'T00:00:00');
    if(state.tab==='day'){
      return { start: state.anchor, end: state.anchor, days: [state.anchor], label: state.anchor };
    }
    if(state.tab==='week'){
      const day = d.getDay();
      const monOffset = day === 0 ? -6 : (1 - day);
      const mon = new Date(d); mon.setDate(d.getDate()+monOffset);
      const days = [];
      for(let i=0;i<7;i++){ const dd = new Date(mon); dd.setDate(mon.getDate()+i); days.push(fmtDate(dd.getTime())); }
      return { start: days[0], end: days[6], days, label: `${days[0]} ~ ${days[6]}` };
    }
    // month
    const yr = d.getFullYear(), mo = d.getMonth();
    const first = new Date(yr, mo, 1);
    const last  = new Date(yr, mo+1, 0);
    const days = [];
    for(let i=1;i<=last.getDate();i++){ days.push(fmtDate(new Date(yr, mo, i).getTime())); }
    return { start: days[0], end: days[days.length-1], days, label: `${yr}-${String(mo+1).padStart(2,'0')}` };
  }
  const period = periodOf();
  const inRange = p => p.date >= period.start && p.date <= period.end;
  const scoped = allPlans.filter(matchesFilter);
  const scopedInPeriod = scoped.filter(inRange);

  // KPI (기간 기준)
  const kpiPlan = scopedInPeriod.reduce((s,p)=>s+(+p.qty||0), 0);
  const kpiActual = scopedInPeriod.reduce((s,p)=>s+calcPlanProgress(p).actual, 0);
  const kpiPct = kpiPlan>0 ? Math.min(100, kpiActual/kpiPlan*100) : 0;

  // 이동 헬퍼
  const shift = (delta) => {
    const d = new Date(state.anchor + 'T00:00:00');
    if(state.tab==='day') d.setDate(d.getDate() + delta);
    else if(state.tab==='week') d.setDate(d.getDate() + delta*7);
    else d.setMonth(d.getMonth() + delta);
    state.anchor = fmtDate(d.getTime());
    router();
  };
  window._planShift = shift;

  const tabBtn = (k,label) => `<button class="btn ${state.tab===k?'primary':''}" data-ptab="${k}" style="border-radius:99px;padding:7px 16px">${label}</button>`;
  const axisBtn = (k,label) => `<button class="btn ${state.axis===k?'primary':''}" data-paxis="${k}" style="border-radius:99px;padding:6px 14px;font-size:11px">${label}</button>`;

  // 상태 색 (blue 계획 / amber 지시발행 / green 완료)
  const stateColor = (s) => s==='완료' ? 'green' : (s==='지시발행' ? 'heat' : 'cyan');
  const matDot = (m) => {
    if(!m) return '<span style="color:var(--dim);font-size:9px" title="소재 정보 미등록">●</span>';
    return m.ok
      ? '<span style="color:var(--green);font-size:9px" title="소재 충분 · 재고 '+Math.round(m.stock).toLocaleString()+'kg / 필요 '+Math.round(m.need).toLocaleString()+'kg">●</span>'
      : '<span style="color:var(--red);font-size:9px" title="소재 부족 · 부족 '+Math.round(m.shortage).toLocaleString()+'kg">●</span>';
  };

  // 뷰별 본문
  let body = '';
  if(state.tab==='day'){
    // 설비별 그룹 (미배정 포함) — 계획일=anchor
    const dayPlans = scoped.filter(p => p.date === state.anchor);
    const groups = { '__none__':[] };
    eqNames.forEach(n => groups[n] = []);
    dayPlans.forEach(p => {
      const key = p.equipment && groups[p.equipment] ? p.equipment : (p.equipment || '__none__');
      if(!groups[key]) groups[key] = [];
      groups[key].push(p);
    });
    const groupKeys = ['__none__', ...eqNames.filter(n => (groups[n]||[]).length)];
    body = `
      <div class="card">
        <h3>일간 · ${_esc(state.anchor)} <span class="tag">${dayPlans.length}건 · 설비별 그룹 (미배정 포함)</span></h3>
        ${groupKeys.map(k => {
          const arr = groups[k] || [];
          if(!arr.length && k !== '__none__') return '';
          const label = k==='__none__' ? '미배정' : k;
          // ★ v0.20.4 — 설비 그룹 헤더에 부하율 소자 (calcDayLoad 재사용 · 미배정은 미표시)
          let loadBadge = '';
          if(k !== '__none__'){
            const ld = calcDayLoad(state.anchor, k);
            const over = ld.pct > 100;
            const clr = over ? 'var(--red)' : 'var(--sub)';
            const bold = over ? 'font-weight:700' : '';
            const uncntTxt = ld.uncounted > 0 ? ` <span style="color:var(--dim);font-weight:400">±${ld.uncounted}건 미산정</span>` : '';
            loadBadge = `<span style="margin-left:8px;color:${clr};font-size:10.5px;${bold}">부하 ${ld.pct.toFixed(0)}% <span style="color:var(--dim);font-weight:400">(${ld.usedH.toFixed(1)}h/${ld.capH}h)</span>${uncntTxt}</span>`;
          }
          return `
            <div style="margin-bottom:10px">
              <div style="font-size:11px;color:${k==='__none__'?'var(--amber)':'var(--cyan)'};font-weight:600;padding:6px 0;letter-spacing:.3px">▾ ${_esc(label)} <span style="color:var(--dim);font-weight:400">${arr.length}건</span>${loadBadge}</div>
              ${arr.length ? arr.map(p => {
                const it = DB.get('items', p.itemCode);
                const pr = calcPlanProgress(p);
                const mat = calcPlanMaterial(p);
                return `<div style="display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--bg2);border:1px solid var(--line);border-radius:8px;margin-bottom:4px;font-size:12px">
                  ${matDot(mat)}
                  <b>${_esc(p.itemCode)}</b>
                  <span class="muted" style="font-size:11px">${_esc(it?.name||'')}</span>
                  <span class="pill ${stateColor(pr.state)}" style="font-size:10px">${pr.state}</span>
                  <span style="margin-left:auto;font-family:'JetBrains Mono',monospace;color:var(--cyan)">${(+p.qty||0).toLocaleString()}ea</span>
                  <span style="font-family:'JetBrains Mono',monospace;color:var(--sub);font-size:11px">→ ${pr.actual.toLocaleString()}</span>
                </div>`;
              }).join('') : `<div style="color:var(--dim);font-size:11px;padding:6px 0">계획 없음</div>`}
            </div>`;
        }).join('')}
      </div>`;
  } else if(state.tab==='week'){
    // 주간 보드 — 7열 · 행 축 토글 (품번 / 설비)
    const cellPlans = {};   // { rowKey: { date: [plans] } }
    if(state.axis==='item'){
      const items = new Set(scoped.filter(inRange).map(p=>p.itemCode));
      items.forEach(code => {
        cellPlans[code] = {};
        period.days.forEach(d => cellPlans[code][d] = []);
      });
      scoped.filter(inRange).forEach(p => {
        if(!cellPlans[p.itemCode]) cellPlans[p.itemCode] = {};
        if(!cellPlans[p.itemCode][p.date]) cellPlans[p.itemCode][p.date] = [];
        cellPlans[p.itemCode][p.date].push(p);
      });
    } else {
      // 설비별 — 미배정 맨 위
      cellPlans['__none__'] = {};
      period.days.forEach(d => cellPlans['__none__'][d] = []);
      const eqsInScope = new Set(scoped.filter(inRange).map(p => p.equipment).filter(Boolean));
      [...eqsInScope].forEach(name => {
        cellPlans[name] = {};
        period.days.forEach(d => cellPlans[name][d] = []);
      });
      scoped.filter(inRange).forEach(p => {
        const k = p.equipment || '__none__';
        if(!cellPlans[k]) cellPlans[k] = {};
        if(!cellPlans[k][p.date]) cellPlans[k][p.date] = [];
        cellPlans[k][p.date].push(p);
      });
    }
    const rowKeys = Object.keys(cellPlans);
    const dayLabels = ['월','화','수','목','금','토','일'];
    const rowLabel = (k) => {
      if(state.axis==='item'){
        const it = DB.get('items', k);
        return `<b>${_esc(k)}</b> <span class="muted" style="font-size:10px">${_esc(it?.name||'')}</span>`;
      }
      return k==='__none__' ? '<span style="color:var(--amber)">미배정</span>' : `<b>${_esc(k)}</b>`;
    };

    body = `
      <div class="card">
        <h3>주간 보드 <span class="tag">${_esc(period.label)} · ${rowKeys.length}행 · ${scopedInPeriod.length}건</span></h3>
        <div class="tbl-wrap"><table style="font-size:12px">
          <thead><tr>
            <th style="width:140px;background:var(--bg2)">${state.axis==='item'?'품번':'설비'}</th>
            ${period.days.map((d,i) => {
              const isToday = d===today;
              const hi = isToday ? 'background:rgba(94,234,212,.08);color:var(--cyan)' : '';
              return `<th style="${hi}"><div style="font-size:10px;color:var(--dim)">${dayLabels[i]}</div><div>${d.slice(5)}</div></th>`;
            }).join('')}
          </tr></thead>
          <tbody>${rowKeys.length? rowKeys.map(k => `
            <tr>
              <td style="font-size:11px">${rowLabel(k)}</td>
              ${period.days.map(d => {
                const cell = cellPlans[k][d] || [];
                const isToday = d===today;
                const hi = isToday ? 'background:rgba(94,234,212,.04)' : '';
                // ★ v0.20.4 — 설비 축일 때 셀 하단 부하율 소자 (100% 초과 red bold · 미산정 표기 · 미배정/품번축 제외)
                let loadFoot = '';
                if(state.axis === 'eq' && k !== '__none__'){
                  const ld = calcDayLoad(d, k);
                  if(ld.usedH > 0 || ld.uncounted > 0 || cell.length){
                    const over = ld.pct > 100;
                    const clr = over ? 'var(--red)' : 'var(--sub)';
                    const wt  = over ? 'font-weight:700' : '';
                    const un  = ld.uncounted > 0 ? ` <span style="color:var(--dim);font-weight:400">±${ld.uncounted}건 미산정</span>` : '';
                    loadFoot = `<div style="font-size:9.5px;color:${clr};${wt};margin-top:3px;letter-spacing:.2px">부하 ${ld.pct.toFixed(0)}%${un}</div>`;
                  }
                }
                return `<td style="${hi};vertical-align:top">${cell.length? cell.map(p => {
                  const pr = calcPlanProgress(p);
                  const mat = calcPlanMaterial(p);
                  const cls = stateColor(pr.state);
                  return `<span class="pill ${cls}" style="font-size:10px;margin:1px 2px;display:inline-flex;align-items:center;gap:3px;cursor:pointer" onclick="VIEWS._planNav('${_esc(p.date)}')" title="${_esc(p.itemCode)} · ${pr.state} · 실적 ${pr.actual}/${p.qty}${mat? (mat.ok?' · 소재 OK':' · 소재 부족 '+Math.round(mat.shortage)+'kg'):''}">${matDot(mat)}${(+p.qty||0).toLocaleString()}</span>`;
                }).join('') : '<span style="color:var(--dim);font-size:10px">·</span>'}${loadFoot}</td>`;
              }).join('')}
            </tr>
          `).join('') : `<tr><td colspan="8" class="empty">계획 없음 — [+ 계획 수립]으로 추가</td></tr>`}</tbody>
        </table></div>
      </div>`;
  } else {
    // 월간 — 달력 그리드 (요약만)
    const first = new Date(period.start + 'T00:00:00');
    const firstDow = first.getDay();
    const monOffset = firstDow === 0 ? -6 : (1 - firstDow);   // 월요일 시작
    const gridStart = new Date(first); gridStart.setDate(first.getDate()+monOffset);
    const cells = [];
    for(let i=0;i<42;i++){
      const d = new Date(gridStart); d.setDate(gridStart.getDate()+i);
      cells.push(fmtDate(d.getTime()));
    }
    const dayCounts = {};
    scoped.forEach(p => {
      if(!dayCounts[p.date]) dayCounts[p.date] = { cnt:0, qty:0 };
      dayCounts[p.date].cnt++;
      dayCounts[p.date].qty += (+p.qty||0);
    });
    const dayLabels = ['월','화','수','목','금','토','일'];
    body = `
      <div class="card">
        <h3>월간 · ${_esc(period.label)} <span class="tag">셀 클릭 → 일간 뷰 점프 (개별 칩 나열 없음)</span></h3>
        <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px">
          ${dayLabels.map(l => `<div style="font-size:10px;color:var(--dim);text-align:center;padding:4px 0;letter-spacing:.3px">${l}</div>`).join('')}
          ${cells.map(d => {
            const inMonth = d.slice(0,7) === period.label;
            const cnt = dayCounts[d];
            const isToday = d===today;
            const style = `background:${isToday?'rgba(94,234,212,.08)':(inMonth?'var(--bg2)':'transparent')};border:1px solid ${isToday?'var(--cyan)':'var(--line)'};border-radius:6px;padding:6px 8px;min-height:56px;cursor:pointer;opacity:${inMonth?1:0.35}`;
            return `<div style="${style}" onclick="VIEWS._planNav('${d}')">
              <div style="font-size:10px;color:var(--sub);font-weight:600">${d.slice(-2)}</div>
              ${cnt ? `<div style="font-size:11px;color:var(--cyan);font-family:'JetBrains Mono',monospace;margin-top:2px">${cnt.cnt}건 · ${cnt.qty.toLocaleString()}</div>` : ''}
            </div>`;
          }).join('')}
        </div>
      </div>`;
  }

  // 계획 목록 (기간·필터 반영)
  const listRows = scopedInPeriod.slice().sort((a,b) => (b.date||'').localeCompare(a.date||''));

  document.getElementById('view').innerHTML = `
    <div class="pghead">
      <div class="pgtitle"><svg class="ic" viewBox="0 0 24 24">${pgIcon('plan')}</svg>생산계획 <span class="pill cyan">${APP_VERSION}</span></div>
      <div class="pgtools">
        <button class="btn" id="btn-plan-xlsx">${ico('excel')}엑셀</button>
        <button class="btn primary" id="btn-plan-new">${ico('plus')}계획 수립</button>
      </div>
    </div>
    <div style="font-size:11px;color:var(--dim);margin-bottom:14px">수주 → 계획 → 작업지시 · 상태는 파생(저장 안 함) · 소재 표시=건별 기준(같은 소재 다계획 합산은 범위 밖)</div>

    <!-- 기간 탭 + 이동 -->
    <div class="card" style="padding:14px;margin-bottom:12px">
      <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap">
        ${tabBtn('day','일간')}${tabBtn('week','주간')}${tabBtn('month','월간')}
        <div style="display:flex;gap:4px;margin-left:12px">
          <button class="btn ghost" onclick="_planShift(-1)">◀</button>
          <button class="btn ghost" onclick="(function(){window._planFilter.anchor='${today}';router();})()">오늘</button>
          <button class="btn ghost" onclick="_planShift(1)">▶</button>
        </div>
        <span style="color:var(--sub);font-size:11.5px;margin-left:8px">${_esc(period.label)}</span>
        ${state.tab==='week' ? `<div style="margin-left:auto;display:flex;gap:4px">${axisBtn('item','품번별')}${axisBtn('eq','설비별')}</div>` : ''}
      </div>

      <!-- 검색·필터 (전 기간 뷰 공통) -->
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-top:10px">
        <div style="flex:1;min-width:240px;display:flex;align-items:center;gap:9px;background:var(--bg2);border:1px solid var(--line);border-radius:10px;padding:8px 12px">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--sub)" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg>
          <input id="plan-q" placeholder="검색 — 품번·품명·수주·비고" value="${_esc(state.q)}" style="flex:1;background:none;border:none;outline:none;color:var(--ink);font-size:12px;padding:0">
        </div>
        <select id="plan-eq" style="width:140px">
          <option value="">전체 설비</option>
          <option value="__none__" ${state.eq==='__none__'?'selected':''}>미배정</option>
          ${eqNames.map(n => `<option value="${_esc(n)}" ${state.eq===n?'selected':''}>${_esc(n)}</option>`).join('')}
        </select>
        <select id="plan-status" style="width:110px">
          <option value="">전체 상태</option>
          <option value="계획" ${state.status==='계획'?'selected':''}>계획</option>
          <option value="지시발행" ${state.status==='지시발행'?'selected':''}>지시발행</option>
          <option value="완료" ${state.status==='완료'?'selected':''}>완료</option>
        </select>
        <!-- ★ v0.23.2 — 출처 필터 (전체/자동/수동) -->
        <select id="plan-origin" style="width:110px" title="출처 (자동계획 · 수동 등록)">
          <option value="">전체 출처</option>
          <option value="auto"   ${state.origin==='auto'?'selected':''}>자동만</option>
          <option value="manual" ${state.origin==='manual'?'selected':''}>수동만</option>
        </select>
      </div>
    </div>

    <!-- KPI (기간 연동) -->
    <div class="grid g4" style="margin-bottom:12px">
      <div class="kpi-mini"><div class="lab">${ico('check')}기간 계획량</div><div class="val c">${kpiPlan.toLocaleString()}<span style="font-size:12px;color:var(--sub)">ea</span></div><div class="sub">${scopedInPeriod.length}건 · ${_esc(period.label)}</div></div>
      <div class="kpi-mini"><div class="lab">${ico('check')}기간 실적</div><div class="val g">${kpiActual.toLocaleString()}<span style="font-size:12px;color:var(--sub)">ea</span></div><div class="sub">양품 합 (라우트 첫 공정)</div></div>
      <div class="kpi-mini"><div class="lab">${ico('check')}달성률</div><div class="val c">${kpiPct.toFixed(0)}<span style="font-size:12px;color:var(--sub)">%</span></div><div class="sub">cap 100%</div></div>
      <div class="kpi-mini"><div class="lab">${ico('check')}전체 계획</div><div class="val c">${allPlans.length}<span style="font-size:12px;color:var(--sub)">건</span></div><div class="sub">모든 기간</div></div>
    </div>

    ${body}

    <!-- 계획 목록 (하단) -->
    <div class="card">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap">
        <h3 style="margin:0">계획 목록 <span class="tag">${listRows.length}건 · 기간·필터 반영</span></h3>
        <!-- ★ v0.23.0 — 체크 1건 이상일 때 활성 · WO 3 STEP 무수정 · 확인 모달에서 hold 사유 확인 후 발행 -->
        <button class="btn primary" id="btn-plan-batch-issue" style="margin-left:auto" disabled>${ico('plus')}작업지시 생성 <span id="btn-plan-batch-cnt" style="opacity:.75;margin-left:4px"></span></button>
      </div>
      <div class="tbl-wrap"><table>
        <thead><tr><th style="width:32px"><input type="checkbox" id="plan-chk-all" style="width:auto;margin:0" title="전체 선택 (미발행 · 미취소만)"></th><th>계획일</th><th>품번·품명</th><th>수주·납기</th><th>설비</th><th class="num">계획</th><th class="num">실적</th><th style="width:100px">달성</th><th>상태</th><th>소재</th><th></th></tr></thead>
        <tbody>${listRows.length? listRows.map(p => {
          const it = DB.get('items', p.itemCode);
          const pr = calcPlanProgress(p);
          const mat = calcPlanMaterial(p);
          const so = p.so_id ? DB.get('orders', p.so_id) : null;
          const cust = so?.cust ? (DB.get('vendors', so.cust)?.name || so.cust) : '';
          const cls = stateColor(pr.state);
          // ★ v0.23.0 — 발행됨(wo_id)·취소(void) 행은 체크 불가(dim). listRows 는 DB.all 이라 실전엔 void 없음이지만 방어적으로 검사.
          const canPick = !p.wo_id && !p.void;
          const rowStyle = canPick ? '' : 'opacity:.55';
          const chkCell  = canPick
            ? `<input type="checkbox" class="plan-chk" data-plan-id="${_esc(p.id)}" style="width:auto;margin:0" title="발행 대상 선택">`
            : `<input type="checkbox" disabled style="width:auto;margin:0" title="${p.wo_id?'이미 발행됨':'취소된 계획'}">`;
          const woBtn = p.wo_id
            ? `<button class="btn ghost" onclick="location.hash='#wo'" title="${_esc(p.wo_id)}"><span class="pill cyan" style="font-size:10px">${_esc(p.wo_id)}</span></button>`
            : `<button class="btn ghost" data-issue="${_esc(p.id)}" style="color:var(--cyan)">${ico('plus')}지시 발행</button>`;
          const cancelBtn = p.wo_id
            ? `<button class="btn ghost" title="지시 발행된 계획 — 지시 먼저 취소" disabled style="opacity:.4">${ico('x')}</button>`
            : `<button class="btn ghost" data-plan-cancel="${_esc(p.id)}" style="color:var(--red)">${ico('x')}</button>`;
          // ★ v0.23.2 — 출처 배지 ([자동] amber · [수동] dim) — 저장소 통합 후 시각 구분
          const originBadge = p.origin === 'auto'
            ? `<span class="pill" style="background:rgba(251,191,36,.15);color:var(--amber);font-size:9px;margin-left:4px" title="자동계획 생성">자동</span>`
            : `<span class="pill" style="background:var(--bg2);color:var(--dim);font-size:9px;margin-left:4px;border:1px solid var(--line)" title="수동 등록">수동</span>`;
          return `<tr style="${rowStyle}">
            <td>${chkCell}</td>
            <td class="muted">${_esc(p.date)}${originBadge}</td>
            <td><b>${_esc(p.itemCode)}</b> <span class="muted" style="font-size:11px">${_esc(it?.name||'')}</span></td>
            <td>${so ? `<div style="font-size:11px"><b>${_esc(so.id)}</b>${cust?`<div style="color:var(--sub);font-size:10px">${_esc(cust)}</div>`:''}${so.due?`<div style="color:var(--dim);font-size:10px">납기 ${_esc(so.due)}</div>`:''}</div>` : '<span class="muted" style="font-size:10.5px">재고생산</span>'}</td>
            <td style="font-size:11px">${p.equipment ? _esc(p.equipment) : '<span style="color:var(--amber)">미배정</span>'}</td>
            <td class="num" style="font-family:'JetBrains Mono',monospace;color:var(--cyan)">${(+p.qty||0).toLocaleString()}</td>
            <td class="num" style="font-family:'JetBrains Mono',monospace">${pr.actual.toLocaleString()}</td>
            <td><div style="background:var(--bg2);border-radius:99px;height:8px;overflow:hidden"><div style="height:100%;width:${pr.pct.toFixed(1)}%;background:${pr.state==='완료'?'var(--green)':(pr.state==='지시발행'?'var(--amber)':'var(--cyan)')}"></div></div><div style="font-size:10px;color:var(--sub);margin-top:2px">${pr.pct.toFixed(0)}%</div></td>
            <td><span class="pill ${cls}">${pr.state}</span></td>
            <td>${mat===null? '<span style="color:var(--dim);font-size:11px" title="품번 재질·단중 미등록">—</span>' : (mat.ok? `<span style="color:var(--green);font-size:11px" title="필요 ${Math.round(mat.need)}kg / 재고 ${Math.round(mat.stock)}kg">● 충분</span>` : `<span style="color:var(--red);font-size:11px" title="부족 ${Math.round(mat.shortage)}kg">● 부족</span>`)}</td>
            <td>${woBtn} ${cancelBtn}</td>
          </tr>`;
        }).join('') : '<tr><td colspan="11" class="empty">이 기간에 계획 없음 — [+ 계획 수립]으로 추가</td></tr>'}</tbody>
      </table></div>
      <div style="font-size:10.5px;color:var(--dim);margin-top:8px;line-height:1.6">
        · 소재 표시 = <b>건별 기준</b> (같은 소재 다계획 합산 소요 대비는 범위 밖 · 부족해도 등록 허용).
        · 상태는 파생(저장 안 함) — 실적 ≥ 계획 시 자동 '완료'.
      </div>
    </div>
  `;

  // 이벤트 바인딩
  document.querySelectorAll('[data-ptab]').forEach(b => b.onclick = ()=>{ state.tab=b.dataset.ptab; router(); });
  document.querySelectorAll('[data-paxis]').forEach(b => b.onclick = ()=>{ state.axis=b.dataset.paxis; router(); });
  let qT;
  document.getElementById('plan-q').oninput = (e)=>{ clearTimeout(qT); qT=setTimeout(()=>{ state.q=e.target.value; router(); }, 250); };
  document.getElementById('plan-eq').onchange = (e)=>{ state.eq=e.target.value; router(); };
  document.getElementById('plan-status').onchange = (e)=>{ state.status=e.target.value; router(); };
  document.getElementById('plan-origin').onchange = (e)=>{ state.origin=e.target.value; router(); };
  document.getElementById('btn-plan-new').onclick = ()=>VIEWS._planNew();
  document.querySelectorAll('[data-issue]').forEach(b => b.onclick = ()=>VIEWS._planIssueWO(b.dataset.issue));
  document.querySelectorAll('[data-plan-cancel]').forEach(b => b.onclick = ()=>VIEWS._planCancel(b.dataset.planCancel));

  // ★ v0.23.0 — 체크박스 + 일괄 발행 버튼
  const chkAll = document.getElementById('plan-chk-all');
  const chks   = [...document.querySelectorAll('.plan-chk')];
  const batchBtn = document.getElementById('btn-plan-batch-issue');
  const batchCnt = document.getElementById('btn-plan-batch-cnt');
  const syncBatchBtn = () => {
    const picked = chks.filter(c => c.checked).length;
    batchBtn.disabled = picked === 0;
    batchCnt.textContent = picked > 0 ? `· ${picked}건 선택` : '';
    // 전체선택 체크박스 상태 동기 (일부만 체크 → indeterminate)
    if(chks.length === 0){ chkAll.checked = false; chkAll.indeterminate = false; }
    else if(picked === 0){ chkAll.checked = false; chkAll.indeterminate = false; }
    else if(picked === chks.length){ chkAll.checked = true; chkAll.indeterminate = false; }
    else { chkAll.checked = false; chkAll.indeterminate = true; }
  };
  chkAll.onchange = () => { chks.forEach(c => c.checked = chkAll.checked); syncBatchBtn(); };
  chks.forEach(c => c.onchange = syncBatchBtn);
  batchBtn.onclick = () => {
    const ids = chks.filter(c => c.checked).map(c => c.dataset.planId);
    if(!ids.length) return;
    VIEWS._planBatchIssue(ids);
  };
  syncBatchBtn();
  document.getElementById('btn-plan-xlsx').onclick = ()=>{
    const xrows = listRows.map(p => {
      const it = DB.get('items', p.itemCode);
      const pr = calcPlanProgress(p);
      const so = p.so_id ? DB.get('orders', p.so_id) : null;
      return {
        계획일: p.date,
        품번: p.itemCode, 품명: it?.name||'',
        수주: p.so_id||'', 납기: so?.due||'',
        설비: p.equipment || '(미배정)',
        계획: +p.qty||0, 실적: pr.actual,
        달성률: pr.pct.toFixed(1)+'%',
        상태: pr.state, 비고: p.note||''
      };
    });
    exportXlsx(xrows, '생산계획', `생산계획_${period.start}_${fmtDate(Date.now())}.xlsx`);
  };
};

// 일간 뷰로 점프
VIEWS._planNav = (dateStr) => {
  window._planFilter = window._planFilter || {};
  window._planFilter.tab = 'day';
  window._planFilter.anchor = dateStr;
  location.hash = '#plan';
  router();
};

// 계획 수립 모달
VIEWS._planNew = (prefill) => {
  const items = getActiveItems();
  const equipmentList = buildEquipmentList();
  const today = fmtDate(Date.now());
  // 잔량 있는 live 수주
  const soLive = DB.all('orders').map(o => {
    const shipped = DB.query('shipments', s=>s.so_id===o.id).reduce((s,r)=>s+(r.qty||0),0);
    const remain  = Math.max(0, (o.qty||0) - shipped);
    return {o, remain, shipped};
  }).filter(x => x.remain>0).sort((a,b) => (a.o.due||'').localeCompare(b.o.due||''));

  openModal(`
    <h2>계획 수립 <span style="color:var(--dim);font-size:12px;font-weight:400;margin-left:8px">수주 연결 → 일정 · 수량 · 설비</span> <button class="x" onclick="closeModal()">${ico('x')}</button></h2>
    <div class="body">
      <div><label>수주 연결 (잔량 있음)</label>
        <select id="pln-so">
          <option value="">재고생산 — 수주 연결 없음</option>
          ${soLive.map(({o, remain, shipped}) => {
            const it = DB.get('items', o.itemCode);
            const cust = DB.get('vendors', o.cust)?.name || o.cust || '미지정';
            return `<option value="${_esc(o.id)}" data-item="${_esc(o.itemCode)}" data-remain="${remain}" data-due="${_esc(o.due||'')}">${_esc(o.id)} · ${_esc(cust)} · ${_esc(o.itemCode)} ${_esc(it?.name||'')} · 잔량 ${remain.toLocaleString()}ea · 납기 ${_esc(o.due||'—')}</option>`;
          }).join('')}
        </select>
        <div id="pln-so-hint" style="font-size:11px;color:var(--sub);margin-top:6px">재고생산 선택 — 수주 없이 계획</div>
      </div>
      <div class="grid g2" style="margin-top:10px">
        <div><label>품번</label>
          <select id="pln-item">${items.map(i => `<option value="${_esc(i.code)}">${_esc(i.code)} · ${_esc(i.name)}</option>`).join('')}</select></div>
        <div><label>계획일</label>
          <input id="pln-date" type="text" value="${today}" placeholder="YYYY-MM-DD" inputmode="numeric" pattern="\\d{4}-\\d{2}-\\d{2}" autocomplete="off" style="font-family:'JetBrains Mono',monospace"></div>
      </div>
      <div class="grid g2" style="margin-top:10px">
        <div><label>수량 (ea)</label>
          <input id="pln-qty" type="number" min="1" placeholder="예: 800"></div>
        <div><label>설비 (선택)</label>
          <select id="pln-eq">
            <option value="">미배정</option>
            ${equipmentList.map(e => `<option value="${_esc(e.name)}">${_esc(e.name)} · ${_esc(e.proc)}</option>`).join('')}
          </select></div>
      </div>
      <div style="margin-top:10px"><label>비고 (선택)</label>
        <input id="pln-note" placeholder="예: 열처리 완료 후 최종 검사 후 출하"></div>
      <div id="pln-mat-hint" style="font-size:11.5px;color:var(--sub);margin-top:10px;padding:10px 12px;background:var(--bg2);border:1px solid var(--line);border-radius:8px;line-height:1.6">소재 힌트 — 품번·수량 선택 시 표시</div>
      <!-- ★ v0.20.4 — 부하 힌트 (설비+날짜+수량 실시간) · 초과 시 저장 단계에서 확인 (차단 X) -->
      <div id="pln-load-hint" style="font-size:11.5px;color:var(--sub);margin-top:8px;padding:10px 12px;background:var(--bg2);border:1px solid var(--line);border-radius:8px;line-height:1.6">부하 힌트 — 설비·날짜·수량 선택 시 표시</div>
      <div class="actions">
        <button class="btn" onclick="closeModal()">취소</button>
        <button class="btn primary" id="pln-ok">${ico('save')}계획 저장</button>
      </div>
    </div>
  `);

  const soSel = document.getElementById('pln-so');
  const itemSel = document.getElementById('pln-item');
  const qtyEl = document.getElementById('pln-qty');
  const dateEl = document.getElementById('pln-date');
  const eqSel  = document.getElementById('pln-eq');
  const soHint = document.getElementById('pln-so-hint');
  const matHint = document.getElementById('pln-mat-hint');
  const loadHint = document.getElementById('pln-load-hint');
  // ★ v0.20.2 — 공용 달력 팝업 (수기 입력 병행 · 모달 바깥클릭 보호와 독립)
  attachCalendar(dateEl);

  const updMatHint = () => {
    const p = { itemCode: itemSel.value, qty: +qtyEl.value||0, date: dateEl.value };
    const m = calcPlanMaterial(p);
    if(m===null){
      matHint.innerHTML = '<span style="color:var(--dim)">소재 정보 미등록 — <a href="#masters" style="color:var(--cyan)">기준정보</a>에서 재질·단중 등록</span>';
      return;
    }
    const dot = m.ok
      ? '<span style="color:var(--green);font-weight:700">● 충분</span>'
      : `<span style="color:var(--red);font-weight:700">● 부족 ${Math.round(m.shortage).toLocaleString()}kg</span>`;
    matHint.innerHTML = `소재: <b>${_esc(m.mat)}</b> · 현 재고 <b>${Math.round(m.stock).toLocaleString()}kg</b> · 필요 ≈ <b>${Math.round(m.need).toLocaleString()}kg</b> (${(p.qty).toLocaleString()}ea × ${m.weight}kg) ${dot}<div style="font-size:10.5px;color:var(--dim);margin-top:4px">※ 부족해도 등록은 허용 — 건별 기준 표시(같은 소재 다계획 합산은 범위 밖)</div>`;
  };

  // ★ v0.20.4 — 부하 힌트 (설비+날짜+수량 실시간 · calcDayLoad 재사용 · 이 입력을 팬텀으로 얹음)
  const updLoadHint = () => {
    const eq = eqSel.value;
    const date = dateEl.value;
    const itemCode = itemSel.value;
    const qty = +qtyEl.value || 0;
    if(!eq){
      loadHint.innerHTML = '<span style="color:var(--dim)">부하 미산정 (설비 미지정) — 설비 지정 시 산정</span>';
      return;
    }
    if(!date){
      loadHint.innerHTML = '<span style="color:var(--dim)">부하 미산정 (계획일 미입력)</span>';
      return;
    }
    const procCode = getEqProcCode(eq);
    const it = itemCode ? DB.get('items', itemCode) : null;
    const ct = procCode ? +(it?.proc_times?.[procCode]?.ct) : 0;
    if(!procCode || !(ct > 0)){
      const reason = !procCode ? '설비 공정 매칭 실패' : 'CT 미등록';
      loadHint.innerHTML = `<span style="color:var(--dim)">부하 미산정 (${reason}) — <a href="#masters" style="color:var(--cyan)">품번 CT 등록</a> 후 산정</span>`;
      return;
    }
    // 이 계획을 팬텀으로 얹은 실시간 부하 (등록되면 이 값이 됨)
    const load = calcDayLoad(date, eq, [{ itemCode, qty }]);
    const pct = load.pct;
    const used = load.usedH;
    const cap  = load.capH;
    const clr = pct > 100 ? 'var(--red)' : 'var(--green)';
    const overTxt = pct > 100 ? ` <b style="color:var(--red)">+초과 ${(used-cap).toFixed(1)}h</b>` : '';
    const uncntTxt = load.uncounted > 0 ? ` <span style="color:var(--dim)">· ±${load.uncounted}건 미산정</span>` : '';
    loadHint.innerHTML = `부하 <b style="color:${clr}">${pct.toFixed(0)}%</b> (${used.toFixed(1)}h / ${cap}h)${overTxt}${uncntTxt}<div style="font-size:10.5px;color:var(--dim);margin-top:4px">${_esc(eq)} · ${_esc(date)} · CT ${ct}s → 이 계획 ${((qty*ct)/3600).toFixed(2)}h · 초과해도 등록 허용(확인 단계)</div>`;
  };

  soSel.onchange = () => {
    const opt = soSel.selectedOptions[0];
    if(soSel.value && opt){
      const item = opt.dataset.item;
      const remain = +opt.dataset.remain || 0;
      const due = opt.dataset.due;
      if([...itemSel.options].some(o => o.value===item)) itemSel.value = item;
      qtyEl.value = remain;
      soHint.innerHTML = `수주 잔량 <b style="color:var(--cyan)">${remain.toLocaleString()}ea</b>${due?` · 납기 ${_esc(due)}`:''} — 수량 초과 시 경고만 표시 (등록은 진행)`;
    } else {
      soHint.innerHTML = '재고생산 선택 — 수주 없이 계획';
    }
    updMatHint(); updLoadHint();
  };
  itemSel.onchange = () => { updMatHint(); updLoadHint(); };
  eqSel.onchange   = updLoadHint;
  dateEl.oninput   = updLoadHint;
  dateEl.onchange  = updLoadHint;
  qtyEl.oninput = () => {
    const opt = soSel.selectedOptions[0];
    if(soSel.value && opt){
      const remain = +opt.dataset.remain || 0;
      const q = +qtyEl.value || 0;
      if(q > remain){
        soHint.innerHTML = `<span style="color:var(--amber)">⚠ 초과: 수주 잔량 ${remain.toLocaleString()}ea 보다 큼 (경고만 · 등록 허용)</span>`;
      } else {
        soHint.innerHTML = `수주 잔량 <b style="color:var(--cyan)">${remain.toLocaleString()}ea</b>`;
      }
    }
    updMatHint(); updLoadHint();
  };

  // 프리필
  if(prefill){
    if(prefill.so_id){
      soSel.value = prefill.so_id;
      soSel.dispatchEvent(new Event('change'));
    }
    if(prefill.itemCode) itemSel.value = prefill.itemCode;
    if(prefill.qty) qtyEl.value = prefill.qty;
  }
  updMatHint(); updLoadHint();

  // ★ v0.20.4 — 실제 등록 로직 (확인 단계에서 재호출 · 날짜 오버라이드 지원)
  const doSave = (overrideDate) => {
    const so_id = soSel.value || null;
    const itemCode = itemSel.value;
    const qty = +qtyEl.value || 0;
    const date = overrideDate || dateEl.value;
    const equipment = eqSel.value || null;
    const note = document.getElementById('pln-note').value.trim();
    if(!itemCode){ toast('품번 선택','warn'); return; }
    if(!date){ toast('계획일 입력','warn'); return; }
    if(qty <= 0){ toast('수량은 0 초과','warn'); return; }
    const id = nextDocNo('PP');
    if(DB.get('production_plans', id)){ toast(`계획번호 중복 — ${id}`,'err'); return; }
    DB.set('production_plans', id, {
      id, plan_type:'board',
      so_id, itemCode, qty, date, equipment, note,
      wo_id: null, ts: Date.now(), by: SESSION.user,
    });
    toast(`계획 저장 — ${id}`,'ok'); closeModal(); router();
  };

  // ★ v0.20.4 — 초과 확인 모달 (차단 X · [그래도 등록]/[다음날로]/[취소])
  //   다음날로: 날짜 +1 후 재판정 · 다시 초과면 재표시(반복 가능) · 등록·미산정은 즉시 진행.
  const _dayShift = (d, n) => {
    const dd = new Date(d + 'T00:00:00');
    dd.setDate(dd.getDate() + n);
    return fmtDate(dd.getTime());
  };
  const askOverload = (date) => {
    const eq = eqSel.value;
    const itemCode = itemSel.value;
    const qty = +qtyEl.value || 0;
    const load = calcDayLoad(date, eq, [{ itemCode, qty }]);
    const next = _dayShift(date, 1);
    openModal(`
      <h2>부하 초과 확인 <button class="x" onclick="closeModal()">${ico('x')}</button></h2>
      <div class="body">
        <div style="padding:14px;background:var(--bg2);border:1px solid var(--red);border-radius:10px;line-height:1.7">
          ⚠ <b>${_esc(eq)}</b> · <b>${_esc(date)}</b> 부하 <b style="color:var(--red)">${load.pct.toFixed(0)}%</b>
          <span style="color:var(--sub)">(${load.usedH.toFixed(1)}h / ${load.capH}h)</span> — 초과 <b style="color:var(--red)">${(load.usedH-load.capH).toFixed(1)}h</b>
          <div style="font-size:11px;color:var(--dim);margin-top:6px">잔업으로 처리하거나, 다음날로 이월하거나, 취소할 수 있습니다.</div>
        </div>
        <div class="actions" style="flex-wrap:wrap;gap:6px">
          <button class="btn" id="ov-cancel">취소</button>
          <button class="btn" id="ov-next">다음날(${_esc(next)})로 →</button>
          <button class="btn primary" id="ov-force">${ico('save')}그래도 등록</button>
        </div>
      </div>
    `);
    document.getElementById('ov-cancel').onclick = () => closeModal();
    document.getElementById('ov-force').onclick  = () => { closeModal(); doSave(date); };
    document.getElementById('ov-next').onclick   = () => {
      closeModal();
      // 날짜 +1 후 재판정 (모달 필드에도 반영) · 여전히 초과면 재확인(반복 가능)
      dateEl.value = next;
      updLoadHint();
      const load2 = calcDayLoad(next, eq, [{ itemCode, qty }]);
      // 미산정이거나 100% 이하면 바로 저장, 초과면 재확인
      const canMeasure = eq && itemCode && qty > 0 && next && (() => {
        const pc = getEqProcCode(eq);
        const ct = pc ? +(DB.get('items', itemCode)?.proc_times?.[pc]?.ct) : 0;
        return pc && ct > 0;
      })();
      if(!canMeasure || load2.pct <= 100){ doSave(next); }
      else { askOverload(next); }
    };
  };

  document.getElementById('pln-ok').onclick = () => {
    const eq = eqSel.value;
    const itemCode = itemSel.value;
    const qty = +qtyEl.value || 0;
    const date = dateEl.value;
    if(!itemCode){ toast('품번 선택','warn'); return; }
    if(!date){ toast('계획일 입력','warn'); return; }
    if(qty <= 0){ toast('수량은 0 초과','warn'); return; }
    // ★ v0.20.4 — 부하 판정 (설비·CT 있는 경우만 · 미산정은 경고 없이 진행)
    const canMeasure = eq && (() => {
      const pc = getEqProcCode(eq);
      const ct = pc ? +(DB.get('items', itemCode)?.proc_times?.[pc]?.ct) : 0;
      return pc && ct > 0;
    })();
    if(canMeasure){
      const load = calcDayLoad(date, eq, [{ itemCode, qty }]);
      if(load.pct > 100){ askOverload(date); return; }
    }
    doSave();
  };
};

//   · WO 3 STEP 모달과 동일 스키마(issueWoFromPlan) · hold 는 강행 발행 금지 (사유만 표시)
//   · 재발행 차단: splitPlansForWo + issueWoFromPlan 양쪽에서 wo_id 검사
VIEWS._planBatchIssue = (planIds) => {

          return `<tr>

            <td><b>${_esc(p.itemCode)}</b> <span class="muted" style="font-size:11px">${_esc(it?.name||'')}</span></td>
            <td class="num" style="font-family:'JetBrains Mono',monospace;color:var(--cyan)">${(+p.qty||0).toLocaleString()}</td>
            <td style="font-size:11px">${p.equipment ? _esc(p.equipment) : '<span style="color:var(--amber)">미배정</span>'}</td>
          </tr>`;
        }).join('')}</tbody>
      </table></div>`
    : `<div style="padding:12px;color:var(--dim);font-size:12px;background:var(--bg2);border:1px solid var(--line);border-radius:8px">발행 가능 건 없음 — 아래 보류 사유 확인 후 계획을 보정하세요.</div>`;
  const holdRows = hold.length
    ? `<div style="margin-top:12px">
        <div style="font-size:11.5px;color:var(--red);font-weight:600;margin-bottom:6px">보류 ${hold.length}건 (발행 제외)</div>
        <div class="tbl-wrap" style="max-height:180px;overflow:auto"><table style="font-size:12px">
          <thead><tr><th>계획일</th><th>품번</th><th style="color:var(--red)">사유</th></tr></thead>
          <tbody>${hold.map(({plan:p, planId, reason}) => `<tr>
            <td class="muted">${_esc(p?.date||'—')}</td>
            <td><b>${_esc(p?.itemCode||planId||'—')}</b></td>
            <td style="color:var(--red);font-size:11px">${_esc(reason)}</td>
          </tr>`).join('')}</tbody>
        </table></div>
      </div>`
    : '';
  const okDisabled = ready.length === 0 ? 'disabled' : '';
  openModal(`
    <h2>작업지시 일괄 생성 확인 <span style="color:var(--dim);font-size:12px;font-weight:400;margin-left:8px">발행 대상 ${ready.length}건 · 보류 ${hold.length}건</span> <button class="x" onclick="closeModal()">${ico('x')}</button></h2>
    <div class="body">
      <div style="font-size:11.5px;color:var(--sub);margin-bottom:6px">발행 대상 — 계획 프리필 값 그대로 (수동 [▶ 지시 발행]과 동일 결과)</div>
      ${readyRows}
      ${holdRows}
      <div class="actions">
        <button class="btn" onclick="closeModal()">취소</button>
        <button class="btn primary" id="btn-batch-ok" ${okDisabled}>${ico('save')}${ready.length}건 생성</button>
      </div>
    </div>
  `);
  const okBtn = document.getElementById('btn-batch-ok');
  if(okBtn && !okDisabled){
    okBtn.onclick = () => {
      let done = 0, late = 0;
      const lateReasons = [];
      ready.forEach(({plan}) => {
        // 재발행 차단 (2·3 양쪽 검사) — 확인 모달 열려 있는 사이 상태 변동 방어
        const cur = DB.get('production_plans', plan.id);
        const res = issueWoFromPlan(cur || plan);
        if(res.ok) done++;
        else { late++; lateReasons.push(`${plan.id}: ${res.reason}`); }
      });
      closeModal();
      const holdN = hold.length + late;
      const msg = `${done}건 생성${holdN > 0 ? ` · ${holdN}건 보류` : ''}`;
      toast(msg, done > 0 ? 'ok' : (holdN > 0 ? 'warn' : 'err'));
      if(late > 0) console.warn('[VELA] 일괄 발행 지연 보류', lateReasons);
      router();
    };
  }
};

/* -------------------- 자동 생산계획 (v0.8.0) — ★ v0.20.1 id 'autoplan' 로 이관 (신규 'plan' = 생산계획 보드) --------------------
   ★ v0.23.2 — 계획 저장 통합 (production_plans 단일 컬렉션) — 자동/수동 모두 board 로 저장
      · 자동계획 = 생성 경로일 뿐 · 저장 스키마 동일 + origin: 'auto'
      · 구 헤더(items[])는 부팅 시 1회 이관 (개별 board 로 분해 · 원본 스탬프만 남기고 삭제 금지)
      · 소재/부하/일괄 발행/계획대비는 같은 컬렉션 · 추가 코드 없이 자동 포함 */

// 부팅 1회 이관 — 구 헤더 문서(plan_type 미지정 · items[] 있음) → 개별 board 행 분해
let _v232MigrationRan = false;
function migrateAutoPlanToBoard(){
  if(_v232MigrationRan) return 0;
  // Firestore 모드: 첫 스냅샷 도착 전이면 대기 (헤더 유실 방지). local 모드는 즉시.
  if(DB._backend === 'firestore' && (typeof _FS_STATE === 'undefined' || _FS_STATE.snapshotRoundsDone === 0)) return 0;
  _v232MigrationRan = true;
  const headers = DB.allRaw('production_plans').filter(p =>
    p && !p.void && p.plan_type !== 'board' && !p._migrated_v232 &&
    Array.isArray(p.items) && p.items.length
  );
  if(!headers.length) return 0;
  const today = fmtDate(Date.now());
  let migrated = 0;
  headers.forEach(h => {
    (h.items||[]).forEach(it => {
      if(!it || !it.code) return;
      // 채번 v2 규칙 유지 (PP-YYYY-{device}NNN). 동시 여러 건이라 loop 안에서 매번 nextDocNo 호출.
      const id = nextDocNo('PP');
      if(DB.get('production_plans', id)){
        console.warn('[VELA v0.23.2] 이관 채번 중복 — 스킵', id);
        return;
      }
      DB.set('production_plans', id, {
        id,
        plan_type: 'board',
        origin:    'auto',
        so_id:     null,
        itemCode:  it.code,
        qty:       +it.netDemand || 0,
        date:      it.due || today,
        equipment: null,
        note:      it.name || '',
        auto_mold_warn: it.moldWarn || null,
        auto_capa_warn: it.capaWarn || null,
        wo_id:     it.wo_id || null,
        migrated_from: h.id,
        created:   h.created || Date.now(),
        ts:        h.created || Date.now(),
        by:        h.by || SESSION.user || 'system',
      });
      migrated++;
    });
    // 원본 헤더는 삭제 금지 · 이관 스탬프만 (다음 부팅부터 스킵)
    DB.set('production_plans', h.id, { _migrated_v232: Date.now() });
  });
  if(migrated){
    console.log(`[VELA v0.23.2] 자동계획 이관 완료 · ${migrated}건 (${headers.length}헤더)`);
    toast(`자동계획 ${migrated}건 이관 (생산계획 통합)`,'ok',3200);
  }
  return migrated;
}

            <td>${warns.join(' ') || '<span class="pill green" style="font-size:10px">OK</span>'}</td>
            <td>${woCell}</td>
            <td>${actBtns}</td>
          </tr>`;
        }).join('') : `<tr><td colspan="7" class="empty">${apState.origin==='auto'?'자동 계획 없음 — [자동계획 생성] 으로 시작':(apState.origin==='manual'?'수동 계획 없음 — 생산계획 화면 [+ 계획 수립]':'계획 없음')}</td></tr>`}</tbody>
      </table></div>
      <div style="font-size:10.5px;color:var(--dim);margin-top:8px;line-height:1.6">
        · 목록 기준 <b>단일화</b> — <code>getLivePlans()</code> (자동/수동/구형 미지정 모두). [자동]/[수동] 배지 · 출처 필터로 구분.<br>
        · 일괄 지시 발행/체크박스는 <a href="#plan" style="color:var(--cyan)">생산계획</a> 목록 상단 [작업지시 생성] 사용 · 소재/부하/계획대비 자동 포함.<br>
        · [취소]는 원본 보존 · 지시(WO)로 발행된 건은 WO 먼저 취소.
      </div>
    </div>
  `;

  // 이벤트 바인딩 — 취소·복원·voidView·출처·개별 지시 발행 (지시 발행은 기존 _woNew 프리필 경로 재사용)
  document.getElementById('ap-void-view').onchange = (e)=>{ apState.voidView = e.target.checked; router(); };
  document.getElementById('ap-origin').onchange    = (e)=>{ apState.origin   = e.target.value;   router(); };
  document.querySelectorAll('[data-ap-void]').forEach(b => b.onclick = () => {
    const id = b.dataset.apVoid;
    const p = DB.get('production_plans', id);
    if(!p){ toast('계획 없음','err'); return; }
    if(p.void){ toast('이미 취소됨','warn'); return; }
    if(p.wo_id){ toast(`연결 문서 먼저 취소 — WO ${p.wo_id}`,'err',3200); return; }
    // ★ v0.23.3 — 통합 목록에서 수동 행도 취소 가능 → 사유·toast 를 origin 기반으로 표기
    const lbl = p.origin === 'auto' ? '자동계획 취소' : '계획 취소';
    voidDoc('production_plans', id, lbl);
    toast(`${lbl} (원본 보존)`,'ok'); router();
  });
  document.querySelectorAll('[data-ap-unvoid]').forEach(b => b.onclick = () => {
    unvoidDoc('production_plans', b.dataset.apUnvoid);
    toast('계획 복원','ok'); router();
  });
  document.querySelectorAll('[data-ap-issue]').forEach(b => b.onclick = () => VIEWS._planIssueWO(b.dataset.apIssue));

  // 옵션 모달
  document.getElementById('btn-plan-opts').onclick = ()=>{
    openModal(`
      <h2>자동계획 옵션 <button class="x" onclick="closeModal()">${ico('x')}</button></h2>
      <div class="body">
        <div style="display:flex;flex-direction:column;gap:10px">
          <label><input type="checkbox" id="o-wip" ${opts.subtract_wip?'checked':''}> 재공 차감 (보수적 기본: OFF, 완제품만 차감)</label>
          <label><input type="checkbox" id="o-grp" ${opts.group_material?'checked':''}> 소재 묶음 (같은 종류+Ø)</label>
          <label><input type="checkbox" id="o-mold" ${opts.mold_check==='warn'?'checked':''}> 금형 수명 경고 (차단 아님)</label>
          <label><input type="checkbox" id="o-capa" ${opts.capa_check==='warn'?'checked':''}> CAPA 초과 경고 (차단 아님)</label>
          <label><input type="checkbox" id="o-safe" ${opts.use_safety?'checked':''}> 안전재고 가산 (보수적 기본: OFF)</label>
        </div>
        <div class="actions">
          <button class="btn" onclick="closeModal()">취소</button>
          <button class="btn primary" id="o-ok">${ico('save')}저장</button>
        </div>
      </div>
    `);
    document.getElementById('o-ok').onclick = ()=>{
      DB.set('settings','auto_plan', {
        ...opts,
        subtract_wip: document.getElementById('o-wip').checked,
        group_material: document.getElementById('o-grp').checked,
        mold_check:    document.getElementById('o-mold').checked? 'warn':'off',
        capa_check:    document.getElementById('o-capa').checked? 'warn':'off',
        use_safety:    document.getElementById('o-safe').checked,
        mode:'manual',
      });
      toast('옵션 저장','ok'); closeModal(); router();
    };
  };

  // 자동계획 생성 — v0.23.2: 헤더 doc 폐지 · 각 품번을 개별 board 행(origin:'auto')으로 저장
  // ★ v0.23.6: toast 에 계획일 범위 · 상단 배너 상태(window._lastAutoGen) 세팅
  document.getElementById('btn-plan-gen').onclick = ()=>{
    const plan = generateAutoPlan();
    if(!plan.items.length){ toast('순소요 > 0 인 품번이 없습니다','warn'); return; }
    const today = fmtDate(Date.now());
    let created = 0, dup = 0;
    const dates = [];
    plan.items.forEach(it => {
      const id = nextDocNo('PP');
      if(DB.get('production_plans', id)){ dup++; return; }
      const date = it.due || today;
      DB.set('production_plans', id, {
        id,
        plan_type: 'board',
        origin:    'auto',
        so_id:     null,
        itemCode:  it.code,
        qty:       +it.netDemand || 0,
        date,
        equipment: null,
        note:      it.name || '',
        auto_mold_warn: it.moldWarn || null,
        auto_capa_warn: it.capaWarn || null,
        wo_id:     null,
        ts:        Date.now(),
        by:        SESSION.user || 'system',
        created:   Date.now(),
      });
      dates.push(date);
      created++;
    });
    if(dup) console.warn('[VELA v0.23.2] 자동계획 생성 중 채번 중복 스킵', dup);
    if(created > 0){
      dates.sort();
      const minDate = dates[0];
      const maxDate = dates[dates.length-1];
      const rng = (minDate === maxDate) ? minDate : `${minDate} ~ ${maxDate}`;
      window._lastAutoGen = { minDate, maxDate, count: created, ts: Date.now() };
      toast(`자동계획 ${created}건 생성 — 계획일 ${rng}`, 'ok', 3600);
    } else {
      toast('자동계획 생성 안 됨 (채번 중복)', 'warn');
    }
    router();
  };

  // ★ v0.23.6 — 배너: [생산계획에서 보기] / [닫기]
  const btnGoto = document.getElementById('btn-goto-plan');
  if(btnGoto){
    btnGoto.onclick = () => {
      const ap = window._lastAutoGen || {};
      // 기존 필터 상태 재사용 · 이동에 필요한 3개(anchor·tab·origin)만 오버라이드
      const st = (window._planFilter = window._planFilter || { tab:'week', axis:'item', anchor: fmtDate(Date.now()), q:'', eq:'', status:'', origin:'' });
      st.tab = 'week';
      st.anchor = ap.minDate || fmtDate(Date.now());
      st.origin = 'auto';
      location.hash = '#plan';
      router();
    };
  }
  const btnDismiss = document.getElementById('btn-dismiss-autogen');
  if(btnDismiss){
    btnDismiss.onclick = () => { window._lastAutoGen = null; router(); };
  }
};

            return `<div style="background:var(--bg2);border:1px solid var(--line);border-radius:8px;padding:8px 10px;margin-bottom:6px">
              <div style="display:flex;justify-content:space-between;font-size:12px"><b>${k||'미정'}</b><span style="font-family:'JetBrains Mono',monospace;color:var(--cyan)">합계 ${sum.toLocaleString()}ea</span></div>
              <div style="font-size:11px;color:var(--sub);margin-top:3px">${arr.map(i=>`${i.code}(${i.netDemand})`).join(' · ')}</div>

        <label>제안 (납기순)</label>

          <thead><tr><th>품번</th><th>품명</th><th class="num">순소요</th><th class="num">재고</th><th>납기</th><th>금형</th><th>CAPA</th><th></th></tr></thead>

            <td><b>${p.code}</b></td>
            <td>${p.name}</td>
            <td class="num"><b style="color:var(--cyan)">${p.netDemand.toLocaleString()}</b></td>
            <td class="num muted">${(p.stock||0).toLocaleString()}</td>

            <td>${p.capaWarn? `<span class="pill red" title="${p.capaWarn}">▲ 초과</span>`: '<span class="pill green">OK</span>'}</td>
            <td>${pp.status==='confirmed' && p.wo_id? `<span class="pill cyan" title="${p.wo_id}">→ WO</span>`:''}</td>
          </tr>`).join('')}</tbody>
        </table></div>
      </div>

      ${items.some(p=>p.moldWarn||p.capaWarn)?`
        <div style="background:rgba(255,171,64,.07);border:1px solid rgba(255,171,64,.3);border-radius:8px;padding:10px;font-size:11.5px;color:var(--heat2);line-height:1.6">

      <div class="actions">

        ${pp.status!=='confirmed'? `
          <button class="btn warn" onclick="VIEWS._planReject('${id}')">${ico('x')}폐기</button>
          <button class="btn primary" id="pp-confirm">${ico('check')}확정 → WO 생성</button>` : ''}

      closeModal(); router();
    };

};

  document.querySelectorAll('[data-etoggle]').forEach(b => b.onclick = () => VIEWS._mstEquipmentToggle(b.dataset.etoggle));

    const cfList = getMasterFields('customers');

      const base = {
        고객코드: c.code, 이름: c.name || '',
        담당자: c.contact || '', 전화: c.phone || '', 메모: c.memo || '',
        상태: (c.active !== false && !c.void) ? '사용중' : '비활성',
