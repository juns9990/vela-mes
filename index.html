/* -------------------- 대시보드 (홈) — v0.9.0 시안 v2 복원 -------------------- */
// 추세 데이터: count=기간, unit='d'(일별) | 'm'(월별)
function computeTrend(count, unit){
  const records = DB.all('records');
  const now = new Date();
  const out = [];
  if(unit==='d'){
    for(let i=count-1; i>=0; i--){
      const d = new Date(now); d.setHours(0,0,0,0); d.setDate(d.getDate()-i);
      const s = d.getTime(), e = s + 86400000;
      const g = records.filter(r=>r.ts>=s && r.ts<e).reduce((sum,r)=>sum+(r.good||0),0);
      out.push({label: `${d.getMonth()+1}/${d.getDate()}`, good: g});
    }
  } else {
    for(let i=count-1; i>=0; i--){
      const m = new Date(now.getFullYear(), now.getMonth()-i, 1);
      const s = m.getTime();
      const e = new Date(m.getFullYear(), m.getMonth()+1, 1).getTime();
      const g = records.filter(r=>r.ts>=s && r.ts<e).reduce((sum,r)=>sum+(r.good||0),0);
      out.push({label: `${m.getMonth()+1}월`, good: g});
    }
  }
  return out;
}
// 추세 라인차트 SVG (간단)
function renderTrendSVG(pts){
  const W=560, H=180, pad=26;
  const max = Math.max(1, ...pts.map(p=>p.good));
  const stepX = (W-pad*2) / Math.max(1, pts.length-1);
  const xy = pts.map((p,i)=>({x: pad + i*stepX, y: H-pad - (p.good/max)*(H-pad*2)}));
  const pathD = xy.map((q,i)=>`${i===0?'M':'L'} ${q.x.toFixed(1)} ${q.y.toFixed(1)}`).join(' ');
  const fill  = `${pathD} L ${xy[xy.length-1].x.toFixed(1)} ${H-pad} L ${pad} ${H-pad} Z`;
  const dots = xy.map(q=>`<circle cx="${q.x.toFixed(1)}" cy="${q.y.toFixed(1)}" r="3" fill="#5eead4"/>`).join('');
  const labels = pts.map((p,i)=>`<text x="${xy[i].x.toFixed(1)}" y="${H-6}" text-anchor="middle" font-size="9" font-family="JetBrains Mono" fill="#5a5f6b">${p.label}</text>`).join('');
  const vals = pts.map((p,i)=>p.good>0? `<text x="${xy[i].x.toFixed(1)}" y="${(xy[i].y-7).toFixed(1)}" text-anchor="middle" font-size="9" font-family="JetBrains Mono" font-weight="700" fill="#eef0f4">${p.good.toLocaleString()}</text>`:'').join('');
  return `<svg class="linechart" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
    <defs><linearGradient id="trendG" x1="0" x2="0" y1="0" y2="1"><stop offset="0%" stop-color="#5eead4" stop-opacity=".25"/><stop offset="100%" stop-color="#5eead4" stop-opacity="0"/></linearGradient></defs>
    <path d="${fill}" fill="url(#trendG)"/>
    <path d="${pathD}" stroke="var(--cyan)" stroke-width="2" fill="none"/>
    ${dots}${vals}${labels}
  </svg>`;
}
// 원화 짧은 표기 (백만/억)
function fmtKRWShort(v){
  if(v===null || v===undefined || isNaN(v)) return '—';
  if(v>=1e8) return (v/1e8).toFixed(1)+'억';
  if(v>=1e6) return Math.round(v/1e6)+'백만';
  if(v>=1e4) return Math.round(v/1e4)+'만';
  return Math.round(v).toLocaleString();
}
// 출하 1건 매출 (SO 우선, 없으면 품번 표준단가)
function shipAmount(sh){
  const so = DB.get('orders', sh.so_id);
  const item = DB.get('items', sh.itemCode);
  const price = so?.price || item?.price || 0;
  return (sh.qty||0) * price;
}

/* ★ v0.14.2 — 매출 집계 헬퍼 (대시보드·출하 공용, 계산 1벌)
   ships 배열 하나로 당월/전월비·연누적/전년비·월별 12칸·5년·고객사별 YTD 반환.
   출하 쪽에 계산을 복사·재구현 금지 — 반드시 이 함수 호출. */
function calcSales(ships){
  const now = new Date();
  const monthMs     = new Date(now.getFullYear(), now.getMonth(),   1).getTime();
  const lastMonthMs = new Date(now.getFullYear(), now.getMonth()-1, 1).getTime();
  const yearMs      = new Date(now.getFullYear(),   0, 1).getTime();
  const lastYearMs  = new Date(now.getFullYear()-1, 0, 1).getTime();
  const sumAmt = (arr) => arr.reduce((s,x)=>s+shipAmount(x), 0);

  const monthSales     = sumAmt(ships.filter(s=>s.ts>=monthMs));
  const lastMonthSales = sumAmt(ships.filter(s=>s.ts>=lastMonthMs && s.ts<monthMs));
  const monthSalesChg  = lastMonthSales>0 ? ((monthSales-lastMonthSales)/lastMonthSales*100) : null;

  const yearSales     = sumAmt(ships.filter(s=>s.ts>=yearMs));
  const lastYearSales = sumAmt(ships.filter(s=>s.ts>=lastYearMs && s.ts<yearMs));
  const yearSalesChg  = lastYearSales>0 ? ((yearSales-lastYearSales)/lastYearSales*100) : null;

  const monthlySales = Array.from({length:12}, (_,m)=>{
    const s0 = new Date(now.getFullYear(), m,   1).getTime();
    const s1 = new Date(now.getFullYear(), m+1, 1).getTime();
    return sumAmt(ships.filter(s=>s.ts>=s0 && s.ts<s1));
  });

  // 5년 (최초 출하 연도부터, 최대 5년 창)
  const earliestY = ships.length ? new Date(Math.min(...ships.map(s=>s.ts))).getFullYear() : now.getFullYear();
  const startYear = Math.max(earliestY, now.getFullYear()-4);
  const yearly = [];
  for(let y=startYear; y<=now.getFullYear(); y++){
    const s0 = new Date(y,   0, 1).getTime();
    const s1 = new Date(y+1, 0, 1).getTime();
    yearly.push({ year:y, sales: sumAmt(ships.filter(s=>s.ts>=s0 && s.ts<s1)) });
  }

  // 고객사별 YTD (정렬)
  const custMap = {};
  ships.filter(s=>s.ts>=yearMs).forEach(s=>{
    const so = DB.get('orders', s.so_id);
    const cust = so?.cust || '미지정';
    custMap[cust] = (custMap[cust]||0) + shipAmount(s);
  });
  const byCustomer = Object.entries(custMap)
    .map(([c,v])=>({ cust:c, name: DB.get('vendors',c)?.name || c, amount: v }))
    .sort((a,b)=>b.amount-a.amount);

  return {
    monthSales, lastMonthSales, monthSalesChg,
    yearSales,  lastYearSales,  yearSalesChg,
    monthlySales, yearly, byCustomer
  };
}

/* ★ v0.16.26 — 마감 (매출·매입·외주) 발생액 집계 헬퍼 · 1벌
   type: 'sales' | 'purchase' | 'outsource'
   month: 'YYYY-MM'
   반환: { byParty: {code -> {party, amount, count}}, missingCount, outflow, inflow }
   · sales     : shipAmount(sh) 재사용 (신규 계산 금지)
   · purchase  : material_receipts + purchase_receipts. 단가 = PO 연결 시 PO 품목 단가, 아니면 receipt.price.
                 단가 없는 건 미집계 + missingCount 카운트 (가짜 합계 금지)
   · outsource : os_receipts × outsource_rates (VIEWS.os 정산 로직 재사용). dispatch 취소분 제외.
   void 문서는 DB.all 이 이미 제외 — 별도 필터 금지.
   ★ v0.16.27 — 월 필터를 ts → getClMonth(doc) 로 교체. outflow/inflow 카운트 반환.
                 물류(ts·재고·LOT·파렛트)·calcSales 는 불변 — cl_month 는 마감 전용. */
function _tsMonth(ts){
  if(!ts) return '';
  const d = new Date(+ts);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
}
// ★ v0.16.27 — 마감 귀속 월 (1벌 · 집계·배지·버튼 공용). cl_month 우선, 없으면 ts 파생.
//              기존 문서 무마이그레이션(파생) · void 문서는 호출부에서 이미 제외.
function getClMonth(doc){
  if(!doc) return '';
  return doc.cl_month || _tsMonth(doc.ts);
}
function _closingRange(month){
  const [y, m] = String(month||'').split('-').map(Number);
  if(!y || !m) return null;
  return { t0: new Date(y, m-1, 1).getTime(), t1: new Date(y, m, 1).getTime() };
}
function _closingPoUnitPrice(r){
  if(!r || !r.po_id || !r.po_item_key) return null;
  const po = DB.get('purchase_orders', r.po_id);
  const it = po?.items?.find(i => _poItemKey(i.name, i.spec) === r.po_item_key);
  return (it && it.price!=null && +it.price>0) ? +it.price : null;
}
function calcClosing(type, month){
  if(!month) return { byParty:{}, missingCount:0, outflow:0, inflow:0 };
  const byParty = {};
  let missingCount = 0, outflow = 0, inflow = 0;
  const bump = (party, amount) => {
    if(!party) party = '미지정';
    const g = byParty[party] = byParty[party] || { party, amount:0, count:0 };
    g.amount += amount;
    g.count  += 1;
  };
  // process(docs, calc):
  //   calc(doc) 반환값
  //     [party, amount] → 정상 집계
  //     null            → 단가·요율 미등록 (missingCount + 이월 유출/유입 카운트)
  //     undefined       → 완전 배제 (예: 반출 취소 os_dispatch) — 카운트 X
  const process = (docs, calc) => {
    docs.forEach(doc => {
      const inMonth  = getClMonth(doc);
      const baseMonth = _tsMonth(doc.ts);
      const r = calc(doc);
      if(r === undefined) return;
      if(inMonth === month){
        if(r === null){ missingCount++; }
        else { bump(r[0], r[1]); }
        if(baseMonth && baseMonth !== month) inflow++;
      } else if(baseMonth === month){
        outflow++;
      }
    });
  };
  if(type === 'sales'){
    process(DB.all('shipments'), sh => {
      const so = DB.get('orders', sh.so_id);
      return [so?.cust || '미지정', shipAmount(sh)];
    });
  } else if(type === 'purchase'){
    process(DB.all('material_receipts'), r => {
      const price = _closingPoUnitPrice(r);
      if(price==null) return null;
      return [r.vendor, (+r.kg||0) * price];
    });
    process(DB.all('purchase_receipts'), r => {
      let price = _closingPoUnitPrice(r);
      if(price==null && r.price!=null && +r.price>0) price = +r.price;
      if(price==null) return null;
      return [r.vendor, (+r.qty||0) * price];
    });
  } else if(type === 'outsource'){
    const rates = DB.get('settings','cost_rates') || defaultCostRates();
    process(DB.all('os_receipts'), r => {
      const d = DB.get('os_dispatches', r.dispatch_id);
      if(!d || d.void) return undefined;   // 반출 취소분 완전 배제
      const rate = rates.outsource_rates?.[d.proc];
      if(rate==null) return null;
      return [d.vendor, (+r.good||0) * (+rate||0)];
    });
  }
  return { byParty, missingCount, outflow, inflow };
}
function _closingId(type, month){ return `CL-${month}-${type}`; }
function _monthAdd(month, delta){
  const [y, m] = String(month||'').split('-').map(Number);
  if(!y || !m) return month;
  const d = new Date(y, m-1+delta, 1);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
}
// 그 달 · 유형의 확정 마감(live) 문서 조회
function getClosing(type, month){
  const doc = DB.get('closings', _closingId(type, month));
  return (doc && !doc.void) ? doc : null;
}
// 어떤 월 이후(같은 유형)에 확정 마감이 있는가? (마감 취소 차단 판정)
function _closingHasLaterLive(type, month){
  const prefix = 'CL-';
  return DB.all('closings').some(c =>
    c.id?.startsWith(prefix) && c.type===type && String(c.month||'') > String(month||'')
  );
}
// 마감된 월(YYYY-MM) 이면 경고 toast · 유형 라벨 자동. 차단 아님.
function _warnClosedMonth(type, month, action){
  if(!type || !month) return;
  if(getClosing(type, month)){
    const label = { sales:'매출', purchase:'매입', outsource:'외주' }[type] || type;
    toast(`${month} · ${label}은 마감된 월 — ${action||'변경'} 시 재마감 필요`, 'warn', 3200);
  }
}
// (구 호환) ts 기반 경고 — 등록/취소 hook 에서 사용 (v0.16.26 부터 유지)
function closingWarnIfClosed(type, ts, action){
  if(!ts) return;
  _warnClosedMonth(type, _tsMonth(ts), action);
}

/* ★ v0.16.27 — 건별 이월 (귀속 월 토글) · shipments · material_receipts · purchase_receipts · os_receipts 전용
   · +1개월 이월(기본 → base+1) · 다시 누르면 원복(cl_month:null · 병합 저장, deleteDoc 금지)
   · 확정 마감 월 경고 재사용(원본 · 대상 둘 다 확인 · 차단 없음)
   · void 문서는 대상 아님(호출부 가드) */
const _CL_COL_TYPE = { shipments:'sales', material_receipts:'purchase', purchase_receipts:'purchase', os_receipts:'outsource' };
function clMonthToggle(col, id){
  const doc = DB.get(col, id);
  if(!doc || doc.void) return;
  const type = _CL_COL_TYPE[col];
  const base = _tsMonth(doc.ts);
  const cur  = getClMonth(doc);
  if(cur === base){
    const target = _monthAdd(base, +1);
    DB.set(col, id, { cl_month: target });
    toast(`${target} 귀속으로 이월`, 'ok');
    _warnClosedMonth(type, base,   '이월');
    _warnClosedMonth(type, target, '이월');
  } else {
    // 원복 (기본 월로) — cl_month:null 병합 → getClMonth 파생값 복원
    DB.set(col, id, { cl_month: null });
    toast(`이월 취소 — ${base} 귀속으로 원복`, 'ok');
    _warnClosedMonth(type, cur,  '이월 취소');
    _warnClosedMonth(type, base, '이월 취소');
  }
  router();
}
// 행 관리 버튼용 [이월]/[이월 취소] 렌더 (col + doc 필요). void 는 빈 문자열.
function clToggleBtn(col, doc){
  if(!doc || doc.void) return '';
  const base = _tsMonth(doc.ts);
  const cur  = getClMonth(doc);
  const shifted = (cur && base && cur !== base);
  const label = shifted ? `${ico('refresh')}이월 취소` : `${ico('save')}이월`;
  const title = shifted ? `귀속 원복(${base})` : `+1개월 이월(${_monthAdd(base,1)})`;
  const style = shifted ? 'style="color:var(--amber)"' : '';
  return `<button class="btn ghost" data-cl-toggle="${col}|${_esc(doc.id)}" ${style} title="${_esc(title)}">${label}</button>`;
}
// 이월 배지 (행 제목·번호 옆). base 와 cur 다르면 표시.
function clBadge(doc){
  if(!doc || doc.void) return '';
  const base = _tsMonth(doc.ts);
  const cur  = getClMonth(doc);
  if(!cur || !base || cur === base) return '';
  return ` <span class="pill" style="background:rgba(251,191,36,.15);color:var(--amber);font-size:9px;margin-left:4px" title="귀속 월 이월(ts ${base} → ${cur})">→ ${_esc(cur)}</span>`;
}
// 페이지 하단 공통 바인더 (해당 화면에서 필요 시 1회 호출)
function bindClToggleButtons(){
  document.querySelectorAll('[data-cl-toggle]').forEach(b => b.onclick = () => {
    const [col, id] = String(b.dataset.clToggle||'').split('|');
    if(col && id) clMonthToggle(col, id);
  });
}

/* ★ v0.14.3 — 수주 대비 생산실적 3단 (대시보드·수주 공용, 계산 1벌)
   computeOrderStages(원본 3단 금액) + pct 파생값을 한 번에 반환.
   수주 화면에 계산 복사·재구현 금지 — 반드시 이 함수 호출. */
function calcSoFulfillment(){
  const stages = computeOrderStages();
  const donePct = stages.total>0 ? (stages.done/stages.total*100) : 0;
  const progPct = stages.total>0 ? (stages.prog/stages.total*100) : 0;
  const waitPct = stages.total>0 ? (stages.wait/stages.total*100) : 0;
  return { ...stages, donePct, progPct, waitPct };
}

/* ★ v0.14.4 — 품번 공정흐름 재고 (재고 화면·출하 모달 공용, 계산 1벌)
   기존 VIEWS.inv 지역 함수 wipOfItem 로직을 모듈 헬퍼로 승격.
   wip: 라우트 순서로 {procCode: qty}. 마지막 가공공정은 '완성품'으로 흡수(제외).
        wipOfItem의 -1(라우트 밖) 의미는 '키 부재' 로 표현 — 호출자가 ?? -1 로 판별.
   finished: max(0, madeSum-shippedSum), madeSum/shippedSum도 함께 반환. */
function calcItemFlow(itemCode){
  const route = getRoute(itemCode);
  const routeProcs = route.filter(r => r.proc !== 'SHIP');
  const lastProdIdx = routeProcs.length - 1;
  const itemLots = DB.query('production_lots', l => l.itemCode === itemCode);
  const wip = {};
  // ★ v0.16.3 — 공정별 양품 누계 (같은 순회 · 기존 wip 계산 불변)
  const goodByProc = {};
  routeProcs.forEach((r, idx) => {
    // goodByProc — 모든 라우트 공정(마지막 가공공정 포함)의 Σ 양품 누계
    goodByProc[r.proc] = itemLots.reduce((s,l) => s + LOT.totalGood(l.plot_no, r.proc), 0);
    if(idx === lastProdIdx) return;   // 마지막 가공공정 → 완성품으로 흡수
    const rIdxInFull = route.findIndex(x => x.proc === r.proc);
    const next = route[rIdxInFull + 1];
    if(!next){ wip[r.proc] = 0; return; }
    // WIP = 다음 공정에서 본 잔량 = (이 공정 양품) - (다음 공정 누적 투입)
    wip[r.proc] = itemLots.reduce((s,l) => s + Math.max(0, LOT.balance(l.plot_no, next.proc)), 0);
  });
  const lastProd = routeProcs[lastProdIdx];
  const madeSum = lastProd
    ? itemLots.reduce((s,l) => s + LOT.totalGood(l.plot_no, lastProd.proc), 0)
    : 0;
  const shippedSum = DB.query('shipments', sh => sh.itemCode === itemCode)
    .reduce((s,sh) => s + (sh.qty||0), 0);
  const finished = Math.max(0, madeSum - shippedSum);
  // ★ v0.16.15 — 반출 중(외주처 체류 · 입고 전) 공정별 합 (표시 전용 · 기존 wip/goodByProc 불변)
  //             osInFlight 소함수 재사용(osAvailable 과 공용) — 계산 중복 금지.
  const outAtVendor = {};
  route.forEach(r => {
    if(r.mode !== 'out') return;
    outAtVendor[r.proc] = itemLots.reduce((s,l) => s + osInFlight(l.plot_no, r.proc), 0);
  });
  return { wip, finished, madeSum, shippedSum, goodByProc, outAtVendor };
}

/* ★ v0.16.1 — heat 잔량 원장 (모듈 헬퍼, 계산 1벌 · 재고·입고 공용)
   in_kg    = Σ material_receipts(live).kg  (heat별)
   used_kg  = Σ (그 heat 를 material_lot_ids 에 포함하는 LOT 의 라우트 첫 공정 양품 × item.weight)
              — 재작업 복귀는 새 투입이 아니므로 제외 (LOT.totalGood 는 rework_returned 포함 → 여기선 raw good 만)
   remain   = in_kg − used_kg
   ※ material_lots.remain_kg 직접 저장 의존 제거 — 파생값만 사용.
   반환: { [heat]: { heat, mat, dia, in_kg, used_kg, remain, receipts:[], vendors:[] } }, totalRemain */
function calcHeatLedger(){
  const receipts = DB.all('material_receipts');
  const ledger = {};
  receipts.forEach(r => {
    if(!r.heat) return;
    const h = ledger[r.heat] = ledger[r.heat] || {
      heat:r.heat, mat:r.mat||'', dia:r.dia||null,
      in_kg:0, used_kg:0, remain:0, receipts:[], vendors:new Set()
    };
    h.in_kg += (+r.kg||0);
    h.receipts.push(r);
    if(r.vendor) h.vendors.add(r.vendor);
    if(!h.mat && r.mat) h.mat = r.mat;
    if(h.dia==null && r.dia!=null) h.dia = r.dia;
  });
  // heat 별 투입 kg = 그 heat 를 참조하는 LOT 의 라우트 첫 공정 양품(raw) × 품번 단중
  const lots = DB.all('production_lots');
  lots.forEach(l => {
    const mats = l.material_lot_ids || [];
    if(!mats.length) return;
    const it = DB.get('items', l.itemCode);
    const w = +it?.weight || 0;
    if(!w) return;
    const route = getRoute(l.itemCode);
    const firstProc = route[0]?.proc;
    if(!firstProc) return;
    // rework_returned 는 새 투입이 아니므로 제외 → good raw 만
    const rawGood = DB.query('records', r => r.plot_no===l.plot_no && r.proc===firstProc)
                      .reduce((s,r)=>s+(r.good||0), 0);
    if(rawGood<=0) return;
    const usedKg = rawGood * w;
    // 여러 heat 를 쓰는 LOT 이면 균등 배분 (단순 모델 · 재고 rawKgOf 와 동일한 원리)
    const share = usedKg / mats.length;
    mats.forEach(h => {
      if(ledger[h]) ledger[h].used_kg += share;
    });
  });
  let totalRemain = 0;
  Object.values(ledger).forEach(h => {
    h.remain = h.in_kg - h.used_kg;
    h.vendors = [...h.vendors];
    totalRemain += Math.max(0, h.remain);
  });
  return { ledger, totalRemain };
}

/* ★ v0.20.1 — 생산계획(board) 파생 헬퍼 (계산 1벌 · 상태 저장 금지)
   실적 = live records 중 같은 itemCode · 계획일 이후(같은 주 내) 양품 합.
   wo_id 연결 시 그 지시(plot_no) LOT 실적 우선(정확 매칭) — 미연결은 품번+기간 매칭.
   달성률 = 실적/계획(cap 100%). 상태: wo_id 없으면 '계획' / 있으면 '지시발행' / 실적≥계획 → '완료'. */
function _weekRangeOf(dateStr){
  // dateStr = 'YYYY-MM-DD' → 그 날짜가 속한 주(월~일) 범위 ts (start, end exclusive)
  const d = new Date(dateStr + 'T00:00:00');
  const day = d.getDay();                   // 0=일 … 6=토
  const monOffset = day === 0 ? -6 : (1 - day);  // 월요일 기준
  const mon = new Date(d);
  mon.setDate(d.getDate() + monOffset);
  mon.setHours(0,0,0,0);
  const sun = new Date(mon);
  sun.setDate(mon.getDate() + 7);           // 다음 주 월요일 (exclusive end)
  return { start: mon.getTime(), end: sun.getTime() };
}
function calcPlanProgress(plan){
  if(!plan){ return { plan:0, actual:0, pct:0, state:'계획' }; }
  const planQty = +plan.qty || 0;
  const range = _weekRangeOf(plan.date);
  let actual = 0;
  if(plan.wo_id){
    const wo = DB.get('work_orders', plan.wo_id);
    if(wo && wo.plot_no){
      // 정확 매칭: 지시의 LOT 실적(라우트 첫 공정만 원 양품 — LOT.totalGood 는 rework_returned 포함되어 이중 반영)
      const route = getRoute(wo.itemCode);
      const firstProc = route[0]?.proc;
      if(firstProc){
        actual = DB.query('records', r => r.plot_no===wo.plot_no && r.proc===firstProc)
                   .reduce((s,r)=>s+(r.good||0), 0);
      }
    }
  } else {
    // 미연결 — 품번+기간 매칭 (같은 주 내 계획일 이후 양품 합, 라우트 첫 공정)
    const it = DB.get('items', plan.itemCode);
    if(it){
      const route = getRoute(plan.itemCode);
      const firstProc = route[0]?.proc;
      const planTs = new Date(plan.date + 'T00:00:00').getTime();
      if(firstProc){
        actual = DB.query('records', r =>
          r.proc===firstProc && r.ts>=planTs && r.ts<range.end && (() => {
            const lot = DB.get('production_lots', r.plot_no);
            return lot && lot.itemCode === plan.itemCode;
          })()
        ).reduce((s,r)=>s+(r.good||0), 0);
      }
    }
  }
  const pct = planQty>0 ? Math.min(100, (actual/planQty)*100) : 0;
  const state = actual >= planQty && planQty>0 ? '완료' : (plan.wo_id ? '지시발행' : '계획');
  return { plan:planQty, actual, pct, state };
}
/* ★ v0.20.1 — 계획 소재 가용 (calcHeatLedger 재사용 · 재질 매칭 합계)
   필요량 = plan.qty × 품번 weight (재질·단중 미등록 → null).
   잔량 = ledger 에서 mat 매칭 합계. 부족해도 등록은 허용(표시만). */
function calcPlanMaterial(plan){
  const it = DB.get('items', plan.itemCode);
  const w = +it?.weight || 0;
  const mat = it?.mat || '';
  if(!it || !w || !mat) return null;   // 미등록
  const need = (+plan.qty||0) * w;
  const { ledger } = calcHeatLedger();
  const stock = Object.values(ledger).filter(h => h.mat === mat).reduce((s,h) => s + Math.max(0, h.remain), 0);
  return { mat, weight:w, need, stock, ok: stock >= need, shortage: Math.max(0, need - stock) };
}

/* ★ v0.23.3 — 계획 목록 기준 단일화 (읽기만 · 저장 스키마 무변경)
   production_plans 중 실제 "계획 행" 만 반환 — 헤더(items[]) 문서는 제외.
   plan_type 무관: 신형 'board' · 구형 미지정 모두 포함. origin(자동/수동)은 배지·필터로만 구분.
   includeVoid=true 면 DB.allRaw 사용 (취소 포함 보기 전용). 필터 함수 1벌로 통일. */
function getLivePlans(includeVoid){
  const src = includeVoid ? DB.allRaw('production_plans') : DB.all('production_plans');
  return src.filter(p => p && p.itemCode);
}

/* ★ v0.20.4 — 일일 부하 계산 (모달·보드 공용 · 계산 1벌 · 상태 저장 금지)
   그날 live plans 중 그 설비 지정 건들의 소요 합 (h) = qty × ct(품번×설비procCode 공정) ÷ 3600.
   반환 { usedH, capH, pct, uncounted } — uncounted = CT 미등록/설비 매칭 불가 건수(추정 금지).
   extras: [{itemCode, qty}] 팬텀(모달 실시간 힌트용 · 저장 전 미리보기). excludeId: 자기 자신 제외. */
function calcDayLoad(date, equipmentName, extras, excludeId){
  const capH = getWorkHours(equipmentName);
  if(!equipmentName || !date){
    return { usedH: 0, capH, pct: 0, uncounted: 0 };
  }
  const procCode = getEqProcCode(equipmentName);
  let usedH = 0, uncounted = 0;
  const acc = (itemCode, qty) => {
    const q = +qty || 0;
    const it = itemCode ? DB.get('items', itemCode) : null;
    const ct = procCode ? +(it?.proc_times?.[procCode]?.ct) : 0;
    if(!procCode || !(ct > 0) || !(q > 0)){
      uncounted++;
      return;
    }
    usedH += (q * ct) / 3600;
  };
  // ★ v0.23.3 — plan_type 하드 조건 제거 · getLivePlans 기준으로 통일 (구형 미지정 · 자동 · 수동 모두 포함)
  getLivePlans().filter(p =>
    p.date === date && p.equipment === equipmentName && p.id !== excludeId
  ).forEach(p => acc(p.itemCode, p.qty));
  (extras || []).forEach(e => acc(e.itemCode, e.qty));
  const pct = capH > 0 ? (usedH / capH) * 100 : 0;
  return { usedH, capH, pct, uncounted };
}

/* ★ v0.16.6 — 발주(PO) 상태 · 잔량 원장 (모듈 헬퍼, 계산 1벌 · 목록·입고 select 공용)
   품목 행별 입고량 = live material_receipts + live purchase_receipts 중
                       po_id 일치 && po_item_key(name|spec) 일치분의 (kg 또는 qty) 합
   반환: { items:[{ordered, received, remain}], totalOrdered, totalReceived, state, uniformUnit }
   state: 입고0 → '대기' / 완료 → '입고완료' / 납기 지남+미완 → '지연' / 그 외 부분 → '부분입고' */
function _poItemKey(name, spec){ return `${name||''}|${spec||''}`; }
function calcPoStatus(po){
  if(!po){ return { items:[], totalOrdered:0, totalReceived:0, state:'대기', uniformUnit:null }; }
  const items = po.items || [];
  // 미리 live 입고를 한 번씩만 스캔 → 키별 합계 맵 (재계산 비용 절감)
  const mrByKey = {};
  DB.query('material_receipts', r => r.po_id===po.id).forEach(r => {
    const k = r.po_item_key || '';
    mrByKey[k] = (mrByKey[k]||0) + (+r.kg||0);
  });
  const prByKey = {};
  DB.query('purchase_receipts', r => r.po_id===po.id).forEach(r => {
    const k = r.po_item_key || '';
    prByKey[k] = (prByKey[k]||0) + (+r.qty||0);
  });
  let totalOrdered=0, totalReceived=0;
  const rows = items.map(it => {
    const key = _poItemKey(it.name, it.spec);
    const ordered = +it.qty||0;
    const received = (mrByKey[key]||0) + (prByKey[key]||0);
    const remain = Math.max(0, ordered - received);
    totalOrdered  += ordered;
    totalReceived += Math.min(received, ordered);   // 잔량 계산과 정합 (초과분은 총합에서 잘라냄)
    return { name:it.name, spec:it.spec||'', unit:it.unit||'', ordered, received, remain };
  });
  const today = fmtDate(Date.now());
  let state;
  if(totalOrdered<=0)                            state = '대기';
  else if(totalReceived >= totalOrdered)         state = '입고완료';
  else if(po.due && today > po.due)              state = '지연';
  else if(totalReceived > 0)                     state = '부분입고';
  else                                           state = '대기';
  // 단위 통일 여부 (표시용) — 전 행 동일 단위면 그 단위, 아니면 null → '건' 표기
  const units = [...new Set(items.map(i=>i.unit).filter(Boolean))];
  const uniformUnit = units.length===1 ? units[0] : null;
  return { items:rows, totalOrdered, totalReceived, state, uniformUnit };
}

  const capaOn = !!flags.capa;
  let capaAvg = null, capaOver = 0, capaEasy = 0;
  if(capaOn){
    const cp = (typeof computeCapa==='function')? computeCapa() : [];
    if(cp.length){
      capaAvg = cp.reduce((s,c)=>s+c.loadPct,0)/cp.length;
      capaOver = cp.filter(c=>c.loadPct>100).length;
      capaEasy = cp.filter(c=>c.loadPct<85).length;

        c.eqs.forEach(e=>{
          const dailyEq = (e.hourly_capa||0)*(e.working_hours||0);
          const assignedEq = (dailyEq && c.dailyCapa) ? (c.assigned * dailyEq / c.dailyCapa) : 0;
          const pctEq = dailyEq>0 ? (assignedEq/dailyEq*100) : 0;
          // v0.15.1 — 여기의 eqRows.push({name:e.name, proc:c.proc.name, dailyEq, assignedEq, pctEq, over:Math.max(0, assignedEq-dailyEq)}) 는
          //          식별자 중복(하단 오늘의 생산 const eqRows) 원인이라 삭제. 원래도 렌더에서 참조되지 않는 dead sink 였음.
        });

/* QR 페이로드 파서 — JSON 형식 또는 라인구분 형식 지원 (전역화) */
function parseQRPayload(text){
  let obj = null;
  try { obj = JSON.parse(text); } catch{}
  if(!obj && text.includes('|')){
    obj = {};
    text.split('|').forEach(seg=>{
      const [k,v] = seg.split(':');
      if(k&&v) obj[k.trim().toLowerCase()] = v.trim();
    });
  }
  if(!obj) throw new Error('QR 형식 인식 불가');
  const norm = {
    plot_no: obj.plot_no || obj.plot || obj.lot || obj.PLOT || obj.LOT,
    item:    obj.item    || obj.itemCode || obj.code || obj.ITEM,
    proc:    obj.proc    || obj.process  || obj.PROC,
    eq:      obj.eq      || obj.equipment|| obj.EQ,
    wo:      obj.wo      || obj.WO,
  };
  if(!norm.plot_no) throw new Error('생산LOT 정보 없음');
  if(!norm.proc){
    const next = LOT.nextProcess(norm.plot_no);
    if(!next) throw new Error('해당 LOT의 다음 공정 없음');
    norm.proc = next.code;
  }
  if(!norm.item){
    const lot = DB.get('production_lots', norm.plot_no);
    if(lot) norm.item = lot.itemCode;
  }
  return norm;
}

/* 카메라 HTTPS 가능 여부 (file:/// 또는 http:// non-localhost → 차단) */
function cameraOK(){
  const p = location.protocol;
  if(p === 'https:') return true;
  if(p === 'http:' && (location.hostname==='localhost' || location.hostname==='127.0.0.1')) return true;
  return false;
}
/* 인식 피드백: 짧은 beep + 진동 */
function scanFeedback(){
  try {
    if(navigator.vibrate) navigator.vibrate(60);
    const AC = window.AudioContext || window.webkitAudioContext;
    if(AC){
      const ctx = new AC();
      const o = ctx.createOscillator(); const g = ctx.createGain();
      o.type='sine'; o.frequency.value=880;
      g.gain.value=0.08;
      o.connect(g); g.connect(ctx.destination);
      o.start(); o.stop(ctx.currentTime + 0.12);
      setTimeout(()=>ctx.close(), 200);
    }
  } catch(e){/* noop */}
}

/* ★ v0.16.12 — 밀시트 바코드 후보 파싱 (구분자 일반 처리 · 포맷 하드코딩 금지)
   원문을 첫 번째로 매치된 구분자로 분해 → 조각 배열 + 원문 전체를 후보로 반환.
   구분자 우선순위: | ; , / \t \s(공백류) — 원문 순서 유지.
   반환: { delimiter:'|' 등 · 원문 무구분자면 null, parts:[조각…], raw:원문 } */
function parseScanCandidates(raw){
  const src = (raw==null?'':String(raw)).trim();
  if(!src) return { delimiter:null, parts:[], raw:'' };
  const delims = ['|', ';', ',', '/', '\t', ' '];
  let delimiter = null, parts = [src];
  for(const d of delims){
    if(src.indexOf(d) >= 0){
      delimiter = d;
      parts = src.split(d).map(s => s.trim()).filter(Boolean);
      break;
    }
  }
  // 조각이 1개면 구분자 없는 것으로 간주 (원문 단독)
  if(parts.length <= 1){ delimiter = null; parts = [src]; }
  return { delimiter, parts, raw: src };
}
/* ★ v0.16.12 — 후보의 heat 다움 판정 (숫자 포함 5~14자 · 시각 강조 힌트) */
function isLikelyHeat(s){
  if(!s) return false;
  const t = String(s).trim();
  if(t.length < 5 || t.length > 14) return false;
  return /\d/.test(t);
}
/* ★ v0.16.12 — vendor_scan_hints (2층 학습 · 병합 저장)
   { id:vendor code, vendor, delimiter, heat_index, updated } */
function getVendorScanHint(vendor){
  if(!vendor) return null;
  return DB.get('vendor_scan_hints', vendor);
}
function saveVendorScanHint(vendor, delimiter, heat_index){
  if(!vendor) return;   // 입고처 미선택 시 저장 생략
  DB.set('vendor_scan_hints', vendor, {
    id: vendor, vendor,
    delimiter: delimiter==null ? '' : String(delimiter),
    heat_index: +heat_index || 0,
    updated: Date.now(),
  });
}

/* ============== 세션 설정 화면 ============== */
function renderSessionSetup(prefill){
  const shifts = (DB.get('settings','shifts')?.shifts) || [
    {code:'day', name:'주간', start:'08:00', end:'20:00'},
    {code:'night', name:'야간', start:'20:00', end:'08:00'},
  ];
  const workers = DB.all('workers').filter(w=>w.active!==false);
  // ★ v0.16.7 — 설비 목록 소스: equipments 마스터 우선 + 기존 equipment 컬렉션 폴백 (렌더 로직 불변)

  // 사전 값 (변경 화면에서 진입할 때 기존값 채움)

  const autoWorker = (function(){
    if(cur.worker) return cur.worker;
    if(!SESSION.user) return null;
    const w = workers.find(w => w.name === SESSION.user);

            <div class="step-ind">
              <span class="si ${doneCount>=1?'done':''} ${doneCount===0?'on':''}"></span>
              <span class="si ${doneCount>=2?'done':''} ${doneCount===1?'on':''}"></span>
              <span class="si ${doneCount>=3?'done':''} ${doneCount===2?'on':''}"></span>

        <div class="shift-pick">
          ${shifts.map(s=>{
            const isDay = s.code==='day' || /주간|day/i.test(s.code);
            const isNight = s.code==='night' || /야간|night/i.test(s.code);
            const cls = isNight ? 'night' : 'day';
            const on  = sel.shift?.code===s.code ? 'on' : '';
            const icon = isNight
              ? '<svg viewBox="0 0 24 24"><path d="M21 12.8A9 9 0 1 1 11.2 3 7 7 0 0 0 21 12.8z"/></svg>'
              : '<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="4"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3M5 5l2 2M17 17l2 2M5 19l2-2M17 7l2-2"/></svg>';
            return `<div class="sp-btn ${cls} ${on}" data-shift="${s.code}">
              ${icon}
              <div class="spn">${s.name||s.code}</div>
              <div class="spt">${s.start||''}${s.end?'~'+s.end:''}</div>
            </div>`;
          }).join('')}
        </div>

        <!-- 2. 작업자 -->
        <div class="sec-label"><span class="n">2</span>작업자<span class="hint">생산부에서 선택</span></div>
        <div class="pick-box">
          <div class="pick-cur worker">
            <div class="pc-ic"><svg viewBox="0 0 24 24" stroke="currentColor"><circle cx="12" cy="8" r="4"/><path d="M4 21v-1a6 6 0 0 1 12 0v1"/></svg></div>
            <div>${sel.worker
              ? `<div class="pc-name">${sel.worker.name}</div><div class="pc-sub">${sel.worker.emp_no||sel.worker.id||''}${sel.worker.dept?` · ${sel.worker.dept}`:''}</div>`
              : `<div class="pc-none">${noWorkers? '작업자 미등록 — 설정에서 추가' : '선택 안 됨'}</div>`}
            </div>
          </div>
          ${noWorkers
            ? `<div class="pick-actions"><button class="pa-btn list" onclick="location.hash='#set'">설정 → 작업자 마스터로</button></div>`
            : `<div class="pick-actions"><button class="pa-btn list" data-toggle="worker"><svg viewBox="0 0 24 24"><path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01"/></svg>${openList==='worker'?'목록 닫기':'생산부 직원 선택'}</button></div>`
          }
          ${openList==='worker' ? `
            <div class="list-open">
              <div class="lo-search"><svg viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="2" style="width:13px;height:13px"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg><input id="wk-q" placeholder="이름·사번·부서 검색…" autocomplete="off"></div>
              <div class="lo-list" id="wk-list">
                ${workers.map(w=>`
                  <div class="lo-item ${sel.worker?.id===w.id?'sel':''}" data-pick-wk="${w.id}">
                    <span class="lo-dot"></span>${w.name}
                    <span class="lo-meta">${w.emp_no||''}${w.dept? ' · '+w.dept:''}</span>

        <div class="pick-box">
          <div class="pick-cur eq">
            <div class="pc-ic"><svg viewBox="0 0 24 24" stroke="currentColor"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 9h6v6H9z"/></svg></div>
            <div>${sel.equipment
              ? `<div class="pc-name">${sel.equipment.name}</div><div class="pc-sub">${(DB.get('processes', sel.equipment.proc)?.name)||sel.equipment.proc||''}${sel.equipment.hourly_capa?` · ${sel.equipment.hourly_capa}/시`:''}</div>`
              : `<div class="pc-none">${noEqs? '설비 미등록 — 설정에서 추가' : '선택 안 됨'}</div>`}
            </div>
          </div>
          ${noEqs
            ? `<div class="pick-actions"><button class="pa-btn list" onclick="location.hash='#set'">설정으로</button></div>`
            : `<div class="pick-actions">
                <button class="pa-btn qr" id="btn-eq-qr"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><path d="M14 14h3v3M21 21v.01M17 21h.01"/></svg>설비 QR</button>
                <button class="pa-btn list" data-toggle="eq"><svg viewBox="0 0 24 24"><path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01"/></svg>${openList==='eq'?'목록 닫기':'목록'}</button>
              </div>`
          }
          ${openList==='eq' ? `
            <div class="list-open">
              <div class="lo-search"><svg viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="2" style="width:13px;height:13px"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg><input id="eq-q" placeholder="설비명·공정 검색…" autocomplete="off"></div>
              <div class="lo-list" id="eq-list">
                ${eqs.map(e=>{
                  const pn = DB.get('processes', e.proc)?.name || e.proc;
                  return `<div class="lo-item ${sel.equipment?.id===e.id?'sel':''}" data-pick-eq="${e.id}">
                    <span class="lo-dot"></span>${e.name}
                    <span class="lo-meta">${pn}${e.hourly_capa?` · ${e.hourly_capa}/시`:''}</span>
                  </div>`;
                }).join('')}
              </div>
            </div>` : ''}

        <div id="eq-qr-area" style="display:none">
          <div class="cam-big" style="aspect-ratio:auto;min-height:280px">
            <div id="qr-reader-eq" style="width:100%"></div>
            <div class="cam-corner c1"></div><div class="cam-corner c2"></div><div class="cam-corner c3"></div><div class="cam-corner c4"></div>
            <div class="cam-txt">설비 QR을 비추세요</div>
          </div>
          <button class="btn" id="btn-eq-qr-stop" style="margin-top:8px">${ico('x')}QR 정지</button>
        </div>

        <div class="setup-summary ${ready?'':'warn'}">
          ${ready
            ? `<b>${sel.shift.name}</b> · <b>${sel.worker.name}</b> · <b>${sel.equipment.name}</b><br>이대로 작업을 시작합니다`
            : `위 3가지(교대·작업자·설비)를 모두 선택하면 시작됩니다`}
        </div>

        <button class="submit-big ${ready?'next':''}" id="sess-start" ${ready?'':'disabled'}>이 세션으로 시작 →</button>
      </div>

    // 이벤트
    document.querySelectorAll('[data-shift]').forEach(b=>b.onclick=()=>{
      const sc = b.dataset.shift;
      sel.shift = shifts.find(s=>s.code===sc) || {code:sc, name:sc};
      render();
    });
    document.querySelectorAll('[data-toggle]').forEach(b=>b.onclick=()=>{
      const t = b.dataset.toggle;
      openList = (openList===t) ? null : t;
      stopEqQR();
      render();
    });
    document.querySelectorAll('[data-pick-wk]').forEach(b=>b.onclick=()=>{
      const id = b.dataset.pickWk;
      const w = DB.get('workers', id);
      if(w){ sel.worker = {id:w.id, name:w.name, emp_no:w.emp_no, dept:w.dept}; openList=null; render(); }
    });
    document.querySelectorAll('[data-pick-eq]').forEach(b=>b.onclick=()=>{
      const id = b.dataset.pickEq;
      const e = DB.get('equipment', id);
      if(e){ sel.equipment = {id:e.id, name:e.name, proc:e.proc, hourly_capa:e.hourly_capa}; openList=null; render(); }
    });
    // 작업자 검색

    if(wq) wq.oninput = ()=>{
      const v = wq.value.toLowerCase();
      document.querySelectorAll('#wk-list .lo-item').forEach(it=>{
        const t = it.textContent.toLowerCase();
        it.style.display = t.includes(v) ? '' : 'none';
      });
    };
    const eq = document.getElementById('eq-q');
    if(eq) eq.oninput = ()=>{
      const v = eq.value.toLowerCase();
      document.querySelectorAll('#eq-list .lo-item').forEach(it=>{
        const t = it.textContent.toLowerCase();
        it.style.display = t.includes(v) ? '' : 'none';
      });
    };
    // 설비 QR
    const qrBtn = document.getElementById('btn-eq-qr');
    if(qrBtn) qrBtn.onclick = startEqQR;
    const qrStop = document.getElementById('btn-eq-qr-stop');
    if(qrStop) qrStop.onclick = stopEqQR;
    // 시작
    document.getElementById('sess-start').onclick = ()=>{
      if(!ready) return;
      SES.set({
        shift: sel.shift,
        worker: sel.worker,
        equipment: sel.equipment,
        started: Date.now(),
      });
      stopEqQR();
      toast(`세션 시작 — ${sel.shift.name} · ${sel.worker.name} · ${sel.equipment.name}`,'ok');
      renderScanPhone(SES.get());
    };
  }

  // 설비 QR 스캐너 (세션 설정용)
  let eqQr = null;
  function startEqQR(){
    if(!cameraOK()){ toast('카메라는 https에서만 작동합니다','warn',3000); return; }
    if(!window.Html5Qrcode){ toast('스캐너 라이브러리 로딩 중','warn'); return; }
    const area = document.getElementById('eq-qr-area');
    if(area) area.style.display = 'block';
    if(!eqQr) eqQr = new Html5Qrcode("qr-reader-eq");
    eqQr.start({facingMode:'environment'}, {fps:10, qrbox:200},
      txt=>{
        const e = DB.get('equipment', txt.trim()) || DB.all('equipment').find(x=>x.qr===txt.trim() || x.name===txt.trim());
        if(e){
          scanFeedback();
          sel.equipment = {id:e.id, name:e.name, proc:e.proc, hourly_capa:e.hourly_capa};
          stopEqQR();
          toast(`설비: ${e.name}`,'ok');
          render();
        } else {
          toast(`설비 미등록: ${txt}`,'err');
        }
      },
      ()=>{}
    ).catch(()=>toast('카메라 권한 필요','err'));
  }
  function stopEqQR(){
    if(eqQr){
      eqQr.stop().catch(()=>{}).finally(()=>{ eqQr=null; });
    }
    const area = document.getElementById('eq-qr-area');
    if(area) area.style.display = 'none';
  }

  render();
}

/* ============== 실적 등록 (스캔 화면) ============== */
function renderScanPhone(session){
  let parsed = null;     // {plot_no, item, proc, eq}
  let bal = 0;
  let qtype = 'good';    // 'good' | 'def' | 'rew'
  let qval = '';         // 수량 문자열
  let qreason = '';
  let continuous = true; // 연속 스캔
  let html5Qr = null;

  function shiftCls(){
    const c = session.shift?.code;
    if(c==='night' || /night|야간/i.test(c||'')) return 'shift-night';
    return 'shift-day';
  }
  function shiftIcon(){
    const c = session.shift?.code;
    const night = c==='night' || /night|야간/i.test(c||'');
    return night
      ? '<svg viewBox="0 0 24 24"><path d="M21 12.8A9 9 0 1 1 11.2 3 7 7 0 0 0 21 12.8z"/></svg>'
      : '<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="4"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/></svg>';
  }

  function pendingRework(){
    if(!parsed) return 0;
    const recs = DB.query('records', r=>r.plot_no===parsed.plot_no && r.proc===parsed.proc);
    const cumRew = recs.reduce((s,r)=>s+(r.rework||0),0);
    const cumRet = recs.reduce((s,r)=>s+(r.rework_returned||0),0);
    return Math.max(0, cumRew - cumRet);

        <button class="submit-big ${qtyOk?'next':''}" id="btn-register" ${qtyOk?'':'disabled'}>${parsed? `실적 등록${continuous?' → 다음 스캔':''}` : 'QR 스캔 대기'}</button>

        <div class="scan-feed">
          <h4>오늘 등록한 실적 — ${session.worker?.name||''}</h4>
          <div id="my-recent"></div>
        </div>
      </div>
    `;

    // 이벤트
    document.getElementById('btn-change-sess').onclick = ()=>{
      stopCam();
      renderSessionSetup(session);  // 기존 값 prefill
    };
    document.getElementById('sw-cont').onclick = (e)=>{
      continuous = !continuous;
      e.currentTarget.classList.toggle('on', continuous);
    };
    document.querySelectorAll('[data-qt]').forEach(b=>b.onclick=()=>{
      qtype = b.dataset.qt; qval=''; qreason=''; render();
    });
    document.querySelectorAll('[data-key]').forEach(b=>b.onclick=()=>{
      const k = b.dataset.key;
      if(k==='C'){ qval=''; }
      else if(k==='back'){ qval = qval.slice(0,-1); }
      else { if(qval.length<6) qval += k; }
      updateQValAndBal();
    });
    const rsn = document.getElementById('q-reason');
    if(rsn) rsn.oninput = ()=>{ qreason = rsn.value; };
    document.getElementById('btn-register').onclick = doRegister;
    document.getElementById('btn-manual').onclick = manualInput;
    // ★ v0.16.13 — 공정 select 변경 (parsed.proc 전환 + bal 갱신 · 재렌더)
    const scProc = document.getElementById('sc-proc');
    if(scProc){
      scProc.onchange = ()=>{
        if(!parsed) return;
        parsed.proc = scProc.value;
        bal = LOT.balance(parsed.plot_no, parsed.proc);
        qval = ''; qreason = '';
        render();
      };
    }

    // 카메라 시작
    if(cameraOK() && !parsed) startCam();
    renderRecent();
  }

  function updateQValAndBal(){
    // 양품/불량/재작업 그대로 같은 잔량 검증
    const v = +qval||0;
    const rem = bal - v;
    const bv = document.querySelector('.bal-big .bv');
    if(bv){
      bv.textContent = (parsed? (rem).toLocaleString() : '―') + ' ea';
      bv.className = 'bv ' + (rem<0?'err':(rem<50?'warn':''));
    }
    const qb = document.querySelector('.qval-big');
    if(qb) qb.textContent = qval||'0';
    const btn = document.getElementById('btn-register');
    if(btn){
      const ok = parsed && v>0 && rem>=0;
      btn.disabled = !ok;
      btn.classList.toggle('next', ok);
    }
  }

  function applyParsed(p){
    parsed = p;
    bal = LOT.balance(p.plot_no, p.proc);
    qval = ''; qreason = '';
    render();
  }

  function doRegister(){
    if(!parsed){ toast('먼저 QR을 스캔하세요','warn'); return; }
    const v = +qval||0;
    if(v<=0){ toast('수량을 입력하세요','warn'); return; }
    const procObj = DB.get('processes', parsed.proc);
    // ★ v0.16.2 — 세션·QR 미지정 시 WO.plan_eq[현재 공정] 을 기본값으로 사용 (수정은 이후 UI 에서)
    const _woForLot = DB.query('work_orders', w => w.plot_no === parsed.plot_no)[0];
    const _planEq   = _woForLot?.plan_eq?.[parsed.proc] || '';
    const payload = {
      plot_no: parsed.plot_no,
      proc:    parsed.proc,
      equipment: session.equipment?.name || parsed.eq || _planEq || (procObj?.equipment?.[0]||''),
      good:0, defect:0, rework:0, scrap:0,
      defect_reason: qtype==='def'? qreason : '',
      type: procObj?.type==='out'?'out':'in',
      shift: session.shift?.code||'day',
      source:'manual',
      worker: session.worker || null,
    };
    if(qtype==='good') payload.good = v;
    else if(qtype==='def') payload.defect = v;
    else if(qtype==='rew') payload.rework = v;
    try {
      LOT.registerRecord(payload);
      scanFeedback();
      const remain = LOT.balance(parsed.plot_no, parsed.proc);
      toast(`✓ 등록 ${qtype==='good'?'양품':qtype==='def'?'불량':'재작업'} ${v}ea · 잔량 ${remain}`,'ok');
      const next = LOT.nextProcess(parsed.plot_no);
      if(remain<=0 && next){ toast(`다음 공정: ${next.name}`,'ok'); }
      // 다음 스캔 대기
      if(continuous){
        parsed = null; bal=0; qval=''; qreason='';
        render();
      } else {
        bal = remain; qval=''; qreason='';
        render();
      }
    } catch(e){
      toast(e.message,'err',3500);
    }
  }

  function manualInput(){
    const lots = DB.all('production_lots');
    openModal(`
      <h2>수동 QR 입력 <button class="x" onclick="closeModal()">${ico('x')}</button></h2>
      <div class="body">
        <div><label>QR 페이로드 (JSON 또는 KEY:VAL|...)</label>
          <textarea id="m-qr" rows="4" placeholder='예: {"plot_no":"PL-2026-001","item":"HF-3301","proc":"FORGE"}'></textarea></div>
        <div class="chip-row" id="m-chip">
          ${lots.slice(0,8).map(l=>`<span class="chip" data-l="${l.plot_no}">${l.plot_no}</span>`).join('')}
          ${lots.length===0? '<span style="color:var(--sub);font-size:11px">먼저 작업지시 화면에서 LOT을 생성하세요.</span>':''}
        </div>
        <div class="actions">
          <button class="btn" onclick="closeModal()">취소</button>
          <button class="btn primary" id="m-ok">${ico('check')}판정</button>
        </div>
      </div>
    `);
    document.querySelectorAll('#m-chip .chip').forEach(c=>c.onclick=()=>{
      document.getElementById('m-qr').value = JSON.stringify({plot_no:c.dataset.l});
    });
    document.getElementById('m-ok').onclick = ()=>{
      try {
        const p = parseQRPayload(document.getElementById('m-qr').value.trim());
        closeModal();
        stopCam();
        applyParsed(p);
        toast(`판정 완료 — ${p.proc} / ${p.plot_no}`,'ok');
      } catch(e){ toast(e.message,'err'); }
    };
  }

  function startCam(){
    if(!cameraOK()) return;
    if(!window.Html5Qrcode) { setTimeout(startCam, 400); return; }
    try {
      if(!html5Qr) html5Qr = new Html5Qrcode("qr-reader");
      html5Qr.start({facingMode:'environment'}, {fps:10, qrbox:240},
        txt=>{
          try {
            const p = parseQRPayload(txt);
            scanFeedback();
            if(html5Qr) html5Qr.pause(true);
            applyParsed(p);
          } catch(e){ toast(e.message,'err'); }
        },
        ()=>{}
      ).catch(()=>{ /* 권한 없으면 침묵 — 수동 가능 */ });
    } catch(e){/* ignore */}
  }
  function stopCam(){
    if(html5Qr){
      try { html5Qr.stop(); } catch(e){}
      html5Qr = null;
    }
  }

  function renderRecent(){
    const wid = session.worker?.id || session.worker?.emp_no;
    const today0=new Date();today0.setHours(0,0,0,0);
    const mine = DB.all('records').filter(r=>(r.worker?.id===wid || r.by===wid) && r.ts>=today0.getTime())
                 .sort((a,b)=>b.ts-a.ts).slice(0,8);
    const el = document.getElementById('my-recent');
    if(!el) return;
    el.innerHTML = mine.length? `<div class="feed">${mine.map(r=>`
      <div class="feed-row">
        <span class="t">${fmtTime(r.ts)}</span>
        <span class="e">${DB.get('processes',r.proc)?.name||r.proc} · <b>${r.plot_no}</b> ${r.defect_reason?`<span class="pill red" style="margin-left:6px">${r.defect_reason}</span>`:''}</span>
        <span class="q">+${r.good||r.defect||r.rework||0}<span style="color:var(--sub);font-size:10px">ea</span></span>
      </div>`).join('')}</div>` : `<div class="empty" style="padding:18px">오늘 등록한 실적이 아직 없습니다.</div>`;
  }

  render();
}

          <select id="wo-tmpl">
            <option value="">— 선택 —</option>
            <option value="__default__">회사 공정 템플릿 (${procs.length}개 공정: ${procs.map(p=>p.name).join(' → ')})</option>
          </select>
        </div>
        <div id="wo-route-slots" style="margin-top:10px"></div>
      `;
      document.getElementById('wo-tmpl').onchange = (e)=>{
        if(e.target.value==='__default__'){
          // 품번 BOM 저장 (품번 귀속)
          const item = DB.get('items', code);
          const prev = getBOM(code) || {
            code, name:item?.name||code, rev:'A',
            material:{ type:item?.mat||'', dia:item?.dia||0, weight:item?.weight||0 },
            route:[],
          };
          prev.route = procs.map(p=>({ seq:p.seq, proc:p.code, mode:p.type==='out'?'out':'in' }));
          DB.set('bom', code, prev);
          toast(`${code} 라우팅 저장`,'ok');
          renderRoute();
        }
      };
      return;
    }
    // 라우팅 있음 → 체인 렌더 + 공정별 설비 select
    const route = getRoute(code);
    const chips = route.map(r=>{
      const p = DB.get('processes', r.proc);
      const isOut = r.mode==='out';
      return `<span class="pill ${isOut?'heat':'cyan'}" style="font-size:11px">${_esc(p?.name||r.proc)}${isOut?' · 외주':''}</span>`;
    }).join('<span style="color:var(--dim);margin:0 4px">→</span>');
    const slots = route.map(r=>{
      const p = DB.get('processes', r.proc);
      const isOut = r.mode==='out';
      const opts = isOut
        ? vendorsOut.map(v=>`<option value="${_esc(v.code)}">${_esc(v.name)}</option>`).join('')
        : getEquipment(r.proc).map(eq=>`<option value="${_esc(eq)}">${_esc(eq)}</option>`).join('');  // ★ v0.16.7 — 컬렉션 우선
      return `<div style="min-width:150px;flex:1">
        <div style="font-size:10.5px;color:${isOut?'var(--heat2)':'var(--cyan)'};font-weight:600;margin-bottom:4px">${_esc(p?.name||r.proc)}${isOut?' · 외주':''}</div>
        <select class="wo-plan-eq" data-proc="${_esc(r.proc)}" data-mode="${isOut?'out':'in'}" style="font-size:12px;padding:7px 9px">
          <option value="">미지정 — 실적 때 확정</option>
          ${opts}
        </select>
      </div>`;
    }).join('');
    routeWrap.innerHTML = `
      <div style="font-size:11px;color:var(--sub);margin-bottom:8px">라우팅 체인 (품번 BOM 기준)</div>
      <div style="display:flex;flex-wrap:wrap;align-items:center;gap:4px;padding:10px 12px;background:var(--bg);border:1px solid var(--line);border-radius:10px;margin-bottom:10px">${chips}</div>
      <div style="font-size:11px;color:var(--sub);margin-bottom:6px">공정별 계획 설비 (미지정 허용)</div>
      <div style="display:flex;flex-wrap:wrap;gap:8px">${slots}</div>
    `;
  }

  // STEP1 — 수주 변경 → 품번·수량·힌트 동기화
  soSel.onchange = ()=>{
    const opt = soSel.selectedOptions[0];
    if(soSel.value && opt){
      const item = opt.dataset.item;
      const remain = +opt.dataset.remain || 0;
      const shipped = +opt.dataset.shipped || 0;
      const soQty  = +opt.dataset.qty || 0;
      const due    = opt.dataset.due;
      // 품번 자동
      if([...itemSel.options].some(o=>o.value===item)){
        itemSel.value = item;
      }
      qtyEl.value = remain;
      let dueTxt = '';
      if(due){
        const d = new Date(due), t = new Date(today);
        const days = Math.round((d-t)/86400000);
        dueTxt = ` · 납기까지 ${days}일`;
      }
      soHint.innerHTML = `수주 잔량 <b style="color:var(--cyan)">${remain.toLocaleString()}ea</b> = 수주 ${soQty.toLocaleString()} − 기출하 ${shipped.toLocaleString()}${dueTxt}`;
    } else {
      soHint.innerHTML = '재고생산 선택 — 수주 없이 재고 확보용 지시';
    }
    renderRoute(); updMatHint();
  };
  itemSel.onchange = ()=>{ renderRoute(); updMatHint(); };
  qtyEl.oninput = updMatHint;
  matSel.onchange = ()=>{
    matManualWrap.style.display = (matSel.value==='__manual__') ? 'block' : 'none';
    updMatHint();
  };

  // STEP3 — 소재 필요량 힌트 (초과 시 앰버 경고만, 차단 X)
  function updMatHint(){
    const code = itemSel.value;
    const it = DB.get('items', code);
    const w = +it?.weight || 0;
    const q = +qtyEl.value || 0;
    const need = Math.round(w*q*100)/100;
    const heat = matSel.value;
    if(!code || !q || !w){
      matHint.innerHTML = '소재 필요량 힌트: 지시수량 × 단중 = ? kg — 품번·수량·heat 선택 시 표시';
      matHint.style.color = 'var(--sub)';
      return;
    }
    if(heat && heat!=='__manual__'){
      const opt = matSel.selectedOptions[0];
      const rem = +opt?.dataset.remain || 0;
      const over = need > rem;
      matHint.innerHTML = `소재 필요량 ${need.toLocaleString()}kg (${q.toLocaleString()}ea × ${w}kg) vs 선택 heat 잔량 ${Math.round(rem).toLocaleString()}kg${over?' — <b>⚠ 초과: 부족분은 다른 heat 로 보완 필요 (등록은 진행됩니다)</b>':' · 여유 <b>'+Math.round(rem-need).toLocaleString()+'kg</b>'}`;
      matHint.style.color = over ? 'var(--amber)' : 'var(--cyan)';
    } else {
      matHint.innerHTML = `소재 필요량 ${need.toLocaleString()}kg (${q.toLocaleString()}ea × ${w}kg) — heat 선택 시 잔량 대조`;
      matHint.style.color = 'var(--sub)';
    }
  }

  // 초기 렌더
  renderRoute(); updMatHint();

  // ★ v0.20.1 — 계획에서 프리필 (수주·품번·수량) — 저장 로직 무수정
  if(pre.so_id && [...soSel.options].some(o => o.value === pre.so_id)){
    soSel.value = pre.so_id;
    soSel.dispatchEvent(new Event('change'));
  } else if(pre.itemCode && [...itemSel.options].some(o => o.value === pre.itemCode)){
    itemSel.value = pre.itemCode;
    renderRoute();
  }
  if(pre.qty) qtyEl.value = pre.qty;
  updMatHint();

  document.getElementById('wo-ok').onclick = () => {
    try {
      const so_id   = soSel.value || null;
      const itemCode= itemSel.value;
      const plot    = document.getElementById('wo-plot').value.trim();
      const qty     = +qtyEl.value;
      const sel     = matSel.value;
      let mats = [];
      if(sel && sel!=='__manual__') mats = [sel];
      else if(sel==='__manual__'){
        const manual = document.getElementById('wo-mat-manual').value.trim();
        if(manual) mats = [manual];
      }
      if(!plot) throw new Error('생산LOT 번호 입력');
      if(!qty || qty<=0) throw new Error('지시수량 입력');

      // 계획 설비 수집 — 미지정(빈 값) 공정은 키 생략
      const plan_eq = {};
      document.querySelectorAll('.wo-plan-eq').forEach(s=>{
        if(s.value) plan_eq[s.dataset.proc] = s.value;
      });

      // 폴백(직접 입력) heat → material_lots 만 생성 (kg 미기록)
      if(sel==='__manual__'){
        mats.forEach(m=>{
          if(!DB.get('material_lots',m)){
            DB.set('material_lots',m,{heat:m, ts:Date.now()});
          }
        });
      }
      // ★ v0.20.0 — 채번 v2: 수동 번호 허용 · 중복 차단 (LOT 번호는 LOT.create 가 이미 던짐)
      const woNo = resolveDocNo('wo-id', 'WO');
      if(woNo.dup){ throw new Error(`지시번호 중복 — ${woNo.id}`); }
      // LOT.create 시그니처 불변 유지 (기존 dup 가드 재사용)
      LOT.create({plot_no:plot, itemCode, materialLots:mats, qty_initial:qty});
      // ★ v0.16.2 — WO 스키마에 so_id·plan_eq 필드 추가 (기존 필드는 그대로)
      const wo = {
        id: woNo.id,
        itemCode, plot_no:plot, qty,
        so_id, plan_eq,
        created:Date.now(), by:SESSION.user
      };
      DB.set('work_orders', wo.id, wo);
      // ★ v0.20.1 — 계획에서 발행된 경우 plan.wo_id 병합 (원본 보존)
      if(pre.from_plan){
        DB.correct('production_plans', pre.from_plan, { wo_id: wo.id }, `WO ${wo.id} 발행`);
      }
      toast(so_id ? `작업지시 생성 · ${so_id} 연결` : '작업지시 생성 (재고생산)','ok');
      closeModal(); router();
    } catch(e){ toast(e.message,'err'); }
  };
};
VIEWS._printWO = (id)=>{ printForm.wo([id]); };  // ★ v0.12.0 — 새 양식 위임

/* -------------------- LOT 추적 -------------------- */
/* ★ v0.13.3 — 통합 검색(품번·품명·고객사·LOT·heat) + 고객사 드롭다운 (재고 검색 패턴 복제) */
let lotSearch = { q:'', cust:'' };
VIEWS.lot = () => {
  // ★ v0.16.0 — voidView 토글
  const lotState = (window._lotVoidView = window._lotVoidView || { voidView:false });
  const lots = (lotState.voidView ? DB.allRaw('production_lots') : DB.all('production_lots')).sort((a,b)=>b.created-a.created);
  const procs = getProcesses();
  const items = getItems();

  // 각 LOT의 파생 필드(품명·고객사명·heat 문자열) 미리 계산
  const enriched = lots.map(l => {
    const item = items.find(i => i.code === l.itemCode);
    const name = item?.name || '';
    const custName = item?.cust ? (DB.get('vendors', item.cust)?.name || item.cust) : '';
    const heatStr = (l.heat_nos||[]).join(' ');
    return { l, name, custName, heatStr };
  });

  const q = lotSearch.q.trim().toLowerCase();
  const filtered = enriched.filter(({ l, name, custName, heatStr }) => {
    if(q){
      const hay = [l.plot_no, l.itemCode, name, custName, heatStr].join(' ').toLowerCase();
      if(!hay.includes(q)) return false;
    }
    if(lotSearch.cust && custName !== lotSearch.cust) return false;
    return true;
  }).map(e => e.l);

  const custOpts = [...new Set(enriched.map(e => e.custName).filter(Boolean))].sort();

  const hasFilter = !!(lotSearch.q || lotSearch.cust);

  document.getElementById('view').innerHTML = `
    <div class="pghead">
      <div class="pgtitle"><svg class="ic" viewBox="0 0 24 24">${pgIcon('lot')}</svg>LOT 추적 · 잔량원장</div>
      <div class="pgtools">
        <label style="display:inline-flex;align-items:center;gap:6px;font-size:11px;color:var(--sub);padding:6px 10px;border:1px solid var(--line);border-radius:8px;cursor:pointer;background:${lotState.voidView?'rgba(248,113,113,.08)':'var(--bg2)'}"><input type="checkbox" id="lot-void-view" ${lotState.voidView?'checked':''} style="width:auto;margin:0"> 취소 포함 보기</label>
        <button class="btn" id="btn-merge">${ico('merge')}LOT 병합</button>
        <button class="btn" id="btn-split">${ico('split')}LOT 분할</button>
        <button class="btn" id="btn-fork">${ico('split')}LOT 분기</button>
        <button class="btn" id="lot-xlsx">${ico('excel')}엑셀</button>
      </div>
    </div>

    <!-- 검색 + 필터 (재고 화면 패턴 복제) -->
    <div class="card" style="padding:14px;margin-bottom:12px">
      <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap">
        <div style="flex:1;min-width:260px;display:flex;align-items:center;gap:9px;background:var(--bg2);border:1px solid var(--line);border-radius:10px;padding:10px 14px">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="var(--sub)" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg>
          <input id="lot-q" placeholder="통합 검색 — 고객사 · 품번 · 품명 · LOT · heat" value="${_esc(lotSearch.q)}" style="flex:1;background:none;border:none;outline:none;color:var(--ink);font-size:13px;padding:0;width:auto">
        </div>
        <select id="lot-cust" style="width:140px"><option value="">고객사 ▾</option>${custOpts.map(c=>`<option value="${_esc(c)}" ${lotSearch.cust===c?'selected':''}>${_esc(c)}</option>`).join('')}</select>
      </div>
      <!-- 적용 필터 칩 -->
      <div style="display:flex;gap:7px;margin-top:10px;flex-wrap:wrap;align-items:center;${hasFilter?'':'display:none'}">
        ${lotSearch.q?    `<span class="pill cyan" style="cursor:pointer" data-clear="q">검색: ${_esc(lotSearch.q)} ✕</span>`:''}
        ${lotSearch.cust? `<span class="pill cyan" style="cursor:pointer" data-clear="cust">고객사: ${_esc(lotSearch.cust)} ✕</span>`:''}
        <span style="margin-left:auto;font-size:11px;color:var(--dim)">${filtered.length}건 / 전체 ${lots.length}건</span>
      </div>
    </div>

    <div class="card">
      <h3>생산 LOT <span class="tag">전체 ${lots.length}건 · 잔량 = 직전 양품 − 현 투입 · <span style="color:var(--blue)">반출 중 = 외주처 체류(입고 전)</span></span></h3>
      <div class="tbl-wrap"><table>
        <thead><tr><th>LOT</th><th>품번</th><th>type</th><th>heat</th><th class="num">초기</th>${procs.map(p=>`<th class="num">${p.name}</th>`).join('')}<th></th></tr></thead>
        <tbody>${filtered.length? filtered.map(l=>{
          const route = getRoute(l.itemCode);
          const inRoute = new Set(route.map(r=>r.proc));
          // ★ v0.16.9 — 행당 1회 records 스캔 → 공정별 불량 집계 (칸마다 개별 query 금지)
          const defectByProc = {};
          DB.query('records', r => r.plot_no === l.plot_no).forEach(r => {
            defectByProc[r.proc] = (defectByProc[r.proc] || 0) + (r.defect || 0);
          });
          const cells = procs.map(p=>{
            if(!inRoute.has(p.code)){
              return `<td class="num muted" title="라우트에 없음">—</td>`;
            }
            const bal = LOT.balance(l.plot_no, p.code);       // 계산 불변
            const good = LOT.totalGood(l.plot_no, p.code);    // 계산 불변
            const defect = defectByProc[p.code] || 0;
            // ★ v0.16.16 — 외주 공정: 반출 중(입고 전) 서브 라인 · osInFlight 재사용(신규 계산 금지)
            //             잔량 표시는 (잔량 − 반출 중) max 0 — 표시만, LOT.balance 계산 불변.
            const routeEntry = route.find(r => r.proc === p.code);
            const isOut = routeEntry?.mode === 'out';
            const inFlight = isOut ? osInFlight(l.plot_no, p.code) : 0;
            const displayBal = isOut ? Math.max(0, bal - inFlight) : bal;
            // ★ v0.16.9 — 3줄 표기: 양품 / 불량(0이면 생략) / 잔량 (+ 반출 중 서브)
            const defectLine = defect > 0
              ? `<div style="color:var(--red);font-size:10px">불량 ${defect.toLocaleString()}</div>`
              : '';
            // ★ v0.16.11 — 음수 잔량 red bold + 툴팁 (초과 투입 · 이상 신호)
            // ★ v0.16.14 — 잔량 0 = green ("대기 없음 · 원활" 신호) · dim → green 만 변경
            const balColor  = displayBal > 0 ? 'var(--amber)' : displayBal < 0 ? 'var(--red)' : 'var(--green)';
            const balWeight = '700';
            const balTitle  = bal < 0 ? ' title="초과 투입 — 실적 중복 여부 확인"' : '';
            const balLine = `<div${balTitle} style="color:${balColor};font-size:10px;font-weight:${balWeight}">잔량 ${displayBal.toLocaleString()}</div>`;
            const inFlightLine = inFlight > 0
              ? `<div title="외주처 체류 — 입고 전" style="color:var(--blue);font-size:10px">반출 중 ${inFlight.toLocaleString()}</div>`
              : '';
            return `<td class="num"><div>${good.toLocaleString()}</div>${defectLine}${balLine}${inFlightLine}</td>`;
          }).join('');
          const forkBadge = l.fork_from
            ? `<div style="font-size:10px;color:var(--heat2)">↳ fork from ${l.fork_from} @${l.fork_at_proc}</div>`
            : (l.merge_at_proc?`<div style="font-size:10px;color:var(--heat2)">@${l.merge_at_proc}</div>`:'');
          // ★ v0.16.0 — void 표시 · 취소/복원 버튼
          const isVoid = !!l.void;
          const rowStyle = isVoid ? 'opacity:.5;background:rgba(248,113,113,.04)' : '';
          const voidBadge = isVoid ? ` <span class="pill" style="background:rgba(248,113,113,.15);color:var(--red);font-size:9px;margin-left:4px" title="${_esc(l.void.reason||'')} · ${fmtDate(l.void.ts)}">「취소」</span>` : '';
          const actionBtns = isVoid
            ? `<button class="btn ghost" data-lot-unvoid="${_esc(l.plot_no)}" style="color:var(--cyan)">${ico('save')}복원</button>`
            : `<button class="btn ghost" onclick="VIEWS._lotHistory('${l.plot_no}')">${ico('eye')}</button> <button class="btn ghost" data-lot-void="${_esc(l.plot_no)}" style="color:var(--red)">${ico('x')}취소</button>`;
          return `<tr style="${rowStyle}">
            <td><b>${l.plot_no}</b>${voidBadge}${forkBadge}</td>
            <td>${l.itemCode}</td>
            <td><span class="pill ${l.type==='merged'?'heat':l.type==='split'?'blue':l.type==='forked'?'heat':'gray'}">${l.type}</span></td>
            <td class="muted">${(l.heat_nos||[]).join(',')||'―'}</td>
            <td class="num">${(l.qty_initial||0).toLocaleString()}</td>
            ${cells}
            <td>${actionBtns}</td>
          </tr>`;
        }).join('') : `<tr><td colspan="${4+procs.length+2}" class="empty">${hasFilter?'필터에 맞는 LOT이 없습니다':'생성된 LOT 없음'}</td></tr>`}</tbody>
      </table></div>
    </div>
  `;

  // 검색·필터 이벤트
  let lotQTimer;
  document.getElementById('lot-q').oninput = (e)=>{
    clearTimeout(lotQTimer);
    lotQTimer = setTimeout(()=>{ lotSearch.q = e.target.value; router(); }, 250);
  };
  document.getElementById('lot-cust').onchange = (e)=>{ lotSearch.cust = e.target.value; router(); };
  document.querySelectorAll('[data-clear]').forEach(el=>el.onclick = ()=>{
    lotSearch[el.dataset.clear] = ''; router();
  });
  // ★ v0.16.0 — LOT void 토글 + 취소/복원 (연관 WO 동반)
  document.getElementById('lot-void-view').onchange = (e)=>{ lotState.voidView=e.target.checked; router(); };
  document.querySelectorAll('[data-lot-void]').forEach(b=>b.onclick = ()=>{
    const plot = b.dataset.lotVoid;
    const liveRecs = DB.query('records', r=>r.plot_no===plot && !r.transferred);
    if(liveRecs.length){ toast('실적이 등록된 LOT — 실적현황에서 먼저 취소','err'); return; }
    voidDoc('production_lots', plot, '오입력');
    const wo = DB.query('work_orders', w=>w.plot_no===plot)[0];
    if(wo) voidDoc('work_orders', wo.id, `LOT ${plot} 동반 취소`);
    toast('LOT·WO 취소 (원본 보존)','ok'); router();
  });
  document.querySelectorAll('[data-lot-unvoid]').forEach(b=>b.onclick = ()=>{
    const plot = b.dataset.lotUnvoid;
    unvoidDoc('production_lots', plot);
    const wo = DB.queryRaw('work_orders', w=>w.plot_no===plot)[0];
    if(wo) unvoidDoc('work_orders', wo.id);
    toast('LOT·WO 복원','ok'); router();
  });

  // 엑셀: 필터 반영 결과 · 화면명 규칙 파일명
  document.getElementById('lot-xlsx').onclick = ()=>{
    const today = new Date().toISOString().slice(0,10);
    exportXlsx(filtered, 'LOT', `LOT추적_${today}.xlsx`);
  };

  document.getElementById('btn-merge').onclick = () => {
    const lots = DB.all('production_lots');
    openModal(`
      <h2>LOT 병합 <button class="x" onclick="closeModal()">${ico('x')}</button></h2>
      <div class="body">
        <div><label>병합 대상 LOT 선택 (Ctrl·동일 품번)</label>
          <select id="mg-lots" multiple size="6">${lots.map(l=>`<option value="${l.plot_no}">${l.plot_no} (${l.itemCode})</option>`).join('')}</select></div>
        <div><label>공정 (잔량 합산 기준)</label>
          <select id="mg-proc">${procs.map(p=>`<option value="${p.code}">${p.name}</option>`).join('')}</select></div>
        <div><label>새 LOT 번호</label>
          <input id="mg-new" placeholder="예: PL-2026-M01"></div>
        <div class="actions">
          <button class="btn" onclick="closeModal()">취소</button>
          <button class="btn primary" id="mg-ok">${ico('merge')}병합</button>
        </div>
      </div>
    `);
    document.getElementById('mg-ok').onclick = () => {
      const ids = [...document.getElementById('mg-lots').selectedOptions].map(o=>o.value);
      const proc = document.getElementById('mg-proc').value;
      const np = document.getElementById('mg-new').value.trim();
      try{
        LOT.merge({newPlotNo:np, sourcePlots:ids, proc});
        toast('병합 완료','ok'); closeModal(); router();
      }catch(e){ toast(e.message,'err'); }
    };
  };
  document.getElementById('btn-split').onclick = () => {
    const lots = DB.all('production_lots');
    openModal(`
      <h2>LOT 분할 (절단공정 1회) <button class="x" onclick="closeModal()">${ico('x')}</button></h2>
      <div class="body">
        <div><label>부모 LOT</label>
          <select id="sp-parent">${lots.map(l=>`<option value="${l.plot_no}">${l.plot_no} (${l.itemCode})</option>`).join('')}</select></div>
        <div><label>분할 자식 (LOT번호:수량, 줄바꿈)</label>
          <textarea id="sp-parts" rows="4" placeholder="PL-2026-001A:400&#10;PL-2026-001B:400"></textarea></div>
        <div class="actions">
          <button class="btn" onclick="closeModal()">취소</button>
          <button class="btn primary" id="sp-ok">${ico('split')}분할</button>
        </div>
      </div>
    `);
    document.getElementById('sp-ok').onclick = () => {
      const parent = document.getElementById('sp-parent').value;
      const parts = document.getElementById('sp-parts').value.split('\n').map(s=>{
        const [p,q] = s.split(':'); return p?{plot_no:p.trim(), qty:+q}:null;
      }).filter(Boolean);
      try{
        LOT.split({parentPlotNo:parent, parts});
        toast('분할 완료','ok'); closeModal(); router();
      }catch(e){ toast(e.message,'err'); }
    };
  };

  /* ★ v0.7.0 — LOT 분기 (fork) 모달
     같은 단조품 부모 → 서로 다른 완성품 자식들로 분기 */
  document.getElementById('btn-fork').onclick = () => {
    const allLots = DB.all('production_lots');
    // v0.15.0 — 자식 LOT 품번 select: 활성 품번만
    const items = getActiveItems();
    if(!allLots.length){ toast('LOT이 없습니다 — 먼저 작업지시 생성','warn'); return; }
    openModal(`
      <h2>LOT 분기 (fork) <button class="x" onclick="closeModal()">${ico('x')}</button></h2>
      <div class="body">
        <div><label>부모 LOT</label>
          <select id="fk-parent">${allLots.map(l=>`<option value="${l.plot_no}">${l.plot_no} (${l.itemCode})</option>`).join('')}</select></div>
        <div><label>분기 공정 (자식들이 시작할 공정 · 부모 라우트 내)</label>
          <select id="fk-proc"></select>
          <div id="fk-bal-hint" style="font-size:11px;color:var(--sub);margin-top:6px"></div>
        </div>
        <div>
          <label style="display:flex;justify-content:space-between;align-items:center">
            <span>자식 LOT (완성품 품번 + 수량)</span>
            <span style="font-size:10px;color:var(--sub);font-weight:500">합계 <b id="fk-sum" style="color:var(--cyan);font-family:'JetBrains Mono',monospace">0</b> / 잔량 <b id="fk-bal" style="font-family:'JetBrains Mono',monospace">―</b></span>
          </label>
          <div id="fk-children" style="display:flex;flex-direction:column;gap:6px;margin-top:6px"></div>
          <button class="btn ghost" id="fk-add-child" style="margin-top:6px;font-size:11px">${ico('plus')}자식 추가</button>
        </div>
        <div style="font-size:11px;color:var(--sub);background:var(--bg2);border:1px solid var(--line);border-radius:8px;padding:8px 10px;line-height:1.6">
          ※ 부모와 자식들의 [공정 라우트 0..분기공정] 가 동일해야 합니다 (같은 단조품 전제).<br>
          ※ heat은 부모로부터 자동 상속. 분기공정 이전 공정은 자식 화면에서 '완료' 처리.
        </div>
        <div class="actions">
          <button class="btn" onclick="closeModal()">취소</button>
          <button class="btn primary" id="fk-ok">${ico('split')}분기</button>
        </div>
      </div>
    `);
    // 자식 행 (동적)
    let kids = [{plot_no:'', itemCode:items[0]?.code||'', qty:''},{plot_no:'', itemCode:items[1]?.code||items[0]?.code||'', qty:''}];
    function renderKids(){
      document.getElementById('fk-children').innerHTML = kids.map((k,i)=>`
        <div style="display:grid;grid-template-columns:1.3fr 1.2fr 0.9fr auto;gap:6px;align-items:end">
          <input data-k="${i}" data-f="plot_no" value="${k.plot_no}" placeholder="자식 LOT 번호">
          <select data-k="${i}" data-f="itemCode">${items.map(it=>`<option value="${it.code}"${k.itemCode===it.code?' selected':''}>${it.code} · ${it.name}</option>`).join('')}</select>
          <input data-k="${i}" data-f="qty" type="number" min="1" value="${k.qty}" placeholder="수량" style="font-family:'JetBrains Mono',monospace;text-align:right">
          <button class="btn warn" data-rm-kid="${i}" ${kids.length<=1?'disabled':''}>${ico('trash')}</button>
        </div>
      `).join('');
      document.querySelectorAll('[data-k]').forEach(el=>{
        el.oninput = ()=>{
          const i = +el.dataset.k, f = el.dataset.f;
          kids[i][f] = (f==='qty')? el.value : el.value.trim();
          updateSum();
        };
        el.onchange = el.oninput;
      });
      document.querySelectorAll('[data-rm-kid]').forEach(b=>b.onclick=()=>{
        kids.splice(+b.dataset.rmKid,1); renderKids(); updateSum();
      });
      updateSum();
    }
    function updateSum(){
      const sum = kids.reduce((s,k)=>s+(+k.qty||0),0);
      const balEl = document.getElementById('fk-bal');
      const sumEl = document.getElementById('fk-sum');
      sumEl.textContent = sum.toLocaleString();
      const bal = +balEl.dataset.bal || 0;
      sumEl.style.color = sum>bal? 'var(--red)' : (sum===bal? 'var(--cyan)' : 'var(--ink)');
      document.getElementById('fk-ok').disabled = (sum<=0 || sum>bal);
    }
    function updateProcOptions(){
      const parentId = document.getElementById('fk-parent').value;
      const parent = DB.get('production_lots', parentId);
      const route = getRoute(parent?.itemCode);
      const sel = document.getElementById('fk-proc');
      sel.innerHTML = route.filter(r=>r.proc!=='SHIP').map(r=>{
        const p = DB.get('processes', r.proc);
        const bal = LOT.balance(parentId, r.proc);
        return `<option value="${r.proc}" data-bal="${bal}">${p?.name||r.proc} (잔량 ${bal})</option>`;
      }).join('');
      updateBal();
    }
    function updateBal(){
      const opt = document.getElementById('fk-proc').selectedOptions[0];
      const bal = +opt?.dataset.bal || 0;
      const balEl = document.getElementById('fk-bal');
      balEl.textContent = bal.toLocaleString();
      balEl.dataset.bal = bal;
      document.getElementById('fk-bal-hint').textContent =
        bal>0 ? `부모 분기공정 잔량 ${bal}ea — 자식 합계가 이를 넘으면 차단됩니다.`
              : `잔량 0 — 다른 공정 선택`;
      updateSum();
    }
    document.getElementById('fk-parent').onchange = updateProcOptions;
    document.getElementById('fk-proc').onchange = updateBal;
    document.getElementById('fk-add-child').onclick = ()=>{
      kids.push({plot_no:'', itemCode:items[0]?.code||'', qty:''}); renderKids();
    };
    document.getElementById('fk-ok').onclick = ()=>{
      const parent = document.getElementById('fk-parent').value;
      const proc   = document.getElementById('fk-proc').value;
      try{
        LOT.fork({parentPlotNo:parent, fork_at_proc:proc, children:kids.map(k=>({plot_no:k.plot_no, itemCode:k.itemCode, qty:+k.qty||0}))});
        toast(`분기 완료 — ${kids.length}개 자식 생성`,'ok'); closeModal(); router();
      }catch(e){ toast(e.message,'err',3500); }
    };
    updateProcOptions();
    renderKids();
  };
};
VIEWS._lotHistory = (plot_no) => {
  const lot = DB.get('production_lots', plot_no);
  // ★ v0.6.0 — 라우트 기준으로 공정 표시
  const procs = lot ? getRouteProcs(lot.itemCode) : getProcesses();
  const recs = DB.query('records', r=>r.plot_no===plot_no).sort((a,b)=>a.ts-b.ts);
  const co = getCompany();
  // ★ v0.16.9 — 공정별 불량 집계 1회 (요약 표 · 실적 이력 표와 정합)
  const defectByProc = {};
  recs.forEach(r => { defectByProc[r.proc] = (defectByProc[r.proc] || 0) + (r.defect || 0); });
  const procRows = procs.map(p=>{
    const good = LOT.totalGood(plot_no,p.code);
    const inp  = LOT.totalInput(plot_no,p.code);
    const bal  = LOT.balance(plot_no,p.code);

      : `<td class="num muted">—</td>`;
    const balCell = bal > 0
      ? `<td class="num" style="color:var(--amber);font-weight:700">${bal.toLocaleString()}</td>`
      : `<td class="num muted">${bal.toLocaleString()}</td>`;
    return `<tr><td>${p.name}${p.mode==='out'?' <span class="pill heat" style="margin-left:4px">외주</span>':''}</td><td class="num">${inp.toLocaleString()}</td><td class="num">${good.toLocaleString()}</td>${defectCell}${balCell}</tr>`;
  }).join('');
  openModal(`
    <h2>LOT 이력서 — ${plot_no} <button class="x" onclick="closeModal()">${ico('x')}</button></h2>
    <div class="body">
      <div class="print-doc" id="lot-hist">
        <div class="doc-head"><b>LOT 이력서 · ${co.name} ${co.site}</b><span>${fmtDate(Date.now())}</span></div>
        <table><tr><th>품번</th><td>${lot?.itemCode||''}</td><th>type</th><td>${lot?.type}</td></tr>
        ${lot?.fork_from?`<tr><th>분기 (fork)</th><td colspan="3">부모 <b>${lot.fork_from}</b> · 분기공정 <b>${lot.fork_at_proc}</b> · 이전 공정 완료 간주</td></tr>`:''}
        ${lot?.source_lots?.length && !lot.fork_from?`<tr><th>원천 LOT</th><td colspan="3">${lot.source_lots.join(', ')}</td></tr>`:''}
        <tr><th>소재 heat</th><td colspan="3">${(lot?.heat_nos||[]).join(', ')||'―'}</td></tr>
        <tr><th>소재LOT</th><td colspan="3">${(lot?.material_lot_ids||[]).join(', ')||'―'}</td></tr>
        <tr><th>초기 수량</th><td colspan="3">${(lot?.qty_initial||0).toLocaleString()}ea</td></tr>
        ${(() => {
          // ★ v0.16.2 — 이 LOT 을 만든 WO 의 연결 수주 표기
          const wo = DB.query('work_orders', w => w.plot_no === plot_no)[0];
          if(!wo) return '';
          if(wo.so_id){
            const so = DB.get('orders', wo.so_id);
            const cust = so?.cust ? (DB.get('vendors', so.cust)?.name || so.cust) : '—';
            const due  = so?.due || '';
            return `<tr><th>연결 수주</th><td colspan="3"><b>${_esc(wo.so_id)}</b> · ${_esc(cust)}${due?` · 납기 ${_esc(due)}`:''}</td></tr>`;
          }
          return `<tr><th>연결 수주</th><td colspan="3"><span style="color:var(--sub)">재고생산</span></td></tr>`;
        })()}
        </table>
        <table style="margin-top:10px">
          <thead><tr><th>공정</th><th class="num">투입</th><th class="num">양품</th><th class="num">불량</th><th class="num">잔량</th></tr></thead>
          <tbody>${procRows}</tbody>

        <div style="margin-top:10px;font-size:11px"><b>실적 이력</b> ${recs.length}건</div>
        <table style="margin-top:6px"><thead><tr><th>일시</th><th>공정</th><th class="num">양품</th><th class="num">불량</th><th>사유</th></tr></thead>
          <tbody>${recs.map(r=>`<tr><td>${fmtDate(r.ts)} ${fmtTime(r.ts)}</td><td>${DB.get('processes',r.proc)?.name||r.proc}</td><td class="num">${r.good||0}</td><td class="num">${r.defect||0}</td><td>${r.defect_reason||''}</td></tr>`).join('')||'<tr><td colspan="5" class="muted">―</td></tr>'}</tbody></table>

        ${(() => {

                  <td>${_esc(n.date||fmtDate(n.ts))}</td>
                  <td>${_esc(p?.name||n.process||'—')}</td>
                  <td>${_esc(dt?.name||n.defect_type||'—')}</td>
                  <td class="num">${(+n.qty||0).toLocaleString()}</td>
                  <td>${_esc(n.status||'—')}${n.void?' · 취소':''}</td>
                </tr>`;
              }).join('')}</tbody>

          `;
        })()}

        ${(() => {

          if(!lot) return '';
          const c = calcLotCost(plot_no);
          if(!c) return '';
          const won = v => (v==null) ? '<span class="muted">— 요율 미등록</span>' : `₩${Math.round(v).toLocaleString()}`;
          const std = computeCost(lot.itemCode);
          const stdPerEa = std?.total;
          let deltaBadge = '';
          if(c.perEa != null && stdPerEa){
            const diff = c.perEa - stdPerEa;

            const clr  = diff>0 ? 'var(--red)' : 'var(--green)';

            deltaBadge = ` <span class="pill" style="background:rgba(0,0,0,.15);color:${clr};font-size:10px;margin-left:6px">표준 대비 ${sign}${pct.toFixed(1)}%</span>`;

              <thead><tr><th>구분</th><th class="num">수량</th><th class="num">요율</th><th class="num">금액</th></tr></thead>
              <tbody>
                <tr><td>소재 (${_esc(c.mat.key||'?')})</td><td class="num">${c.mat.kgIn>0?c.mat.kgIn.toFixed(2)+'kg':'—'}</td><td class="num">${c.mat.rate!=null?'₩'+c.mat.rate.toLocaleString()+'/kg':(c.mat.kgIn>0?'<span class="muted">미등록</span>':'—')}</td><td class="num">${won(c.mat.amount)}</td></tr>
                ${c.proc.parts.map(p=>`
                  <tr><td>가공 · ${_esc(p.proc)}</td><td class="num">${p.good>0?p.good.toLocaleString()+'ea':'—'}</td><td class="num">${p.rate!=null?'₩'+p.rate.toLocaleString()+'/ea':(p.good>0?'<span class="muted">미등록</span>':'—')}</td><td class="num">${won(p.amount)}</td></tr>
                `).join('')}
                ${c.os.parts.map(p=>`
                  <tr><td>외주 · ${_esc(p.proc)}</td><td class="num">${p.qty>0?p.qty.toLocaleString()+'ea':'—'}</td><td class="num">${p.rate!=null?'₩'+p.rate.toLocaleString()+'/ea':(p.qty>0?'<span class="muted">미등록</span>':'—')}</td><td class="num">${won(p.amount)}</td></tr>
                `).join('')}
                <tr><td>간접비 (${(c.ovh.pct*100).toFixed(1)}%)</td><td class="num">—</td><td class="num">—</td><td class="num">${won(c.ovh.amount)}</td></tr>
                <tr style="background:var(--bg2)"><td><b>합계</b></td><td class="num">${c.done>0?c.done.toLocaleString()+'ea':'—'}</td><td class="num">개당 ${c.perEa!=null?'₩'+Math.round(c.perEa).toLocaleString():'<span class="muted">—</span>'}</td><td class="num"><b>${won(c.total)}</b></td></tr>
              </tbody>
            </table>
            ${missingNote}
          `;
        })()}
      </div>
      <div class="actions">
        <button class="btn" onclick="closeModal()">닫기</button>
        <button class="btn primary" onclick="window.print()">${ico('print')}인쇄/PDF</button>
      </div>
    </div>
  `);
};

// ★ v0.20.0 — nextPoId 는 nextDocNo('PO') 로 통합 (구 호환 wrapper · 유틸 1벌)
function nextPoId(){ return nextDocNo('PO'); }

VIEWS.po = () => {
  const state = (window._poState = window._poState || { voidView:false, q:'' });
  const pos = (state.voidView ? DB.allRaw('purchase_orders') : DB.all('purchase_orders'))
    .slice().sort((a,b)=>(b.ts||0)-(a.ts||0));
  const q = (state.q||'').trim().toLowerCase();
  const filtered = q ? pos.filter(p => {
    if((p.id||'').toLowerCase().includes(q)) return true;
    const v = DB.get('vendors', p.vendor);
    if((v?.name||'').toLowerCase().includes(q)) return true;
    if((p.vendor||'').toLowerCase().includes(q)) return true;
    return (p.items||[]).some(it => (it.name||'').toLowerCase().includes(q));
  }) : pos;

  const rowsHTML = filtered.length ? filtered.map(p => {
    const st = calcPoStatus(p);
    const v  = DB.get('vendors', p.vendor);
    const items = p.items||[];
    const first = items[0];
    const summary = items.length===0
      ? '<span class="muted">품목 없음</span>'
      : `${_esc(first.name||'—')}${first.spec?' '+_esc(first.spec):''}${items.length>1?` <span style="color:var(--dim);font-size:11px">외 ${items.length-1}건</span>`:''}`;
    const amtItems = items.filter(i => i.price != null && !isNaN(+i.price));
    const amt = amtItems.reduce((s,i) => s + (+i.qty||0)*(+i.price||0), 0);
    const amtDisp = amtItems.length ? Math.round(amt).toLocaleString() : '<span class="muted">—</span>';
    const rxDisp = st.uniformUnit

   · 삭제 = void (v0.16.0 인프라 재사용) · 가드: 해당 heat 를 쓰는 live 절단 실적 존재 시 차단

function _matinLiveCutForHeat(heat){
  const lots = DB.query('production_lots', l => (l.material_lot_ids||[]).includes(heat));
  for(const l of lots){
    const firstProc = getRoute(l.itemCode)[0]?.proc;
    if(!firstProc) continue;
    const recs = DB.query('records', r => r.plot_no===l.plot_no && r.proc===firstProc && !r.transferred && ((r.good||0)+(r.defect||0)+(r.rework||0)+(r.scrap||0))>0);
    if(recs.length) return recs[0];
  }
  return null;
}
