VIEWS._matinMaterial = () => {
  const state = (window._matinFilter = window._matinFilter || { tab:'day', voidView:false });
  // ★ v0.16.8 — 소재 입고처: 구매처(sup) + 외주처(out) 통합 (발주 모달과 동일 기준 · 'in' 유형 제거)
  const vendors = DB.query('vendors', v => (v.type==='sup' || v.type==='out') && v.active !== false)
                    .sort((a,b) => (a.name||'').localeCompare(b.name||''));
  const items   = DB.all('items');
  // 재질/Ø 옵션 (품번 마스터에서 추출)
  const matOpts = [...new Set(items.map(i=>i.mat).filter(Boolean))].sort();
  const diaOpts = [...new Set(items.map(i=>i.dia).filter(Boolean))].sort((a,b)=>a-b);

  const receipts = (state.voidView ? DB.allRaw('material_receipts') : DB.all('material_receipts'))
                     .slice().sort((a,b)=>b.ts-a.ts);
  const now = new Date();
  const today0 = new Date(now); today0.setHours(0,0,0,0);
  const monthMs = new Date(now.getFullYear(), now.getMonth(), 1).getTime();
  const yearMs  = new Date(now.getFullYear(), 0, 1).getTime();
  const liveReceipts = DB.all('material_receipts');
  const kgSum = arr => arr.reduce((s,r)=>s+(+r.kg||0),0);
  const todayKg = kgSum(liveReceipts.filter(r=>r.ts>=today0.getTime()));
  const monthKg = kgSum(liveReceipts.filter(r=>r.ts>=monthMs));
  const yearKg  = kgSum(liveReceipts.filter(r=>r.ts>=yearMs));
  const { ledger, totalRemain } = calcHeatLedger();

  // 일별 그룹 (voidView 반영된 receipts 기준)
  const byDate = {};
  receipts.forEach(r=>{
    const d = r.date || fmtDate(r.ts);
    (byDate[d] = byDate[d] || {date:d, recs:[], cnt:0, kg:0}).recs.push(r);

  const byMonth = {};
  receipts.forEach(r=>{
    const d = new Date(r.ts);
    const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    const m = byMonth[key] = byMonth[key] || {month:key, cnt:0, kg:0, heats:new Set()};
    m.cnt++; m.kg += (+r.kg||0); if(r.heat) m.heats.add(r.heat);

  // 연간 집계
  const byYear = {};
  receipts.forEach(r=>{
    const y = new Date(r.ts).getFullYear();
    const yr = byYear[y] = byYear[y] || {year:y, cnt:0, kg:0, heats:new Set()};
    yr.cnt++; yr.kg += (+r.kg||0); if(r.heat) yr.heats.add(r.heat);

        </tr></thead>
        <tbody>${dateGroups.length? dateGroups.map(g=>{

            ${g.recs.map(r=>{

              const actBtn = isVoid
                ? `<button class="btn ghost" data-mr-unvoid="${_esc(r.id)}" style="color:var(--cyan)">${ico('save')}복원</button>`

              return `<tr style="${rowStyle}">
                ${chkCell}

                <td>${_esc(r.mat||'—')}</td>

      <div class="tbl-wrap"><table>

              ? '<span class="pill" style="background:rgba(90,95,107,.15);color:var(--dim);font-size:10px">소진</span>'

              <td><b>${_esc(h.heat)}</b></td>

      </div>
    </div>
  `;

  // 탭 전환
  _matinBindHubTabs();
  document.querySelectorAll('[data-tab]').forEach(b=>b.onclick=()=>{ state.tab=b.dataset.tab; router(); });
  document.getElementById('matin-void-view').onchange = (e)=>{ state.voidView=e.target.checked; router(); };

  // 체크박스 → 선택 취소 카운트
  const chkAll = document.getElementById('matin-chk-all');
  const chkBtn = document.getElementById('matin-void-sel');
  const chkCnt = document.getElementById('matin-void-cnt');
  const updateSel = ()=>{
    const sel = [...document.querySelectorAll('.matin-chk')].filter(c=>c.checked);
    chkCnt.textContent = sel.length;
    chkBtn.style.display = sel.length ? 'inline-flex' : 'none';
  };
  if(chkAll) chkAll.onchange = (e)=>{ document.querySelectorAll('.matin-chk').forEach(c=>c.checked=e.target.checked); updateSel(); };
  document.querySelectorAll('.matin-chk').forEach(c=>c.onchange=updateSel);

  // 개별 취소 · 일괄 취소 (가드: heat 를 쓰는 live 절단 실적 존재 → 차단)
  function voidReceiptWithGuard(id, reason){
    const r = DB.get('material_receipts', id); if(!r) return false;
    const blocker = _matinLiveCutForHeat(r.heat);
    if(blocker){
      const bp = DB.get('processes', blocker.proc);
      toast(`해당 heat 투입 실적 있음 — ${bp?.name||blocker.proc} ${blocker.id} 먼저 취소`, 'err');
      return false;
    }
    const _pre = DB.get('material_receipts', id);
    voidDoc('material_receipts', id, reason||'오입력');
    if(_pre) closingWarnIfClosed('purchase', _pre.ts, '소재 입고 취소');
    return true;
  }
  document.querySelectorAll('[data-mr-void]').forEach(b=>b.onclick=()=>{
    if(voidReceiptWithGuard(b.dataset.mrVoid, '오입력')){ toast('입고 취소 (원본 보존)','ok'); router(); }
  });
  document.querySelectorAll('[data-mr-unvoid]').forEach(b=>b.onclick=()=>{
    toast('복원 시 잔량이 이중 계상될 수 있습니다 — 확인 후 진행','warn');
    setTimeout(()=>{
      const _id = b.dataset.mrUnvoid;
      unvoidDoc('material_receipts', _id);
      const _r = DB.get('material_receipts', _id);
      if(_r) closingWarnIfClosed('purchase', _r.ts, '소재 입고 복원');
      toast('입고 복원','ok'); router();
    }, 400);
  });
  chkBtn.onclick = ()=>{
    const ids = [...document.querySelectorAll('.matin-chk')].filter(c=>c.checked).map(c=>c.dataset.rid);
    if(!ids.length) return;
    let done=0;
    for(const id of ids){ if(voidReceiptWithGuard(id, '오입력')) done++; else return; }
    toast(`입고 ${done}건 취소 (원본 보존)`,'ok'); router();
  };

  // 엑셀: 현재 탭 반영
  document.getElementById('matin-xlsx').onclick = ()=>{
    let xrows, sheet;
    if(state.tab==='day'){
      sheet='입고_일별';
      xrows = receipts.map(r=>({
        일자: r.date||fmtDate(r.ts), 시각: fmtTime(r.ts),
        Heat: r.heat, 재질:r.mat||'', 'Ø':r.dia||'', 'kg':(+r.kg||0),
        입고처: DB.get('vendors',r.vendor)?.name||r.vendor||'', 등록자: r.by||'',
        상태: r.void?'취소':'live',
      }));
    } else if(state.tab==='month'){
      sheet='입고_월별';
      xrows = monthRows.map(m=>({월:m.month, 건수:m.cnt, 'kg':m.kg, 'heat 수':m.heats.size}));
    } else {

      xrows = yearRows.map(y=>({연도:y.year, 건수:y.cnt, 'kg':y.kg, 'heat 수':y.heats.size}));
    }
    exportXlsx(xrows, sheet, `입고_${fmtDate(Date.now())}.xlsx`);
  };
  bindClToggleButtons();

  // + 소재 입고 모달
  document.getElementById('matin-add').onclick = ()=>{
    if(!vendors.length){
      openModal(`
        <h2>거래처 없음 <button class="x" onclick="closeModal()">${ico('x')}</button></h2>
        <div class="body">
          <div style="font-size:13px">입고 가능한 <b>구매처(sup)</b> 또는 <b>외주처(out)</b>가 없습니다.</div>
          <div style="font-size:12px;color:var(--sub)">기준정보 → [거래처 등록]에서 구분을 '구매처' 또는 '외주처'로 추가하세요.</div>
          <div class="actions">
            <button class="btn" onclick="closeModal()">닫기</button>
            <button class="btn primary" onclick="closeModal();location.hash='#masters'">기준정보로 이동</button>
          </div>
        </div>
      `);
      return;

    const today = fmtDate(Date.now());

    const poOptions = [];
    DB.all('purchase_orders').forEach(p => {
      const st = calcPoStatus(p);
      (p.items||[]).forEach((it, i) => {
        if((it.unit||'') !== 'kg') return;
        const r = st.items[i]; if(!r || r.remain<=0) return;
        const vName = DB.get('vendors', p.vendor)?.name || p.vendor || '';
        poOptions.push({
          key: `${p.id}::${i}`,
          po_id: p.id,
          po_item_key: _poItemKey(it.name, it.spec),
          vendor: p.vendor||'',
          remain: r.remain,
          label: `${p.id} · ${vName} · ${it.name||''}${it.spec?' '+it.spec:''} · 잔량 ${Math.round(r.remain).toLocaleString()}kg`,

    document.getElementById('mr-po').onchange = (e)=>{
      const opt = e.target.selectedOptions[0]; if(!opt) return;
      const ven = opt.dataset.vendor||'';
      if(ven){

    // ★ v0.16.12 — 밀시트 스캔 (html5-qrcode 인스턴스 패턴 재사용 · 새 라이브러리 금지)
    let mrQr = null;
    let lastScan = null;   // { delimiter, parts, raw }
    const stopMrScan = () => {
      const area = document.getElementById('mr-scan-area');
      if(area) area.style.display = 'none';
      if(mrQr){
        try { mrQr.stop().catch(()=>{}).finally(()=>{ mrQr = null; }); }
        catch(_) { mrQr = null; }
      }
    };
    const startMrScan = () => {
      if(!cameraOK()){ toast('카메라는 https 접속(폰)에서만 작동합니다','warn',3000); return; }
      if(!window.Html5Qrcode){ toast('스캐너 라이브러리 로딩 중','warn'); return; }
      const area = document.getElementById('mr-scan-area');
      if(area) area.style.display = 'block';
      try {
        if(!mrQr) mrQr = new Html5Qrcode('mr-qr-reader');
        mrQr.start({facingMode:'environment'}, {fps:10, qrbox:{width:260, height:120}},
          txt => {
            scanFeedback();
            stopMrScan();
            handleScanText(txt);
          },
          () => {}
        ).catch(() => toast('카메라 권한 필요','err'));
      } catch(e){ toast('스캐너 시작 실패','err'); }
    };
    const applyCandidate = (idx, save) => {
      if(!lastScan) return;
      const val = lastScan.parts[idx] || '';
      const heatEl = document.getElementById('mr-heat');
      if(heatEl){ heatEl.value = val; heatEl.dataset.touched = '1'; }
      // 힌트 저장 — 입고처 선택 상태일 때만 (병합 갱신 · 자동 확정 아님)
      if(save){
        const vendor = document.getElementById('mr-vendor').value;
        saveVendorScanHint(vendor, lastScan.delimiter, idx);
      }
    };
    const renderCandidates = (autoIdx) => {
      const area = document.getElementById('mr-cand-area');
      const rawEl = document.getElementById('mr-cand-raw');
      const hintEl = document.getElementById('mr-cand-hint');
      const tabsEl = document.getElementById('mr-cand-tabs');
      if(!lastScan){ area.style.display = 'none'; return; }
      area.style.display = 'block';
      rawEl.textContent = lastScan.raw;
      hintEl.textContent = (autoIdx!=null) ? '힌트 적용' : '';
      // 조각 후보 + 원문 전체 (조각이 여러 개일 때만 원문 별도 표시)
      const items = [];
      lastScan.parts.forEach((p, i) => items.push({ label: p, idx: i, isRaw: false }));
      if(lastScan.parts.length > 1 && !lastScan.parts.includes(lastScan.raw)){
        items.push({ label: lastScan.raw, idx: -1, isRaw: true });
      }
      tabsEl.innerHTML = items.map(it => {
        const likely = !it.isRaw && isLikelyHeat(it.label);
        const isAuto = (autoIdx!=null && it.idx === autoIdx);
        const bg = isAuto ? 'rgba(94,234,212,.16)' : (likely ? 'rgba(251,191,36,.10)' : 'var(--bg)');
        const bd = isAuto ? 'var(--cyan)' : (likely ? 'rgba(251,191,36,.35)' : 'var(--line2)');
        const co = isAuto ? 'var(--cyan)' : (likely ? 'var(--amber)' : 'var(--ink)');
        const suffix = it.isRaw ? '<span style="color:var(--dim);font-size:9px;margin-left:4px">원문</span>' : '';
        return `<button type="button" class="mr-cand" data-idx="${it.idx}" style="border:1px solid ${bd};background:${bg};color:${co};font-family:'JetBrains Mono',monospace;font-size:12px;padding:6px 10px;border-radius:8px;cursor:pointer">${_esc(it.label)}${suffix}</button>`;
      }).join('');
      document.querySelectorAll('.mr-cand').forEach(b => b.onclick = () => {
        const idx = +b.dataset.idx;
        if(idx < 0){
          // 원문 전체 선택 시: 힌트 저장 생략 (delimiter 무관), Heat 입력에만 채움
          const heatEl = document.getElementById('mr-heat');
          if(heatEl){ heatEl.value = lastScan.raw; heatEl.dataset.touched = '1'; }
        } else {
          applyCandidate(idx, true);
          renderCandidates(idx);
        }
      });
    };
    const handleScanText = (txt) => {
      lastScan = parseScanCandidates(txt);
      if(!lastScan.parts.length){ toast('빈 스캔','warn'); return; }
      // 힌트 자동 적용 (같은 입고처 · 구분자 일치 · index 범위 내)
      const vendor = document.getElementById('mr-vendor').value;
      const hint = vendor ? getVendorScanHint(vendor) : null;
      const canAuto = hint
        && (hint.delimiter||'') === (lastScan.delimiter||'')
        && hint.heat_index >= 0
        && hint.heat_index < lastScan.parts.length;
      if(canAuto){
        applyCandidate(hint.heat_index, false);   // 재저장 없음 (병합 갱신은 사용자 정정 시)
        renderCandidates(hint.heat_index);
      } else {
        renderCandidates(null);
      }
    };
    document.getElementById('mr-scan-btn').onclick = startMrScan;
    document.getElementById('mr-scan-stop').onclick = stopMrScan;
    // 모달 닫힘(취소·X·등록) 감지 — bg 관찰로 카메라 정지 보장 (누수 방지)
    (function watchClose(){
      const bg = document.getElementById('modal-bg');
      if(!bg) return;
      const obs = new MutationObserver(() => {
        if(!bg.classList.contains('show')){ stopMrScan(); obs.disconnect(); }
      });
      obs.observe(bg, { attributes:true, attributeFilter:['class'] });
    })();
    document.getElementById('mr-ok').onclick = ()=>{
      const heat = document.getElementById('mr-heat').value.trim();
      const vendor = document.getElementById('mr-vendor').value;
      const mat = document.getElementById('mr-mat').value.trim();
      const dia = +document.getElementById('mr-dia').value || null;
      const kg  = +document.getElementById('mr-kg').value  || 0;
      const date= document.getElementById('mr-date').value || today;
      const poSel = document.getElementById('mr-po');
      const poOpt = poSel.selectedOptions[0];
      const po_id = poOpt?.dataset.poid || null;
      const po_item_key = poOpt?.dataset.poitem || null;
      if(!heat){ toast('Heat No. 입력','warn'); return; }
      if(kg<=0){ toast('입고량(kg) 입력','warn'); return; }
      const mrNo = resolveDocNo('mr-id', 'MR');
      if(mrNo.dup){ toast(`입고번호 중복 — ${mrNo.id}`,'err'); return; }
      const id = mrNo.id;
      DB.set('material_receipts', id, {id, heat, mat, dia, kg, vendor, po_id, po_item_key, date, ts:Date.now(), by:SESSION.user});
      closingWarnIfClosed('purchase', Date.now(), '소재 입고 등록');
      // material_lots 도 함께 등록/가산 (기존 스키마 준수 — remain_kg 는 참고값, 잔량은 헬퍼가 파생)
      const existing = DB.get('material_lots', heat);
      if(existing){
        DB.set('material_lots', heat, {qty_in_kg:(existing.qty_in_kg||0)+kg, remain_kg:(existing.remain_kg||0)+kg});
      } else {
        DB.set('material_lots', heat, {heat, qty_in_kg:kg, remain_kg:kg, mat, dia, ts:Date.now()});
      }
      toast(`입고 등록 — ${heat} · ${kg}kg`,'ok'); closeModal(); router();
    };
  };
};

/* =================================================================================================
   ★ v0.16.4 — 입고 · 구매품 탭 (_matinBuy)
   · purchase_receipts { id:'PR-…', name, spec, unit, qty, price(선택), vendor, po_id(null 허용), date, ts, by }
   · 자유 입력 + 품명 datalist 자동완성 · 일/월/연 탭 · KPI(건수/금액·단가 있는 건만)
   · 삭제 = void · 체크박스 일괄 취소 · 엑셀 · 잔량·불출 관리는 범위 밖(하단 안내)
   ================================================================================================= */
VIEWS._matinBuy = () => {
  const state = (window._matinBuyFilter = window._matinBuyFilter || { tab:'day', voidView:false });
  // ★ v0.16.8 — 구매품 입고처: 구매처(sup) + 외주처(out) 통합 (발주 모달과 동일 기준 · 'in' 유형 제거)
  const vendors = DB.query('vendors', v => (v.type==='sup' || v.type==='out') && v.active !== false)
                    .sort((a,b) => (a.name||'').localeCompare(b.name||''));
  const receipts = (state.voidView ? DB.allRaw('purchase_receipts') : DB.all('purchase_receipts'))
                     .slice().sort((a,b)=>b.ts-a.ts);
  const liveReceipts = DB.all('purchase_receipts');

  const now = new Date();
  const today0 = new Date(now); today0.setHours(0,0,0,0);
  const monthMs = new Date(now.getFullYear(), now.getMonth(), 1).getTime();
  const yearMs  = new Date(now.getFullYear(), 0, 1).getTime();

  // 금액 = 단가 있는 건만 합산 (NaN 금지)
  const kpiAmount = arr => arr.reduce((s,r)=>{
    if(r.price == null || isNaN(+r.price)) return s;
    return s + (+r.qty||0) * (+r.price||0);
  }, 0);
  const todayArr = liveReceipts.filter(r=>r.ts>=today0.getTime());
  const monthArr = liveReceipts.filter(r=>r.ts>=monthMs);
  const yearArr  = liveReceipts.filter(r=>r.ts>=yearMs);
  const todayCnt = todayArr.length, todayAmt = kpiAmount(todayArr);
  const monthCnt = monthArr.length, monthAmt = kpiAmount(monthArr);
  const yearCnt  = yearArr.length,  yearAmt  = kpiAmount(yearArr);

  // 품명·규격 자동완성 (voidView 무관 · 과거 등록 전체)
  const allRaw = DB.allRaw('purchase_receipts');
  const nameOpts = [...new Set(allRaw.map(r=>r.name).filter(Boolean))].sort();
  const specOpts = [...new Set(allRaw.map(r=>r.spec).filter(Boolean))].sort();

  // 일별 그룹
  const byDate = {};
  receipts.forEach(r=>{
    const d = r.date || fmtDate(r.ts);
    const g = byDate[d] = byDate[d] || {date:d, recs:[], cnt:0, amt:0, hasAmt:false};
    g.recs.push(r); g.cnt++;
    if(r.price != null && !isNaN(+r.price)){
      g.amt += (+r.qty||0) * (+r.price||0);
      g.hasAmt = true;
    }
  });
  const dateGroups = Object.values(byDate).sort((a,b)=>b.date.localeCompare(a.date));

  // 월별 집계
  const byMonth = {};
  receipts.forEach(r=>{
    const d = new Date(r.ts);
    const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    const m = byMonth[key] = byMonth[key] || {month:key, cnt:0, amt:0, hasAmt:false};
    m.cnt++;
    if(r.price != null && !isNaN(+r.price)){
      m.amt += (+r.qty||0) * (+r.price||0);
      m.hasAmt = true;
    }
  });
  const monthRows = Object.values(byMonth).sort((a,b)=>b.month.localeCompare(a.month));

  // 연간 집계
  const byYear = {};
  receipts.forEach(r=>{
    const y = new Date(r.ts).getFullYear();
    const yr = byYear[y] = byYear[y] || {year:y, cnt:0, amt:0, hasAmt:false};
    yr.cnt++;
    if(r.price != null && !isNaN(+r.price)){
      yr.amt += (+r.qty||0) * (+r.price||0);
      yr.hasAmt = true;
    }
  });
  const yearRows = Object.values(byYear).sort((a,b)=>b.year-a.year);

  const tabBtn = (k,label) => `<button class="btn ${state.tab===k?'primary':''}" data-btab="${k}" style="border-radius:99px;padding:7px 16px">${label}</button>`;
  const amtDisp = (amt, has) => has ? Math.round(amt).toLocaleString() : '<span style="color:var(--dim)">—</span>';

  document.getElementById('view').innerHTML = `
    ${_matinHubBar('buy')}
    <div class="pghead">
      <div class="pgtitle"><svg class="ic" viewBox="0 0 24 24">${PAGES.find(p=>p.id==='matin').icon}</svg>입고 <span class="pill cyan">${APP_VERSION} · 구매품</span></div>
      <div class="pgtools">
        <label style="display:inline-flex;align-items:center;gap:6px;font-size:11px;color:var(--sub);padding:6px 10px;border:1px solid var(--line);border-radius:8px;cursor:pointer;background:${state.voidView?'rgba(248,113,113,.08)':'var(--bg2)'}"><input type="checkbox" id="mbuy-void-view" ${state.voidView?'checked':''} style="width:auto;margin:0"> 취소 포함 보기</label>
        <button class="btn" id="mbuy-void-sel" style="display:none">${ico('x')}선택 취소 (<span id="mbuy-void-cnt">0</span>)</button>
        <button class="btn" id="mbuy-xlsx">${ico('excel')}엑셀</button>
        <button class="btn primary" id="mbuy-add">${ico('plus')}구매품 입고</button>
      </div>
    </div>
    <div style="font-size:11px;color:var(--dim);margin-bottom:14px">공구·부자재·소모품 등 자유 입력 · 품명 자동완성 · 단가는 선택(있는 건만 금액 집계).</div>

    <div class="grid g3" style="margin-bottom:14px">
      <div class="kpi-mini"><div class="lab">${ico('check')}오늘 입고</div><div class="val c">${todayCnt}<span style="font-size:12px;color:var(--sub)">건</span></div><div class="sub">금액 ${amtDisp(todayAmt, todayAmt>0)}</div></div>
      <div class="kpi-mini"><div class="lab">${ico('check')}이번달 입고</div><div class="val c">${monthCnt}<span style="font-size:12px;color:var(--sub)">건</span></div><div class="sub">금액 ${amtDisp(monthAmt, monthAmt>0)}</div></div>
      <div class="kpi-mini"><div class="lab">${ico('check')}올해 입고</div><div class="val c">${yearCnt}<span style="font-size:12px;color:var(--sub)">건</span></div><div class="sub">금액 ${amtDisp(yearAmt, yearAmt>0)}</div></div>
    </div>

    <div class="card">
      <h3>구매품 입고 현황 <span class="tag">기간 탭 · 자유 입력 · 삭제=취소(void)</span></h3>
      <div style="display:flex;gap:6px;margin-bottom:12px">${tabBtn('day','일별')}${tabBtn('month','월별')}${tabBtn('year','연간')}</div>
      <div class="tbl-wrap"><table>
        ${state.tab==='day' ? `
        <thead><tr>
          <th style="width:28px"><input type="checkbox" id="mbuy-chk-all" style="width:auto;margin:0"></th>
          <th>품명</th><th>규격</th><th>단위</th><th class="num">수량</th><th class="num">단가</th><th class="num">금액</th><th>거래처</th><th>등록자</th><th></th>
        </tr></thead>
        <tbody>${dateGroups.length? dateGroups.map(g=>{
          const isToday = g.date===fmtDate(Date.now());
          return `<tr style="background:var(--bg2)"><td colspan="10" style="font-size:11px;color:var(--cyan);font-weight:600;letter-spacing:.3px;padding:8px 10px">▾ ${g.date}${isToday?' (오늘)':''}<span style="color:var(--dim);margin-left:8px;font-weight:400">${g.cnt}건${g.hasAmt?` · ${Math.round(g.amt).toLocaleString()}원`:''}</span></td></tr>
            ${g.recs.map(r=>{
              const isVoid = !!r.void;
              const rowStyle = isVoid ? 'opacity:.5;background:rgba(248,113,113,.04)' : '';
              const voidBadge = isVoid ? ` <span class="pill" style="background:rgba(248,113,113,.15);color:var(--red);font-size:9px;margin-left:4px" title="${_esc(r.void.reason||'')} · ${fmtDate(r.void.ts)}">「취소」</span>` : '';
              const actBtn = isVoid
                ? `<button class="btn ghost" data-pr-unvoid="${_esc(r.id)}" style="color:var(--cyan)">${ico('save')}복원</button>`
                : `${clToggleBtn('purchase_receipts', r)} <button class="btn ghost" data-pr-void="${_esc(r.id)}" style="color:var(--red)">${ico('x')}취소</button>`;
              const chkCell = isVoid ? '<td></td>' : `<td><input type="checkbox" class="mbuy-chk" data-rid="${_esc(r.id)}" style="width:auto;margin:0"></td>`;
              const ven = DB.get('vendors', r.vendor);
              const hasPrice = r.price != null && !isNaN(+r.price);
              const amt = hasPrice ? (+r.qty||0)*(+r.price||0) : 0;
              return `<tr style="${rowStyle}">
                ${chkCell}
                <td><b>${_esc(r.name||'—')}</b>${voidBadge}${clBadge(r)}</td>
                <td>${_esc(r.spec||'—')}</td>
                <td>${_esc(r.unit||'—')}</td>
                <td class="num" style="color:var(--cyan);font-weight:700">${(+r.qty||0).toLocaleString()}</td>
                <td class="num">${hasPrice? Math.round(+r.price).toLocaleString():'<span class="muted">—</span>'}</td>
                <td class="num">${hasPrice? Math.round(amt).toLocaleString():'<span class="muted">—</span>'}</td>
                <td style="font-size:11px;color:var(--sub)">${_esc(ven?.name||r.vendor||'—')}</td>
                <td style="font-size:11px;color:var(--sub)">${_esc(r.by||'—')}</td>
                <td>${actBtn}</td>
              </tr>`;
            }).join('')}`;
        }).join('') : '<tr><td colspan="10" class="empty">구매품 입고 없음 — [+ 구매품 입고]로 추가</td></tr>'}</tbody>
        ` : state.tab==='month' ? `
        <thead><tr><th>월</th><th class="num">건수</th><th class="num">금액</th></tr></thead>
        <tbody>${monthRows.length? monthRows.map(m=>`
          <tr><td><b>${_esc(m.month)}</b></td><td class="num">${m.cnt}</td><td class="num" style="color:var(--cyan);font-weight:700">${amtDisp(m.amt, m.hasAmt)}</td></tr>
        `).join('') : '<tr><td colspan="3" class="empty">구매품 입고 없음</td></tr>'}</tbody>
        ` : `
        <thead><tr><th>연도</th><th class="num">건수</th><th class="num">금액</th></tr></thead>
        <tbody>${yearRows.length? yearRows.map(y=>`
          <tr><td><b>${y.year}</b></td><td class="num">${y.cnt}</td><td class="num" style="color:var(--cyan);font-weight:700">${amtDisp(y.amt, y.hasAmt)}</td></tr>
        `).join('') : '<tr><td colspan="3" class="empty">구매품 입고 없음</td></tr>'}</tbody>
        `}
      </table></div>
      <div style="font-size:11px;color:var(--sub);background:var(--bg2);border:1px solid var(--line);border-radius:10px;padding:10px 13px;margin-top:10px;line-height:1.7">
        <b style="color:var(--amber)">범위 밖</b> 잔량·불출 관리는 추후 버전. 현재는 구매품 입고 이력·집계만 관리합니다.
      </div>
    </div>
  `;

  // 허브 탭 + 기간 탭 + void 토글
  _matinBindHubTabs();
  document.querySelectorAll('[data-btab]').forEach(b=>b.onclick=()=>{ state.tab=b.dataset.btab; router(); });
  document.getElementById('mbuy-void-view').onchange = (e)=>{ state.voidView=e.target.checked; router(); };

  // 체크박스 → 선택 취소 카운트
  const chkAll = document.getElementById('mbuy-chk-all');
  const chkBtn = document.getElementById('mbuy-void-sel');
  const chkCnt = document.getElementById('mbuy-void-cnt');
  const updateSel = ()=>{
    const sel = [...document.querySelectorAll('.mbuy-chk')].filter(c=>c.checked);
    chkCnt.textContent = sel.length;
    chkBtn.style.display = sel.length ? 'inline-flex' : 'none';
  };
  if(chkAll) chkAll.onchange = (e)=>{ document.querySelectorAll('.mbuy-chk').forEach(c=>c.checked=e.target.checked); updateSel(); };
  document.querySelectorAll('.mbuy-chk').forEach(c=>c.onchange=updateSel);

  // 개별 취소·복원 · 일괄 취소 (구매품은 후속 연쇄 없음 → 가드 불필요)
  document.querySelectorAll('[data-pr-void]').forEach(b=>b.onclick=()=>{
    const _id = b.dataset.prVoid;
    const _pre = DB.get('purchase_receipts', _id);
    voidDoc('purchase_receipts', _id, '오입력');
    if(_pre) closingWarnIfClosed('purchase', _pre.ts, '구매품 입고 취소');
    toast('구매품 입고 취소 (원본 보존)','ok'); router();
  });
  document.querySelectorAll('[data-pr-unvoid]').forEach(b=>b.onclick=()=>{
    const _id = b.dataset.prUnvoid;
    unvoidDoc('purchase_receipts', _id);
    const _r = DB.get('purchase_receipts', _id);
    if(_r) closingWarnIfClosed('purchase', _r.ts, '구매품 입고 복원');
    toast('구매품 입고 복원','ok'); router();
  });
  if(chkBtn) chkBtn.onclick = ()=>{
    const ids = [...document.querySelectorAll('.mbuy-chk')].filter(c=>c.checked).map(c=>c.dataset.rid);
    if(!ids.length) return;
    const monthsHit = new Set();
    ids.forEach(id=>{
      const _pre = DB.get('purchase_receipts', id);
      voidDoc('purchase_receipts', id, '오입력');
      if(_pre?.ts){
        const d = new Date(_pre.ts);
        monthsHit.add(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`);
      }
    });
    // 일괄 취소는 월 중복 방지 — 마감 월별 1회만 경고

/* ★ v0.13.0 — 재고: 공정흐름 (inv-flow.html) — 공정 컬럼 자동 + 검색·필터 */
VIEWS.inv = () => {
  const items   = getItems();
  const procsAll= getProcesses();
  const procsNoShip = procsAll.filter(p => p.code !== 'SHIP');
  // WIP 컬럼 = 출하·마지막 가공공정 제외 (마지막 가공공정 양품은 '완성품' 컬럼으로 흡수)
  const lastProdProc = procsNoShip[procsNoShip.length-1] || null;
  const wipProcs = procsNoShip.slice(0, procsNoShip.length - 1);
  const co      = getCompany();
  const preset  = co.preset || 'forging';

  // 필터 상태 (탭간 유지)
  const state = (window._invFilter = window._invFilter || { q:'', cust:'', mat:'', status:'' });

  // ★ v0.16.1 — 원소재(kg)는 calcHeatLedger 파생값 사용 (재고·입고 계산 1벌)
  const { ledger:heatLedger } = calcHeatLedger();
  function rawKgOf(itemCode, itemLots){
    const heatSet = new Set();
    itemLots.forEach(l => (l.material_lot_ids||[]).forEach(h => heatSet.add(h)));
    let sum = 0;
    heatSet.forEach(h => { if(heatLedger[h]) sum += Math.max(0, heatLedger[h].remain); });
    return sum;
  }
  function lastBadge(itemLots){
    // 가장 최근 stopped 레코드
    const rec = DB.query('records', r => r.stopped && itemLots.some(l=>l.plot_no===r.plot_no))
                  .sort((a,b)=>b.ts-a.ts)[0];
    if(!rec) return null;
    return `${DB.get('processes',rec.proc)?.name||rec.proc}중단·${rec.stop_reason||''}`;
  }

  // ★ v0.14.4 — wipOfItem 지역 함수 폐기 → calcItemFlow 모듈 헬퍼 사용 (재고·출하 모달 공용)
  const rows = items.map(i => {
    const itemLots = DB.query('production_lots', l => l.itemCode === i.code);
    const flow = calcItemFlow(i.code);
    const wip = {};
    // 전역 컬럼(wipProcs)에 매핑 — 라우트에 없는 공정은 -1(=render "—")
    wipProcs.forEach(p => { wip[p.code] = (flow.wip[p.code] !== undefined) ? flow.wip[p.code] : -1; });
    const done = flow.finished;
    const defects = DB.query('records', r => {
      const lot = DB.get('production_lots', r.plot_no);
      return lot && lot.itemCode === i.code;
    }).reduce((s,r)=>s+(r.defect||0), 0);
    const custName = i.cust ? (DB.get('vendors', i.cust)?.name || i.cust) : '';
    return {
      code: i.code, name: i.name, cust: custName, mat: i.mat||'',
      rawKg: rawKgOf(i.code, itemLots),
      wip, done, defects,
      safety: i.safety||0, low: done < (i.safety||0),
      stopBadge: lastBadge(itemLots),
      // ★ v0.16.15 — 표시 계층 전용 (계산 무영향): 라우트 + outAtVendor
      route: getRoute(i.code),
      outAtVendor: flow.outAtVendor || {},
    };
  });

  // 필터 적용
  const filtered = rows.filter(r => {
    if(state.q){
      const q = state.q.toLowerCase();
      if(!(r.code.toLowerCase().includes(q) || r.name.toLowerCase().includes(q) ||
           r.cust.toLowerCase().includes(q) || r.mat.toLowerCase().includes(q))) return false;
    }
    if(state.cust && r.cust !== state.cust) return false;
    if(state.mat  && r.mat  !== state.mat)  return false;
    if(state.status === 'wip'){
      const w = Object.values(r.wip).reduce((s,v)=>s+(v>0?v:0),0);
      if(w === 0) return false;
    }
    if(state.status === 'stopped' && !r.stopBadge) return false;
    if(state.status === 'low'     && !r.low)       return false;
    return true;
  });

  // KPI (★ v0.16.1 — 원소재 kg = calcHeatLedger 파생, matLots.remain_kg 저장값 의존 제거)
  const totalRawKg = Object.values(heatLedger).reduce((s,h)=>s+Math.max(0,h.remain),0);
  const heatCount  = Object.keys(heatLedger).length;
  const totalWip = filtered.reduce((s,r)=> s + Object.values(r.wip).reduce((a,v)=>a+(v>0?v:0),0), 0);
  const totalDone = filtered.reduce((s,r)=>s+r.done, 0);
  const totalDef  = filtered.reduce((s,r)=>s+r.defects, 0);
  const lowCount  = filtered.filter(r=>r.low).length;
  const custOpts  = [...new Set(rows.map(r=>r.cust).filter(Boolean))].sort();
  const matOpts   = [...new Set(rows.map(r=>r.mat).filter(Boolean))].sort();

  function cell(v, cls){
    if(v === -1) return `<td class="num muted" title="라우트에 없음">—</td>`;
    if(v === 0)  return `<td class="num muted">—</td>`;
    return `<td class="num" style="${cls||''}">${v.toLocaleString()}</td>`;
  }
  // ★ v0.16.15 — 반출 중 반영 셀 (표시 전용 · calcItemFlow 계산 불변)
  //   내부 공정 X: cell = max(0, wip[X] − outAtVendor[다음 외주 공정])
  //   외주 공정 Y: cell = wip[Y] + 서브 라인 "반출 중 N" (var(--blue), 10px)
  function flowCell(r, procCode){
    const v = r.wip[procCode];
    if(v === -1) return `<td class="num muted" title="라우트에 없음">—</td>`;
    const routeIdx = r.route.findIndex(x => x.proc === procCode);
    const routeEntry = routeIdx >= 0 ? r.route[routeIdx] : null;
    const isOut = routeEntry?.mode === 'out';
    if(isOut){
      const inFlight = r.outAtVendor[procCode] || 0;
      const sub = inFlight > 0
        ? `<div style="color:var(--blue);font-size:10px">반출 중 ${inFlight.toLocaleString()}</div>`
        : '';
      if(v === 0 && !sub) return `<td class="num muted">—</td>`;
      const main = v > 0 ? v.toLocaleString() : '<span class="muted">—</span>';
      return `<td class="num" style="color:var(--amber)">${main}${sub}</td>`;
    }
    // 내부 공정: 다음 공정이 외주면 그 반출 중 만큼 차감(음수 방지)
    const next = routeIdx >= 0 ? r.route[routeIdx + 1] : null;
    const nextOutInFlight = (next && next.mode === 'out') ? (r.outAtVendor[next.proc] || 0) : 0;
    const adj = Math.max(0, v - nextOutInFlight);
    if(adj === 0) return `<td class="num muted">—</td>`;
    return `<td class="num" style="color:var(--amber)">${adj.toLocaleString()}</td>`;
  }

  document.getElementById('view').innerHTML = `
    <div class="pghead">
      <div class="pgtitle"><svg class="ic" viewBox="0 0 24 24">${PAGES.find(p=>p.id==='inv').icon}</svg>재고 <span class="pill cyan">${APP_VERSION} · 공정흐름</span></div>
      <div class="pgtools">
        <button class="btn" id="inv-xlsx">${ico('excel')}엑셀</button>
      </div>
    </div>

    <!-- 업종 프리셋 표시 -->
    <div style="display:flex;gap:8px;margin-bottom:14px;align-items:center;font-size:11px;color:var(--sub)">
      <span>업종:</span>
      ${['forging','machining','heat'].map(k=>{
        const lbl = k==='forging'?'단조':k==='machining'?'가공':'열처리';
        return `<span class="pill ${preset===k?'cyan':'gray'}" style="cursor:default">${lbl}${preset===k?' ✓':''}</span>`;
      }).join('')}
      <span style="margin-left:auto;color:var(--dim);font-size:10px">공정 컬럼은 회사 공정 설정에서 자동 — 단조는 첫 사례, 업종 하드코딩 X</span>

      </table></div>

  document.getElementById('inv-q').oninput = (e)=>{
    clearTimeout(qTimer);

  };
  document.getElementById('inv-cust').onchange = (e)=>{ state.cust = e.target.value; refresh(); };
  document.getElementById('inv-mat').onchange  = (e)=>{ state.mat  = e.target.value; refresh(); };
  document.getElementById('inv-status').onchange = (e)=>{ state.status = e.target.value; refresh(); };

    state[el.dataset.clear] = ''; refresh();

    const xrows = filtered.map(r => {
      const out = { 품번:r.code, 품명:r.name, 고객사:r.cust||'', 재질:r.mat||'', '원소재(kg)':Math.round(r.rawKg) };

      return out;
    });
    exportXlsx(xrows, '재고', `재고_${fmtDate(Date.now())}.xlsx`);
  };
};

      if(!qty){ toast('수량 입력','warn'); return; }
      const soNo = resolveDocNo('so-id', 'SO');
      if(soNo.dup){ toast(`수주번호 중복 — ${soNo.id}`,'err'); return; }
      const id = soNo.id;
      DB.set('orders', id, {id, cust, itemCode:it, qty, price, due, created:Date.now()});
      toast('수주 생성','ok'); closeModal(); router();
    };
  };
};

/* -------------------- 출하 -------------------- */
VIEWS.ship = () => {

  const sos = DB.all('orders');

  // ★ v0.14.2 — 매출 집계 (대시보드와 동일한 calcSales — 계산 1벌)

  const { monthSales, monthSalesChg, yearSales, yearSalesChg, monthlySales, byCustomer } = sales;
  const now = new Date();
  const curMonth = now.getMonth();

  const isFirstHalf = curMonth < 6;
  const halfSum  = (isFirstHalf ? monthlySales.slice(0,6) : monthlySales.slice(6,12)).reduce((s,v)=>s+v,0);
  const halfLabel= isFirstHalf ? '상반기 누적(1~6월)' : '하반기 누적(7~12월)';
  let peakMonth=0, peakVal=0;
  monthlySales.forEach((v,m)=>{ if(v>peakVal){peakVal=v; peakMonth=m+1;} });
  const custRows = byCustomer;
  const custMax  = Math.max(1, ...custRows.map(r=>r.amount));
  const m_colors = [
    'linear-gradient(180deg,#5eead4,#2dd4bf)','linear-gradient(180deg,#7dd3fc,#38bdf8)',
    'linear-gradient(180deg,#a5b4fc,#818cf8)','linear-gradient(180deg,#f0abfc,#e879f9)',
    'linear-gradient(180deg,#86efac,#4ade80)','linear-gradient(180deg,#fbbf24,#f59e0b)'
  ];
  const c_colors = ['var(--c1)','var(--c2)','var(--c3)','var(--c4)','var(--c5)'];

  document.getElementById('view').innerHTML = `
    <div class="pghead">
      <div class="pgtitle"><svg class="ic" viewBox="0 0 24 24">${pgIcon('ship')}</svg>출하</div>
      <div class="pgtools">
        <label style="display:inline-flex;align-items:center;gap:6px;font-size:11px;color:var(--sub);padding:6px 10px;border:1px solid var(--line);border-radius:8px;cursor:pointer;background:${shState.voidView?'rgba(248,113,113,.08)':'var(--bg2)'}"><input type="checkbox" id="ship-void-view" ${shState.voidView?'checked':''} style="width:auto;margin:0"> 취소 포함 보기</label>
        <button class="btn" onclick="exportXlsx(DB.all('shipments'),'SHIP','출하_${fmtDate(Date.now())}.xlsx')">${ico('excel')}엑셀</button>
        <button class="btn primary" id="btn-ship-new">${ico('plus')}새 출하</button>
      </div>
    </div>

    <!-- ★ v0.14.2 — 매출 현황 (대시보드 sales-hero/mbars/crow 마크업 재사용) -->
    <div class="secttl">매출 현황 · SALES</div>
    <div class="sales-hero">
      <div class="dkpi">
        <div class="lab"><svg viewBox="0 0 24 24" stroke="var(--cyan)"><path d="M5 4l3.5 8M19 4l-3.5 8M8.5 12h7M5 16h14M12 12v8"/></svg>당월 매출</div>
        <div class="val c">${monthSales>0? '₩'+Math.round(monthSales).toLocaleString() : '<span style="color:var(--dim);font-size:18px">수집중</span>'}</div>
        <div class="sub">${monthSalesChg===null? '<span class="nodata">전월 데이터 없음</span>' : `전월 대비 <span class="chg ${monthSalesChg>=0?'up':'down'}">${monthSalesChg>=0?'▲':'▼'} ${Math.abs(monthSalesChg).toFixed(1)}%</span>`}</div>
      </div>
      <div class="dkpi">
        <div class="lab"><svg viewBox="0 0 24 24" stroke="var(--cyan)"><path d="M3 3v18h18"/><path d="M7 14l4-4 3 3 5-6"/></svg>연 누적 매출</div>
        <div class="val w">${yearSales>0? '₩'+Math.round(yearSales).toLocaleString() : '<span style="color:var(--dim);font-size:18px">수집중</span>'}</div>
        <div class="sub">${yearSalesChg===null? '<span class="nodata">전년 데이터 없음 · 다음 해부터 비교</span>' : `전년 대비 <span class="chg ${yearSalesChg>=0?'up':'down'}">${yearSalesChg>=0?'▲':'▼'} ${Math.abs(yearSalesChg).toFixed(1)}%</span>`}</div>
      </div>
    </div>

    <div class="grid g2" style="margin-bottom:18px">
      <div class="card">
        <h3>월별 매출실적 <span class="tag">${now.getFullYear()} · 단위: 백만원 (막대)</span></h3>
        ${monthlySales.some(v=>v>0)? `
          <div class="mbar-sum">
            <span>${halfLabel} <b>₩${Math.round(halfSum).toLocaleString()}</b></span>
            <span class="mbar-peak">최고 ${peakMonth}월 <b>₩${Math.round(peakVal).toLocaleString()}</b></span>
          </div>
          <div class="mbars">
            ${monthlySales.map((v,m)=>{
              const isFuture = m>curMonth;
              const isCur = m===curMonth;
              const h = isFuture? 2 : Math.max(3, v/monthMax*92);
              const clr = m_colors[m%6];
              return `<div class="mbar">
                ${!isFuture && v>0? `<div class="bamt${isCur?' cur':''}">${Math.round(v/1e6)}</div>`:''}
                <div class="b ${isCur?'cur':''} ${isFuture?'future':''}" style="height:${h}%;${!isFuture && v>0?`background:${clr}`:''}"></div>
                <div class="ml">${m+1}</div>
              </div>`;
            }).join('')}
          </div>
        ` : '<div class="chart-empty" style="padding:50px 0"><div class="big">수집중</div><div class="sm">출하 데이터가 쌓이면 표시됩니다</div></div>'}
      </div>
      <div class="card">
        <h3>고객사별 매출 <span class="tag">연 누적 비중</span></h3>
        ${custRows.length? custRows.slice(0,5).map((r,i)=>`
          <div class="crow"><div class="ch"><div class="cn">${r.name}</div><div class="cv" style="color:${c_colors[i%5]}">₩${Math.round(r.amount).toLocaleString()}</div></div>
          <div class="ctrack"><i style="width:${Math.max(8,r.amount/custMax*100).toFixed(0)}%;background:${c_colors[i%5]}"></i></div></div>
        `).join('') : '<div class="chart-empty" style="padding:50px 0"><div class="big">수집중</div><div class="sm">출하 데이터가 쌓이면 표시됩니다</div></div>'}
      </div>
    </div>

    <div class="card">
      <h3>출하 내역</h3>
      <div class="tbl-wrap"><table>
        <thead><tr><th>일시</th><th>SO</th><th>품번</th><th class="num">수량</th><th class="num">금액</th><th>LOT</th><th></th></tr></thead>
        <tbody>${ships.length? ships.map(s=>{
          const so = DB.get('orders', s.so_id);
          const amt = (s.qty||0) * (so?.price||0);
          // ★ v0.16.0 — void 표시 + 취소/복원
          const isVoid = !!s.void;
          const rowStyle = isVoid ? 'opacity:.5;background:rgba(248,113,113,.04)' : '';
          const voidBadge = isVoid ? ` <span class="pill" style="background:rgba(248,113,113,.15);color:var(--red);font-size:9px;margin-left:4px" title="${_esc(s.void.reason||'')} · ${fmtDate(s.void.ts)}">「취소」</span>` : '';
          const actionBtns = isVoid
            ? `<button class="btn ghost" data-sh-unvoid="${_esc(s.id)}" style="color:var(--cyan)">${ico('save')}복원</button>`
            : `<button class="btn ghost" onclick="VIEWS._printStmt('${s.id}')">${ico('print')}명세서</button> ${clToggleBtn('shipments', s)} <button class="btn ghost" data-sh-void="${_esc(s.id)}" style="color:var(--red)">${ico('x')}취소</button>`;
          return `<tr style="${rowStyle}">
            <td class="muted">${fmtDate(s.ts)} ${fmtTime(s.ts)}${voidBadge}${clBadge(s)}</td>
            <td>${s.so_id||'―'}</td>
            <td>${s.itemCode}</td>
            <td class="num">${(s.qty||0).toLocaleString()}</td>
            <td class="num">₩${amt.toLocaleString()}</td>
            <td><span class="pill cyan">${s.plot_no}</span></td>
            <td>${actionBtns}</td>
          </tr>`;
        }).join('') : '<tr><td colspan="7" class="empty">출하 없음</td></tr>'}</tbody>
      </table></div>
    </div>
  `;
  document.getElementById('btn-ship-new').onclick = () => {
    const lots = DB.all('production_lots');
    openModal(`
      <h2>새 출하 <button class="x" onclick="closeModal()">${ico('x')}</button></h2>
      <div class="body">
        <div><label>출하번호 (자동 · 수정 가능)</label>
          <input id="sh-id" value="${nextDocNo('SH')}" placeholder="${nextDocNo('SH')}" style="font-family:'JetBrains Mono',monospace;letter-spacing:.3px" autocomplete="off"></div>
        <div><label>수주</label>
          <select id="sh-so">${sos.map(o=>`<option value="${o.id}" data-i="${o.itemCode}" data-q="${o.qty}" data-c="${o.cust||''}">${o.id} · ${o.itemCode} (${o.qty}ea)</option>`).join('')}</select></div>
        <!-- ★ v0.16.3 — 공정 실적 참고 스트립 (calcItemFlow.goodByProc · LOT 선택 시 LOT.totalGood 로 전환) -->
        <div><label>공정 실적 참고 <span style="color:var(--dim);font-weight:400">— 공정별 양품 누계</span></label>
          <div class="fl-strip" id="sh-strip"><span class="fl-empty">수주(품번)을 선택하세요</span></div>
        </div>
        <div><label>생산LOT (출하 직전공정 양품 보유)</label>
          <select id="sh-lot">${lots.map(l=>`<option value="${l.plot_no}">${l.plot_no} (${l.itemCode})</option>`).join('')}</select></div>
        <div class="grid g2">
          <div>
            <label>수량 (ea)</label>
            <input id="sh-qty" type="number" placeholder="수량 입력">
            <div id="sh-warn"></div>
            <!-- ★ v0.16.11 — 포장 힌트 (기준·실측·환산) -->
            <div id="sh-pack-hint" style="font-size:11px;color:var(--sub);margin-top:6px;font-family:'JetBrains Mono',monospace">—</div>
          </div>
          <div>
            <label>실제 포장수량 (ea/포장) <span style="color:var(--dim);font-weight:400">— 기본=표준(선택)</span></label>
            <input id="sh-pack" type="number" min="1" step="1" placeholder="—">
          </div>
        </div>
        <div><label>파렛트 수량 (개) <span style="color:var(--dim);font-weight:400">— 고객사 출고(편도)</span></label><input id="sh-plt" type="number" min="0" placeholder="0"></div>
        <div class="actions">
          <button class="btn" onclick="closeModal()">취소</button>
          <button class="btn primary" id="sh-ok">${ico('save')}출하</button>
        </div>
      </div>
    `);

    // ★ v0.16.3 — 스트립 = 공정별 양품 누계(calcItemFlow.goodByProc) · LOT 선택 시 LOT.totalGood 로 전환
    //             완성품(재고)·출하누계 값은 기존 필드 그대로. 초과 경고·LOT 잔량 차단 로직 불변.
    const soSel   = document.getElementById('sh-so');
    const lotSel  = document.getElementById('sh-lot');
    const qtyEl   = document.getElementById('sh-qty');
    const stripEl = document.getElementById('sh-strip');
    const warnEl  = document.getElementById('sh-warn');
    const drawStrip = () => {
      const opt = soSel.selectedOptions[0];
      const itemCode = opt?.dataset.i;
      if(!itemCode){ stripEl.innerHTML = '<span class="fl-empty">수주(품번)을 선택하세요</span>'; return; }
      const flow = calcItemFlow(itemCode);
      const routeProcs = getRoute(itemCode).filter(r => r.proc !== 'SHIP');
      // LOT 선택 시 그 LOT 기준으로 전환 (해제 시 품번 goodByProc)
      const selPlot = lotSel?.value || '';
      const selLot  = selPlot ? DB.get('production_lots', selPlot) : null;
      const useLot  = !!(selLot && selLot.itemCode === itemCode);
      const parts = [];
      if(useLot){
        parts.push(`<span class="fl-step" style="color:var(--cyan)"><b style="color:var(--cyan);margin:0">${_esc(selPlot)}</b> 기준</span>`);
      }
      routeProcs.forEach((r, idx) => {
        const p = DB.get('processes', r.proc);
        const isLast = idx === routeProcs.length - 1;
        const v = useLot ? LOT.totalGood(selPlot, r.proc) : (flow.goodByProc[r.proc] || 0);
        // 마지막 가공공정은 '완성품(재고)' 라벨로 흡수 — 값은 기존 flow.finished 그대로
        if(isLast){
          parts.push(`<span class="fl-fin">완성품(재고) <b>${flow.finished.toLocaleString()}</b></span>`);
        } else {
          parts.push(`<span class="fl-step">${_esc(p?.name || r.proc)} <b>${v.toLocaleString()}</b></span>`);
        }
      });
      parts.push(`<span class="fl-ship">출하누계 <b>${flow.shippedSum.toLocaleString()}</b></span>`);
      stripEl.innerHTML = parts.join('<span class="fl-arr">→</span>');
    };
    const drawWarn = () => {
      const opt = soSel.selectedOptions[0];
      const itemCode = opt?.dataset.i;
      const qty = +qtyEl.value || 0;
      if(!itemCode || qty <= 0){ warnEl.innerHTML = ''; return; }
      const flow = calcItemFlow(itemCode);
      warnEl.innerHTML = (qty > flow.finished)
        ? `<div class="fl-warn">⚠ 완성품재고(${flow.finished.toLocaleString()}) 초과 — 등록은 진행됩니다</div>`
        : '';
    };
    // ★ v0.16.11 — 포장 힌트 (기준·실측) + 실측 기본값 = 표준
    const packEl = document.getElementById('sh-pack');
    const packHint = document.getElementById('sh-pack-hint');
    const drawPack = () => {
      const opt = soSel.selectedOptions[0];
      const itemCode = opt?.dataset.i;
      const item = itemCode ? DB.get('items', itemCode) : null;
      const std = (item?.pack_qty!=null && +item.pack_qty>0) ? +item.pack_qty : null;
      // 사용자가 안 건드렸으면 표준값 자동 채움 (실측 필드)
      if(!packEl.dataset.touched && std!=null && !packEl.value){
        packEl.value = std;
      }
      const actualRaw = packEl.value.trim();
      const actual = actualRaw==='' ? null : Math.max(1, Math.floor(+actualRaw||0));
      const qty = +qtyEl.value || 0;
      if(actual && qty>0){
        const packs = qty / actual;
        packHint.innerHTML = `≈ ${packs.toFixed(2).replace(/\.?0+$/,'')}포장 (실제 <b style="color:var(--cyan)">${actual}</b> ea 기준${std!=null?` · 표준 ${std}`:''})`;
      } else if(std!=null){
        packHint.innerHTML = `표준 포장단위 <b style="color:var(--cyan)">${std}</b> ea · 실측 입력 시 환산`;
      } else {
        packHint.innerHTML = `<span style="color:var(--dim)">포장단위 미설정 — 기준정보 › 품번에서 등록 가능</span>`;
      }
    };
    packEl.oninput = () => { packEl.dataset.touched = '1'; drawPack(); };
    soSel.addEventListener('change', () => { drawStrip(); drawWarn(); drawPack(); });
    lotSel?.addEventListener('change', () => { drawStrip(); });
    qtyEl.addEventListener('input', () => { drawWarn(); drawPack(); });
    drawStrip();
    drawPack();

    document.getElementById('sh-ok').onclick = () => {
      const so_id = document.getElementById('sh-so').value;
      const so = DB.get('orders', so_id);
      const plot = document.getElementById('sh-lot').value;
      const qty  = +document.getElementById('sh-qty').value;
      const plt  = +document.getElementById('sh-plt').value || 0;
      // ★ v0.16.11 — 실제 포장수량 (있을 때만 pack_qty_actual 로 저장 · 없으면 필드 자체 생략)
      const packRaw = document.getElementById('sh-pack').value.trim();
      const pack_qty_actual = packRaw==='' ? null : (+packRaw>0 ? Math.floor(+packRaw) : null);
      if(!qty){ toast('수량 입력','warn'); return; }
      // 출하 = shipment 레코드 (출하 직전 공정의 품번별 양품 검증)
      try {
        const lotObj = DB.get('production_lots', plot);
        if(!lotObj) throw new Error('LOT 없음');
        const route = getRoute(lotObj.itemCode);
        const lastProd = route.length>1 ? route[route.length-2] : route[0];
        const bal = LOT.totalGood(plot, lastProd.proc);
        const shippedFromLot = DB.query('shipments', x=>x.plot_no===plot).reduce((s,r)=>s+(r.qty||0),0);
        if(qty > bal - shippedFromLot) throw new Error(`출하 가능 ${bal-shippedFromLot}ea (요청 ${qty})`);
        const shNo = resolveDocNo('sh-id', 'SH');
        if(shNo.dup) throw new Error(`출하번호 중복 — ${shNo.id}`);
        const id = shNo.id;
        DB.set('shipments', id, {id, so_id, itemCode:so.itemCode, plot_no:plot, qty, pallets:plt, pack_qty_actual, ts:Date.now(), by:SESSION.user});
        // ★ v0.13.0 — 고객사 파렛트 출고 자동 (편도, 미회수 없음)
        if(plt>0 && so?.cust){ PALLET.add({vendor:so.cust, type:'out', qty:plt, ref:{kind:'tx', id}}); }
        toast(`출하 완료${plt>0?` · 파렛트 ${plt}개 출고`:''}`,'ok');
        closingWarnIfClosed('sales', Date.now(), '출하 등록');
        // ★ v0.14.4 — 등록 직후 명세서 발행 액션 (선택 — 안 눌러도 등록은 완료)
        openModal(`
          <h2>거래명세서 발행 <button class="x" onclick="closeModal();router()">${ico('x')}</button></h2>
          <div class="body">
            <div style="font-size:13px">방금 등록한 출하의 거래명세서를 지금 발행하시겠습니까?</div>
            <div style="font-size:11px;color:var(--sub)">${_esc(id)} · ${_esc(so.itemCode)} · ${qty.toLocaleString()}ea${plt>0?` · 파렛트 ${plt}개`:''}</div>
            <div class="actions">
              <button class="btn" onclick="closeModal();router()">아니오</button>
              <button class="btn primary" id="sh-print">${ico('print')}거래명세서 발행</button>
            </div>
          </div>
        `);
        document.getElementById('sh-print').onclick = () => {
          closeModal();
          router();
          VIEWS._printStmt(id);
        };
      } catch(e){ toast(e.message,'err'); }
    };
  };

  // ★ v0.16.0 — 출하 취소 (사유 모달 + 파렛트 tx 연쇄 void · 집계 자동 복원)
  document.getElementById('ship-void-view').onchange = (e)=>{ shState.voidView=e.target.checked; router(); };
  document.querySelectorAll('[data-sh-void]').forEach(b=>b.onclick = ()=>{
    const id = b.dataset.shVoid;
    openModal(`
      <h2>출하 취소 — ${_esc(id)} <button class="x" onclick="closeModal()">${ico('x')}</button></h2>
      <div class="body">
        <div style="font-size:12px;color:var(--sub)">출하가 취소되며 완성품재고·매출·수주 잔량은 자동 복원됩니다.<br>파렛트 출고(고객사)도 함께 취소됩니다.</div>
        <div><label>취소 사유</label>
          <select id="sh-void-reason">
            <option value="오입력">오입력</option>
            <option value="중복">중복</option>
            <option value="수량착오">수량착오</option>
            <option value="기타">기타</option>
          </select></div>
        <div><label>상세 (선택)</label><input id="sh-void-note" placeholder="상세 사유"></div>
        <div class="actions">
          <button class="btn" onclick="closeModal()">닫기</button>
          <button class="btn primary" id="sh-void-ok" style="color:var(--red);border-color:var(--red)">${ico('x')}취소 확정</button>
        </div>
      </div>
    `);
    document.getElementById('sh-void-ok').onclick = ()=>{
      const rsn = document.getElementById('sh-void-reason').value;
      const note= document.getElementById('sh-void-note').value.trim();
      const reason = note ? `${rsn} · ${note}` : rsn;
      const _pre = DB.get('shipments', id);
      voidDoc('shipments', id, reason);
      // 연쇄: pallet_moves ref.kind='tx' && ref.id===id
      DB.queryRaw('pallet_moves', m => m.ref?.kind==='tx' && m.ref?.id===id && !m.void)
        .forEach(m => voidDoc('pallet_moves', m.id, `SHIP ${id} 연쇄 취소`));
      toast('출하 취소 · 파렛트 연쇄 처리 (원본 보존)','ok');
      if(_pre) closingWarnIfClosed('sales', _pre.ts, '출하 취소');
      closeModal(); router();
    };
  });
  document.querySelectorAll('[data-sh-unvoid]').forEach(b=>b.onclick = ()=>{
    const id = b.dataset.shUnvoid;
    toast('복원 시 수량이 이중 계상될 수 있습니다 — 확인 후 진행','warn');

        .forEach(m => unvoidDoc('pallet_moves', m.id));

      if(_r) closingWarnIfClosed('sales', _r.ts, '출하 복원');
      toast('출하·파렛트 복원','ok'); router();
    }, 400);
  });
  bindClToggleButtons();
};

      // 기본값: 가능량 자동 채움 (사용자 수정 후에는 유지 · ea 모드에서만 채움)
      const qEl = document.getElementById('od-q');
      if(!qEl.dataset.touched && inputMode === 'ea') qEl.value = info.avail > 0 ? info.avail : '';
      // 모드 안내 재갱신 (LOT/공정에 따라 품번이 바뀔 수 있음)
      const help = document.getElementById('od-mode-help');
      if(help) help.innerHTML = osInputHelp(inputMode, currentItemCode(), { pltAutoFillNote: inputMode==='plt' }).html;
    };
    // ★ v0.16.18 — 입력 모드 토글 (osInputHelp/Convert 공용 · 복사 금지)
    let inputMode = 'ea';
    const currentItemCode = () => {
      const plot = document.getElementById('od-l').value;
      const lot = plot ? DB.get('production_lots', plot) : null;
      return lot?.itemCode || null;
    };
    const setMode = (mode) => {
      inputMode = mode;
      document.querySelectorAll('.od-mode').forEach(b => b.classList.toggle('primary', b.dataset.mode === mode));
      const row  = document.getElementById('od-src-row');
      const lbl  = document.getElementById('od-src-label');
      const src  = document.getElementById('od-src');
      const hint = document.getElementById('od-src-hint');
      const qBadge = document.getElementById('od-q-badge');
      const pBadge = document.getElementById('od-plt-badge');
      src.value = '';
      hint.textContent = '—';
      row.style.display = (mode === 'ea') ? 'none' : '';
      if(mode === 'kg'){  lbl.textContent = '계근 (kg)';        src.placeholder = '예: 395'; qBadge.textContent = '— 계근 환산 (수정 가능)'; pBadge.textContent = '— 외주처 출고·미회수 자동 반영'; }
      if(mode === 'plt'){ lbl.textContent = '파렛트 수 (환산용)'; src.placeholder = '예: 5';   qBadge.textContent = '— 파렛트 환산 (수정 가능)'; pBadge.textContent = '— 파렛트 수와 동기 (수정 가능)'; }
      if(mode === 'ea'){                                                                      qBadge.textContent = '— 가능량 자동 채움';        pBadge.textContent = '— 외주처 출고·미회수 자동 반영'; }
      document.getElementById('od-mode-help').innerHTML = osInputHelp(mode, currentItemCode(), { pltAutoFillNote: mode==='plt' }).html;
    };
    document.querySelectorAll('.od-mode').forEach(b => b.onclick = () => setMode(b.dataset.mode));
    // 환산 → 반출 수량 채움 (+ plt 모드는 od-plt 도 동기)

        }
      }

    document.getElementById('od-l').onchange = updAvail;
    document.getElementById('od-p').onchange = updAvail;

      const info = osAvailable(plot, proc);

  document.getElementById('os-xlsx').onclick = ()=>{

        품번: lot?.itemCode||'', LOT:d.plot_no,
        반출:d.qty||0, 입고:recv, '파렛트 출':pOut, '파렛트 회':pIn,
        상태: recv>=(d.qty||0)?'완료':'진행',
      };
    });
    exportXlsx(xrows, '외주', `외주_${fmtDate(Date.now())}.xlsx`);
  };

  // ★ v0.16.0 — 외주 취소 이벤트
  document.getElementById('os-void-view').onchange = (e)=>{ osState.voidView=e.target.checked; router(); };
  // C5. 반출 취소 (live 입고 0 · 파렛트 os 이동 연쇄)
  document.querySelectorAll('[data-od-void]').forEach(b=>b.onclick = ()=>{
    const id = b.dataset.odVoid;
    const liveRecvs = DB.query('os_receipts', r=>r.dispatch_id===id);

    voidDoc('os_dispatches', id, '오입력');
    DB.queryRaw('pallet_moves', m => m.ref?.kind==='os' && m.ref?.id===id && !m.void)

  });
  document.querySelectorAll('[data-od-unvoid]').forEach(b=>b.onclick = ()=>{

    unvoidDoc('os_dispatches', id);

      .forEach(m => unvoidDoc('pallet_moves', m.id));

  });
  // C6. 입고 취소 (사유 모달 · 실적 record + 파렛트 회수 이동 연쇄)
  document.querySelectorAll('[data-or-void]').forEach(b=>b.onclick = ()=>{

      <div class="body">
        <div style="font-size:12px;color:var(--sub)">입고가 취소되면 연결된 실적과 파렛트 회수도 함께 취소됩니다.${!r.record_id?'<br><b style="color:var(--amber)">※ 구 데이터 — 실적은 실적현황에서 별도 취소 필요</b>':''}</div>
        <div><label>취소 사유</label>
          <select id="or-void-reason">
            <option value="오입력">오입력</option>
            <option value="중복">중복</option>
            <option value="수량착오">수량착오</option>
            <option value="기타">기타</option>
          </select></div>
        <div><label>상세 (선택)</label><input id="or-void-note" placeholder="상세 사유"></div>
        <div class="actions">
          <button class="btn" onclick="closeModal()">닫기</button>
          <button class="btn primary" id="or-void-ok" style="color:var(--red);border-color:var(--red)">${ico('x')}취소 확정</button>
        </div>

    `);

      // 연쇄: record_id (신규 데이터만) · pallet_move_id (회수 이동)

      toast('외주 입고·실적·파렛트 복원','ok'); router();
    }, 400);
  });
  bindClToggleButtons();
};
VIEWS._osRecv = (dispId) => {

        if(DB.get('os_receipts', id)) throw new Error(`외주 입고번호 중복 — ${id}`);
        // ★ v0.16.17 — 입력 근거 병합 (ea 모드는 생략 · 저장은 항상 ea 확정)
        const doc = {id, dispatch_id:dispId, qty:g+df, good:g, defect:df, scrap:0, pallets_recovered:prc, record_id:recordId, pallet_move_id:palletMoveId, ts:Date.now()};
        if(inputMode !== 'ea'){
          doc.input_mode  = inputMode;
          doc.input_value = +document.getElementById('or-src').value || 0;
        }
        DB.set('os_receipts', id, doc);
      }
      toast(`입고 등록${prc>0?` · 회수 파렛트 ${prc}개`:''}`,'ok');
      closingWarnIfClosed('outsource', Date.now(), '외주 입고 등록');
      closeModal(); router();
    } catch(e){ toast(e.message,'err'); }
  };
};
VIEWS._printDisp = (id) => { printForm.os([id]); };  // ★ v0.12.0 — 새 양식 위임

/* =================================================================================================
   ★ v0.13.0 — 실적현황 (PC) (scan-pc.html)
   생산실적 통합 조회 (폰 + PC 등록) · 일자별 헤더+요약 · 소재규격 · 폰/PC 출처 · 수정 · 중단
   ================================================================================================= */
VIEWS.perf = () => {
  // ★ v0.16.0 — voidView 토글 · v0.16.10 — 필터 칩 [전체|실적|중단] (KPI 무영향, 표시 필터만)
  // ★ v0.20.1 — view 토글 [실적현황|계획대비] · 기존 실적현황 뷰 무수정
  // ★ v0.20.2 — 설비 필터 추가 (records 등장 설비 고유 목록)
  const state = (window._perfFilter = window._perfFilter || { q:'', proc:'', worker:'', shift:'', date:'', voidView:false, rowFilter:'all', view:'perf', equipment:'' });
  if(state.view === undefined) state.view = 'perf';
  if(state.equipment === undefined) state.equipment = '';

  // ★ v0.20.1 — 계획대비 뷰 (plans + records 재사용, 신규 계산 없음)
  if(state.view === 'plan' && getFlags().plan){
    return VIEWS._perfPlanCompare();
  }

  const procs = getProcesses();
  const workers = DB.all('workers');
  const shifts  = (DB.get('settings','shifts')?.shifts) || [];
  // ★ v0.20.2 — 설비 목록: live records 에 등장한 고유 값 (라이브만)
  const eqSet = new Set();
  let hasEmptyEq = false;
  DB.all('records').forEach(r => {
    if(r.transferred) return;
    const e = r.equipment;
    if(e) eqSet.add(e); else hasEmptyEq = true;
  });
  const eqOptions = [...eqSet].sort();

  // ★ v0.16.10 — 필터 조건 함수 (KPI·목록 공용) · transferred 제외
  const matchesFilters = (r) => {
    if(state.q){
      const q = state.q.toLowerCase();
      const lot = DB.get('production_lots', r.plot_no);
      const item = lot && DB.get('items', lot.itemCode);
      const proc = DB.get('processes', r.proc);
      const who = r.worker?.name || r.by || '';
      const text = `${r.plot_no} ${lot?.itemCode||''} ${item?.name||''} ${proc?.name||''} ${who}`.toLowerCase();
      if(!text.includes(q)) return false;
    }
    if(state.proc   && r.proc !== state.proc) return false;
    if(state.worker && (r.worker?.id||r.by) !== state.worker) return false;
    if(state.shift  && (r.shift||'day') !== state.shift) return false;
    // ★ v0.20.2 — 설비 필터 (미지정=__none__)
    if(state.equipment){
      if(state.equipment === '__none__'){ if(r.equipment) return false; }
      else if((r.equipment||'') !== state.equipment) return false;
    }
    if(state.date){
      const d = fmtDate(r.ts);
      if(d !== state.date) return false;
    }
    return true;
  };
  // ★ v0.16.10 — 화면 범위 raw (KPI + 배지 카운트 산정 기준 · 필터 칩 무관)
  const rawInScope = DB.allRaw('records').filter(r => !r.transferred && matchesFilters(r));
  const voidInScope = rawInScope.filter(r => !!r.void).length;

  // 모든 record (transferred는 표시 안함 — fork/merge 내부 기록)
  // ★ v0.16.0 — voidView 시 Raw 로 취소 문서 포함
  const filtered = (state.voidView ? rawInScope : rawInScope.filter(r => !r.void))
                     .slice().sort((a,b) => b.ts - a.ts);

  // ★ v0.16.10 — 필터 칩은 목록 표시에만 적용 (KPI 산정은 filtered 원본 그대로)
  const listRecs = state.rowFilter==='stop' ? filtered.filter(r => !!r.stopped)
                 : state.rowFilter==='perf' ? filtered.filter(r => !r.stopped)
                 : filtered;
  // 일자별 그룹
  const byDate = {};
  filtered.forEach(r => {
    const d = fmtDate(r.ts);
    if(!byDate[d]) byDate[d] = { date:d, recs:[], cnt:0, good:0, def:0 };
    byDate[d].recs.push(r);
    byDate[d].cnt++;
    byDate[d].good += r.good||0;
    byDate[d].def  += r.defect||0;
  });
  // ★ v0.16.10 — 목록 렌더 전용 그룹 (칩 필터 반영 · KPI 무영향)
  const byDateList = {};
  listRecs.forEach(r => {
    const d = fmtDate(r.ts);
    if(!byDateList[d]) byDateList[d] = { date:d, recs:[], cnt:0, good:0, def:0 };
    byDateList[d].recs.push(r);
    byDateList[d].cnt++;
    byDateList[d].good += r.good||0;
    byDateList[d].def  += r.defect||0;
  });
  const dateGroups = Object.values(byDateList).sort((a,b)=>b.date.localeCompare(a.date));

  // KPI (오늘 기준)
  const today = fmtDate(Date.now());
  const todayG = byDate[today] || {cnt:0, good:0, def:0};
  const todayDay   = (byDate[today]?.recs||[]).filter(r=>(r.shift||'day')==='day').length;
  const todayNight = (byDate[today]?.recs||[]).filter(r=>r.shift==='night').length;
  const todayInput = todayG.good + todayG.def;
  const todayDefPct = todayInput>0 ? (todayG.def/todayInput*100) : 0;

  // ★ v0.14.3 — 기간 생산량 KPI (진도 4칸 클릭 도착지 · 일/주/월/연 records 양품 합)
  // ★ v0.16.11 — allRecs 참조 복구 (v0.16.10 리팩터에서 변수명 유실 → ReferenceError). filtered 와 동일 범위(voidView 반영) 사용.
  const allRecs = filtered;
  const sumGoodInRange = (start, end) => allRecs.filter(r => r.ts>=start && r.ts<end).reduce((s,r)=>s+(r.good||0), 0);
  const rgDay   = periodRange('day');
  const rgWeek  = periodRange('week');
  const rgMonth = periodRange('month');
  const rgYear  = periodRange('year');
  const goodDay   = sumGoodInRange(rgDay.start,   rgDay.end);
  const goodWeek  = sumGoodInRange(rgWeek.start,  rgWeek.end);
  const goodMonth = sumGoodInRange(rgMonth.start, rgMonth.end);
  const goodYear  = sumGoodInRange(rgYear.start,  rgYear.end);

  function srcBadge(r){
    const src = r.source==='counter' ? 'counter' : (r.session_src||(r.source==='manual_pc'?'pc':'phone'));
    if(src === 'pc') return '<span class="pill" style="background:rgba(125,211,252,.14);color:var(--blue);font-size:9px;margin-left:4px">PC</span>';
    if(src === 'counter') return '<span class="pill" style="background:rgba(74,222,128,.12);color:var(--green);font-size:9px;margin-left:4px">계수기</span>';
    return '<span class="pill" style="background:rgba(125,211,252,.12);color:var(--blue);font-size:9px;margin-left:4px">폰</span>';
  }

  document.getElementById('view').innerHTML = `
    <div class="pghead">
      <div class="pgtitle"><svg class="ic" viewBox="0 0 24 24">${PAGES.find(p=>p.id==='perf').icon}</svg>실적현황 <span class="pill cyan">${APP_VERSION} · PC</span></div>
      <div class="pgtools">
        ${getFlags().plan ? `<!-- ★ v0.20.1 — view 토글 [실적현황|계획대비] -->
        <div style="display:inline-flex;gap:2px;background:var(--bg2);border:1px solid var(--line);border-radius:8px;padding:2px">
          <button class="btn ${state.view==='perf'?'primary':'ghost'}" data-perfview="perf" style="padding:5px 12px;font-size:11px;border-radius:6px">실적현황</button>
          <button class="btn ${state.view==='plan'?'primary':'ghost'}" data-perfview="plan" style="padding:5px 12px;font-size:11px;border-radius:6px">계획대비</button>
        </div>`:''}
        <!-- ★ v0.16.0 · v0.16.10 — 취소 도구 -->
        <label class="chk-toggle" style="display:inline-flex;align-items:center;gap:6px;font-size:11px;color:var(--sub);padding:6px 10px;border:1px solid var(--line);border-radius:8px;cursor:pointer;background:${state.voidView?'rgba(248,113,113,.08)':'var(--bg2)'}"><input type="checkbox" id="perf-void-view" ${state.voidView?'checked':''} style="width:auto;margin:0"> 취소 포함 보기${voidInScope>0?` <span style="color:var(--red);font-weight:700">(${voidInScope})</span>`:''}</label>
        <button class="btn warn" id="perf-void-sel" style="display:none">${ico('x')}선택 취소 (<span id="perf-void-cnt">0</span>)</button>
        <button class="btn" id="perf-xlsx">${ico('excel')}엑셀</button>
        <button class="btn" id="perf-stop">${ico('plus')}중단 등록</button>
        <button class="btn primary" id="perf-add">${ico('plus')}PC 실적 등록</button>
      </div>
    </div>
    <div style="font-size:11px;color:var(--dim);margin-bottom:14px">폰은 현장 스캔 등록 · PC는 등록된 실적 현황 + 스캔 없이 직접 등록·수정. 같은 LOT(plot_no)으로 폰↔PC 일관 추적.</div>

    <!-- 검색·필터 -->
    <div class="card" style="padding:14px;margin-bottom:12px">
      <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap">

          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="var(--sub)" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg>
          <input id="perf-q" placeholder="검색 — 품번 · LOT · 작업자 · 공정" value="${_esc(state.q)}" style="flex:1;background:none;border:none;outline:none;color:var(--ink);font-size:13px;padding:0;width:auto">

        <span class="pill ${state.rowFilter==='stop'?'heat':'gray'}" style="cursor:pointer" data-rowfilter="stop">중단</span>
        <span style="margin-left:auto;font-size:11px;color:var(--dim)">${listRecs.length}건 / 전체 ${filtered.length}건</span>
      </div>

    <!-- KPI -->
    <div class="grid g4" style="margin-bottom:14px">
      <div class="kpi-mini"><div class="lab">${ico('check')}오늘 등록 건</div><div class="val c">${todayG.cnt}<span style="font-size:12px;color:var(--sub)">건</span></div><div class="sub">주간 ${todayDay} · 야간 ${todayNight}</div></div>
      <div class="kpi-mini"><div class="lab">${ico('check')}오늘 양품</div><div class="val g">${todayG.good.toLocaleString()}<span style="font-size:12px;color:var(--sub)">ea</span></div><div class="sub">전 공정 합</div></div>
      <div class="kpi-mini"><div class="lab">${ico('check')}오늘 불량</div><div class="val r">${todayG.def.toLocaleString()}<span style="font-size:12px;color:var(--sub)">ea</span></div><div class="sub">불량률 ${todayDefPct.toFixed(1)}%</div></div>
      <div class="kpi-mini"><div class="lab">${ico('check')}중단</div><div class="val h">${stoppedToday}<span style="font-size:12px;color:var(--sub)">건</span></div><div class="sub">${lastStop?.stop_reason||'—'}</div></div>

    <div class="grid g4" style="margin-bottom:14px">
      <div class="kpi-mini"><div class="lab">${ico('check')}일 생산량</div><div class="val c">${goodDay>0? goodDay.toLocaleString()+'<span style="font-size:12px;color:var(--sub)">ea</span>' : '<span style="color:var(--dim)">—</span>'}</div><div class="sub">${_esc(rgDay.label)}</div></div>

        <tbody>${dateGroups.length? dateGroups.map(g=>{
          const isToday = g.date===today;
          return `<tr style="background:var(--bg2)"><td colspan="11" style="font-size:11px;color:var(--cyan);font-weight:600;letter-spacing:.3px;padding:8px 10px">▾ ${g.date}${isToday?' (오늘)':''}<span style="color:var(--dim);margin-left:8px;font-weight:400">${g.cnt}건 · 양품 ${g.good.toLocaleString()} · 불량 ${g.def.toLocaleString()}</span></td></tr>
            ${g.recs.map(r=>{
              const lot = DB.get('production_lots', r.plot_no);
              const item = lot && DB.get('items', lot.itemCode);
              const proc = DB.get('processes', r.proc);
              const spec = item ? `${item.mat||'—'} · Ø${item.dia||'—'} · ${item.weight||'—'}kg` : '—';
              const who = r.vendor ? `— · 외주(${_esc(DB.get('vendors',r.vendor)?.name||r.vendor)})`
                        : `${_esc(r.worker?.name||r.by||'—')} · ${_esc(r.equipment||'—')}`;
              const shiftCode = r.shift||'day';
