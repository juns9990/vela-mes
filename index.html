/* 거래처 등록·수정 모달 */
VIEWS._mstVendorEdit = (code) => {
  const isNew = !code;
  const v = isNew
    ? { code:'', name:'', type:'cust', contact:'', active:true }
    : DB.get('vendors', code);
  if(!isNew && !v){ toast('거래처를 찾을 수 없음','err'); return; }

  // 자동 채번: C-XXX (cust) / V-XXX (out) / S-XXX (sup) — 사용중·비활성 모두 스캔해 다음 번호 산출
  const suggestCode = (type) => {
    const prefix = (type === 'cust') ? 'C-' : (type === 'sup') ? 'S-' : 'V-';
    const nums = DB.all('vendors')
      .filter(x => (x.code||'').startsWith(prefix))
      .map(x => +(x.code.slice(prefix.length)) || 0);
    const next = Math.max(0, ...nums) + 1;
    return `${prefix}${String(next).padStart(3, '0')}`;
  };

  openModal(`
    <h2>${isNew ? '거래처 등록' : '거래처 수정'} <button class="x" onclick="closeModal()">${ico('x')}</button></h2>
    <div class="body">
      <div class="grid g2">
        <div><label>코드 ${isNew?'<span style="color:var(--dim);font-weight:400">— 자동 · 수동 수정 허용</span>':'<span style="color:var(--dim);font-weight:400">— 불변</span>'}</label>
          <input id="mv-code" value="${_esc(v.code)}" ${isNew?'':'readonly'} style="font-family:'JetBrains Mono',monospace"></div>
        <div><label>구분 ${isNew?'':'<span style="color:var(--dim);font-weight:400">— 불변</span>'}</label>
          <select id="mv-type" ${isNew?'':'disabled'}>
            <option value="cust" ${v.type==='cust'?'selected':''}>고객사</option>
            <option value="out"  ${v.type==='out'? 'selected':''}>외주처</option>
            <option value="sup"  ${v.type==='sup'? 'selected':''}>구매처</option>
          </select></div>
      </div>
      <div><label>이름</label><input id="mv-name" value="${_esc(v.name||'')}" placeholder="예: 두산모트롤"></div>
      <div><label>연락처 (선택)</label><input id="mv-contact" value="${_esc(v.contact||'')}" placeholder="예: 055-000-0000"></div>
      <!-- ★ v0.16.19 — 사업자 상세 (전부 선택 · 인쇄물 당사자 블록 반영 · 구분 무관 공통) -->
      <div class="grid g2">
        <div><label>사업자등록번호 (선택)</label><input id="mv-biz" value="${_esc(v.biz_no||'')}" placeholder="123-45-67890"></div>
        <div><label>대표자 (선택)</label><input id="mv-ceo" value="${_esc(v.ceo||'')}"></div>
      </div>
      <div><label>주소 (선택)</label><input id="mv-addr" value="${_esc(v.addr||'')}"></div>
      <div class="grid g3">
        <div><label>업태 (선택)</label><input id="mv-bt" value="${_esc(v.biz_type||'')}" placeholder="예: 제조업"></div>
        <div><label>종목 (선택)</label><input id="mv-bi" value="${_esc(v.biz_item||'')}" placeholder="예: 자동차부품"></div>
        <div><label>전화 (선택)</label><input id="mv-tel" value="${_esc(v.tel||'')}" placeholder="055-000-0000"></div>
      </div>
      <div class="actions">
        <button class="btn" onclick="closeModal()">취소</button>
        <button class="btn primary" id="mv-save">${ico('save')}저장</button>
      </div>
    </div>
  `);

  if(isNew){
    const codeEl = document.getElementById('mv-code');
    codeEl.value = suggestCode(v.type);
    document.getElementById('mv-type').onchange = (e) => {
      // 사용자가 접두를 그대로 두고 있었으면 자동 갱신, 커스텀이면 유지 (C-/V-/S- 3종 접두 인정)
      if(/^[CVS]-\d{3}$/.test(codeEl.value)) codeEl.value = suggestCode(e.target.value);
    };
  }

  document.getElementById('mv-save').onclick = () => {
    const code    = document.getElementById('mv-code').value.trim();
    const type    = document.getElementById('mv-type').value;
    const name    = document.getElementById('mv-name').value.trim();
    const contact = document.getElementById('mv-contact').value.trim();
    // ★ v0.16.19 — 사업자 상세 (전부 선택 · 미입력이면 빈 문자열)
    const biz_no   = document.getElementById('mv-biz').value.trim();
    const ceo      = document.getElementById('mv-ceo').value.trim();
    const addr     = document.getElementById('mv-addr').value.trim();
    const biz_type = document.getElementById('mv-bt').value.trim();
    const biz_item = document.getElementById('mv-bi').value.trim();
    const tel      = document.getElementById('mv-tel').value.trim();
    if(!code){ toast('코드 입력','warn'); return; }
    if(!name){ toast('이름 입력','warn'); return; }
    // 사용중·비활성 불문 코드 중복 차단 (신규만)
    if(isNew && DB.get('vendors', code)){ toast(`코드 중복 — ${code} 이미 존재`,'err'); return; }
    const doc = isNew
      ? { code, name, type, contact, biz_no, ceo, addr, biz_type, biz_item, tel, active:true }
      : { name, contact, biz_no, ceo, addr, biz_type, biz_item, tel };  // 코드·구분·active는 불변
    DB.set('vendors', code, doc);
    toast(isNew?`거래처 등록 — ${name}`:`거래처 수정 — ${name}`,'ok');
    closeModal(); router();
  };
};

/* 거래처 비활성/재활성 (물리 삭제 금지) */
VIEWS._mstVendorToggle = (code) => {
  const v = DB.get('vendors', code); if(!v) return;
  const wasActive = v.active !== false;
  DB.set('vendors', code, { active: !wasActive });
  toast(wasActive ? `${v.name} 비활성` : `${v.name} 재활성`, wasActive ? 'warn' : 'ok');
  router();
};

/* 품번 등록·수정 모달
   ★ v0.20.4 — 공정별 시간 섹션 (라우트 기반) · CT ↔ 시간당 타수 상호 자동
   ★ v0.26.0 — 고객사 마스터(customers) 연동 · 식별번호 자동 채번 · 리비전 복제
              · 계산 필드(원/kg) 파생 표시(입력 불가) · Cav 표시 전용 · 정의 필드 · 금형·설비 연결 */
VIEWS._mstItemEdit = (code) => {
  const isNew = !code;
  const it = isNew
    ? { code:'', name:'', cust:'', customer_ref:'', rev:0, mat:'', dia:'', weight:'', product_weight_g:'',
        price:'', cav:1, cav_source:'manual', mold_no:'', default_forge_eq:'', pack_qty:'', proc_times:{}, custom:{}, active:true }
    : DB.get('items', code);
  if(!isNew && !it){ toast('품번을 찾을 수 없음','err'); return; }
  const activeCustsV = getActiveVendors('cust').sort((a,b) => (a.name||'').localeCompare(b.name||''));  // 하위 호환
  const activeCusts  = getActiveCustomers();  // ★ v0.26 신 고객사 마스터
  const routeProcs = (!isNew && it.code) ? getRouteProcs(it.code).filter(p => p.code !== 'SHIP') : [];
  const pt = it.proc_times || {};
  // 절단대비/제품대비 자동 계산 표시 (입력 불가 · 값 없으면 —)
  const _fmtWon = v => v==null ? '—' : v.toLocaleString();
  const cutRate = itemRatePerCutKg({ weight: it.weight, price: it.price });
  const prodRate = itemRatePerProductKg({ product_weight_g: it.product_weight_g, price: it.price });
  const forgeEqs = DB.query('equipments', e => e.procCode==='FORGE' && e.active !== false)
    .map(e => e.name).concat(DB.get('processes','FORGE')?.equipment || []).filter((v,i,a)=>a.indexOf(v)===i);
  const cutG0 = it.weight ? Math.round(+it.weight*1000) : '';
  const ident = isItemIdentifier(it.code) ? splitItemIdentifier(it.code) : null;

  openModal(`
    <h2>${isNew ? '품번 등록' : '품번 수정'} <span style="color:var(--dim);font-weight:400;font-size:12px">${ident?` — ${ident.cust}-${String(ident.seq).padStart(3,'0')}-${ident.rev}`:''}</span> <button class="x" onclick="closeModal()">${ico('x')}</button></h2>
    <div class="body">
      <div style="font-size:11px;font-weight:800;letter-spacing:.5px;color:var(--cyan);margin:2px 0 8px;padding-left:8px;border-left:3px solid var(--cyan)">표준 (계산·채번에 쓰이는 필드)</div>
      <div class="grid g2">
        <div><label>고객사 <span style="color:var(--dim);font-weight:400">— customers 마스터</span></label>
          <select id="mi-cref">
            <option value="">— 미지정 —</option>
            ${activeCusts.map(c=>`<option value="${_esc(c.code)}" ${it.customer_ref===c.code?'selected':''}>${_esc(c.name)} · ${_esc(c.code)}</option>`).join('')}
          </select></div>
        <div><label>식별번호 ${isNew?'<span style="color:var(--dim);font-weight:400">— 자동 · {고객코드}-{순번3}-{리비전}</span>':'<span style="color:var(--dim);font-weight:400">— 불변</span>'}</label>
          <input id="mi-code" value="${_esc(it.code)}" ${isNew?'':'readonly'} placeholder="예: 038-031-0" style="font-family:'JetBrains Mono',monospace"></div>
      </div>
      <div class="grid g2">
        <div><label>품번 <span style="color:var(--dim);font-weight:400">— 하위 호환(자유 문자열 · 없으면 식별번호 사용)</span></label>
          <input id="mi-legacy" value="${_esc(ident?it.code:it.code)}" placeholder="예: SKT271" style="font-family:'JetBrains Mono',monospace"></div>
        <div><label>품명</label><input id="mi-name" value="${_esc(it.name||'')}" placeholder="예: LOWER-BALL JOINT SOCKET"></div>
      </div>
      <div class="grid g3">
        <div><label>재질</label><input id="mi-mat" value="${_esc(it.mat||'')}" placeholder="예: SCM435"></div>
        <div><label>Ø</label><input id="mi-dia" type="number" step="0.1" value="${it.dia||''}" placeholder="32"></div>
        <div><label>리비전 <span style="color:var(--dim);font-weight:400">— 기본 0</span></label>
          <input id="mi-rev" type="number" min="0" step="1" value="${it.rev==null?0:it.rev}" ${isNew?'':'readonly'}></div>
      </div>
      <div class="grid g3">
        <div><label>절단 중량 (g)</label><input id="mi-cutg" type="number" min="0" step="1" value="${cutG0}" placeholder="1553"></div>
        <div><label>제품 중량 (g)</label><input id="mi-prodg" type="number" min="0" step="1" value="${it.product_weight_g||''}" placeholder="535"></div>
        <div><label>단가 (원)</label><input id="mi-price" type="number" value="${it.price||''}" placeholder="1740"></div>
      </div>
      <div class="grid g3">
        <div><label>절단대비 (원/kg) — 자동</label>
          <input id="mi-cutRate" value="${_fmtWon(cutRate)}" disabled style="border-style:dashed;color:var(--dim);font-family:'JetBrains Mono',monospace"></div>
        <div><label>제품대비 (원/kg) — 자동</label>
          <input id="mi-prodRate" value="${_fmtWon(prodRate)}" disabled style="border-style:dashed;color:var(--dim);font-family:'JetBrains Mono',monospace"></div>
        <div><label>Cav (1타 생산 수) — 표시用<span style="color:var(--dim);font-weight:400;font-size:10px"> · 카운터기 대비 자리 예약</span></label>
          <input id="mi-cav" type="number" min="1" step="1" value="${+it.cav>0?+it.cav:1}" placeholder="1"></div>
      </div>
      <div class="grid g3">
        <div><label>금형번호 <span style="color:var(--dim);font-weight:400">— 식별번호 연동 제안(수정 가능)</span></label>
          <input id="mi-moldno" value="${_esc(it.mold_no||'')}" placeholder="예: 038-031" style="font-family:'JetBrains Mono',monospace"></div>

          <select id="mi-forgeeq">

          </select></div>
        <div><label>포장단위 (ea/포장) <span style="color:var(--dim);font-weight:400">— 표준값(선택)</span></label>
          <input id="mi-pack" type="number" min="1" step="1" value="${it.pack_qty!=null?it.pack_qty:''}" placeholder="예: 200"></div>
      </div>
      ${renderCustomFields('items', it.custom, 'form')}
      <!-- ★ v0.20.4 — 공정별 시간 (라우트 기반) · CT ↔ 시간당 타수 상호 자동 (저장은 ct 1값) -->
      <div style="margin-top:12px;padding:10px 12px;background:var(--bg2);border:1px solid var(--line);border-radius:8px">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
          <b style="font-size:12.5px">공정별 시간</b>
          <span class="tag">CT(초/개) ↔ 시간당 타수(개/h) 자동 · 저장은 CT 기준 · 선택 입력</span>
        </div>
        ${isNew ? `<div style="font-size:11px;color:var(--dim);padding:8px 0">품번 저장 후 라우트(BOM) 등록 시 여기서 공정별 CT 관리</div>`
        : !routeProcs.length ? `<div style="font-size:11px;color:var(--dim);padding:8px 0">라우트 없음 — BOM 라우트 등록 후 표시</div>`
        : `<div class="tbl-wrap"><table style="font-size:12px">
            <thead><tr>
              <th style="width:60px">순서</th>
              <th>공정</th>
              <th style="width:130px" class="num">CT(초/개)</th>
              <th style="width:130px" class="num">시간당 타수(개/h)</th>
            </tr></thead>
            <tbody>${routeProcs.map(p => {
              const ct = +pt[p.code]?.ct || '';
              const uph = ct>0 ? Math.round(3600/ct) : '';
              return `<tr>
                <td class="muted" style="text-align:center">${p.seq||''}</td>
                <td><b>${_esc(p.name||p.code)}</b> <span class="muted" style="font-size:10.5px">${_esc(p.code)}</span></td>
                <td class="num"><input type="number" min="0" step="0.01" class="mi-ct" data-proc="${_esc(p.code)}" value="${ct}" placeholder="예: 12" style="font-family:'JetBrains Mono',monospace;text-align:right;width:100%"></td>
                <td class="num"><input type="number" min="0" step="1" class="mi-uph" data-proc="${_esc(p.code)}" value="${uph}" placeholder="예: 300" style="font-family:'JetBrains Mono',monospace;text-align:right;width:100%"></td>
              </tr>`;
            }).join('')}</tbody>
          </table></div>`}
      </div>
      <div class="actions">
        <button class="btn" onclick="closeModal()">취소</button>
        ${(!isNew && ident) ? `<button class="btn" id="mi-revup" title="새 리비전(rev+1) 로 복제 · 원본 비활성">${ico('plus')}리비전 올리기</button>` : ''}
        <button class="btn primary" id="mi-save">${ico('save')}저장</button>
      </div>
    </div>
  `);

  // ★ v0.20.4 — CT ↔ uph 상호 자동 (저장은 CT 기준 · uph 는 표시 파생)
  document.querySelectorAll('.mi-ct').forEach(el => {
    el.oninput = () => {
      const proc = el.dataset.proc;
      const uphEl = document.querySelector(`.mi-uph[data-proc="${proc}"]`);
      const v = +el.value;
      if(uphEl) uphEl.value = v>0 ? Math.round(3600/v) : '';
    };
  });
  document.querySelectorAll('.mi-uph').forEach(el => {
    el.oninput = () => {
      const proc = el.dataset.proc;
      const ctEl = document.querySelector(`.mi-ct[data-proc="${proc}"]`);
      const v = +el.value;
      // 반올림 표시 — 저장은 ct 값이 근원. uph 입력 시 ct = 3600/uph (소수 2자리)
      if(ctEl) ctEl.value = v>0 ? Math.round((3600/v)*100)/100 : '';
    };
  });

  // ★ v0.26.0 — 고객사 선택 시 식별번호 자동 채번 (수정 가능) · 금형번호 제안
  const _syncId = () => {
    if(!isNew) return;
    const cref = document.getElementById('mi-cref').value;
    const rev = +document.getElementById('mi-rev').value || 0;
    if(!cref) return;
    const codeEl = document.getElementById('mi-code');
    const moldEl = document.getElementById('mi-moldno');
    // 사용자가 수동 편집 안 했으면 채번 갱신
    const auto = codeEl.value === '' || isItemIdentifier(codeEl.value);
    if(auto){
      const seq = nextItemSeqForCustomer(cref);
      codeEl.value = makeItemIdentifier(cref, seq, rev);
      if(!moldEl.value || /^[A-Za-z0-9]{1,4}-\d{3}$/.test(moldEl.value)){
        moldEl.value = `${cref}-${String(seq).padStart(3,'0')}`;
      }
    }
  };
  const crefEl = document.getElementById('mi-cref');
  if(crefEl) crefEl.onchange = _syncId;
  const revEl = document.getElementById('mi-rev');
  if(revEl) revEl.oninput = _syncId;
  if(isNew) _syncId();

  // ★ v0.26.0 — 계산 필드 자동 (절단대비·제품대비 원/kg · 반올림 정수 · 값 없으면 —)
  const _refreshRates = () => {
    const priceV = +document.getElementById('mi-price').value || 0;
    const cutG = +document.getElementById('mi-cutg').value || 0;
    const prodG = +document.getElementById('mi-prodg').value || 0;
    const cr = (cutG && priceV) ? Math.round(priceV / (cutG/1000)) : null;
    const pr = (prodG && priceV) ? Math.round(priceV / (prodG/1000)) : null;
    document.getElementById('mi-cutRate').value  = cr==null ? '—' : cr.toLocaleString();
    document.getElementById('mi-prodRate').value = pr==null ? '—' : pr.toLocaleString();
  };
  ['mi-price','mi-cutg','mi-prodg'].forEach(id => {
    const el = document.getElementById(id); if(el) el.oninput = _refreshRates;
  });

  // ★ v0.26.0 — 리비전 올리기: 현 값 복제 + rev+1 · 원본 비활성 (이력 보존)
  const revUpBtn = document.getElementById('mi-revup');
  if(revUpBtn) revUpBtn.onclick = () => {
    if(!ident) return;
    const newRev = ident.rev + 1;
    const newId  = makeItemIdentifier(ident.cust, ident.seq, newRev);
    if(DB.get('items', newId)){ toast(`리비전 ${newRev} 이미 존재 — ${newId}`,'err'); return; }
    const clone = { ...it, code:newId, rev:newRev, active:true, previous_rev: it.code, ts: Date.now() };
    DB.set('items', newId, clone);
    DB.set('items', it.code, { active:false });
    toast(`리비전 복제 — ${newId} (원본 ${it.code} 비활성)`, 'ok', 3000);
    closeModal(); router();
  };

  document.getElementById('mi-save').onclick = () => {
    const codeInput = document.getElementById('mi-code').value.trim();
    const legacy = document.getElementById('mi-legacy').value.trim();
    const code   = codeInput || legacy;
    const name   = document.getElementById('mi-name').value.trim();
    const cref   = document.getElementById('mi-cref').value;
    const mat    = document.getElementById('mi-mat').value.trim();
    const dia    = +document.getElementById('mi-dia').value || 0;
    const rev    = +document.getElementById('mi-rev').value || 0;
    const cutG   = +document.getElementById('mi-cutg').value || 0;
    const prodG  = +document.getElementById('mi-prodg').value || 0;
    const price  = +document.getElementById('mi-price').value || 0;
    const cav    = Math.max(1, +document.getElementById('mi-cav').value || 1);
    const moldNo = document.getElementById('mi-moldno').value.trim();
    const forgeEq= document.getElementById('mi-forgeeq').value;
    const packRaw = document.getElementById('mi-pack').value.trim();
    const pack_qty = packRaw==='' ? null : (+packRaw>0 ? Math.floor(+packRaw) : null);
    if(!code){ toast('식별번호 또는 품번 입력','warn'); return; }
    if(!name){ toast('품명 입력','warn'); return; }
    if(isNew && DB.get('items', code)){ toast(`코드 중복 — ${code} 이미 존재`,'err'); return; }
    // weight(kg) = 절단 중량(g) / 1000  · 단일 필드 원칙(G2 · B5)
    const weight = cutG ? (cutG/1000) : (+it.weight||0);
    // ★ v0.20.4 — 공정별 CT 병합 (라우트에 없는 기존 공정 값 보존 · 빈칸=해당 공정 제거)
    const nextPt = { ...(it.proc_times || {}) };
    document.querySelectorAll('.mi-ct').forEach(el => {
      const proc = el.dataset.proc;
      const v = +el.value;
      if(v > 0) nextPt[proc] = { ct: v };
      else delete nextPt[proc];
    });
    const custom = readCustomFieldsInputs('items');
    // 하위 호환: cust(vendors 코드) 는 customer_ref → migrated_from_vendor 로 채움
    const custVendor = cref ? (DB.get('customers', cref)?.migrated_from_vendor || '') : (it.cust||'');
    const doc = isNew
      ? { code, name, cust: custVendor, customer_ref: cref, rev,
          mat, dia, weight, product_weight_g: prodG, price, cav, cav_source:'manual',
          mold_no: moldNo, default_forge_eq: forgeEq,
          pack_qty, proc_times: nextPt, custom, active:true }
      : { name, cust: custVendor, customer_ref: cref, rev,
          mat, dia, weight, product_weight_g: prodG, price, cav, cav_source:'manual',
          mold_no: moldNo, default_forge_eq: forgeEq,
          pack_qty, proc_times: nextPt, custom };
    DB.set('items', code, doc);
    toast(isNew?`품번 등록 — ${code}`:`품번 수정 — ${code}`,'ok');
    closeModal(); router();
  };
};

/* 품번 비활성/재활성 */
VIEWS._mstItemToggle = (code) => {
  const it = DB.get('items', code); if(!it) return;
  const wasActive = it.active !== false;

  toast(wasActive ? `${it.code} 비활성` : `${it.code} 재활성`, wasActive ? 'warn' : 'ok');
  router();
};

/* ★ v0.26.0 — 고객사 등록·수정 모달 (customers 컬렉션 · code 1~4자 · 정의 필드) */
VIEWS._mstCustomerEdit = (code) => {

    ? { code:'', name:'', contact:'', phone:'', memo:'', custom:{}, active:true }

  openModal(`
    <h2>${isNew ? '고객사 등록' : '고객사 수정'} <button class="x" onclick="closeModal()">${ico('x')}</button></h2>
    <div class="body">
      <div class="grid g2">
        <div><label>고객코드 ${isNew?'<span style="color:var(--dim);font-weight:400">— 자동 · 수동 수정 허용 · 영숫자 1~4자</span>':'<span style="color:var(--dim);font-weight:400">— 불변</span>'}</label>

      </div>
      <div class="grid g2">
        <div><label>담당자 (선택)</label><input id="mc-contact" value="${_esc(c.contact||'')}" placeholder="예: 홍길동"></div>
        <div><label>전화 (선택)</label><input id="mc-phone" value="${_esc(c.phone||'')}" placeholder="예: 055-000-0000"></div>
      </div>
      <div><label>메모 (선택)</label><input id="mc-memo" value="${_esc(c.memo||'')}"></div>
      ${renderCustomFields('customers', c.custom, 'form')}
      <div class="actions">
        <button class="btn" onclick="closeModal()">취소</button>
        <button class="btn primary" id="mc-save">${ico('save')}저장</button>
      </div>
    </div>
  `);
  document.getElementById('mc-save').onclick = () => {
    const codeIn = document.getElementById('mc-code').value.trim().toUpperCase();
    const name   = document.getElementById('mc-name').value.trim();
    if(!isValidCustomerCode(codeIn)){ toast('고객코드는 영숫자 1~4자','err'); return; }
    if(!name){ toast('이름 입력','warn'); return; }
    if(isNew && DB.get('customers', codeIn)){ toast(`코드 중복 — ${codeIn} 이미 존재`,'err'); return; }

    } : {

    closeModal(); router();
  };
};
VIEWS._mstCustomerToggle = (code) => {
  const c = DB.get('customers', code); if(!c) return;
  const wasActive = c.active !== false && !c.void;
  DB.set('customers', code, { active: !wasActive, void: wasActive ? { ts:Date.now(), by:SESSION.user||'system', reason:'비활성' } : null });

};

/* ★ v0.26.0 — 사용자 정의 필드 관리 모달 (master_fields · items/customers/molds 공용) */
VIEWS._mstFieldsEdit = (master) => {
  const label = _MASTER_FIELD_MASTERS[master] || master;
  const fields = getMasterFieldsAll(master);
  openModal(`
    <h2>${_esc(label)} — 사용자 정의 필드 관리 <button class="x" onclick="closeModal()">${ico('x')}</button></h2>
    <div class="body">
      <div style="font-size:11.5px;color:var(--sub);line-height:1.7;margin-bottom:10px">
        여기 정의된 필드는 <b class="c">${_esc(label)} 등록 폼·목록·검색·엑셀·임포트 템플릿</b>에 자동 반영됩니다.
        <br>비활성 시 데이터는 <b style="color:var(--amber)">보존</b>(void 원칙 · 삭제 없음).
      </div>
      <div class="tbl-wrap"><table>
        <thead><tr><th>순서</th><th>라벨</th><th>유형</th><th>단위</th><th>옵션(select)</th><th>상태</th><th></th></tr></thead>
        <tbody>${fields.length ? fields.map(f => {
          const active = f.active !== false;
          const opts = (f.type==='select' && Array.isArray(f.options)) ? f.options.join(', ') : '—';
          return `<tr class="${active?'':'mst-off'}">
            <td class="mono num">${f.order||''}</td>
            <td><b>${_esc(f.label||f.key)}</b> <span style="color:var(--dim);font-size:10px">${_esc(f.key)}</span></td>
            <td>${_esc(f.type||'text')}</td>
            <td>${_esc(f.unit||'—')}</td>
            <td class="muted" style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${_esc(opts)}</td>
            <td>${active ? '<span class="pill cyan">사용중</span>' : '<span class="pill gray">비활성</span>'}</td>
            <td><div style="display:flex;gap:6px;justify-content:flex-end">
              <button class="btn ghost" data-mfedit="${_esc(f.id)}">수정</button>
              <button class="btn ghost" data-mftoggle="${_esc(f.id)}">${active?'비활성':'재활성'}</button>
            </div></td>
          </tr>`;
        }).join('') : '<tr><td colspan="7" class="empty">정의 필드 없음 — [필드 추가]로 이 업체 필드를 추가</td></tr>'}</tbody>
      </table></div>
      <div class="actions">
        <button class="btn" onclick="closeModal()">닫기</button>
        <button class="btn primary" id="mf-new">${ico('plus')}필드 추가</button>
      </div>
    </div>
  `);
  document.getElementById('mf-new').onclick = () => VIEWS._mstFieldEdit(master, null);
  document.querySelectorAll('[data-mfedit]').forEach(b => b.onclick = () => VIEWS._mstFieldEdit(master, b.dataset.mfedit));
  document.querySelectorAll('[data-mftoggle]').forEach(b => b.onclick = () => {
    const f = DB.get('master_fields', b.dataset.mftoggle); if(!f) return;
    const wasActive = f.active !== false;
    DB.set('master_fields', f.id, { active: !wasActive });
    toast(wasActive ? `${f.label||f.key} 비활성` : `${f.label||f.key} 재활성`, wasActive ? 'warn' : 'ok');
    VIEWS._mstFieldsEdit(master);
  });
};
VIEWS._mstFieldEdit = (master, id) => {
  const isNew = !id;
  const f = isNew
    ? { id:'', master, key:'', label:'', type:'text', unit:'', options:[], order:nextMasterFieldOrder(master), active:true }
    : DB.get('master_fields', id);
  if(!isNew && !f){ toast('필드 없음','err'); return; }
  openModal(`
    <h2>${isNew ? '필드 추가' : '필드 수정'} — ${_esc(_MASTER_FIELD_MASTERS[master]||master)} <button class="x" onclick="closeModal()">${ico('x')}</button></h2>
    <div class="body">
      <div class="grid g2">
        <div><label>라벨</label><input id="mf-label" value="${_esc(f.label||'')}" placeholder="예: 차종"></div>
        <div><label>유형</label>
          <select id="mf-type">
            <option value="text"   ${f.type==='text'?'selected':''}>텍스트</option>
            <option value="number" ${f.type==='number'?'selected':''}>숫자</option>
            <option value="date"   ${f.type==='date'?'selected':''}>날짜</option>
            <option value="select" ${f.type==='select'?'selected':''}>선택(옵션)</option>
          </select>
        </div>
      </div>
      <div class="grid g2">
        <div><label>단위 (선택 · 숫자형에 표시)</label><input id="mf-unit" value="${_esc(f.unit||'')}" placeholder="예: ℃ · mm · HB"></div>
        <div><label>순서</label><input id="mf-order" type="number" min="0" step="1" value="${f.order||0}"></div>
      </div>
      <div id="mf-opts-wrap" style="${f.type==='select'?'':'display:none'}">
        <label>옵션 (콤마 구분 · select 형 전용)</label>

        <button class="btn primary" id="mf-save">${ico('save')}저장</button>
      </div>
    </div>
  `);
  document.getElementById('mf-type').onchange = (e) => {
    document.getElementById('mf-opts-wrap').style.display = e.target.value === 'select' ? '' : 'none';
  };
  document.getElementById('mf-save').onclick = () => {
    const label = document.getElementById('mf-label').value.trim();
    const type  = document.getElementById('mf-type').value;
    const unit  = document.getElementById('mf-unit').value.trim();
    const order = +document.getElementById('mf-order').value || 0;
    if(!label){ toast('라벨 입력','warn'); return; }
    let options = [];
    if(type === 'select'){
      options = document.getElementById('mf-opts').value.split(',').map(s=>s.trim()).filter(Boolean);
      if(!options.length){ toast('select 형은 옵션 1개 이상','warn'); return; }
    }
    const key = f.key || _mfSlug(label);
    const finalId = isNew ? nextMasterFieldId(master) : f.id;

      ? { id:finalId, master, key, label, type, unit, options, order, active:true }
      : { label, type, unit, options, order };
    DB.set('master_fields', finalId, doc);

/* ★ v0.26.0 — 엑셀 임포트 모달 (품목·고객사 공용 · 원장 문서 생성 금지) */

          <input type="file" id="imp-file" accept=".xlsx,.xls" style="display:none">

        <span id="imp-fname" style="font-size:11px;color:var(--dim);align-self:center">파일 미선택</span>
      </div>
      <div id="imp-preview" style="max-height:340px;overflow:auto;border:1px solid var(--line);border-radius:8px;padding:6px 8px;background:var(--bg2)">
        <div class="empty" style="padding:20px;color:var(--dim);text-align:center">파일을 선택하면 미리보기가 표시됩니다.</div>
      </div>
      <div class="actions">
        <button class="btn" onclick="closeModal()">취소</button>
        <button class="btn primary" id="imp-apply" disabled>0건 등록</button>
      </div>
    </div>
  `);
  document.getElementById('imp-tpl').onclick = () => {
    const rows = [_importerTemplateRow(master)];
    exportXlsx(rows, label, `${label}_템플릿_${fmtDate(Date.now())}.xlsx`);
  };
  const fileEl = document.getElementById('imp-file');
  fileEl.onchange = (e) => {
    const f = e.target.files && e.target.files[0];
    if(!f) return;
    document.getElementById('imp-fname').textContent = f.name;
    window._importState[master].filename = f.name;
    if(!window.XLSX){ toast('엑셀 라이브러리 로딩 중','warn'); return; }
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const wb = XLSX.read(ev.target.result, { type:'array' });
        const ws = wb.Sheets[wb.SheetNames[0]];
        const rawRows = XLSX.utils.sheet_to_json(ws, { defval:'' });
        _importRenderPreview(master, rawRows);
      } catch(err){
        toast('파싱 실패 · ' + err.message,'err');
      }
    };
    reader.readAsArrayBuffer(f);
  };
  document.getElementById('imp-apply').onclick = () => {
    const st = window._importState[master];
    const okRows = st.parsed.filter(x => x.judge.ok);
    if(!okRows.length){ toast('등록 가능한 행이 없음','warn'); return; }
    let added = 0, skipped = 0;
    st.parsed.forEach(x => {
      if(x.judge.ok){
        try { _importApplyRow(master, x.parsed); added++; }
        catch(e){ skipped++; console.warn('[VELA] import apply failed', e); }
      } else skipped++;
    });
    recordImportLog(master, st.filename, st.parsed.length, added, skipped);
    toast(`임포트 완료 — 성공 ${added}건 · 제외 ${skipped}건`, 'ok', 3200);
    closeModal(); router();
  };
};
function _importRenderPreview(master, rawRows){
  const cols = _importerColumns(master);
  const parsed = rawRows.map(r => {
    const p = _parseImportRow(master, r);
    return { raw:r, parsed:p, judge: _importJudgeRow(master, p) };
  });
  window._importState[master].parsed = parsed;
  const okCount = parsed.filter(x => x.judge.ok).length;
  const skipCount = parsed.length - okCount;
  const wrap = document.getElementById('imp-preview');
  const showCols = cols.slice(0, 6);
  wrap.innerHTML = `
    <div style="font-size:11px;color:var(--sub);margin:4px 0 8px">
      ${parsed.length}건 중 <span style="color:var(--green)">${okCount}건 등록 가능</span> · <span style="color:var(--red)">${skipCount}건 제외</span>
    </div>
    <table style="width:100%;font-size:11.5px">
      <thead><tr><th style="width:18px"></th>${showCols.map(c=>`<th>${_esc(c.label)}</th>`).join('')}<th>판정</th></tr></thead>
      <tbody>${parsed.map((x,i) => {
        const cls = x.judge.ok ? 'ok' : 'err';
        return `<tr>
          <td class="${cls}" style="text-align:center">${x.judge.ok?'✓':'✗'}</td>
          ${showCols.map(c => `<td class="muted">${_esc(x.raw[c.label]==null?'':String(x.raw[c.label]))}</td>`).join('')}
          <td class="${cls}">${_esc(x.judge.reason)}</td>
        </tr>`;
      }).join('')}</tbody>
    </table>
  `;
  const applyBtn = document.getElementById('imp-apply');
  applyBtn.disabled = okCount === 0;
  applyBtn.textContent = `${okCount}건 등록`;
}

/* -------------------- 마감 (v0.16.26) --------------------
   유형 탭 [매출|매입|외주] + 월 선택 · 거래처별 표 (전월이월/발생/결제 수기/차월이월 자동)
   · 발생액 = calcClosing 재사용 (신규 계산 금지) · 결제(paid) 만 수기
   · 전월 이월 = 전월 확정 마감의 rows[party].carry (없으면 0 · 도입 첫 달 startBalance 수기 허용)
   · 확정 → closings 저장, 재마감 시 void:null 로 덮어 씀
   · 마감 취소 = voidDoc · 후속 월(같은 유형)에 확정 마감 있으면 차단 */
VIEWS.closing = () => {
  const flags = getFlags();
  if(!flags.closing){
    document.getElementById('view').innerHTML = `<div class="card">마감 모듈 OFF — 설정 → 기능 플래그에서 켜세요.</div>`;
    return;
  }
  const _now = new Date();
  const _thisMonth = `${_now.getFullYear()}-${String(_now.getMonth()+1).padStart(2,'0')}`;
  const state = (window._closingState = window._closingState || { type:'sales', month:_thisMonth, paidDraft:{}, startDraft:{} });
  // 유형·월 변경 시 draft 초기화 (직전 상태를 다음 세션에 흘리지 않음)
  if(state._key !== `${state.type}|${state.month}`){
    state._key = `${state.type}|${state.month}`;
    state.paidDraft = {};
    state.startDraft = {};
  }
  const typeLabels = { sales:'매출 (받을 돈)', purchase:'매입 (줄 돈)', outsource:'외주 (줄 돈)' };
  const typePartyLabel = state.type==='sales' ? '거래처(고객)' : '거래처(공급처/외주처)';

  // 월 옵션 = 과거 데이터 있는 달 + 이번 달 + 마감 이력 있는 달 (내림차순)
  const monthSet = new Set([_thisMonth, state.month]);
  const scanTs = (col) => DB.all(col).forEach(x => {
    if(x.ts){ const d = new Date(x.ts); monthSet.add(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`); }
  });
  scanTs('shipments'); scanTs('material_receipts'); scanTs('purchase_receipts'); scanTs('os_receipts');
  DB.all('closings').forEach(c => { if(c.month) monthSet.add(c.month); });
  const monthOpts = [...monthSet].sort().reverse();

  // 발생액 (calcClosing 재사용) · v0.16.27 — 귀속 월(cl_month) 기준 + 유출/유입 카운트
  const { byParty, missingCount, outflow, inflow } = calcClosing(state.type, state.month);

  // 전월 확정 마감 조회 → prev
  const prevMonth = _monthAdd(state.month, -1);
  const prevClosing = getClosing(state.type, prevMonth);
  const prevMap = {};
  if(prevClosing){
    (prevClosing.rows||[]).forEach(r => { prevMap[r.party] = +r.carry||0; });
  }
  // 도입 첫 달 (전월 마감 없음 && 아무 이전 마감도 없음) → startBalance 수기 허용
  const firstEver = !DB.all('closings').some(c => c.type===state.type && String(c.month) < state.month);
  const allowStart = !prevClosing && firstEver;

  // 현재 월 확정 마감 (있으면 read-only 표시)
  const currentClosing = getClosing(state.type, state.month);
  const isClosed = !!currentClosing;

  // 표에 표시할 party set (당월 발생 + 전월 carry 잔액자)
  const partySet = new Set(Object.keys(byParty));
  Object.keys(prevMap).forEach(p => { if((+prevMap[p]||0) !== 0) partySet.add(p); });
  // 확정 마감 있으면 저장된 rows 우선 (그 시점의 스냅샷 표시)
  const displayParties = isClosed
    ? (currentClosing.rows||[]).map(r => r.party)
    : [...partySet].sort((a,b)=>{
        const an = DB.get('vendors', a)?.name || a;
        const bn = DB.get('vendors', b)?.name || b;
        return an.localeCompare(bn);
      });

  // 행 계산 함수 (닫혔으면 저장값, 아니면 라이브 계산)
  function rowFor(party){
    if(isClosed){
      const r = (currentClosing.rows||[]).find(x => x.party === party) || { party, prev:0, amount:0, paid:0, carry:0 };
      return r;
    }
    const prev = prevMap[party] != null ? +prevMap[party] : (allowStart ? (+state.startDraft[party]||0) : 0);
    const amount = byParty[party]?.amount || 0;
    const paid = +state.paidDraft[party]||0;
    return { party, prev, amount, paid, carry: prev + amount - paid };
  }
  const rows = displayParties.map(rowFor);
  const totals = rows.reduce((t,r)=>({
    prev:t.prev+(+r.prev||0), amount:t.amount+(+r.amount||0),
    paid:t.paid+(+r.paid||0), carry:t.carry+(+r.carry||0)
  }), {prev:0, amount:0, paid:0, carry:0});

  const fmtN = n => Math.round(+n||0).toLocaleString();
  const carryClass = n => (n>0 ? 'style="color:var(--amber);font-weight:700"' : (n<0 ? 'style="color:var(--red);font-weight:700"' : 'style="color:var(--dim)"'));

  // 마감 이력 (모든 유형 · 최신순)
  const historyRaw = DB.allRaw('closings').filter(c => c.id && c.type && c.month).sort((a,b)=>{
    if(a.month !== b.month) return a.month < b.month ? 1 : -1;
    return String(a.type).localeCompare(String(b.type));
  });

  document.getElementById('view').innerHTML = `
    <div class="pghead">
      <div class="pgtitle"><svg class="ic" viewBox="0 0 24 24">${pgIcon('closing')}</svg>마감 <span class="pill cyan">${APP_VERSION} · 매출·매입·외주</span></div>
      <div class="pgtools">
        <button class="btn" id="cl-xlsx">${ico('excel')}엑셀</button>
        ${isClosed
          ? `<span class="pill green" style="align-self:center">${state.month} ${typeLabels[state.type].split(' ')[0]} · 마감 완료</span>`
          : `<button class="btn primary" id="cl-confirm" ${rows.length===0 && !allowStart ? 'disabled' : ''}>${ico('save')}${state.month} ${typeLabels[state.type].split(' ')[0]} 마감 확정</button>`
        }
      </div>
    </div>

    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:10px">
        <div style="display:flex;gap:6px">
          ${['sales','purchase','outsource'].map(t=>`
            <button class="btn ${state.type===t?'primary':''}" data-cl-tab="${t}">${typeLabels[t]}</button>
          `).join('')}
        </div>
        <div style="display:flex;gap:8px;align-items:center">
          <label style="font-size:11px;color:var(--sub);font-weight:600">마감월</label>
          <select id="cl-month" style="width:140px">${monthOpts.map(m=>`<option value="${m}" ${m===state.month?'selected':''}>${m}</option>`).join('')}</select>
        </div>
      </div>

      <div class="tbl-wrap"><table>
        <thead><tr>
          <th>${typePartyLabel}</th>
          <th class="num">전월 이월 ${allowStart?'<span style="font-size:9px;color:var(--amber)">(첫 달 · 수기)</span>':'<span style="font-size:9px;color:var(--dim)">(자동)</span>'}</th>
          <th class="num">당월 발생 <span style="font-size:9px;color:var(--dim)">(자동)</span></th>
          <th class="num">당월 결제 <span style="font-size:9px;color:var(--cyan)">(수기)</span></th>
          <th class="num">차월 이월 <span style="font-size:9px;color:var(--dim)">(자동)</span></th>
        </tr></thead>
        <tbody>
        ${rows.length ? rows.map(r=>{
          const name = _esc(DB.get('vendors', r.party)?.name || r.party);
          const prevCell = isClosed
            ? `<span class="mono">${fmtN(r.prev)}</span>`
            : (allowStart
                ? `<input data-cl-start="${_esc(r.party)}" type="number" step="1" value="${(+state.startDraft[r.party]||0)}" style="width:110px;text-align:right;font-family:'JetBrains Mono',monospace;padding:6px 9px">`
                : `<span class="mono">${fmtN(r.prev)}</span>`);
          const paidCell = isClosed
            ? `<span class="mono">${fmtN(r.paid)}</span>`
            : `<input data-cl-paid="${_esc(r.party)}" type="number" step="1" value="${(+state.paidDraft[r.party]||0)}" style="width:110px;text-align:right;font-family:'JetBrains Mono',monospace;padding:6px 9px">`;
          return `<tr>
            <td><b>${name}</b>${r.party==='미지정'?' <span class="pill gray" style="font-size:9px">미지정</span>':''}</td>
            <td class="num mono">${prevCell}</td>
            <td class="num mono">${fmtN(r.amount)}</td>
            <td class="num">${paidCell}</td>
            <td class="num mono" ${carryClass(r.carry)}>${fmtN(r.carry)}</td>
          </tr>`;

    document.getElementById('cl-void-ok').onclick = () => {

  // 마감 확정
  const clConfirm = document.getElementById('cl-confirm');
  if(clConfirm){
    clConfirm.onclick = () => {
      // rows·totals 확정 스냅샷 (rowFor 는 상단 계산과 동일 · 재사용)

      const finalTotals = finalRows.reduce((t,r)=>({

      const id = _closingId(state.type, state.month);

  // 엑셀

    exportXlsx(xrows, `마감_${state.month}_${label}`, `마감_${state.month}_${label}.xlsx`);

// 부서 배지 · 태그

// 원 (₩) 표기 헬퍼
function _wKr(v){ return '₩' + Math.round(+v||0).toLocaleString(); }

// buildReportData(scope, baseDate) — 기존 헬퍼 재사용만 · 새 집계·판정 금지
function buildReportData(scope, baseDate){
  scope = (scope === 'week' || scope === 'month') ? scope : 'day';
  baseDate = baseDate || fmtDate(Date.now());
  const dt = new Date(baseDate + 'T00:00:00');

  // 기간 산정 (day/week/month)
  let start, end, label, days;
  if(scope === 'day'){
    start = end = baseDate;
    label = baseDate;
    days = [baseDate];
  } else if(scope === 'week'){
    const day = dt.getDay();
    const monOffset = day === 0 ? -6 : (1 - day);
    const mon = new Date(dt); mon.setDate(dt.getDate() + monOffset);
    days = [];
    for(let i=0;i<7;i++){ const d = new Date(mon); d.setDate(mon.getDate()+i); days.push(fmtDate(d.getTime())); }
    start = days[0]; end = days[6]; label = `${start} ~ ${end}`;
  } else {
    const y = dt.getFullYear(), m = dt.getMonth();
    const first = new Date(y, m, 1);
    const last  = new Date(y, m+1, 0);
    days = [];
    for(let i=1;i<=last.getDate();i++){ days.push(fmtDate(new Date(y, m, i).getTime())); }
    start = days[0]; end = days[days.length-1]; label = `${y}-${String(m+1).padStart(2,'0')}`;
  }
  const startTs = new Date(start + 'T00:00:00').getTime();
  const endTs   = new Date(end   + 'T23:59:59').getTime();
  const month = `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}`;

  // ─── 생산부 (getLivePlans + calcPlanProgress + records) ───
  const plansInPeriod = getLivePlans().filter(p => p.date >= start && p.date <= end);
  let planQty = 0, actual = 0;
  plansInPeriod.forEach(p => {
    const pr = calcPlanProgress(p);
    planQty += (+p.qty||0);
    actual  += pr.actual;
  });
  const pct = planQty > 0 ? Math.min(100, actual/planQty*100) : 0;
  const activeLotSet = new Set();
  DB.query('records', r => r.ts >= startTs && r.ts <= endTs).forEach(r => { if(r.plot_no) activeLotSet.add(r.plot_no); });
  const activeLots = activeLotSet.size;
  // 설비별 실적 (records · 기간 내 양품 합) + 대표일 부하율 (calcDayLoad 재사용)
  const eqActualMap = {};
  DB.query('records', r => r.ts >= startTs && r.ts <= endTs && r.equipment).forEach(r => {
    eqActualMap[r.equipment] = (eqActualMap[r.equipment]||0) + (+r.good||0);
  });
  const byEquipment = Object.entries(eqActualMap)
    .map(([name, act]) => {
      const ld = calcDayLoad(baseDate, name);
      return { name, actual: act, loadPct: +(ld.pct||0).toFixed(1) };
    })
    .sort((a,b) => b.actual - a.actual)
    .slice(0, 5);

  // ─── 영업부 (orders + shipments + shipAmount) ───
  const ordersInPeriod = DB.query('orders', o => (o.ts||0) >= startTs && (o.ts||0) <= endTs);
  const newOrders = ordersInPeriod.length;
  const shipsInPeriod = DB.query('shipments', s => s.ts >= startTs && s.ts <= endTs);
  const shipped = shipsInPeriod.reduce((s,r)=>s+(+r.qty||0), 0);
  const revenue = shipsInPeriod.reduce((s,r)=>s+shipAmount(r), 0);
  let backlog = 0;
  DB.all('orders').forEach(o => {
    const sQty = DB.query('shipments', x => x.so_id === o.id).reduce((sum,r)=>sum+(+r.qty||0), 0);
    backlog += Math.max(0, (+o.qty||0) - sQty);
  });
  const custMap = {};
  shipsInPeriod.forEach(sh => {
    const so = DB.get('orders', sh.so_id);
    const cust = so?.cust || '미지정';
    const cx = custMap[cust] = custMap[cust] || { cust, revenue:0, backlog:0, nextDue:'' };
    cx.revenue += shipAmount(sh);
  });
  DB.all('orders').forEach(o => {
    const sQty = DB.query('shipments', x => x.so_id === o.id).reduce((sum,r)=>sum+(+r.qty||0), 0);
    const remain = Math.max(0, (+o.qty||0) - sQty);
    if(remain <= 0) return;
    const cust = o.cust || '미지정';
    const cx = custMap[cust] = custMap[cust] || { cust, revenue:0, backlog:0, nextDue:'' };
    cx.backlog += remain;
    if(o.due && (!cx.nextDue || o.due < cx.nextDue)) cx.nextDue = o.due;
  });
  const byCustomer = Object.values(custMap)
    .map(c => ({ ...c, name: DB.get('vendors', c.cust)?.name || c.cust }))
    .sort((a,b) => b.revenue - a.revenue)
    .slice(0, 5);

  // ─── 구매·자재 (material_receipts + calcClosing purchase/outsource + calcHeatLedger) ───
  const matRecs = DB.query('material_receipts', r => r.ts >= startTs && r.ts <= endTs);
  const matInKg = matRecs.reduce((s,r)=>s+(+r.kg||0), 0);
  const purcClose = calcClosing('purchase', month);
  const purchaseAmount = Object.values(purcClose.byParty).reduce((s,g)=>s+(g.amount||0), 0);
  const osClose = calcClosing('outsource', month);
  const osCost = Object.values(osClose.byParty).reduce((s,g)=>s+(g.amount||0), 0);
  const osActiveDispatch = DB.query('os_dispatches', d => d.ts >= startTs && d.ts <= endTs)
    .filter(d => !DB.query('os_receipts', r => r.dispatch_id === d.id).length).length;
  const { ledger } = calcHeatLedger();
  const matSummary = {};
  Object.values(ledger).forEach(h => {
    if(!h.mat) return;
    const m = matSummary[h.mat] = matSummary[h.mat] || { mat:h.mat, remain:0, used:0 };
    m.remain += Math.max(0, h.remain);
  });
  plansInPeriod.forEach(p => {
    const it = DB.get('items', p.itemCode);
    if(!it || !it.mat || !it.weight) return;
    const m = matSummary[it.mat] = matSummary[it.mat] || { mat:it.mat, remain:0, used:0 };
    m.used += (+p.qty||0) * (+it.weight||0);
  });
  const byMaterial = Object.values(matSummary)
    .filter(m => m.remain > 0 || m.used > 0)
    .sort((a,b) => b.used - a.used)
    .slice(0, 5)
    .map(m => ({ ...m, short: m.used > m.remain }));

  // ─── 품질 (records 기간 합) ───
  const recsInPeriod = DB.query('records', r => r.ts >= startTs && r.ts <= endTs);
  const totalIn = recsInPeriod.reduce((s,r)=>s+(+r.good||0)+(+r.defect||0)+(+r.scrap||0)+(+r.rework||0), 0);
  const defectQty = recsInPeriod.reduce((s,r)=>s+(+r.defect||0)+(+r.scrap||0), 0);
  const defectRate = totalIn > 0 ? (defectQty/totalIn*100) : 0;
  // 중단(stop) 이력 : records.type === 'stop' (기존 필드) — 없으면 0
  const stopCount = DB.query('records', r => r.ts >= startTs && r.ts <= endTs && (r.type === 'stop' || r.stopReason)).length;
  // ★ v0.25.0 — NC(부적합) 집계 — qc ON 시만 (OFF 시 0 · 보고서 무영향)
  const _qcOnRep = !!getFlags().qc;
  let ncCount = 0, ncWaiting = 0, ncTopTypes = [];
  if(_qcOnRep){
    const ncsInPeriod = DB.query('nc_records', n => n.ts >= startTs && n.ts <= endTs);
    ncCount = ncsInPeriod.length;
    ncWaiting = ncsInPeriod.filter(n => n.status === '접수').length;
    const typeMap = {};
    ncsInPeriod.forEach(n => {
      const key = n.defect_type;
      if(!typeMap[key]) typeMap[key] = { name: DB.get('defect_types', key)?.name || key, qty:0, count:0 };
      typeMap[key].qty   += (+n.qty||0);
      typeMap[key].count += 1;
    });
    ncTopTypes = Object.values(typeMap).sort((a,b) => b.qty - a.qty).slice(0, 3);
  }

  // ─── 경영·정산 (calcClosing sales + getClosing carry) ───
  const salesClose = calcClosing('sales', month);
  const salesClosing = Object.values(salesClose.byParty).reduce((s,g)=>s+(g.amount||0), 0);
  const salesClosed = getClosing('sales', month);
  const unpaid = salesClosed
    ? (salesClosed.rows||[]).reduce((s,r)=>s+Math.max(0, +r.carry||0), 0)
    : null;
  const purcClosed = getClosing('purchase', month);
  const osClosed   = getClosing('outsource', month);
  const unpayable = (purcClosed || osClosed)
    ? ((purcClosed?.rows||[]).reduce((s,r)=>s+Math.max(0, +r.carry||0), 0) +
       (osClosed?.rows||[]).reduce((s,r)=>s+Math.max(0, +r.carry||0), 0))
    : null;

  // ─── 이슈 수집 (기존 판정만 · 부서 태그) ───
  const issues = [];
  // 소재 부족 (calcPlanMaterial red · 기간 계획 대상 · 재질별 중복 제거)
  const matShortSeen = new Set();
  plansInPeriod.forEach(p => {
    const m = calcPlanMaterial(p);
    if(m && !m.ok && !matShortSeen.has(m.mat)){
      matShortSeen.add(m.mat);
      issues.push({ severity:'red', dept:'pur', text:`${m.mat} 소재 부족 — ${Math.round(m.shortage).toLocaleString()}kg 부족` });
    }
  });
  // 부하 초과 (calcDayLoad pct>100 · 기간 내 계획된 설비 대상)
  const eqSet = new Set(plansInPeriod.map(p => p.equipment).filter(Boolean));
  const eqOverSeen = new Set();
  days.forEach(d => {
    eqSet.forEach(eq => {
      const key = `${eq}|${d}`;
      if(eqOverSeen.has(key)) return;
      const ld = calcDayLoad(d, eq);
      if(ld.pct > 100){
        eqOverSeen.add(key);
        issues.push({ severity:'red', dept:'prod', text:`${eq} ${d} 부하 ${ld.pct.toFixed(0)}% — 초과 ${(ld.usedH-ld.capH).toFixed(1)}h` });
      }
    });
  });
  // 납기 임박 (14일 이내 미완결 SO · D-7 이내 red)
  const todayMs = new Date(fmtDate(Date.now())+'T00:00:00').getTime();
  DB.all('orders').forEach(o => {
    if(!o.due) return;
    const dueMs = new Date(o.due + 'T00:00:00').getTime();
    const dDays = Math.round((dueMs - todayMs)/86400000);
    if(dDays > 14) return;
    const sQty = DB.query('shipments', x => x.so_id === o.id).reduce((sum,r)=>sum+(+r.qty||0), 0);
    const remain = Math.max(0, (+o.qty||0) - sQty);
    if(remain <= 0) return;
    const custName = DB.get('vendors', o.cust)?.name || o.cust || '미지정';
    issues.push({ severity: dDays <= 7 ? 'red' : 'amber', dept:'sales',
      text:`${o.id} ${custName} 납기 ${o.due} (D${dDays<0?'+':'-'}${Math.abs(dDays)}) · 잔량 ${remain.toLocaleString()}` });
  });
  // 마감 carry > 0 · 상위 2건 (유형별)
  ['sales','purchase','outsource'].forEach(type => {
    const cl = getClosing(type, month);
    if(!cl) return;
    (cl.rows||[])
      .filter(r => (+r.carry||0) > 0)
      .sort((a,b) => (+b.carry||0) - (+a.carry||0))
      .slice(0, 2)
      .forEach(r => {
        const partyName = DB.get('vendors', r.party)?.name || r.party;
        const label = type === 'sales' ? '미수' : '미지급';
        issues.push({ severity:'amber', dept:'fin', text:`${partyName} ${label} ${_wKr(+r.carry)}` });
      });
  });
  // ★ v0.25.0 — 부적합 처리 대기 (qc ON · 기간 내 접수 상태 NC · amber · qc 태그)
  if(_qcOnRep && ncWaiting > 0){
    issues.push({ severity:'amber', dept:'qc', text:`부적합 처리 대기 ${ncWaiting}건 — 접수 상태 (품질)` });
  }
  // ★ v0.26.0 — 금형 수명 임박/초과 (파생 표시 계산 · 원장 무변 · 생산부 태그)
  try {
    const moldIssues = getMoldLifeIssues();
    const overCnt = moldIssues.filter(x => x.pct >= 100).length;
    const nearCnt = moldIssues.length - overCnt;
    if(overCnt > 0) issues.push({ severity:'red',   dept:'prod', text:`금형 수명 초과 ${overCnt}건 — 즉시 교체 대상 (파생 표시)` });
    if(nearCnt > 0) issues.push({ severity:'amber', dept:'prod', text:`금형 수명 임박 ${nearCnt}건 — 90% 이상 (파생 표시)` });
  } catch(e){ /* 금형 모듈 OFF/데이터 이상 시 무시 */ }
  // 계획 미발행 임박 (오늘~D+3 · wo_id 없음 · 최대 5건)
  const todayStr = fmtDate(Date.now());
  const nearEnd = new Date(todayStr + 'T00:00:00'); nearEnd.setDate(nearEnd.getDate() + 3);
  const nearEndStr = fmtDate(nearEnd.getTime());
  let unissuedCnt = 0;
  getLivePlans().forEach(p => {
    if(unissuedCnt >= 5) return;
    if(!p.date || p.wo_id) return;
    if(p.date < todayStr || p.date > nearEndStr) return;
    unissuedCnt++;
    issues.push({ severity:'amber', dept:'prod', text:`${p.itemCode} ${p.date} 계획 · 지시 미발행 (${(+p.qty||0).toLocaleString()}ea)` });
  });
  // red 먼저
  issues.sort((a,b) => (a.severity==='red' ? -1 : 1) - (b.severity==='red' ? -1 : 1));

  return {
    scope, baseDate,
    period: { start, end, label, month, days },
    companyKPI: { actual, sales: revenue, purchases: purchaseAmount + osCost, issueCount: issues.length },
    production: { plan: planQty, actual, pct: +pct.toFixed(1), activeLots, byEquipment },
    sales:      { newOrders, shipped, revenue, backlog, byCustomer },
    procurement:{ matInKg, purchaseAmount, osActive: osActiveDispatch, osCost, byMaterial },
    quality:    { defectRate: +defectRate.toFixed(2), defectQty, stopCount, ncCount, ncWaiting, ncTopTypes },
    finance:    { salesClosing, unpaid, unpayable },
    issues,
    ai_summary: null,
  };
}

    router();
  });
  const todayBtn = document.querySelector('[data-rep-today]');
  if(todayBtn) todayBtn.onclick = () => { st.anchor = fmtDate(Date.now()); st.viewSnapshotId = null; router(); };
  const backBtn = document.getElementById('btn-rep-back');
  if(backBtn) backBtn.onclick = () => { st.viewSnapshotId = null; router(); };
  const genBtn = document.getElementById('btn-rep-gen');
  if(genBtn) genBtn.onclick = () => {
    const fresh = buildReportData(st.scope, st.anchor);
    const id = nextDocNo('RP');
    if(DB.get('reports', id)){ toast(`보고서 번호 중복 — ${id}`,'err'); return; }
    DB.set('reports', id, {
      id, scope: fresh.scope, period: fresh.period, data: fresh,
      ts: Date.now(), by: SESSION.user || 'system',
    });
    toast(`보고서 스냅샷 저장 — ${id}`, 'ok');
    router();
  };
  document.querySelectorAll('[data-rep-view]').forEach(b => b.onclick = () => { st.viewSnapshotId = b.dataset.repView; router(); });
  document.querySelectorAll('[data-rep-void]').forEach(b => b.onclick = () => {
    voidDoc('reports', b.dataset.repVoid, '보고서 취소');
    toast('보고서 스냅샷 취소 (원본 보존)','ok');
    if(st.viewSnapshotId === b.dataset.repVoid) st.viewSnapshotId = null;
    router();
  });
  // AI 요약 생성
  const aiBtn = document.getElementById('btn-rep-ai');
  if(aiBtn) aiBtn.onclick = async () => {
    const body = document.getElementById('rep-ai-body');
    if(body) body.innerHTML = '<span style="color:var(--dim)">AI 요약 생성 중…</span>';
    try {
      const summary = await _requestAiBriefing(data);
      if(body) body.innerHTML = `<pre style="white-space:pre-wrap;font-family:inherit;margin:0">${_esc(summary)}</pre>`;
      // 최근 스냅샷에 병합 (있으면) — 라이브에도 반영
      data.ai_summary = summary;
      // 마지막 저장된 이 조건의 스냅샷 찾아 병합 (선택적: 사용자가 [보고서 생성] 후 클릭한 경우 최신 스냅샷)
      const latest = historyRaw.find(r => r.scope === data.scope && r.data?.period?.label === data.period.label);
      if(latest){
        const nd = { ...(latest.data||{}), ai_summary: summary };
        DB.correct('reports', latest.id, { data: nd }, 'AI 요약 병합');
      }
      toast('AI 요약 생성 완료','ok');
    } catch(e){
      if(body) body.innerHTML = `<span style="color:var(--red)">AI 요약 실패 — ${_esc(e.message||'네트워크 오류')}</span> <span style="color:var(--dim);font-size:11px">(보고서 수치는 그대로)</span>`;
    }
  };

  // 엑셀 · 인쇄
  document.getElementById('btn-rep-xlsx').onclick = () => _reportExportXlsx(data);
  document.getElementById('btn-rep-print').onclick = () => _reportPrint(data);
};

// AI 브리핑 요청 — 수치 요약 텍스트 → Anthropic API
async function _requestAiBriefing(data){
  const key = getAiKey();
  if(!key) throw new Error('API 키 없음');
  const p = data.production, s = data.sales, m = data.procurement, q = data.quality, f = data.finance;
  const lines = [];
  lines.push(`[기간] ${data.period.label} · ${_REPORT_TITLES[data.scope]||''}`);
  lines.push(`[전사] 실적 ${p.actual}ea · 매출 ${_wKr(s.revenue)} · 매입+외주 ${_wKr(m.purchaseAmount + m.osCost)} · 이슈 ${data.issues.length}건`);
  lines.push(`[생산] 계획 ${p.plan}ea · 실적 ${p.actual}ea · 달성률 ${p.pct.toFixed(0)}% · 진행 LOT ${p.activeLots}개`);
  if(p.byEquipment.length){
    lines.push(`  · 설비별: ${p.byEquipment.map(e => `${e.name} ${e.actual}(부하 ${e.loadPct.toFixed(0)}%)`).join(', ')}`);
  }
  lines.push(`[영업] 신규 수주 ${s.newOrders}건 · 출하 ${s.shipped}ea · 매출 ${_wKr(s.revenue)} · 잔량 ${s.backlog}ea`);
  if(s.byCustomer.length){
    lines.push(`  · 고객사: ${s.byCustomer.map(c => `${c.name} ${_wKr(c.revenue)}(잔량 ${c.backlog}${c.nextDue?`, 납기 ${c.nextDue}`:''})`).join(', ')}`);
  }
  lines.push(`[구매·자재] 소재 입고 ${Math.round(m.matInKg)}kg · 매입액 ${_wKr(m.purchaseAmount)} · 외주 진행 ${m.osActive}건 · 외주비 ${_wKr(m.osCost)}`);
  if(m.byMaterial.length){
    lines.push(`  · 재질별: ${m.byMaterial.map(x => `${x.mat} 잔량 ${Math.round(x.remain)}kg${x.short?'(부족)':''}, 소요 ${Math.round(x.used)}kg`).join(', ')}`);
  }
  lines.push(`[품질] 불량률 ${q.defectRate.toFixed(2)}% · 불량 ${q.defectQty}ea · 중단 ${q.stopCount}건${((+q.ncCount||0)>0||(+q.ncWaiting||0)>0)?` · 부적합 ${(+q.ncCount||0)}건(대기 ${(+q.ncWaiting||0)})${(q.ncTopTypes&&q.ncTopTypes.length)?` · 상위 ${q.ncTopTypes.map(t=>`${t.name} ${t.qty}ea`).join(', ')}`:''}`:''}`);
  lines.push(`[경영·정산] 마감 매출 ${_wKr(f.salesClosing)} · 미수 ${f.unpaid==null?'미확정':_wKr(f.unpaid)} · 미지급 ${f.unpayable==null?'미확정':_wKr(f.unpayable)}`);
  if(data.issues.length){
    lines.push(`[이슈]`);
    data.issues.slice(0, 12).forEach(iss => { lines.push(`  · [${iss.severity}][${iss.dept}] ${iss.text}`); });
  }
  const summaryText = lines.join('\n');
  const prompt = `아래 제조 현황 수치를 경영 브리핑으로 작성해 주세요.\n\n형식:\n[총평] 1~2 문장\n[생산부] 1~2 문장\n[영업부] 1~2 문장\n[구매·자재] 1~2 문장\n[품질] 1~2 문장\n[경영·정산] 1~2 문장\n\n원칙: 한국어, 과장 금지, 아래 수치만 인용, 데이터에 없는 내용 생성 금지.\n\n${summaryText}`;
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': key,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true',
    },
    body: JSON.stringify({
      model: 'claude-haiku-4-5-20251001',
      max_tokens: 900,
      messages: [{ role:'user', content: prompt }],
    }),
  });
  if(!res.ok){
    let msg = `API 오류 ${res.status}`;
    try { const j = await res.json(); msg += ` · ${j?.error?.message || JSON.stringify(j).slice(0,120)}`; } catch {}
    throw new Error(msg);
  }
  const j = await res.json();
  const text = j?.content?.[0]?.text || '';
  if(!text) throw new Error('빈 응답');
  return text.trim();
}

// 엑셀 — 결재란 자동 적용 (exportXlsx 경유)
function _reportExportXlsx(data){
  const rows = [];
  const t = _REPORT_TITLES[data.scope] || 'AI 보고서';
  rows.push({ 구분:t, 항목:'기간', 값: data.period.label });
  rows.push({ 구분:'전사', 항목:'생산 실적(ea)', 값: data.companyKPI.actual });
  rows.push({ 구분:'전사', 항목:'매출(원)',      값: data.companyKPI.sales });
  rows.push({ 구분:'전사', 항목:'매입+외주(원)', 값: data.companyKPI.purchases });
  rows.push({ 구분:'전사', 항목:'이슈(건)',      값: data.companyKPI.issueCount });
  const p = data.production;
  rows.push({ 구분:'생산부', 항목:'계획(ea)',     값: p.plan });
  rows.push({ 구분:'생산부', 항목:'실적(ea)',     값: p.actual });
  rows.push({ 구분:'생산부', 항목:'달성률(%)',    값: p.pct });
  rows.push({ 구분:'생산부', 항목:'진행 LOT',     값: p.activeLots });
  p.byEquipment.forEach(e => rows.push({ 구분:'생산부·설비', 항목:e.name, 값:e.actual, 비고:`부하 ${e.loadPct.toFixed(0)}%` }));
  const s = data.sales;
  rows.push({ 구분:'영업부', 항목:'신규 수주(건)', 값: s.newOrders });
  rows.push({ 구분:'영업부', 항목:'출하(ea)',      값: s.shipped });
  rows.push({ 구분:'영업부', 항목:'매출(원)',      값: s.revenue });
  rows.push({ 구분:'영업부', 항목:'수주 잔량(ea)', 값: s.backlog });
  s.byCustomer.forEach(c => rows.push({ 구분:'영업부·고객사', 항목:c.name, 값:c.revenue, 비고:`잔량 ${c.backlog}${c.nextDue?`, 납기 ${c.nextDue}`:''}` }));
  const m = data.procurement;
  rows.push({ 구분:'구매·자재', 항목:'소재 입고(kg)', 값: Math.round(m.matInKg) });
  rows.push({ 구분:'구매·자재', 항목:'매입액(원)',    값: m.purchaseAmount });
  rows.push({ 구분:'구매·자재', 항목:'외주 진행(건)', 값: m.osActive });
  rows.push({ 구분:'구매·자재', 항목:'외주비(원)',    값: m.osCost });
  m.byMaterial.forEach(x => rows.push({ 구분:'구매·자재·재질', 항목:x.mat, 값:Math.round(x.remain), 비고:`소요 ${Math.round(x.used)}kg${x.short?' 부족':''}` }));
  const q = data.quality;
  rows.push({ 구분:'품질', 항목:'불량률(%)',   값: q.defectRate });
  rows.push({ 구분:'품질', 항목:'불량(ea)',    값: q.defectQty });
  rows.push({ 구분:'품질', 항목:'중단(건)',    값: q.stopCount });
  if((+q.ncCount||0) > 0 || (+q.ncWaiting||0) > 0){
    rows.push({ 구분:'품질', 항목:'부적합(건)', 값: (+q.ncCount||0) });
    rows.push({ 구분:'품질', 항목:'처리 대기(건)', 값: (+q.ncWaiting||0) });
    (q.ncTopTypes||[]).forEach(t => rows.push({ 구분:'품질·유형', 항목:t.name, 값:t.qty, 비고:`${t.count}건` }));
  }
  const f = data.finance;
  rows.push({ 구분:'경영·정산', 항목:`마감 매출 ${data.period.month}(원)`, 값: f.salesClosing });
  rows.push({ 구분:'경영·정산', 항목:'미수 잔액(원)',     값: f.unpaid == null ? '미확정' : f.unpaid });
  rows.push({ 구분:'경영·정산', 항목:'미지급(원)',        값: f.unpayable == null ? '미확정' : f.unpayable });
  data.issues.forEach(iss => rows.push({ 구분:`이슈·${iss.severity}`, 항목: iss.dept, 값: iss.text }));
  if(data.ai_summary){
    rows.push({ 구분:'AI 브리핑', 항목:'요약', 값: data.ai_summary });
  }
  exportXlsx(rows, _esc(_REPORT_TITLES[data.scope]||'AI 보고서'), `보고서_${data.scope}_${data.period.label.replace(/[ ~]/g,'_')}.xlsx`);
}
