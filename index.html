                <td><b>${_esc(r.plot_no)}</b></td>
                <td>${procLbl}</td>
                <td class="num" style="color:${r.good>0?'var(--green)':'var(--dim)'}">${(r.good||0).toLocaleString()}</td>
                <td class="num" style="color:${r.defect>0?'var(--red)':'var(--dim)'}">${(r.defect||0).toLocaleString()}</td>
                <td style="font-size:11px;color:var(--sub)">${who}</td>
                <td style="font-size:11px;color:var(--sub)">${_esc(shiftName)} ${srcBadge(r)}</td>
                <td>${actionBtn}</td>
              </tr>`;
            }).join('')}`;
        }).join('') : '<tr><td colspan="11" class="empty">실적 없음 — 폰 스캔 또는 [PC 실적 등록]으로 추가</td></tr>'}</tbody>
      </table></div>
    </div>
  `;

  // 이벤트
  const refresh = () => router();
  // ★ v0.20.1 — view 토글
  document.querySelectorAll('[data-perfview]').forEach(b => b.onclick = ()=>{ state.view = b.dataset.perfview; router(); });
  let qTimer;
  document.getElementById('perf-q').oninput = (e)=>{ clearTimeout(qTimer); qTimer = setTimeout(()=>{state.q=e.target.value; refresh();}, 250); };
  document.getElementById('perf-proc').onchange   = (e)=>{ state.proc = e.target.value; refresh(); };
  document.getElementById('perf-eq').onchange     = (e)=>{ state.equipment = e.target.value; refresh(); };
  document.getElementById('perf-worker').onchange = (e)=>{ state.worker = e.target.value; refresh(); };
  document.getElementById('perf-shift').onchange  = (e)=>{ state.shift = e.target.value; refresh(); };
  document.getElementById('perf-date').onchange   = (e)=>{ state.date = e.target.value; refresh(); };
  document.getElementById('perf-add').onclick  = ()=>VIEWS._perfAddPC();
  document.getElementById('perf-stop').onclick = ()=>VIEWS._perfStop();
  document.querySelectorAll('[data-edit]').forEach(b=>b.onclick = ()=>VIEWS._perfEdit(b.dataset.edit));

  // ★ v0.16.0 — 취소 포함 보기 · 선택 취소 · 복원 · 체크박스
  document.getElementById('perf-void-view').onchange = (e)=>{ state.voidView = e.target.checked; refresh(); };
  // ★ v0.16.10 — 필터 칩 이벤트
  document.querySelectorAll('[data-rowfilter]').forEach(el => el.onclick = ()=>{
    state.rowFilter = el.dataset.rowfilter;
    refresh();
  });
  const chkAll = document.getElementById('perf-chk-all');
  const chkBtn = document.getElementById('perf-void-sel');
  const chkCnt = document.getElementById('perf-void-cnt');
  const updateSel = ()=>{
    const sel = [...document.querySelectorAll('.perf-chk')].filter(c=>c.checked);
    chkCnt.textContent = sel.length;
    chkBtn.style.display = sel.length ? 'inline-flex' : 'none';
  };
  chkAll.onchange = (e)=>{
    document.querySelectorAll('.perf-chk').forEach(c=>c.checked = e.target.checked);
    updateSel();
  };
  document.querySelectorAll('.perf-chk').forEach(c=>c.onchange = updateSel);
  // ★ v0.16.10 — 선택 취소·행별 취소 공용 경로 (후속 가드·사유 '오입력' 재사용 · 새 취소 로직 작성 금지)
  const doVoidByIds = (ids) => {
    if(!ids.length) return;
    for(const id of ids){
      const r = DB.get('records', id); if(!r) continue;
      const blocker = laterLiveRecord(r.plot_no, r.proc);
      if(blocker){
        const bp = DB.get('processes', blocker.proc);
        toast(`후속 실적 있음 — ${bp?.name||blocker.proc} ${blocker.id} 먼저 취소`, 'err');
        const row = document.querySelector(`.perf-chk[data-rid="${blocker.id}"]`)?.closest('tr');
        if(row){ row.style.transition='background .3s'; row.style.background='rgba(251,191,36,.15)'; row.scrollIntoView({behavior:'smooth',block:'center'}); setTimeout(()=>{row.style.background='';}, 2200); }
        return;
      }
    }
    ids.forEach(id => voidDoc('records', id, '오입력'));
    toast(`${ids.length}건 취소됨 — 복원은 [취소 포함 보기]에서`,'ok');
    router();
  };
  chkBtn.onclick = ()=>{
    const ids = [...document.querySelectorAll('.perf-chk')].filter(c=>c.checked).map(c=>c.dataset.rid);
    doVoidByIds(ids);
  };
  // ★ v0.16.10 — 행별 취소 (선택 취소와 동일 경로 · 1건)
  document.querySelectorAll('[data-void]').forEach(b => b.onclick = ()=>{
    doVoidByIds([b.dataset.void]);
  });
  document.querySelectorAll('[data-unvoid]').forEach(b=>b.onclick = ()=>{
    const id = b.dataset.unvoid;
    toast('복원 시 수량이 이중 계상될 수 있습니다 — 확인 후 진행','warn');
    setTimeout(()=>{ unvoidDoc('records', id); toast('실적 복원','ok'); router(); }, 400);
  });

  // ★ v0.25.0 — 실적행 부적합 등록 / NC 배지 → 상세 (qc ON 시만 DOM 존재)
  document.querySelectorAll('[data-nc-new]').forEach(b => b.onclick = () => {
    const r = DB.get('records', b.dataset.ncNew); if(!r) return;
    const lot = DB.get('production_lots', r.plot_no);
    VIEWS._qcRegister({
      record_id: r.id,
      lot_id: r.plot_no,
      item_code: lot?.itemCode || null,
      process: r.proc || null,
      equipment: r.equipment || null,
      worker: r.worker || (r.by ? { name: r.by } : null),
      defect_qty_source: +r.defect || 0,
      already_qty: ncSumByRecord(r.id),
    });
  });
  document.querySelectorAll('[data-nc-detail]').forEach(el => el.onclick = (e) => {
    e.stopPropagation();
    VIEWS._qcDetail(el.dataset.ncDetail);
  });

  document.getElementById('perf-xlsx').onclick = ()=>{
    const xrows = filtered.map(r=>{
      const lot = DB.get('production_lots', r.plot_no);
      const item = lot && DB.get('items', lot.itemCode);
      return {
        일자: fmtDate(r.ts), 시각: fmtTime(r.ts),
        품번: lot?.itemCode||'', 품명: item?.name||'',
        '소재규격': item? `${item.mat||''} Ø${item.dia||''} ${item.weight||''}kg`.trim() : '',
        LOT: r.plot_no, 공정: DB.get('processes', r.proc)?.name||r.proc,
        양품: r.good||0, 불량: r.defect||0, 재작업: r.rework||0,
        작업자: r.worker?.name || r.by || '',
        설비: r.equipment || '',
        교대: (shifts.find(s=>s.code===r.shift)?.name) || r.shift || 'day',
        출처: r.source==='manual_pc'?'PC':'폰',
        중단: r.stopped? (r.stop_reason||'중단') : '',
      };
    });
    exportXlsx(xrows, '생산실적', `생산실적_${fmtDate(Date.now())}.xlsx`);
  };
};

/* ★ v0.20.1 — 실적현황 [계획대비] 뷰
   기간(날짜 필터) 내 계획 품번별 계획합/실적합/달성률/차이 + 계획외 실적 행.
   신규 계산 헬퍼 없음 — calcPlanProgress·plans·records 재사용 (계획외 실적 = 라우트 첫 공정 양품 − 계획된 품번 실적). */
VIEWS._perfPlanCompare = () => {
  const state = window._perfFilter;
  const today = fmtDate(Date.now());
  const focusDate = state.date || today;
  // ★ v0.20.3 — 계획대비 뷰 기간 탭 [일간|주간|월간] · 기본 일간 · 기준일 = state.date (◀▶ 이동)
  if(state.planTab === undefined) state.planTab = 'day';

  // 기간 계산 (VIEWS.plan periodOf 미러 · 신규 집계 없음)
  const anchor = new Date(focusDate + 'T00:00:00');
  let periodStart, periodEnd, periodStartTs, periodEndTs, periodLabel;
  if(state.planTab === 'day'){
    periodStart = periodEnd = focusDate;
    periodStartTs = anchor.getTime();
    periodEndTs   = anchor.getTime() + 86400000;
    periodLabel   = `${focusDate}(일간)`;
  } else if(state.planTab === 'week'){
    const dow = anchor.getDay();
    const monOffset = dow === 0 ? -6 : (1 - dow);
    const mon = new Date(anchor); mon.setDate(anchor.getDate()+monOffset); mon.setHours(0,0,0,0);
    const sun = new Date(mon); sun.setDate(mon.getDate()+6);
    const nextMon = new Date(mon); nextMon.setDate(mon.getDate()+7);
    periodStart = fmtDate(mon.getTime());
    periodEnd   = fmtDate(sun.getTime());
    periodStartTs = mon.getTime();
    periodEndTs   = nextMon.getTime();
    periodLabel   = `${periodStart.slice(5)} ~ ${periodEnd.slice(5)}(주간)`;
  } else {
    const yr = anchor.getFullYear(), mo = anchor.getMonth();
    const first = new Date(yr, mo, 1);
    const nextFirst = new Date(yr, mo+1, 1);
    const last = new Date(yr, mo+1, 0);
    periodStart = fmtDate(first.getTime());
    periodEnd   = fmtDate(last.getTime());
    periodStartTs = first.getTime();
    periodEndTs   = nextFirst.getTime();
    periodLabel   = `${yr}-${String(mo+1).padStart(2,'0')}(월간)`;
  }

  // ★ v0.20.2 — 실적현황과 공용 필터 (검색·설비·기간) 를 계획대비 표시 범위에 반영
  //  · calcPlanProgress·records 집계 로직은 수정하지 않음 — 필터는 표시 범위만.
  //  · 검색: plan.itemCode·품명 매칭
  //  · 설비: state.equipment 를 plan.equipment 매칭 (미지정='__none__')
  const matchesPlan = (p) => {
    if(state.equipment){
      if(state.equipment === '__none__'){ if(p.equipment) return false; }
      else if((p.equipment||'') !== state.equipment) return false;
    }
    if(state.q){
      const q = state.q.toLowerCase();
      const it = DB.get('items', p.itemCode);
      const text = `${p.itemCode} ${it?.name||''}`.toLowerCase();
      if(!text.includes(q)) return false;
    }
    return true;
  };
  // ★ v0.23.3 — 목록 기준 단일화(getLivePlans) · plan_type 하드 조건 제거 (구형 미지정·자동·수동 모두 포함)
  const plans = getLivePlans()
    .filter(p => p.date >= periodStart && p.date <= periodEnd)
    .filter(matchesPlan);
  // 계획 품번별 집계 (calcPlanProgress 재사용)
  const byItem = {};
  plans.forEach(p => {
    if(!byItem[p.itemCode]) byItem[p.itemCode] = { itemCode:p.itemCode, planQty:0, actual:0, plans:[] };
    const pr = calcPlanProgress(p);
    byItem[p.itemCode].planQty += (+p.qty||0);
    byItem[p.itemCode].actual += pr.actual;
    byItem[p.itemCode].plans.push(p);
  });
  const rows = Object.values(byItem).sort((a,b) => b.planQty - a.planQty);

  // 계획외 실적 (기간 ts 범위 · 계획 없는 품번 · 라우트 첫 공정 양품 합) — 필터 반영
  const planItems = new Set(Object.keys(byItem));
  const offPlanByItem = {};
  DB.query('records', r => !r.void && !r.transferred && r.ts >= periodStartTs && r.ts < periodEndTs)
    .forEach(r => {
      // 설비 필터 (records 기준)
      if(state.equipment){
        if(state.equipment === '__none__'){ if(r.equipment) return; }
        else if((r.equipment||'') !== state.equipment) return;
      }
      const lot = DB.get('production_lots', r.plot_no);
      if(!lot) return;
      if(planItems.has(lot.itemCode)) return;
      const route = getRoute(lot.itemCode);
      const firstProc = route[0]?.proc;
      if(r.proc !== firstProc) return;
      // 검색 필터 (품번·품명)
      if(state.q){
        const q = state.q.toLowerCase();
        const it = DB.get('items', lot.itemCode);
        const text = `${lot.itemCode} ${it?.name||''}`.toLowerCase();
        if(!text.includes(q)) return;
      }
      if(!offPlanByItem[lot.itemCode]) offPlanByItem[lot.itemCode] = 0;
      offPlanByItem[lot.itemCode] += (r.good || 0);
    });
  const offPlanRows = Object.entries(offPlanByItem).filter(([,v]) => v>0);

  const totalPlan = rows.reduce((s,r)=>s+r.planQty, 0);
  const totalActual = rows.reduce((s,r)=>s+r.actual, 0);
  const totalPct = totalPlan>0 ? Math.min(100, totalActual/totalPlan*100) : 0;

  // ★ v0.20.2 — 설비 옵션: live records 등장 설비 (실적현황과 동일 소스)
  const eqSet = new Set();
  let hasEmptyEq = false;
  DB.all('records').forEach(r => {
    if(r.transferred) return;
    if(r.equipment) eqSet.add(r.equipment); else hasEmptyEq = true;
  });
  const eqOptions = [...eqSet].sort();

  // ★ v0.20.3 — 기간 탭 UI (VIEWS.plan 과 동일 패턴)
  const ptabBtn = (k, label) => `<button class="btn ${state.planTab===k?'primary':''}" data-planptab="${k}" style="border-radius:99px;padding:6px 14px;font-size:11px">${label}</button>`;

  document.getElementById('view').innerHTML = `
    <div class="pghead">
      <div class="pgtitle"><svg class="ic" viewBox="0 0 24 24">${PAGES.find(p=>p.id==='perf').icon}</svg>실적현황 <span class="pill cyan">${APP_VERSION} · 계획대비</span></div>
      <div class="pgtools">
        <div style="display:inline-flex;gap:2px;background:var(--bg2);border:1px solid var(--line);border-radius:8px;padding:2px">
          <button class="btn ${state.view==='perf'?'primary':'ghost'}" data-perfview="perf" style="padding:5px 12px;font-size:11px;border-radius:6px">실적현황</button>
          <button class="btn ${state.view==='plan'?'primary':'ghost'}" data-perfview="plan" style="padding:5px 12px;font-size:11px;border-radius:6px">계획대비</button>
        </div>
        <button class="btn" onclick="location.hash='#plan'">${ico('plus')}생산계획</button>
      </div>
    </div>
    <div style="font-size:11px;color:var(--dim);margin-bottom:14px">계획 품번의 계획합·실적합·달성률 · 계획외 실적은 별도 행 (계획대비 착시 방지) · 헬퍼는 생산계획 화면과 공용</div>

    <!-- 필터 (실적현황과 공용) + 기간 탭 (계획대비 전용) -->
    <div class="card" style="padding:14px;margin-bottom:12px">
      <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap">
        ${ptabBtn('day','일간')}${ptabBtn('week','주간')}${ptabBtn('month','월간')}
        <div style="display:flex;gap:4px;margin-left:8px">
          <button class="btn ghost" data-planshift="-1">◀</button>
          <button class="btn ghost" data-plantoday>오늘</button>
          <button class="btn ghost" data-planshift="1">▶</button>
        </div>
        <span style="color:var(--sub);font-size:11.5px;margin-left:8px;font-family:'JetBrains Mono',monospace">${_esc(periodLabel)}</span>
      </div>
      <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-top:10px">
        <div style="flex:1;min-width:220px;display:flex;align-items:center;gap:9px;background:var(--bg2);border:1px solid var(--line);border-radius:10px;padding:8px 12px">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--sub)" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg>
          <input id="perf-q" placeholder="검색 — 품번 · 품명" value="${_esc(state.q||'')}" style="flex:1;background:none;border:none;outline:none;color:var(--ink);font-size:12px;padding:0">
        </div>
        <select id="perf-eq" style="width:140px"><option value="">설비 ▾</option>${hasEmptyEq?`<option value="__none__" ${state.equipment==='__none__'?'selected':''}>(미지정)</option>`:''}${eqOptions.map(e=>`<option value="${_esc(e)}" ${state.equipment===e?'selected':''}>${_esc(e)}</option>`).join('')}</select>
        <label style="font-size:11px;color:var(--sub);margin-left:4px">기준일</label>
        <input id="perf-date" type="date" value="${_esc(focusDate)}" style="width:140px">
        <span style="font-size:11px;color:var(--sub)">${plans.length}계획 · 계획외 ${offPlanRows.length}품번</span>
      </div>
    </div>

    <!-- KPI (계획대비 전환 · 기간·필터 반영) -->
    <div class="grid g4" style="margin-bottom:14px">
      <div class="kpi-mini"><div class="lab">${ico('check')}계획량</div><div class="val c">${totalPlan.toLocaleString()}<span style="font-size:12px;color:var(--sub)">ea</span></div><div class="sub">${rows.length}품번 · ${_esc(periodLabel)}</div></div>
      <div class="kpi-mini"><div class="lab">${ico('check')}실적</div><div class="val g">${totalActual.toLocaleString()}<span style="font-size:12px;color:var(--sub)">ea</span></div><div class="sub">양품 합 (라우트 첫 공정)</div></div>
      <div class="kpi-mini"><div class="lab">${ico('check')}달성률</div><div class="val c">${totalPct.toFixed(0)}<span style="font-size:12px;color:var(--sub)">%</span></div><div class="sub">cap 100%</div></div>
      <div class="kpi-mini"><div class="lab">${ico('check')}계획외 실적</div><div class="val h">${offPlanRows.reduce((s,[,v])=>s+v,0).toLocaleString()}<span style="font-size:12px;color:var(--sub)">ea</span></div><div class="sub">${offPlanRows.length}품번</div></div>
    </div>

    <!-- 계획대비 표 -->
    <div class="card">
      <h3>품번별 계획 vs 실적 <span class="tag">${_esc(periodLabel)} · ${rows.length}품번${state.q?` · 검색 "${_esc(state.q)}"`:''}${state.equipment?` · 설비 ${_esc(state.equipment==='__none__'?'(미지정)':state.equipment)}`:''}</span></h3>
      <div class="tbl-wrap"><table>
        <thead><tr><th>품번·품명</th><th class="num">계획(합)</th><th class="num">실적(합)</th><th style="width:180px">달성률</th><th class="num">차이</th></tr></thead>
        <tbody>${rows.length? rows.map(r => {
          const it = DB.get('items', r.itemCode);
          const diff = r.actual - r.planQty;
          const pct = r.planQty>0 ? Math.min(100, r.actual/r.planQty*100) : 0;
          const diffColor = diff<0 ? 'var(--red)' : (diff>0 ? 'var(--blue)' : 'var(--sub)');
          const barColor = r.actual >= r.planQty ? 'var(--green)' : 'var(--cyan)';
          return `<tr>
            <td><b>${_esc(r.itemCode)}</b> <span class="muted" style="font-size:11px">${_esc(it?.name||'')}</span></td>
            <td class="num" style="font-family:'JetBrains Mono',monospace;color:var(--cyan)">${r.planQty.toLocaleString()}</td>
            <td class="num" style="font-family:'JetBrains Mono',monospace;color:var(--green)">${r.actual.toLocaleString()}</td>
            <td><div style="background:var(--bg2);border-radius:99px;height:10px;overflow:hidden"><div style="height:100%;width:${pct.toFixed(1)}%;background:${barColor}"></div></div><div style="font-size:10px;color:var(--sub);margin-top:2px">${pct.toFixed(0)}%</div></td>
            <td class="num" style="font-family:'JetBrains Mono',monospace;color:${diffColor}">${diff>0?'+':''}${diff.toLocaleString()}</td>
          </tr>`;
        }).join('') : '<tr><td colspan="5" class="empty">이 기준일에 계획 없음 — [생산계획]에서 등록</td></tr>'}
        ${offPlanRows.length? `<tr style="background:var(--bg2)"><td colspan="5" style="font-size:11px;color:var(--amber);font-weight:600;padding:8px 10px">▾ 계획외 실적 <span style="color:var(--dim);font-weight:400;margin-left:4px">기간 내 계획 없는 품번 (착시 방지)</span></td></tr>
          ${offPlanRows.map(([code, val]) => {
            const it = DB.get('items', code);
            return `<tr>
              <td><b>${_esc(code)}</b> <span class="muted" style="font-size:11px">${_esc(it?.name||'')}</span></td>
              <td class="num" style="color:var(--dim)">—</td>
              <td class="num" style="font-family:'JetBrains Mono',monospace;color:var(--amber)">${val.toLocaleString()}</td>
              <td><span style="font-size:10.5px;color:var(--amber)">계획외</span></td>
              <td class="num" style="font-family:'JetBrains Mono',monospace;color:var(--blue)">+${val.toLocaleString()}</td>
            </tr>`;
          }).join('')}` : ''}
        </tbody>
      </table></div>
    </div>
  `;
  document.querySelectorAll('[data-perfview]').forEach(b => b.onclick = ()=>{ state.view = b.dataset.perfview; router(); });
  document.getElementById('perf-date').onchange = (e)=>{ state.date = e.target.value; router(); };
  document.getElementById('perf-eq').onchange = (e)=>{ state.equipment = e.target.value; router(); };
  let qT;
  document.getElementById('perf-q').oninput = (e)=>{ clearTimeout(qT); qT=setTimeout(()=>{ state.q = e.target.value; router(); }, 250); };
  // ★ v0.20.3 — 기간 탭 · 기준일 ◀▶
  document.querySelectorAll('[data-planptab]').forEach(b => b.onclick = ()=>{ state.planTab = b.dataset.planptab; router(); });
  document.querySelectorAll('[data-planshift]').forEach(b => b.onclick = ()=>{
    const delta = +b.dataset.planshift;
    const d = new Date((state.date || today) + 'T00:00:00');
    if(state.planTab === 'day') d.setDate(d.getDate() + delta);
    else if(state.planTab === 'week') d.setDate(d.getDate() + delta*7);
    else d.setMonth(d.getMonth() + delta);
    state.date = fmtDate(d.getTime());
    router();
  });
  const btnToday = document.querySelector('[data-plantoday]');
  if(btnToday) btnToday.onclick = ()=>{ state.date = today; router(); };
};

  let preferProcOnce = prefill.proc || null;
  const refreshProcSelect = ()=>{
    const plot = document.getElementById('pa-lot').value;
    const sel = document.getElementById('pa-proc');
    const {list, defaultIndex} = LOT.availableProcesses(plot);
    if(!list.length){
      sel.innerHTML = '<option value="">등록 가능 공정 없음</option>';
      sel.disabled = true;
    } else {
      sel.disabled = false;
      // prefill.proc 이 list 에 있으면 그 인덱스 선택 (한 번만 반영), 아니면 기존 defaultIndex
      let pickIdx = defaultIndex;
      if(preferProcOnce){
        const idx = list.findIndex(p => p.code === preferProcOnce);
        if(idx >= 0) pickIdx = idx;
        preferProcOnce = null;
      }
      sel.innerHTML = list.map((p, i) => {
        const outTag = p.mode==='out' ? ' ·외주' : '';
        return `<option value="${_esc(p.code)}" ${i===pickIdx?'selected':''}>${_esc(p.name)}${outTag} — 등록 가능 ${p.avail.toLocaleString()} ea</option>`;
      }).join('');
    }
  };
  const updBal = ()=>{

    const proc = document.getElementById('pa-proc').value;

    const bal = LOT.balance(plot, proc);
    balEl.textContent = `잔량 ${bal.toLocaleString()}ea`;
    // 수량 입력 placeholder 힌트 (양품/불량/재작업 모두 잔량 초과 시 registerRecord 가드에서 차단)
    const gEl = document.getElementById('pa-g');
    if(gEl) gEl.placeholder = bal>0 ? `최대 ${bal}` : '0';
    // ★ v0.16.7 — 공정 변경 시 datalist 옵션 갱신 (getEquipment 소스 · 자유 입력 유지)
    const dl = document.getElementById('pa-eq-list');
    if(dl) dl.innerHTML = getEquipment(proc).map(n=>`<option value="${_esc(n)}">`).join('');
    // ★ v0.16.2 — WO.plan_eq[현재 공정] 있으면 설비 기본값으로 채움 (사용자가 이미 입력했으면 건드리지 않음)
    // ★ v0.25.0 — prefill.equipment 우선 (있으면 · 사용자 미입력 상태에서만)
    const eqEl = document.getElementById('pa-eq');
    if(prefill.equipment && !eqEl.value){ eqEl.value = prefill.equipment; eqEl.placeholder = '재작업 설비 (수정 가능)'; }
    else {
      const wo = DB.query('work_orders', w => w.plot_no === plot)[0];
      const planEq = wo?.plan_eq?.[proc];
      if(planEq && !eqEl.value){ eqEl.value = planEq; eqEl.placeholder = '계획 설비 (수정 가능)'; }
    }
  };
  document.getElementById('pa-lot').onchange = ()=>{ refreshProcSelect(); updBal(); };
  document.getElementById('pa-proc').onchange = updBal;
  refreshProcSelect();
  updBal();
  document.getElementById('pa-ok').onclick = ()=>{
    const plot = document.getElementById('pa-lot').value;
    const proc = document.getElementById('pa-proc').value;
    const g = +document.getElementById('pa-g').value||0;
    const d = +document.getElementById('pa-d').value||0;
    const r = +document.getElementById('pa-r').value||0;
    const wid = document.getElementById('pa-w').value;
    const eq  = document.getElementById('pa-eq').value.trim();
    if(g+d+r<=0){ toast('수량 입력','warn'); return; }
    try {
      const worker = wid ? DB.get('workers', wid) : null;
      LOT.registerRecord({
        plot_no:plot, proc, equipment:eq,
        good:g, defect:d, rework:r,
        type: DB.get('processes',proc)?.type==='out'?'out':'in',
        shift:'day', source:'manual_pc',
        worker: worker ? {id:worker.id, name:worker.name, emp_no:worker.emp_no, dept:worker.dept} : null,
      });
      toast(`PC 실적 등록 — 양품 ${g}ea`,'ok'); closeModal(); router();
    } catch(e){ toast(e.message,'err'); }
  };
};

/* =================================================================================================
   ★ v0.13.0 — 파렛트 모듈 (pallet.html)
   - pallet_moves: {id, vendor, type:'out'|'in', qty, ref:{kind:'tx'|'os'|'manual', id?}, ts, by}
   - 외주처(왕복) = 출고시 미회수 +, 입고시 미회수 −
   - 고객사(편도) = 출고만 기록 (파렛트업체가 회수)
   ================================================================================================= */
const PALLET = {
  add({vendor, type, qty, ref}){
    qty = Math.max(0, +qty||0);
    if(!vendor || !type || qty<=0) return null;
    const id = `PLT-${type.toUpperCase()}-${Date.now().toString(36).toUpperCase()}-${Math.floor(Math.random()*999)}`;
    return DB.set('pallet_moves', id, {id, vendor, type, qty, ref:ref||{kind:'manual'}, ts:Date.now(), by:SESSION.user});
  },
  totalsByVendor(){
    const out = {}, inn = {};
    DB.all('pallet_moves').forEach(m=>{
      if(m.type==='out') out[m.vendor] = (out[m.vendor]||0) + (m.qty||0);
      else if(m.type==='in') inn[m.vendor] = (inn[m.vendor]||0) + (m.qty||0);
    });
    return {out, inn};
  },
  /* 어떤 외주반출에서 회수된 누계 */
  recoveredFor(refId){
    return DB.query('pallet_moves', m => m.type==='in' && m.ref?.kind==='os' && m.ref?.id===refId).reduce((s,m)=>s+(m.qty||0), 0);
  },
  /* 어떤 외주반출에서 출고된 누계 */
  dispatchedFor(refId){
    return DB.query('pallet_moves', m => m.type==='out' && m.ref?.kind==='os' && m.ref?.id===refId).reduce((s,m)=>s+(m.qty||0), 0);
  },
};

  const rows = vendors.filter(v => v.type==='out' || v.type==='cust').map(v=>{
    const o = out[v.code]||0, i = inn[v.code]||0;

function _esc(s){ return (s==null?'':String(s)).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function _coHead(co){
  // 회사명 없으면 빈 문자열 반환 (헤더 숨김)
  if(!co?.name || !co.name.trim()) return '';
  return `<span class="co-name">${_esc(co.name)}</span>${co.site? `<span class="co-site">· ${_esc(co.site)}</span>`:''}`;
}

/* ★ v0.23.5 — 인쇄 방향(세로/가로) 저장·토글
   settings/documents.orientation[formKey] = 'portrait' | 'landscape'
   기본값: 작업지시서(wo) = 가로 · 나머지 미지정 = 세로. 사용자가 토글에서 바꾸면 그 양식 기본값으로 병합 저장.
   저장 스키마 확장만 · @media print 밖 화면 무영향. */
const _ORIENT_DEFAULTS = { wo: 'landscape' };
function getFormOrient(formKey){
  const s = DB.get('settings','documents') || {};
  const o = s.orientation || {};
  const v = o[formKey];
  if(v === 'portrait' || v === 'landscape') return v;
  return _ORIENT_DEFAULTS[formKey] || 'portrait';
}
function setFormOrient(formKey, orient){
  if(orient !== 'portrait' && orient !== 'landscape') return;
  const prev = DB.get('settings','documents') || {};
  const cur = prev.orientation || {};
  DB.set('settings','documents', { ...prev, orientation: { ...cur, [formKey]: orient } });
}

// 실제 인쇄창 오픈 — orient 있을 때만 @page size 를 A4 <orient> 로 주입 (브라우저 대화상자에서 재조정 가능)
function _openPrintWindow(title, bodyHTML, extraCSS, orient){
  const orientCSS = orient ? `@media print{@page{size:A4 ${orient}}}` : '';
  const win = window.open('','_blank');
  if(!win){ toast('팝업 차단 — 인쇄창 열 수 없음','err'); return; }
  win.document.write(`<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"><title>${_esc(title)}</title>
    <style>${PRINT_BASE_CSS}${orientCSS}${extraCSS||''}</style></head><body>${bodyHTML}
    <scr`+`ipt>window.addEventListener('load',()=>setTimeout(()=>window.print(), 300));</scr`+`ipt>
    </body></html>`);
  win.document.close();
}

// opts.formKey 있으면 방향 선택 모달 표시 → 저장 → 주입 후 인쇄. 없으면 이전 동작(브라우저 방향).
function _openPrint(title, bodyHTML, extraCSS, opts){
  const formKey = opts && opts.formKey;
  if(!formKey){ _openPrintWindow(title, bodyHTML, extraCSS, null); return; }
  const cur = getFormOrient(formKey);
  openModal(`
    <h2>인쇄 방향 선택 <span style="color:var(--dim);font-size:12px;font-weight:400;margin-left:8px">${_esc(title)}</span> <button class="x" onclick="closeModal()">${ico('x')}</button></h2>
    <div class="body">
      <div style="display:flex;align-items:center;gap:14px;padding:14px;background:var(--bg2);border:1px solid var(--line);border-radius:10px;flex-wrap:wrap">
        <label style="display:inline-flex;align-items:center;gap:6px;cursor:pointer;font-size:13px;margin:0">
          <input type="radio" name="prt-orient" value="portrait"  ${cur==='portrait'?'checked':''} style="width:auto;margin:0"> 세로 (Portrait)
        </label>
        <label style="display:inline-flex;align-items:center;gap:6px;cursor:pointer;font-size:13px;margin:0">
          <input type="radio" name="prt-orient" value="landscape" ${cur==='landscape'?'checked':''} style="width:auto;margin:0"> 가로 (Landscape)
        </label>
        <span style="margin-left:auto;font-size:11px;color:var(--dim)">기본값 <b style="color:var(--cyan)">${cur==='landscape'?'가로':'세로'}</b> · 바꾸면 이 양식 기본값으로 저장</span>
      </div>
      <div style="font-size:10.5px;color:var(--dim);margin-top:6px;line-height:1.55">
        · 브라우저 인쇄 대화상자에서도 방향을 다시 조정할 수 있습니다.
      </div>
      <div class="actions">
        <button class="btn" onclick="closeModal()">취소</button>
        <button class="btn primary" id="prt-ok">${ico('print')}인쇄</button>
      </div>
    </div>
  `);
  document.getElementById('prt-ok').onclick = () => {
    const orient = document.querySelector('input[name="prt-orient"]:checked')?.value || 'portrait';
    if(orient !== cur) setFormOrient(formKey, orient);
    closeModal();
    _openPrintWindow(title, bodyHTML, extraCSS, orient);
  };
}

  /* ===== ② 부품 식별표 (form-label.html) — A4 6격자 (2×3), 같은 LOT N장 반복
        v0.16.11 — entry.pack_qty_actual 반영: 각 라벨의 '수량 칸' = 실측 포장수량,
                   '포장단위: N ea' 소자 추가. 실제값 없으면 기존 초기수량(LOT) 유지.
                   품번 마스터의 pack_qty(표준)는 덮어쓰지 않음 (인쇄용). */
  label(entries){
    // entries: [{plot_no, repeat:1, pack_qty_actual:200?}, ...]
    const expand = [];
    (entries||[]).forEach(e=>{
      const n = Math.max(1, +e.repeat || 1);
      const pkg = (e.pack_qty_actual!=null && +e.pack_qty_actual>0) ? Math.floor(+e.pack_qty_actual) : null;
      for(let i=0;i<n;i++) expand.push({plot_no: e.plot_no, pack_qty_actual: pkg});
    });
    if(!expand.length){ toast('출력할 LOT 없음','warn'); return; }
    const co = getCompany();
    const date = fmtDate(Date.now());
    const PER_PAGE = 6;

    function cell(entry){
      if(!entry) return `<div class="cell"></div>`;
      const plot_no = entry.plot_no;
      if(!plot_no) return `<div class="cell"></div>`;
      const lot = DB.get('production_lots', plot_no);
      if(!lot) return `<div class="cell"><div class="cell-in"><div class="cell-co">LOT 없음: ${_esc(plot_no)}</div></div></div>`;
      const item = DB.get('items', lot.itemCode) || {};
      const bom = getBOM(lot.itemCode);
      const mat = bom?.material?.type || item.mat || '';
      const heat = (lot.heat_nos||[]).join(', ');
      // ★ v0.16.11 — 라벨 수량 = 실측(포장수량) · 없으면 LOT 초기수량 (기존 동작 유지)
      const pkg = entry.pack_qty_actual;
      const qty = (pkg!=null) ? pkg : (lot.qty_initial || 0);
      const payload = JSON.stringify({plot_no, item:lot.itemCode, pack_qty:pkg||null});
      const qr = qrDataURL(payload, {cell:3, margin:4});
      const coLine = (co?.name && co.name.trim())? `<div class="cell-co">${_esc(co.name)}</div>` : '';
      const packLine = `<div class="kv"><span class="k">포장</span><span class="v mono">${pkg!=null? pkg.toLocaleString()+' ea' : '—'}</span></div>`;
      return `<div class="cell">
        <div class="cut-mark">✂</div>
        <div class="cell-in">
          ${coLine}
          <div class="cell-head"><div class="ci-code">${_esc(lot.itemCode)}</div><div class="ci-name">${_esc(item.name||'')}</div></div>
          <div class="cell-body">
            <div class="kv"><span class="k">LOT</span><span class="v mono">${_esc(plot_no)}</span></div>
            <div class="kv"><span class="k">수량</span><span class="v mono">${qty.toLocaleString()} ea</span></div>
            <div class="kv"><span class="k">소재</span><span class="v">${_esc(mat)}${heat?` · ${_esc(heat)}`:''}</span></div>
            ${packLine}
          </div>
          <img class="cell-qr" src="${qr}">
        </div>
      </div>`;
    }

    // Paginate by 6
    const pages = [];
    for(let i=0;i<expand.length;i+=PER_PAGE){
      const slice = expand.slice(i, i+PER_PAGE);
      while(slice.length < PER_PAGE) slice.push(null); // 빈 칸 채움
      pages.push(`<div class="page">
        <div class="ptitle"><span>부품 식별표 · ${slice.filter(Boolean).length}매 (점선 절취)</span><span>${co?.name?_esc(co.name)+' · ':''}${date}</span></div>
        <div class="grid">${slice.map(p=>cell(p)).join('')}</div>
      </div>`);
    }
    const css = `
      .page{width:794px;height:1010px;background:#fff;padding:36px;box-shadow:0 8px 30px rgba(0,0,0,.4)}
      .ptitle{font-size:13px;font-weight:700;color:#888;margin-bottom:18px;letter-spacing:1px;display:flex;justify-content:space-between}
      .grid{display:grid;grid-template-columns:1fr 1fr;grid-template-rows:repeat(3,1fr);gap:0;height:920px}
      .cell{border:1px dashed #b8bbc2;position:relative;padding:6px}
      .cut-mark{position:absolute;top:-9px;left:-7px;font-size:11px;color:#c0c3ca}
      .cell-in{border:2px solid #16181d;border-radius:6px;height:100%;padding:14px 18px;display:flex;flex-direction:column;position:relative}
      .cell-co{font-size:11px;font-weight:700;color:#888;letter-spacing:.5px;margin-bottom:8px}
      .cell-head{display:flex;align-items:baseline;gap:9px;border-bottom:2px solid #16181d;padding-bottom:8px;margin-bottom:10px}
      .ci-code{font-size:20px;font-weight:900;font-family:'JetBrains Mono','Consolas',monospace}
      .ci-name{font-size:13px;color:#555}
      .cell-body{flex:1}
      .kv{display:flex;padding:4px 0;font-size:13px}
      .kv .k{width:42px;color:#888;font-weight:500;font-size:11px;padding-top:2px}
      .kv .v{font-weight:700}
      .cell-qr{width:86px;height:86px;position:absolute;right:16px;bottom:14px}
    `;
    _openPrint(`부품 식별표 ${expand.length}매`, pages.join(''), css, { formKey:'label' });
  },

  /* ===== ③ 공정 이동표 (form-move.html) — A5, LOT별 1장 ===== */
  move(plotNos){
    const lots = (plotNos||[]).map(p=>DB.get('production_lots', p)).filter(Boolean);
    if(!lots.length){ toast('출력할 LOT 없음','warn'); return; }
    const co = getCompany();

    function page(lot){
      const item = DB.get('items', lot.itemCode) || {};
      const route = getRouteProcs(lot.itemCode);
      const heats = (lot.heat_nos||[]).join(', ');
      // due: 가장 빠른 SO 납기
      let due = '';
      DB.query('orders', o=>o.itemCode===lot.itemCode).forEach(o=>{
        if(o.due && (!due || o.due < due)) due = o.due;
      });
      // WO 지시수량
      const wo = DB.query('work_orders', w=>w.plot_no===lot.plot_no)[0];
      const qty = wo?.qty || lot.qty_initial || 0;
      const payload = JSON.stringify({plot_no:lot.plot_no, item:lot.itemCode});
      const qr = qrDataURL(payload, {cell:3, margin:4});
      const procRows = route.map(p=>{
        const recs = DB.query('records', r=>r.plot_no===lot.plot_no && r.proc===p.code);
        const good = recs.reduce((s,r)=>s+(r.good||0)+(r.rework_returned||0),0);
        const bal = LOT.balance(lot.plot_no, p.code);
        const done = bal<=0 && good>0;
        const lastRec = recs.sort((a,b)=>b.ts-a.ts)[0];
        const by = lastRec?.worker?.name || lastRec?.by || '';
        const dt = lastRec ? fmtDate(lastRec.ts).slice(5) : '';
        return `<tr>
          <td class="pseq mono">${p.seq||''}</td>
          <td class="pname">${_esc(p.name)}${p.mode==='out'?'(외주)':''}</td>
          <td class="pcheck">${done?'<span class="done">✓ 완료</span>':'<span class="box"></span>'}</td>
          <td class="pqty mono">${good>0?good.toLocaleString():''}</td>
          <td class="psign">${_esc(by)}</td>
          <td class="pdate mono">${dt}</td>
        </tr>`;
      }).join('');
      return `<div class="page">
        <div class="doc-title">공 정 이 동 표</div>
        <div class="a5-tag">A5 · 현품 동행 · 라우팅 시트${co?.name?` · ${_esc(co.name)}`:''}</div>
        <div class="rule"></div>
        <div class="top">
          <div class="top-info">
            <div class="ti-row"><span class="k">품번·품명</span><span class="v big">${_esc(lot.itemCode)} ${_esc(item.name||'')}</span></div>
            <div class="ti-row"><span class="k">생산 LOT</span><span class="v mono">${_esc(lot.plot_no)}</span></div>
            <div class="ti-row"><span class="k">소재 Heat</span><span class="v mono">${_esc(heats||'―')}</span></div>
            <div class="ti-row"><span class="k">지시수량</span><span class="v mono">${qty.toLocaleString()} ea</span></div>
            <div class="ti-row"><span class="k">납기</span><span class="v mono">${_esc(due||'―')}</span></div>
          </div>
          <img class="top-qr" src="${qr}">
        </div>
        <div class="sec-label">공정 진행 — 각 공정 완료 시 체크 · 서명</div>
        <table>
          <thead><tr><th>순번</th><th>공정</th><th class="c">완료</th><th class="c">양품</th><th>작업자</th><th style="text-align:right">일자</th></tr></thead>
          <tbody>${procRows}</tbody>
        </table>
        <div class="foot"><span>이 표는 현품과 함께 이동합니다 · 분실 주의</span><span>VELA SYSTEM</span></div>
      </div>`;
    }

    const css = `
      .page{width:559px;height:794px;background:#fff;padding:32px 34px;box-shadow:0 8px 30px rgba(0,0,0,.4)}
      .doc-title{text-align:center;font-size:21px;font-weight:900;letter-spacing:9px;padding-left:9px;margin-bottom:5px}
      .a5-tag{text-align:center;font-size:10px;color:#999;margin-bottom:10px}
      .rule{height:2.5px;background:#16181d;margin-bottom:14px}
      .top{display:flex;gap:16px;margin-bottom:16px}
      .top-info{flex:1}
      .ti-row{display:flex;padding:6px 0;border-bottom:1px solid #e2e4e8;font-size:13px}
      .ti-row .k{width:64px;color:#888;font-size:11px;font-weight:500;padding-top:2px}
      .ti-row .v{font-weight:700}
      .ti-row .v.big{font-size:16px}
      .top-qr{width:104px;height:104px;border:1px solid #ddd}
      .sec-label{font-size:11px;font-weight:700;color:#555;margin:6px 0 7px;letter-spacing:.5px}
      table{width:100%;border-collapse:collapse}
      th{background:#16181d;color:#fff;font-size:10px;font-weight:500;padding:8px 6px;text-align:left}
      th.c{text-align:center}
      td{border-bottom:1px solid #d5d7dc;padding:12px 6px;font-size:12px}
      .pseq{color:#999;font-size:11px;width:36px}
      .pname{font-weight:700;width:96px}
      .pcheck{text-align:center;width:74px}
      .pcheck .done{color:#0a7d3c;font-weight:700;font-size:11px}
      .pcheck .box{display:inline-block;width:16px;height:16px;border:1.5px solid #aaa;border-radius:3px}
      .pqty{text-align:center;width:52px;font-weight:600}
      .psign{font-size:11px;color:#444}

      .foot{margin-top:18px;font-size:10px;color:#888;border-top:1px solid #ddd;padding-top:9px;display:flex;justify-content:space-between}
    `;
    _openPrint(`공정 이동표 ${lots.length}장`, lots.map(page).join(''), css, { formKey:'move' });

  /* ===== ④ 외주 반출증 (form-os.html) — A4 = 위 A5(공급자) + 아래 A5(외주처) ===== */
  os(dispatchIds){
    const dispatches = (dispatchIds||[]).map(id=>DB.get('os_dispatches', id)).filter(Boolean);
    if(!dispatches.length){ toast('출력할 외주반출 없음','warn'); return; }

    function page(d){
      const co = getCompany();  // ★ v0.16.19 — 반출증 요약(bizSummary) 용
      const v = DB.get('vendors', d.vendor) || {};
      const p = DB.get('processes', d.proc) || {};
      const lot = DB.get('production_lots', d.plot_no) || {};
      const item = DB.get('items', lot.itemCode) || {};
      const bom = getBOM(lot.itemCode);
      const unitW = bom?.material?.weight || item.weight || 0;

        return `<div class="slip">
          <div class="copy-tag" style="background:${color}">${tag}</div>
          <div class="slip-title">외 주 반 출 증</div>

          <div class="slip-top">

              <div class="r"><span class="k">외주처</span><span class="v" style="font-weight:700">${_esc(v.name||d.vendor)}</span></div>
              <div class="r"><span class="k">공정</span><span class="v">${_esc(p.name||d.proc)}</span></div>

            <tbody>
              <tr>
                <td class="b">${_esc(lot.itemCode||'')} ${_esc(item.name||'')}</td>
                <td class="mono">${_esc(d.plot_no)}</td>
                <td class="c mono">${(d.qty||0).toLocaleString()}${(function(){
                  // ★ v0.16.18 — 입력 근거 (kg/plt) 외주처 검수용 표기 (print-safe)
                  if(d.input_mode==='kg' && d.input_value) return `<div style="font-size:9px;color:#666;font-weight:400">(계근 ${(+d.input_value).toLocaleString()}kg)</div>`;

                  return '';

                <td class="c mono">${unitW?unitW+'kg':'―'}</td>
                <td class="c mono">${totalW?Math.round(totalW).toLocaleString()+'kg':'―'}</td>
                <td class="c mono">${pallets?_esc(pallets)+' PLT':'―'}</td>
              </tr>
            </tbody>
          </table>
          <div class="totals">
            <span>총 반출수량 <b class="mono">${(d.qty||0).toLocaleString()} ea</b>${(d.input_mode==='kg' && d.input_value)?` <span style="font-size:10px;color:#666">(계근 ${(+d.input_value).toLocaleString()}kg)</span>`:(d.input_mode==='plt' && d.input_value)?` <span style="font-size:10px;color:#666">(${(+d.input_value).toLocaleString()}plt)</span>`:''}</span>
            <span>총 반출중량 <b class="mono">${totalW?Math.round(totalW).toLocaleString()+' kg':'―'}</b></span>
            <span>총 파렛트 <b class="mono">${pallets?_esc(pallets)+' PLT':'―'}</b></span>
          </div>

          </div>

            <div class="sign"><span>운송</span><span class="line"></span></div>
          </div>

      return `<div class="page">

      .totals b{font-family:'JetBrains Mono','Consolas',monospace;margin-left:5px}
      .party-summary{display:flex;flex-wrap:wrap;align-items:center;gap:2px;padding:6px 5px 2px;margin-top:6px;border-top:1px dashed #ddd;font-size:10.5px}
      .slip-foot{display:flex;gap:30px;margin-top:8px}

      .sign .line{flex:1;border-bottom:1px solid #999;height:18px}

    _openPrint(`외주 반출증 ${dispatches.length}건`, dispatches.map(page).join(''), css, { formKey:'os' });

  /* ===== ⑤ 거래명세서 (form-tx.html) — A4, 공급자/공급받는자 보관용 2장 ===== */
  tx(shipmentIds){
    const ships = (shipmentIds||[]).map(id=>DB.get('shipments', id)).filter(Boolean);
    if(!ships.length){ toast('출력할 출하 없음','warn'); return; }
    // 거래처별로 묶음
    const byCust = {};
    ships.forEach(sh=>{
      const so = DB.get('orders', sh.so_id);
      const custCode = so?.cust || '';
      if(!byCust[custCode]) byCust[custCode] = { custCode, ships: [] };
      byCust[custCode].ships.push({sh, so});
    });
    const co = getCompany();
    const date = fmtDate(Date.now());

    function page(group, copyTag, txNo){
      const cust = DB.get('vendors', group.custCode) || {};
      let total = 0;
      // ★ v0.16.23 — 7컬럼: 품명 | LOT | 수량 | 포장내역 | 단가 | 공급가액 | 파렛트
      //              규격 컬럼 제거(폭 확보) · 포장내역 = "N ea × M포장"(pack_qty_actual 있을 때만)
      //              수량 밑 소자 제거(포장내역 컬럼과 중복 방지)
      const dash = '<span style="color:#bbb">—</span>';
      const lineRows = group.ships.map(({sh, so})=>{
        const item = DB.get('items', sh.itemCode) || {};
        const price = so?.price || item.price || 0;
        const amt = (sh.qty||0) * price;
        total += amt;
        const pkg = (sh.pack_qty_actual!=null && +sh.pack_qty_actual>0) ? +sh.pack_qty_actual : null;
        const pkgCell = (pkg && (sh.qty||0)>0)
          ? `${pkg.toLocaleString()} ea × ${Math.ceil((sh.qty||0)/pkg).toLocaleString()}포장`
          : dash;
        const lotCell  = sh.plot_no ? `<b class="mono">${_esc(sh.plot_no)}</b>` : dash;
        const pltCell  = (sh.pallets!=null && +sh.pallets>0) ? `${(+sh.pallets).toLocaleString()} PLT` : dash;
        return `<tr>
          <td class="b"><b>${_esc(sh.itemCode)}</b> ${_esc(item.name||'')}</td>
          <td class="c">${lotCell}</td>
          <td class="c mono">${(sh.qty||0).toLocaleString()}</td>
          <td class="c">${pkgCell}</td>
          <td class="r mono">${price.toLocaleString()}</td>
          <td class="r mono">${amt.toLocaleString()}</td>
          <td class="c mono">${pltCell}</td>
        </tr>`;
      }).join('');
      // 빈 줄 채움 (총 8줄 — compact 헤더로 확보한 공간)
      const blanks = Math.max(0, 8 - group.ships.length);

      // ★ v0.16.21 — 명세서는 compact 로 (품목 공간 확보) · 발주서 등 기존 호출은 무영향
      return `<div class="page">

      pages.push(page(g, '공급자 보관용', txNo));

          <td>${_esc(it.spec||'')}</td>

      label: '여러 LOT 선택 → 6격자 라벨. 같은 LOT을 N장 인쇄하려면 우측 수량 조정. 6개 넘으면 다음 페이지.',
      move: 'LOT당 A5 1장씩 연속 출력. 공정 라우트가 동적으로 채워지고, 완료 공정은 ✓ 표시.',
      os: '외주 반출 건당 A4 (위 공급자 보관용 / 아래 외주처 보관용 · 절취선).',
      tx: '출하 → 거래처별로 묶어서 거래명세서 출력 (공급자 보관용 + 공급받는자용 = 2장).',
    };
    help.textContent = HELP[docType] || '';

    if(!ids.length){
      list.innerHTML = `<div class="empty">대상 데이터 없음 — 먼저 해당 화면에서 생성하세요.</div>`;
      btn.disabled = true;
      btn.innerHTML = `${ico('print')}인쇄 (0)`;
      return;
    }

    if(docType==='wo'){
      title.innerHTML = `작업지시 (WO) 선택 <span class="tag" style="font-size:11px;color:var(--sub);margin-left:6px">${ids.length}건</span>`;
      list.innerHTML = `<div class="tbl-wrap"><table>
        <thead><tr><th style="width:36px"></th><th>WO번호</th><th>품번·품명</th><th>생산LOT</th><th class="num">지시수량</th><th>생성일</th></tr></thead>
        <tbody>${ids.map(id=>{
          const w = DB.get('work_orders', id);
          const item = DB.get('items', w.itemCode);
          const on = selection.has(id);
          return `<tr>
            <td><input type="checkbox" data-sel="${id}" ${on?'checked':''}></td>
            <td><b>${_esc(id)}</b></td>
            <td>${_esc(w.itemCode)} · ${_esc(item?.name||'')}</td>
            <td><span class="pill cyan">${_esc(w.plot_no)}</span></td>
            <td class="num">${(w.qty||0).toLocaleString()}</td>
            <td class="muted">${fmtDate(w.created)}</td>
          </tr>`;
        }).join('')}</tbody>
      </table></div>`;
    }
    else if(docType==='label'){
      title.innerHTML = `LOT 라벨 선택 <span class="tag" style="font-size:11px;color:var(--sub);margin-left:6px">${ids.length}개 · 6/페이지 · 포장단위 기준+실측</span>`;
      list.innerHTML = `<div class="tbl-wrap"><table>
        <thead><tr>
          <th style="width:36px"></th>
          <th>LOT</th><th>품번</th><th>품명</th>
          <th class="num">초기수량</th>
          <th class="num" style="width:110px">포장단위(기준)</th>
          <th class="num" style="width:118px">실제 포장수량</th>
          <th class="num" style="width:96px">인쇄매수</th>
        </tr></thead>
        <tbody>${ids.map(pn=>{
          const l = DB.get('production_lots', pn);
          const item = DB.get('items', l.itemCode);
          const on = selection.has(pn);
          const qty0 = (l.qty_initial||0);
          // ★ v0.16.11 — 기준 pack_qty (표준) · 실제 = 세션 입력 (기본=표준, 없으면 빈칸)
          const std = (item?.pack_qty!=null && +item.pack_qty>0) ? +item.pack_qty : null;
          const actual = (labelActuals[pn]!=null) ? labelActuals[pn] : (std!=null ? std : '');
          // 인쇄매수 기본: ceil(초기수량 / 실제) · 실제 없으면 1 (수동)
          const autoRep = (+actual>0 && qty0>0) ? Math.ceil(qty0 / +actual) : 1;
          const rep = (labelReps[pn]!=null) ? labelReps[pn] : autoRep;
          const stdDisp = std!=null
            ? `<span style="font-family:'JetBrains Mono',monospace">${std.toLocaleString()}</span>`
            : '<span class="muted">—</span>';
          return `<tr>
            <td><input type="checkbox" data-sel="${pn}" ${on?'checked':''}></td>
            <td><b class="mono" style="font-family:'JetBrains Mono',monospace">${_esc(pn)}</b></td>
            <td>${_esc(l.itemCode)}</td>
            <td>${_esc(item?.name||'')}</td>
            <td class="num">${qty0.toLocaleString()}</td>
            <td class="num">${stdDisp}</td>
            <td class="num"><input type="number" min="1" step="1" value="${actual===''?'':actual}" data-actual="${pn}" placeholder="${std!=null?std:'—'}" style="width:88px;text-align:right;padding:4px 6px"></td>
            <td class="num"><input type="number" min="1" max="60" value="${rep}" data-rep="${pn}" style="width:64px;text-align:center;padding:4px 6px"></td>
          </tr>`;
        }).join('')}</tbody>
      </table></div>
      <div style="font-size:11px;color:var(--sub);background:var(--bg2);border:1px solid var(--line);border-radius:8px;padding:9px 12px;margin-top:8px;line-height:1.7">
        <b style="color:var(--amber)">규칙</b> 라벨은 <b>실측(실제 포장수량)</b> 인쇄 — 마지막 박스 잔량 등 상황 반영. 실제 수정 시 인쇄매수 = ceil(초기수량 / 실제) 자동 재계산(수동 조정 가능). 품번 마스터의 표준 pack_qty 는 인쇄로 <b>덮어쓰지 않음</b>.
      </div>`;
      document.querySelectorAll('[data-actual]').forEach(inp=>inp.oninput=()=>{
        const pn = inp.dataset.actual;
        const raw = inp.value.trim();
        const v = raw==='' ? null : Math.max(1, Math.floor(+raw||0));
        labelActuals[pn] = v;
        // 매수 자동 재계산 (사용자가 매수 입력을 직접 건드리기 전 상태만 갱신)
        const l = DB.get('production_lots', pn);
        const qty0 = (l?.qty_initial||0);
        const autoRep = (v!=null && v>0 && qty0>0) ? Math.ceil(qty0 / v) : 1;
        labelReps[pn] = autoRep;
        const repEl = document.querySelector(`[data-rep="${pn}"]`);
        if(repEl) repEl.value = autoRep;
      });
      document.querySelectorAll('[data-rep]').forEach(inp=>inp.onchange=()=>{
        const pn = inp.dataset.rep;
        const v = Math.max(1, +inp.value||1);
        labelReps[pn] = v;
      });
    }
    else if(docType==='move'){
      title.innerHTML = `LOT 선택 (공정 이동표) <span class="tag" style="font-size:11px;color:var(--sub);margin-left:6px">${ids.length}개 · A5 LOT당 1장</span>`;
      list.innerHTML = `<div class="tbl-wrap"><table>
        <thead><tr><th style="width:36px"></th><th>LOT</th><th>품번·품명</th><th>type</th><th>heat</th><th class="num">초기수량</th></tr></thead>
        <tbody>${ids.map(pn=>{
          const l = DB.get('production_lots', pn);
          const item = DB.get('items', l.itemCode);
          const on = selection.has(pn);
          return `<tr>
            <td><input type="checkbox" data-sel="${pn}" ${on?'checked':''}></td>
            <td><b>${_esc(pn)}</b></td>
            <td>${_esc(l.itemCode)} · ${_esc(item?.name||'')}</td>
            <td><span class="pill ${l.type==='merged'?'heat':l.type==='split'?'blue':'gray'}">${l.type}</span></td>
            <td class="muted">${(l.heat_nos||[]).join(',')||'―'}</td>
            <td class="num">${(l.qty_initial||0).toLocaleString()}</td>
          </tr>`;
        }).join('')}</tbody>
      </table></div>`;
    }
    else if(docType==='os'){
      title.innerHTML = `외주 반출 건 선택 <span class="tag" style="font-size:11px;color:var(--sub);margin-left:6px">${ids.length}건</span>`;
      list.innerHTML = `<div class="tbl-wrap"><table>
        <thead><tr><th style="width:36px"></th><th>일시</th><th>전표No</th><th>외주처</th><th>공정</th><th>LOT</th><th class="num">반출</th></tr></thead>
        <tbody>${ids.map(id=>{
          const d = DB.get('os_dispatches', id);
          const v = DB.get('vendors', d.vendor);
          const p = DB.get('processes', d.proc);
          const on = selection.has(id);
          return `<tr>
            <td><input type="checkbox" data-sel="${id}" ${on?'checked':''}></td>
            <td class="muted">${fmtDate(d.ts)}</td>
            <td><b>${_esc(id)}</b></td>
            <td>${_esc(v?.name||d.vendor)}</td>
            <td>${_esc(p?.name||d.proc)}</td>
            <td><span class="pill cyan">${_esc(d.plot_no)}</span></td>
            <td class="num">${(d.qty||0).toLocaleString()}</td>
          </tr>`;
        }).join('')}</tbody>
      </table></div>`;
    }
    else if(docType==='tx'){
      title.innerHTML = `출하 선택 (거래명세서) <span class="tag" style="font-size:11px;color:var(--sub);margin-left:6px">${ids.length}건 · 거래처별 묶음</span>`;
      list.innerHTML = `<div class="tbl-wrap"><table>
        <thead><tr><th style="width:36px"></th><th>일시</th><th>출하번호</th><th>거래처</th><th>품번</th><th class="num">수량</th><th class="num">금액</th></tr></thead>
        <tbody>${ids.map(id=>{
          const sh = DB.get('shipments', id);
          const so = DB.get('orders', sh.so_id);
          const cust = DB.get('vendors', so?.cust);
          const amt = (sh.qty||0) * (so?.price||0);
          const on = selection.has(id);
          return `<tr>
            <td><input type="checkbox" data-sel="${id}" ${on?'checked':''}></td>
            <td class="muted">${fmtDate(sh.ts)} ${fmtTime(sh.ts)}</td>
            <td><b>${_esc(id)}</b></td>
            <td>${_esc(cust?.name||so?.cust||'미지정')}</td>
            <td>${_esc(sh.itemCode)}</td>
            <td class="num">${(sh.qty||0).toLocaleString()}</td>
            <td class="num">₩${amt.toLocaleString()}</td>
          </tr>`;
        }).join('')}</tbody>
      </table></div>`;
    }

    document.querySelectorAll('[data-sel]').forEach(cb=>cb.onchange = ()=>{
      const id = cb.dataset.sel;
      if(cb.checked) selection.add(id); else selection.delete(id);
      updateBtn();
    });
    updateBtn();
  }

  function updateBtn(){
    const btn = document.getElementById('btn-print');
    btn.disabled = selection.size===0;
    btn.innerHTML = `${ico('print')}인쇄 (${selection.size})`;
  }

  function doPrint(){
    if(selection.size===0) return;
    const ids = Array.from(selection);
    if(docType==='wo')    printForm.wo(ids);
    else if(docType==='label') printForm.label(ids.map(pn=>({plot_no:pn, repeat:labelReps[pn]||1, pack_qty_actual: (labelActuals[pn]!=null? labelActuals[pn] : null)})));
    else if(docType==='move')  printForm.move(ids);
    else if(docType==='os')    printForm.os(ids);
    else if(docType==='tx')    printForm.tx(ids);
  }

  render();
};

/* ★ v0.6.0 — BOM 라우트 편집 모달 */
VIEWS._editBOM = (itemCode) => {
  const item = DB.get('items', itemCode);
  const bom = getBOM(itemCode) || { code:itemCode, name:item?.name||itemCode, rev:'A',
    material:{ type:item?.mat||'', dia:item?.dia||0, weight:item?.weight||0 }, route:[] };
  const allProcs = getProcesses();
  // 임시 라우트(편집용) — seq 순으로
  let route = (bom.route||[]).slice().sort((a,b)=>(a.seq||0)-(b.seq||0));

  function render(){
    const used = new Set(route.map(r=>r.proc));
    const avail = allProcs.filter(p=>!used.has(p.code));
    document.getElementById('bom-route').innerHTML = route.length? route.map((r,i)=>{
      const p = DB.get('processes', r.proc);
      return `<div class="feed-row" style="grid-template-columns:60px 1fr 100px auto">
        <span class="t">seq ${r.seq||(i+1)*10}</span>
        <span class="e"><b>${p?.name||r.proc}</b> <span class="muted">(${r.proc})</span></span>
        <select data-mode="${i}" style="padding:5px 8px;font-size:11px">
          <option value="in"${r.mode==='in'?' selected':''}>사내</option>
          <option value="out"${r.mode==='out'?' selected':''}>외주</option>
          <option value="both"${r.mode==='both'?' selected':''}>양쪽</option>
        </select>
        <span style="display:flex;gap:4px">
          <button class="btn ghost" data-up="${i}" ${i===0?'disabled':''}>↑</button>
          <button class="btn ghost" data-down="${i}" ${i===route.length-1?'disabled':''}>↓</button>
          <button class="btn warn" data-rm="${i}">${ico('trash')}</button>
        </span>
      </div>`;
    }).join('') : '<div class="empty">라우트가 비었습니다. 아래에서 공정 추가</div>';

    document.getElementById('bom-add').innerHTML = avail.length? `
      <select id="bom-add-proc" style="flex:1">${avail.map(p=>`<option value="${p.code}">${p.name} (${p.code})</option>`).join('')}</select>
      <button class="btn primary" id="bom-add-btn">${ico('plus')}추가</button>
    ` : `<span class="muted" style="font-size:11px">모든 공정이 추가됨</span>`;

    route.forEach((r,i)=>{
      document.querySelector(`[data-mode="${i}"]`).onchange = e=>{ route[i].mode = e.target.value; };
    });
    document.querySelectorAll('[data-up]').forEach(b=>b.onclick=()=>{ const i=+b.dataset.up; [route[i-1],route[i]]=[route[i],route[i-1]]; render(); });
    document.querySelectorAll('[data-down]').forEach(b=>b.onclick=()=>{ const i=+b.dataset.down; [route[i+1],route[i]]=[route[i],route[i+1]]; render(); });
    document.querySelectorAll('[data-rm]').forEach(b=>b.onclick=()=>{ route.splice(+b.dataset.rm,1); render(); });
    const addBtn = document.getElementById('bom-add-btn');
    if(addBtn) addBtn.onclick = ()=>{
      const code = document.getElementById('bom-add-proc').value;
      const p = DB.get('processes', code);
      route.push({ proc:code, mode:p?.type==='out'?'out':'in', seq:(route.length+1)*10 });
      render();
    };
  }

  openModal(`
    <h2>BOM 라우트 편집 — ${itemCode} <button class="x" onclick="closeModal()">${ico('x')}</button></h2>
    <div class="body">
      <div class="grid g3">
        <div><label>Rev</label><input id="bom-rev" value="${bom.rev||'A'}"></div>

/* -------------------------------------------------------------------------------------------------
   §원가 계산 헬퍼 — v0.7.0
   품번 표준원가 = 재료 + 외주 + 가공 + 간접
   재료 = bom.material.weight(kg) × 자재단가(₩/kg)
   외주 = route 중 mode='out' 공정의 외주단가 합
   가공 = route 중 사내 공정의 가공단가 합 (간이: ₩/ea)
   간접 = (재료+외주+가공) × overhead_pct
   ------------------------------------------------------------------------------------------------- */
function computeCost(itemCode){
  const rates = DB.get('settings','cost_rates') || defaultCostRates();
  const item = DB.get('items', itemCode);
  const bom  = getBOM(itemCode);
  if(!bom) return null;
  const matKey = bom.material?.type || item?.mat || '';
  const matRate = rates.material_rates?.[matKey] || 0;
  const matKg = bom.material?.weight || item?.weight || 0;
  const material = matKg * matRate;
  let outsource = 0, process = 0;
  const route = getRoute(itemCode);
  route.forEach(r=>{
    if(r.proc==='SHIP') return;
    if(r.mode==='out') outsource += rates.outsource_rates?.[r.proc] || 0;
    else               process   += rates.process_rates?.[r.proc]   || 0;
  });
  const subtotal = material + outsource + process;
  const overhead = subtotal * (rates.overhead_pct || 0);
  const total    = subtotal + overhead;
  return { material, outsource, process, overhead, total,
           rate_meta: { matKey, matKg, matRate, overhead_pct: rates.overhead_pct||0 } };
}
/* =================================================================================================
   ★ v0.16.5 — calcLotCost(plot_no) : LOT 실제원가 (계산 헬퍼 1벌 · 렌더 N곳)
   · 소재 = 첫 공정 양품 × 품번 weight(kg/ea) × material_rates[재질]
   · 가공 = Σ (사내 공정 live 양품 × process_rates[proc])  — SHIP 제외
   · 외주 = Σ (외주 공정 live 입고 양품(good) × outsource_rates[proc])  — os_dispatches↔os_receipts
   · 간접 = (mat+proc+os) × overhead_pct
   · 요율 미등록(값이 있는 항목에 한해) → 해당 부분·total 모두 null (missing[] 누적, 부분합 위장 금지)
   · perEa = total / lotCompletedQty (완성수량>0 & total 있을 때)
   · void 실적은 DB 레이어(all/query)가 자동 제외 — 개별 필터 금지.
   ================================================================================================= */
function calcLotCost(plot_no){
  const lot = DB.get('production_lots', plot_no);
  if(!lot) return null;
  const item  = DB.get('items', lot.itemCode);
  const bom   = getBOM(lot.itemCode);
  const route = getRoute(lot.itemCode);
  const rates = DB.get('settings','cost_rates') || defaultCostRates();
  const missing = [];

  // ── 소재 (그 LOT 첫 공정 양품 × 품번 weight × 재질요율)
  const matKey  = bom?.material?.type || item?.mat || '';
  const wtPerEa = +(bom?.material?.weight ?? item?.weight ?? 0) || 0;
  const firstProc = route[0]?.proc || null;
  const firstGood = firstProc ? LOT.totalGood(plot_no, firstProc) : 0;
  const kgIn = firstGood * wtPerEa;
  let matAmount = 0, matRate = null;
  if(kgIn > 0){
    if(matKey && rates.material_rates && rates.material_rates[matKey] != null){
      matRate   = +rates.material_rates[matKey];
      matAmount = kgIn * matRate;
    } else {
      matAmount = null;
      missing.push(`재질 ${matKey||'?'}`);
    }
  }

  // ── 가공 (사내 공정별)
  const procParts = [];
  let procAmount = 0, procHasNull = false;
  route.forEach(r=>{
    if(r.proc==='SHIP' || r.mode!=='in') return;
    const good = LOT.totalGood(plot_no, r.proc);
    const rate = rates.process_rates?.[r.proc];
    if(good<=0){
      procParts.push({proc:r.proc, good:0, rate: rate!=null?+rate:null, amount:0});
      return;
    }
    if(rate==null){
      procParts.push({proc:r.proc, good, rate:null, amount:null});
      missing.push(`공정 ${r.proc}`);
      procHasNull = true;
    } else {
      const amt = good * (+rate);
      procParts.push({proc:r.proc, good, rate:+rate, amount:amt});
      procAmount += amt;
    }
  });
  if(procHasNull) procAmount = null;

  // ── 외주 (외주 공정별 · live os_receipts.good 합)
  const osParts = [];
  let osAmount = 0, osHasNull = false;
  route.forEach(r=>{
    if(r.mode!=='out') return;
    const dispIds = DB.query('os_dispatches', d => d.plot_no===plot_no && d.proc===r.proc).map(d=>d.id);
    const goodQty = dispIds.length
      ? DB.query('os_receipts', rc => dispIds.includes(rc.dispatch_id)).reduce((s,rc)=>s+(+rc.good||0), 0)
      : 0;
    const rate = rates.outsource_rates?.[r.proc];
    if(goodQty<=0){
      osParts.push({proc:r.proc, qty:0, rate: rate!=null?+rate:null, amount:0});
      return;
    }
    if(rate==null){
      osParts.push({proc:r.proc, qty:goodQty, rate:null, amount:null});
      missing.push(`외주 ${r.proc}`);
      osHasNull = true;
    } else {
      const amt = goodQty * (+rate);
      osParts.push({proc:r.proc, qty:goodQty, rate:+rate, amount:amt});
      osAmount += amt;
    }
  });
  if(osHasNull) osAmount = null;

  // ── 간접비 · 합계 · 개당 (null 전파 — 부분합 위장 금지)
  const anyNull = (matAmount==null) || (procAmount==null) || (osAmount==null);
  const ovhPct  = +rates.overhead_pct || 0;
  const subtotal = anyNull ? null : ((matAmount||0)+(procAmount||0)+(osAmount||0));
  const ovhAmount = subtotal==null ? null : subtotal*ovhPct;
  const total = subtotal==null ? null : subtotal + ovhAmount;
  const done  = lotCompletedQty(plot_no, lot.itemCode);
  const perEa = (total==null || done<=0) ? null : (total/done);

  return {
    mat:  { key:matKey, kgIn, rate:matRate, amount:matAmount },
    proc: { parts:procParts, amount:procAmount },
    os:   { parts:osParts,   amount:osAmount },
    ovh:  { pct:ovhPct, amount:ovhAmount },
    total, perEa, done, missing,
  };
}
// 실제원가 — LOT 실적 기반 (yield 반영 — 양품 1개당 실제 비용)
function computeActualCost(itemCode){
  const std = computeCost(itemCode);
  if(!std) return null;
  const lots = DB.query('production_lots', l=>l.itemCode===itemCode);
  if(!lots.length) return null;
  const route = getRoute(itemCode);
  const lastProd = route.length>1 ? route[route.length-2] : route[0];
  let totalGood = 0, totalInput = 0;
  lots.forEach(l=>{
    totalGood  += LOT.totalGood(l.plot_no, lastProd.proc);
    totalInput += l.qty_initial||0;
  });
  if(totalGood<=0) return null;
  const yieldR = totalInput? totalGood/totalInput : 1;
  const factor = yieldR>0? 1/yieldR : 1;   // 손실 클수록 양품당 원가 ↑
  return {
    material: std.material*factor, outsource: std.outsource*factor,
    process:  std.process*factor,  overhead: std.overhead*factor,
    total:    std.total*factor,
    yield: yieldR, totalGood, totalInput,
  };
}

    const row = (lab,s,a)=>`<tr><td>${lab}</td><td class="num">₩${Math.round(s).toLocaleString()}</td><td class="num">${a?'₩'+Math.round(a).toLocaleString():'<span class="muted">―</span>'}</td></tr>`;
    return `
      <div class="card" style="margin:0">
        <h3>${i.code} · ${i.name} <span class="tag">${std.rate_meta.matKey} · ${std.rate_meta.matKg}kg</span></h3>
        <table style="margin-bottom:6px">
          <thead><tr><th></th><th class="num">표준</th><th class="num">실제 ${act?`(수율 ${(act.yield*100).toFixed(1)}%)`:''}</th></tr></thead>
          <tbody>
            ${row('재료', std.material, act?.material)}
            ${row('외주', std.outsource, act?.outsource)}
            ${row('가공', std.process, act?.process)}
            ${row('간접', std.overhead, act?.overhead)}
            <tr style="background:var(--bg2)"><td><b>합계</b></td><td class="num"><b>₩${Math.round(std.total).toLocaleString()}</b></td><td class="num"><b>${act?'₩'+Math.round(act.total).toLocaleString():'<span class="muted">―</span>'}</b></td></tr>
          </tbody>
        </table>
        ${i.price? `<div style="font-size:11px;color:var(--sub);margin-top:6px">판매 ₩${i.price.toLocaleString()} · 표준마진 ₩${Math.round(i.price-std.total).toLocaleString()} (${(((i.price-std.total)/i.price)*100).toFixed(1)}%)</div>`:''}
      </div>
    `;
  }).join('');

  // 단가표 편집 모달
  document.getElementById('btn-cost-rates').onclick = ()=>{
    const r = DB.get('settings','cost_rates') || defaultCostRates();
    const inProcs = procs.filter(p=>p.code!=='SHIP' && (p.type==='in'||p.type==='both'));
    const outProcs = procs.filter(p=>p.type==='out'||p.type==='both');
    openModal(`
      <h2>원가 단가표 편집 <button class="x" onclick="closeModal()">${ico('x')}</button></h2>
      <div class="body">
        <div>
          <label>자재 단가 (₩/kg)</label>
          <div class="grid g2" id="cr-mats">
            ${mats.map(m=>`
              <div style="display:flex;gap:6px;align-items:center">
                <span style="min-width:80px;font-family:'JetBrains Mono',monospace;font-size:12px">${m}</span>
                <input data-mat="${m}" type="number" value="${r.material_rates?.[m]||0}">
              </div>
            `).join('')}
          </div>
        </div>
        <div>
          <label>사내 공정 가공단가 (₩/ea · 간이)</label>
          <div class="grid g2">
            ${inProcs.map(p=>`
              <div style="display:flex;gap:6px;align-items:center">
                <span style="min-width:80px;font-family:'JetBrains Mono',monospace;font-size:12px">${p.code}</span>
                <input data-proc="${p.code}" type="number" value="${r.process_rates?.[p.code]||0}">
              </div>
            `).join('')}
          </div>
        </div>
        <div>
          <label>외주 공정 단가 (₩/ea)</label>
          <div class="grid g2">
            ${outProcs.map(p=>`
              <div style="display:flex;gap:6px;align-items:center">
                <span style="min-width:80px;font-family:'JetBrains Mono',monospace;font-size:12px">${p.code}</span>
                <input data-out="${p.code}" type="number" value="${r.outsource_rates?.[p.code]||0}">
              </div>
            `).join('')}
          </div>
        </div>
        <div><label>간접비율 (%)</label>
          <input id="cr-ovr" type="number" step="0.1" value="${((r.overhead_pct||0)*100).toFixed(1)}"></div>
        <div class="actions">
          <button class="btn" onclick="closeModal()">취소</button>
          <button class="btn primary" id="cr-ok">${ico('save')}저장</button>
        </div>
      </div>
    `);
    document.getElementById('cr-ok').onclick = ()=>{
      const mat = {}, prc = {}, out = {};
      document.querySelectorAll('[data-mat]').forEach(i=>mat[i.dataset.mat] = +i.value||0);
      document.querySelectorAll('[data-proc]').forEach(i=>prc[i.dataset.proc] = +i.value||0);
      document.querySelectorAll('[data-out]').forEach(i=>out[i.dataset.out] = +i.value||0);
      const ovr = (+document.getElementById('cr-ovr').value||0)/100;
      DB.set('settings','cost_rates',{material_rates:mat, process_rates:prc, outsource_rates:out, overhead_pct:ovr});
      toast('단가표 저장','ok'); closeModal(); router();
    };
  };
};

VIEWS.quote = () => {

  }
  const quotes = DB.all('quotes').sort((a,b)=>(b.created||0)-(a.created||0));
  // v0.15.0 — 신규 견적 select: 활성 품번·활성 고객사만
  const items = getActiveItems();

  // KPI

  document.getElementById('view').innerHTML = `

      <div class="pgtools">
        <button class="btn" onclick="exportXlsx(DB.all('quotes'),'QUOTES','견적_${fmtDate(Date.now())}.xlsx')">${ico('excel')}엑셀</button>

      </div>
    </div>

    <div class="grid g4">
      <div class="kpi-mini"><div class="lab">${ico('check')}진행중 견적</div><div class="val c">${draft+sent}<span style="font-size:12px;color:var(--sub)">건</span></div><div class="sub">작성 ${draft} · 발송 ${sent}</div></div>
      <div class="kpi-mini"><div class="lab">${ico('check')}수주전환</div><div class="val g">${won}<span style="font-size:12px;color:var(--sub)">건</span></div><div class="sub">전환율 ${winRate}%</div></div>
      <div class="kpi-mini"><div class="lab">${ico('check')}실주</div><div class="val r">${lost}<span style="font-size:12px;color:var(--sub)">건</span></div><div class="sub">실주 사유 분석 대상</div></div>
      <div class="kpi-mini"><div class="lab">${ico('check')}진행 금액</div><div class="val h">₩${(inflight/1e6).toFixed(1)}<span style="font-size:12px;color:var(--sub)">M</span></div><div class="sub">작성+발송 합계</div></div>
    </div>

    <div class="card">
      <h3>견적 내역 <span class="tag">전체 ${quotes.length}건</span></h3>
      <div class="tbl-wrap"><table>
        <thead><tr><th>견적번호</th><th>고객</th><th>품번</th><th class="num">수량</th><th class="num">단가</th><th class="num">금액</th><th>마진율</th><th>유효일</th><th>상태</th><th></th></tr></thead>
        <tbody>${quotes.length? quotes.map(q=>{
          const stPill = q.status==='won'?'green': q.status==='lost'?'red': q.status==='sent'?'heat':'gray';
          const stLab = ({draft:'작성',sent:'발송',won:'수주전환',lost:'실주'})[q.status]||q.status;
          return `<tr>
            <td><b>${q.id}</b>${q.so_id?`<div style="font-size:10px;color:var(--cyan)">→ ${q.so_id}</div>`:''}</td>
            <td>${DB.get('vendors',q.cust)?.name||q.cust}</td>
            <td>${q.itemCode}</td>
            <td class="num">${(q.qty||0).toLocaleString()}</td>
            <td class="num">₩${(q.unit_price||0).toLocaleString()}</td>
            <td class="num">₩${(q.total_amount||0).toLocaleString()}</td>
            <td class="num">${(q.margin_pct||0).toFixed(1)}%</td>
            <td class="muted">${q.valid_until||'―'}</td>
            <td><span class="pill ${stPill}">${stLab}</span></td>
            <td style="display:flex;gap:4px">
              <button class="btn ghost" title="견적서" onclick="VIEWS._printQuote('${q.id}')">${ico('print')}</button>
              ${q.status==='draft'||q.status==='sent'? `
                <button class="btn" title="수주전환" onclick="VIEWS._quoteWin('${q.id}')">${ico('check')}</button>
                <button class="btn warn" title="실주" onclick="VIEWS._quoteLost('${q.id}')">${ico('x')}</button>` : ''}
            </td>
          </tr>`;
        }).join('') : '<tr><td colspan="10" class="empty">견적 없음 — [새 견적] 으로 시작</td></tr>'}</tbody>
      </table></div>
    </div>
  `;

  document.getElementById('btn-q-new').onclick = ()=>{
    if(!custs.length){ toast('고객사 마스터 없음','warn'); return; }
    // ★ v0.16.21 — 원가 산출 내역 (접이식 · 세션 draft)
    // ★ v0.16.24 — 행 구조 확장: {cat, name(항목), qty, unit, price, amt}. qty·price 둘 다면 amt 자동 · 아니면 수기.
    let breakdownRows = [];
    let overrideCostTotal = null;   // [견적 단가에 반영] 시 c.total 대체
    openModal(`
      <h2>새 견적 (RFQ → 원가기반 산출) <button class="x" onclick="closeModal()">${ico('x')}</button></h2>
      <div class="body">
        <div><label>견적번호 (자동 · 수정 가능)</label>
          <input id="q-id" value="${nextDocNo('Q')}" placeholder="${nextDocNo('Q')}" style="font-family:'JetBrains Mono',monospace;letter-spacing:.3px" autocomplete="off"></div>
        <div class="grid g2">
          <div><label>고객사</label>
            <select id="q-cust">${custs.map(c=>`<option value="${c.code}">${c.name}</option>`).join('')}</select></div>
          <div><label>품번</label>
            <select id="q-item">${items.map(i=>`<option value="${i.code}">${i.code} · ${i.name}</option>`).join('')}</select></div>
        </div>
        <div class="grid g3">
          <div><label>수량 (ea)</label><input id="q-qty" type="number" value="100"></div>
          <div><label>마진율 (%)</label><input id="q-margin" type="number" step="0.5" value="15"></div>
          <div><label>유효기간</label><input id="q-valid" type="date" value="${fmtDate(Date.now()+30*86400000)}"></div>
        </div>
        <div class="card" style="margin:0;padding:12px;background:var(--bg2)">
          <h3 style="margin-bottom:8px">원가 산출 미리보기 <span class="tag">단가표 기반</span></h3>
          <div id="q-preview" style="font-size:12px;line-height:1.8"></div>
        </div>
        <!-- ★ v0.16.21 — 원가 산출 내역 (접이식) -->
        <details style="border:1px solid var(--line);border-radius:10px;background:var(--bg2)">
          <summary style="cursor:pointer;padding:10px 14px;font-size:13px;font-weight:700">원가 산출 내역 <span style="color:var(--dim);font-weight:400;font-size:11px">— 항목별 수기 산출 · 표준원가 불러오기 · 견적 단가 반영</span></summary>
          <div style="padding:6px 14px 14px">
            <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px">
              <button type="button" class="btn" id="q-bd-add">${ico('plus')}행 추가</button>
              <button type="button" class="btn" id="q-bd-std">${ico('refresh')}표준원가 불러오기</button>
              <button type="button" class="btn primary" id="q-bd-apply" disabled>${ico('save')}견적 단가에 반영</button>
            </div>
            <div id="q-bd-body"></div>
            <div style="display:flex;justify-content:space-between;padding:8px 4px 0;border-top:1px solid var(--line);margin-top:8px;font-size:12.5px">
              <span style="color:var(--sub)">합계</span>
              <span id="q-bd-sum" style="font-family:'JetBrains Mono',monospace;font-weight:700;color:var(--cyan)">₩0</span>
            </div>
          </div>
        </details>
        <div class="actions">
          <button class="btn" onclick="closeModal()">취소</button>
          <button class="btn primary" id="q-ok">${ico('save')}견적 저장</button>
        </div>
      </div>
    `, { width: '760px' });
    // ── 원가 산출 내역 rendering / 이벤트 ───────────────────────────────
    const bdCats  = ['재료비','가공비','외주비','간접비','기타'];
    const bdUnits = ['ea','kg','hr','식','기타'];
    // ★ v0.16.24 — 행 표시값 정규화: 구형 {basis, amt} 는 name 으로 이월 (변환 저장 강제 X · 표시만)
    function bdRowAmt(r){
      const qty = +r.qty||0, price = +r.price||0;
      return (qty>0 && price>0) ? qty*price : (+r.amt||0);
    }
    function renderBd(){
      const box = document.getElementById('q-bd-body');
      if(!breakdownRows.length){
        box.innerHTML = '<div style="color:var(--dim);font-size:11.5px;padding:10px 0">행 없음 — [+ 행 추가] 또는 [표준원가 불러오기]</div>';
      } else {
        // ★ v0.16.24 — 6컬럼: 구분 | 항목 | 수량 | 단위 | 단가 | 금액 | 삭제
        //   qty·price 둘 다 > 0 → amt = qty×price 자동, amt 입력 read-only
        //   아니면 amt 수기 입력 허용 (예: 금형 상각)
        box.innerHTML = `
          <div style="display:grid;grid-template-columns:88px 1fr 68px 62px 92px 100px 28px;gap:5px;padding:0 2px 4px;font-size:10px;color:var(--sub);letter-spacing:.4px">
            <span>구분</span><span>항목</span><span style="text-align:right">수량</span><span style="text-align:center">단위</span><span style="text-align:right">단가</span><span style="text-align:right">금액</span><span></span>
          </div>
        ` + breakdownRows.map((r, i) => {
          const auto = (+r.qty>0 && +r.price>0);
          const shownAmt = Math.round(bdRowAmt(r));
          const name = r.name!=null ? r.name : (r.basis||'');
          return `
          <div style="display:grid;grid-template-columns:88px 1fr 68px 62px 92px 100px 28px;gap:5px;margin-bottom:5px;align-items:center">
            <select class="bd-cat" data-i="${i}" style="padding:6px 6px;font-size:12px">${bdCats.map(c => `<option value="${c}" ${r.cat===c?'selected':''}>${c}</option>`).join('')}</select>
            <input class="bd-name" data-i="${i}" value="${_esc(name)}" placeholder="항목 (예: SCM440 · CUT 절단 · 금형 상각)" style="padding:6px 8px;font-size:12px">
            <input class="bd-qty" data-i="${i}" type="number" min="0" step="any" value="${r.qty!=null?r.qty:''}" placeholder="—" style="padding:6px 6px;font-size:12px;text-align:right;font-family:'JetBrains Mono',monospace">
            <select class="bd-unit" data-i="${i}" style="padding:6px 4px;font-size:12px;text-align:center">${bdUnits.map(u => `<option value="${u}" ${r.unit===u?'selected':''}>${u}</option>`).join('')}</select>
            <input class="bd-price" data-i="${i}" type="number" min="0" step="any" value="${r.price!=null?r.price:''}" placeholder="—" style="padding:6px 6px;font-size:12px;text-align:right;font-family:'JetBrains Mono',monospace">
            <input class="bd-amt" data-i="${i}" type="number" min="0" step="1" value="${shownAmt||0}" ${auto?'readonly title="수량×단가 자동" style="padding:6px 6px;font-size:12px;text-align:right;font-family:\'JetBrains Mono\',monospace;background:var(--panel);color:var(--cyan);border:1px solid var(--line);border-radius:6px"':'style="padding:6px 6px;font-size:12px;text-align:right;font-family:\'JetBrains Mono\',monospace"'}>
            <button type="button" class="btn ghost bd-del" data-i="${i}" title="행 삭제" style="color:var(--red);padding:4px 6px">${ico('x')}</button>
          </div>
        `;}).join('');
        document.querySelectorAll('.bd-cat').forEach(el => el.onchange = () => { breakdownRows[+el.dataset.i].cat = el.value; });
        document.querySelectorAll('.bd-name').forEach(el => el.oninput = () => {
          const r = breakdownRows[+el.dataset.i];
          r.name = el.value;
          if('basis' in r) delete r.basis;   // 다음 저장 시 신규 스키마로 정착 (구형 태그 제거)
        });
        document.querySelectorAll('.bd-qty').forEach(el => el.oninput = () => {
          const r = breakdownRows[+el.dataset.i];
          r.qty = el.value==='' ? null : (+el.value || 0);
          renderBd();
        });
        document.querySelectorAll('.bd-unit').forEach(el => el.onchange = () => { breakdownRows[+el.dataset.i].unit = el.value; });
        document.querySelectorAll('.bd-price').forEach(el => el.oninput = () => {
          const r = breakdownRows[+el.dataset.i];
          r.price = el.value==='' ? null : (+el.value || 0);
          renderBd();
        });
        document.querySelectorAll('.bd-amt').forEach(el => el.oninput = () => {
          const r = breakdownRows[+el.dataset.i];
          if(+r.qty>0 && +r.price>0) return; // 자동 계산 행 — 무시
          r.amt = +el.value || 0;
          updSum();
        });
        document.querySelectorAll('.bd-del').forEach(el => el.onclick = () => { breakdownRows.splice(+el.dataset.i, 1); renderBd(); });
      }
      updSum();
    }
    function bdSum(){ return breakdownRows.reduce((s,r) => s + bdRowAmt(r), 0); }
    function updSum(){
      const sum = bdSum();
      const el = document.getElementById('q-bd-sum');
      if(el) el.textContent = '₩' + Math.round(sum).toLocaleString();
      const apply = document.getElementById('q-bd-apply');
      if(apply) apply.disabled = !(sum > 0);
    }
    document.getElementById('q-bd-add').onclick = () => {
      breakdownRows.push({cat:'재료비', name:'', qty:null, unit:'ea', price:null, amt:0});
      renderBd();
    };
    // ★ v0.16.24 — 표준원가 불러오기: 새 구조로 채움 (재료비 = qty×price 자동 / 가공·외주는 공정별 행 / 간접비는 수기)
    document.getElementById('q-bd-std').onclick = () => {
      const code = document.getElementById('q-item').value;
      const c = computeCost(code);
      if(!c){ toast('BOM 없음 — 표준원가 계산 불가','warn'); return; }
      const rates = DB.get('settings','cost_rates') || defaultCostRates();
      const route = getRoute(code);
      const newRows = [];
      if(c.material > 0){
        const {matKey, matKg, matRate} = c.rate_meta;
        newRows.push({cat:'재료비', name:matKey||'재료', qty:+matKg||0, unit:'kg', price:+matRate||0, amt:Math.round(c.material)});
      }
      route.forEach(r => {
        if(r.proc==='SHIP') return;
        if(r.mode==='out'){
          const rate = +rates.outsource_rates?.[r.proc] || 0;
          if(rate > 0){
            const p = DB.get('processes', r.proc);
            newRows.push({cat:'외주비', name:`${p?.name||r.proc} 외주`, qty:1, unit:'ea', price:rate, amt:rate});
          }
        } else {
          const rate = +rates.process_rates?.[r.proc] || 0;
          if(rate > 0){
            const p = DB.get('processes', r.proc);
            newRows.push({cat:'가공비', name:`${p?.name||r.proc}`, qty:1, unit:'ea', price:rate, amt:rate});
          }
        }
      });
      if(c.overhead > 0){
        const pct = (rates.overhead_pct || 0) * 100;
        // 간접비는 % 기반 — qty×price 로 표현 어색해 수기 금액 행 (자동 계산 X)
        newRows.push({cat:'간접비', name:`(재료+가공+외주) × ${pct.toFixed(1)}%`, qty:null, unit:'식', price:null, amt:Math.round(c.overhead)});
      }
      if(!newRows.length){ toast('요율 미등록 — 생성할 행 없음','warn'); return; }
      breakdownRows = newRows;
      renderBd();
      toast(`표준원가 ${newRows.length}행 불러옴`,'ok');
    };
    // [견적 단가에 반영] — 이후 preview 는 breakdown 합계를 원가로 사용
    document.getElementById('q-bd-apply').onclick = () => {
      const sum = bdSum();
      if(sum <= 0) return;
      overrideCostTotal = sum;
      preview();
      toast(`견적 단가에 반영 — ₩${Math.round(sum).toLocaleString()}`,'ok');
    };
    renderBd();
    // ── 원가 미리보기 ───────────────────────────────
    function preview(){
      const code = document.getElementById('q-item').value;
      const qty  = +document.getElementById('q-qty').value || 0;
      const mp   = +document.getElementById('q-margin').value || 0;
      const c = computeCost(code);

      const usedTotal = (overrideCostTotal != null) ? overrideCostTotal : c.total;

      const overrideBadge = (overrideCostTotal != null)
        ? ` <span class="pill" style="background:rgba(94,234,212,.15);color:var(--cyan);font-size:9px;margin-left:6px">산출 내역 반영</span>` : '';
      box.innerHTML = `
        <div>재료 <b>₩${Math.round(c.material).toLocaleString()}</b> + 외주 <b>₩${Math.round(c.outsource).toLocaleString()}</b> + 가공 <b>₩${Math.round(c.process).toLocaleString()}</b> + 간접 <b>₩${Math.round(c.overhead).toLocaleString()}</b></div>
        <div>${overrideCostTotal!=null?'적용 원가':'표준원가'} = <b style="color:var(--cyan)">₩${Math.round(usedTotal).toLocaleString()}</b> /ea${overrideBadge}</div>
