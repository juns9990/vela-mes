      const ch = (e & f) ^ (~e & g);
      const T1 = (h + S1 + ch + K[t] + W[t]) >>> 0;
      const S0 = rr(2,a) ^ rr(13,a) ^ rr(22,a);
      const mj = (a & b) ^ (a & c) ^ (b & c);
      const T2 = (S0 + mj) >>> 0;
      h = g; g = f; f = e; e = (d + T1) >>> 0; d = c; c = b; b = a; a = (T1 + T2) >>> 0;
    }
    H[0]=(H[0]+a)>>>0; H[1]=(H[1]+b)>>>0; H[2]=(H[2]+c)>>>0; H[3]=(H[3]+d)>>>0;
    H[4]=(H[4]+e)>>>0; H[5]=(H[5]+f)>>>0; H[6]=(H[6]+g)>>>0; H[7]=(H[7]+h)>>>0;
  }
  return H.map(x => x.toString(16).padStart(8,'0')).join('');
}
async function hashPassword(pw, salt){
  const input = `${salt||''}::${pw||''}`;
  try {
    if(typeof crypto !== 'undefined' && crypto.subtle && typeof crypto.subtle.digest === 'function' && typeof TextEncoder !== 'undefined'){
      const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(input));
      const hex = Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
      return 'sha256:' + hex;
    }
  } catch(e){ /* fallback below */ }
  return 'sha256:' + _sha256HexFallback(input);
}
async function verifyPassword(input, opts){
  // opts: { stored, salt } — 사용자·벤더 공용. legacy 마킹 시 호출자가 강제 변경 흐름으로 이행.
  if(!opts || opts.stored == null || input == null) return { match:false, legacy:false };
  const stored = String(opts.stored);
  if(stored.startsWith('sha256:')){
    const h = await hashPassword(input, opts.salt || '');
    return { match: h === stored, legacy: false };
  }
  // legacy 평문 (구 숫자 6자리 · 초기 000000 · 벤더 000000 등)
  return { match: input === stored, legacy: input === stored };
}

/* ★ v0.16.7 — 설비 마스터 헬퍼 (컬렉션 우선 · 없으면 공정템플릿 배열 폴백 — 시드 호환)
   equipments 컬렉션 { id, name, procCode, active, note } 를 우선 조회.
   해당 공정에 등록된 활성 설비가 없으면 processes[procCode].equipment 배열로 폴백.
   반환은 항상 설비명 문자열 배열 (records.equipment 문자열 구조 불변). */
function getEquipment(procCode){
  const list = DB.query('equipments', e => e.procCode===procCode && e.active !== false);
  if(list.length) return list.map(e => e.name).filter(Boolean);
  const p = DB.get('processes', procCode);
  return (p?.equipment || []).slice();
}
/* ★ v0.16.7 — 전 활성 내부 공정의 설비 목록 통합 (교대 세션·설비현황 소스 승격)
   getEquipment 로 이름 열거 후, 기존 'equipment' 컬렉션(v0.8.0 시드)의 hourly_capa 등은
   이름 매칭 폴백으로 병합 → 집계·QR 로직 불변, 목록 소스만 교체. 외주 공정 제외. */
function buildEquipmentList(){
  const procs = getProcesses();
  const legacyByName = {};
  DB.all('equipment').forEach(e => { legacyByName[e.name] = e; });
  const seen = new Set();
  const out = [];
  procs.forEach(p => {
    if(p.type === 'out') return;
    getEquipment(p.code).forEach(name => {
      if(seen.has(name)) return;
      seen.add(name);
      const lg = legacyByName[name] || {};
      out.push({
        id: lg.id || name,
        name,
        proc: p.code,
        hourly_capa: lg.hourly_capa || 0,
        working_hours: lg.working_hours || 0,
        status: lg.status,
        counter_enabled: lg.counter_enabled,
        counter_source: lg.counter_source,
        counter_endpoint: lg.counter_endpoint,
        counter_last: lg.counter_last,
        qr: lg.qr || name,
      });
    });
  });
  return out;
}

/* ★ v0.20.4 — 표준 가동시간 · 설비별 오버라이드 · 설비 procCode 해석 (헬퍼 각 1벌)
   getStdWorkHours: settings/system.std_work_hours || 8
   getWorkHours(eq): equipments/{name}.work_hours (없으면 legacy equipment/{name}.working_hours) || 표준값
   getEqProcCode(name): equipments 우선, 없으면 legacy 폴백 */
function getStdWorkHours(){
  const sys = DB.get('settings','system');
  const v = +sys?.std_work_hours;
  return v > 0 ? v : 8;
}
function getWorkHours(eq){
  const std = getStdWorkHours();
  if(!eq) return std;
  const name = typeof eq === 'string' ? eq : (eq.name || '');
  if(!name) return std;
  const doc = DB.query('equipments', e => e.name === name)[0];
  const v = +doc?.work_hours;
  if(v > 0) return v;
  const lg = DB.query('equipment', e => e.name === name)[0];
  const vl = +lg?.working_hours;
  if(vl > 0) return vl;
  return std;
}
function getEqProcCode(name){
  if(!name) return null;
  const doc = DB.query('equipments', e => e.name === name)[0];
  if(doc?.procCode) return doc.procCode;
  const lg = DB.query('equipment', e => e.name === name)[0];
  return lg?.proc || null;
}

/* ★ v0.6.0 — BOM 라우팅 헬퍼 (CLAUDE.md §12 masters/bom)
   품번별 공정 라우팅. 전역 procs 대신 품번별 route 사용. */
function getBOM(itemCode){
  return DB.get('bom', itemCode);
}
// 품번의 라우트(원시) — [{seq,proc,mode}] 정렬됨. 없으면 전역 procs 폴백.
function getRoute(itemCode){
  const bom = getBOM(itemCode);
  if(bom?.route?.length){
    return bom.route.slice().sort((a,b)=>(a.seq||0)-(b.seq||0));
  }
  return getProcesses().map(p=>({ seq:p.seq, proc:p.code, mode:p.type==='out'?'out':'in' }));
}
// 품번의 라우트(공정 객체 머지) — process 마스터에서 name/unit/inspect 등 결합
function getRouteProcs(itemCode){
  return getRoute(itemCode).map(r=>{
    const p = DB.get('processes', r.proc);
    return p ? {...p, seq:r.seq||p.seq, mode:r.mode||p.type} : {code:r.proc, name:r.proc, seq:r.seq||0, mode:r.mode};
  });
}
function bomHasProc(itemCode, procCode){
  return getRoute(itemCode).some(r=>r.proc===procCode);
}

/* ★ v0.16.0 — 취소 가드: 같은 LOT에서 라우트 seq 가 더 뒤인 live 실적을 찾음 (없으면 null).
   반환된 rec 를 먼저 취소해야 이 실적을 취소할 수 있음(역순 원칙). transferred(내부 이동) 제외. */
function laterLiveRecord(plot_no, proc){
  const lot = DB.get('production_lots', plot_no);
  if(!lot) return null;
  const route = getRoute(lot.itemCode);
  const seq = route.findIndex(r=>r.proc===proc);
  if(seq < 0) return null;
  const laterSet = new Set(route.slice(seq+1).map(r=>r.proc));
  const cands = DB.query('records', r =>
    r.plot_no===plot_no && !r.transferred && laterSet.has(r.proc)
  );
  if(!cands.length) return null;
  // 라우트상 가장 이른 후속(먼저 취소해야 할 것)을 반환
  return cands.sort((a,b) =>
    route.findIndex(x=>x.proc===a.proc) - route.findIndex(x=>x.proc===b.proc)
  )[0];
}

/* ★ v0.16.24 — 메뉴 순서 헬퍼
   · defaultMenuOrder() = 코드 기본 순서 (PAGES 배열 순)
   · getMenuOrder()     = settings/menu.order 우선 · 신규 메뉴(order에 없는 id) 는 코드 기본 위치에 삽입
                          (뒤로 몰지 않음 — 기본 순서 그대로 자연스러운 위치 유지)
   · saveMenuOrder(arr) = settings/menu 병합 저장 (increment-only) */
function defaultMenuOrder(){ return PAGES.map(p => p.id); }
function getMenuOrder(){
  const saved = DB.get('settings','menu')?.order;
  const base  = defaultMenuOrder();
  if(!Array.isArray(saved) || !saved.length) return base;
  // 저장 순서 유지하되, 실존 id 만 남기고, 누락 id 는 코드 기본 위치 규칙으로 삽입
  const validSaved = saved.filter(id => PAGES.some(p => p.id === id));
  const missing = base.filter(id => !validSaved.includes(id));
  if(!missing.length) return validSaved;
  // 각 누락 id 는 base 순서상 앞쪽에 위치한 id 뒤에 삽입(가장 가까운 앞 id 기준)
  const out = validSaved.slice();
  missing.forEach(mid => {
    const bIdx = base.indexOf(mid);
    let anchor = null;
    for(let i=bIdx-1;i>=0;i--){
      const cand = base[i];
      if(out.includes(cand)){ anchor = cand; break; }
    }
    const insertAt = anchor==null ? 0 : out.indexOf(anchor) + 1;
    out.splice(insertAt, 0, mid);
  });
  return out;
}
function saveMenuOrder(order){ DB.set('settings','menu', { order: order.slice() }); }

/* -------------------------------------------------------------------------------------------------
   §금형 누적타발 — v0.8.0
   FORGE 실적 등록시 타발수(양품+불량) 누적, 상태(정상/임박/교체) 자동 갱신.
   ------------------------------------------------------------------------------------------------- */
function moldStatusOf(cum, limit){
  const r = limit? cum/limit : 0;
  if(r >= 1)   return '교체';
  if(r >= 0.9) return '임박';
  return '정상';
}
function accumulateMoldStrokes(itemCode, strokes){
  if(!strokes || !itemCode) return;
  const molds = DB.query('molds', m=>Array.isArray(m.itemCodes) && m.itemCodes.includes(itemCode));
  molds.forEach(m=>{
    const cur = (m.cum_strokes||0) + strokes;
    DB.set('molds', m.id, {...m, cum_strokes:cur, status: moldStatusOf(cur, m.life_limit||0)});
  });
}

   §v0.26.0 — 기준정보 확장 (고객사 · 품목 채번 · 정의 필드 · 금형 수명 · 임포트)
   대원칙(G1): 원장(실적·재고·수주·마감) 무변. 마스터 문서만 생성/병합.
              금형 누적 타수는 파생 표시 계산(저장 금지) · Cav 는 표시 전용.

/* ── 고객사 마스터 (customers · code 영숫자 1~4자) ─────────────────────── */
function isValidCustomerCode(code){
  const s = String(code||'').trim();
  return /^[A-Za-z0-9]{1,4}$/.test(s);
}
function getActiveCustomers(){
  return DB.all('customers').filter(c => c.active !== false)
    .sort((a,b) => (a.code||'').localeCompare(b.code||''));
}
function nextCustomerCode(){
  const used = new Set(DB.allRaw('customers').map(c => c.code));
  let n = 1;
  while(used.has(String(n).padStart(3,'0'))) n++;
  return String(n).padStart(3, '0');
}
function getCustomerName(ref){
  if(!ref) return '';
  const c = DB.get('customers', ref);
  return c ? (c.name || ref) : '';
}
/* customers_migration: 기존 vendors(cust)/orders/closings/items 의 cust 문자열을
   customers 마스터로 1회 이관 + customer_ref 병합 (파괴 금지·병합만).
   settings/customers_migration.done 플래그로 seedIfEmpty 재실행 방지.
   force=true 시 플래그 무시(멱등 — 이미 참조 있으면 건너뜀). */
function runCustomersMigration(force){
  const flag = DB.get('settings','customers_migration');
  if(!force && flag?.done) return { skipped:true };
  const uniq = new Map();
  DB.query('vendors', v => v.type === 'cust').forEach(v => {
    if(v.code) uniq.set(v.code, v.name || v.code);
  });
  DB.all('orders').forEach(o => {
    if(o.cust && !uniq.has(o.cust)) uniq.set(o.cust, DB.get('vendors', o.cust)?.name || o.cust);
  });
  DB.all('closings').forEach(cl => (cl.rows||[]).forEach(r => {
    if(r.party && !uniq.has(r.party)) uniq.set(r.party, DB.get('vendors', r.party)?.name || r.party);
  }));
  DB.all('items').forEach(it => {
    if(it.cust && !uniq.has(it.cust)) uniq.set(it.cust, DB.get('vendors', it.cust)?.name || it.cust);
  });
  const sorted = [...uniq.entries()].sort((a,b) => (a[1]||'').localeCompare(b[1]||''));
  const map = {};
  let seq = 1;
  const pad3 = n => String(n).padStart(3, '0');
  sorted.forEach(([vendorCode, name]) => {
    const existing = DB.all('customers').find(c => c.name === name);
    if(existing){ map[vendorCode] = existing.code; return; }
    while(DB.get('customers', pad3(seq))) seq++;
    const code = pad3(seq++);
    DB.set('customers', code, {
      code, name, contact:'', phone:'', memo:'',
      custom:{}, ts: Date.now(), by:'migration', active:true, void:null,
      migrated_from_vendor: vendorCode,
    });
    map[vendorCode] = code;
  });
  DB.all('orders').forEach(o => {
    const ref = map[o.cust];
    if(ref && !o.customer_ref) DB.set('orders', o.id, { customer_ref: ref });
  });
  DB.all('shipments').forEach(s => {
    if(s.customer_ref) return;
    const so = DB.get('orders', s.so_id);
    const ref = so ? map[so.cust] : null;
    if(ref) DB.set('shipments', s.id, { customer_ref: ref });
  });
  DB.all('closings').forEach(cl => {
    if(cl.type !== 'sales' || !cl.rows) return;
    let updated = false;
    const nextRows = cl.rows.map(r => {
      if(r.customer_ref) return r;
      const ref = map[r.party];
      if(!ref) return r;
      updated = true;
      return { ...r, customer_ref: ref };
    });
    if(updated) DB.set('closings', cl.id, { rows: nextRows });
  });
  DB.all('items').forEach(it => {
    if(it.customer_ref) return;
    const ref = map[it.cust];
    if(ref) DB.set('items', it.code, { customer_ref: ref });
  });
  DB.set('settings','customers_migration', {
    done:true, version:'v0.26.0', ts:Date.now(), count: Object.keys(map).length,
  });
  return { skipped:false, count: Object.keys(map).length };
}

/* ── 사용자 정의 필드 엔진 (master_fields · items/customers/molds) ─────── */
const _MASTER_FIELD_MASTERS = { items:'품목', customers:'고객사', molds:'금형' };
function _mfSlug(label){
  const raw = String(label||'').trim();
  if(!raw) return '';
  return raw.replace(/[\s\-·:/\\.]+/g,'_').replace(/[^\p{L}\p{N}_]/gu,'').slice(0,40)
    || ('field_' + Date.now().toString(36));
}
function getMasterFields(master){
  return DB.query('master_fields', f => f.master === master && f.active !== false)
    .sort((a,b) => (+a.order||0) - (+b.order||0));
}
function getMasterFieldsAll(master){
  return DB.query('master_fields', f => f.master === master)
    .sort((a,b) => (+a.order||0) - (+b.order||0));
}
function nextMasterFieldId(master){
  const prefix = `MF-${master.slice(0,4).toUpperCase()}-`;
  const nums = DB.allRaw('master_fields').filter(x => (x.id||'').startsWith(prefix))
    .map(x => parseInt((x.id||'').slice(prefix.length)) || 0);
  const next = (nums.length ? Math.max(...nums) : 0) + 1;
  return `${prefix}${String(next).padStart(3,'0')}`;
}
function nextMasterFieldOrder(master){
  const fs = getMasterFieldsAll(master);
  return (fs.length ? Math.max(...fs.map(f => +f.order||0)) : 0) + 1;
}
function _cfInputId(master, key){ return `cf-${master}-${key}`; }
/* renderCustomFields(master, values, mode)
    mode 'form'  → 등록/수정 폼 그리드 HTML
    mode 'detail'→ 상세 표시 행 HTML
    mode 'list'  → 목록 컬럼 셀 배열 (상위 2개) */
function renderCustomFields(master, values, mode){
  const vals = values || {};
  const fields = getMasterFields(master);
  if(mode === 'list'){
    return getTopCustomFields(master).map(f => customCellDisplay(f, vals[f.key]));
  }
  if(mode === 'detail'){
    if(!fields.length) return '';
    return fields.map(f => `<div style="display:flex;justify-content:space-between;font-size:12px;padding:4px 0;border-bottom:1px dashed var(--line)">
      <span style="color:var(--sub)">${_esc(f.label||f.key)}${f.unit?` <span style="color:var(--dim)">(${_esc(f.unit)})</span>`:''} <span class="tag" style="font-size:9px">정의</span></span>
      <span>${customCellDisplay(f, vals[f.key])}</span></div>`).join('');
  }
  // form
  if(!fields.length){
    return `<div style="grid-column:1 / -1;margin-top:6px;padding:8px 10px;background:var(--bg2);border:1px dashed var(--line);border-radius:8px;font-size:11px;color:var(--dim)">
      사용자 정의 필드 없음 — <b style="color:var(--amber)">[필드 관리]</b>로 추가</div>`;
  }
  const rows = fields.map(f => {
    const val = vals[f.key];
    const id = _cfInputId(master, f.key);
    const unit = f.unit ? ` <span style="color:var(--dim);font-weight:400;font-size:11px">— ${_esc(f.unit)}</span>` : '';
    let inputHtml;
    if(f.type === 'number'){
      inputHtml = `<input id="${id}" type="number" step="0.01" value="${val==null?'':_esc(val)}" data-cf-master="${_esc(master)}" data-cf-key="${_esc(f.key)}" data-cf-type="number">`;
    } else if(f.type === 'date'){
      inputHtml = `<input id="${id}" type="date" value="${val==null?'':_esc(val)}" data-cf-master="${_esc(master)}" data-cf-key="${_esc(f.key)}" data-cf-type="date">`;
    } else if(f.type === 'select'){
      const rawOpts = Array.isArray(f.options) ? f.options : [];
      inputHtml = `<select id="${id}" data-cf-master="${_esc(master)}" data-cf-key="${_esc(f.key)}" data-cf-type="select">
        <option value="">— 선택 —</option>
        ${rawOpts.map(o=>{
          const v = typeof o==='object' ? (o.value||o.label||'') : o;
          const lbl = typeof o==='object' ? (o.label||o.value||'') : o;
          return `<option value="${_esc(v)}" ${String(val)===String(v)?'selected':''}>${_esc(lbl)}</option>`;
        }).join('')}
      </select>`;
    } else {
      inputHtml = `<input id="${id}" type="text" value="${val==null?'':_esc(val)}" data-cf-master="${_esc(master)}" data-cf-key="${_esc(f.key)}" data-cf-type="text">`;
    }
    return `<div><label>${_esc(f.label||f.key)}${unit} <span class="tag" style="font-size:9.5px">정의</span></label>${inputHtml}</div>`;
  }).join('');
  return `<div style="grid-column:1 / -1;margin-top:6px">
    <div style="font-size:11px;font-weight:800;letter-spacing:.5px;color:var(--amber);margin:8px 0 6px;padding-left:8px;border-left:3px solid var(--amber)">
      사용자 정의 필드 <span style="color:var(--dim);font-weight:400">— 이 업체 정의</span>
    </div>
    <div class="grid g2">${rows}</div></div>`;
}
function readCustomFieldsInputs(master){
  const out = {};
  document.querySelectorAll(`[data-cf-master="${master}"]`).forEach(el => {
    const key = el.dataset.cfKey;
    const type = el.dataset.cfType;
    const raw = el.value;
    if(type === 'number'){
      const v = raw==='' ? '' : +raw;
      if(raw !== '' && !Number.isNaN(v)) out[key] = v;
    } else {
      if(raw !== '') out[key] = raw;
    }
  });
  return out;
}
function getTopCustomFields(master, limit){
  return getMasterFields(master).slice(0, limit||2);
}
function customCellDisplay(f, val){
  if(val==null || val==='') return '<span class="muted">—</span>';
  if(f.type === 'number') return `<span style="font-family:'JetBrains Mono',monospace">${_esc(val)}</span>${f.unit?`<span style="color:var(--dim);font-size:10px"> ${_esc(f.unit)}</span>`:''}`;
  return _esc(val);
}

/* ── 품목 식별번호 채번 ({custCode}-{seq3}-{rev}) ───────────────────────── */
function isItemIdentifier(code){ return /^[A-Za-z0-9]{1,4}-\d{3}-\d+$/.test(String(code||'')); }
function splitItemIdentifier(code){
  const m = String(code||'').match(/^([A-Za-z0-9]{1,4})-(\d{3})-(\d+)$/);
  return m ? { cust:m[1], seq:+m[2], rev:+m[3] } : null;
}
function nextItemSeqForCustomer(custCode){
  if(!custCode) return 1;
  const seen = new Set();
  DB.allRaw('items').forEach(it => {
    const p = splitItemIdentifier(it.code);
    if(p && p.cust === custCode) seen.add(p.seq);
  });
  let n = 1;
  while(seen.has(n)) n++;
  return n;
}
function makeItemIdentifier(custCode, seq, rev){
  return `${custCode}-${String(seq).padStart(3,'0')}-${rev==null?0:rev}`;
}
function nextItemIdentifier(custCode){
  if(!custCode) return '';
  return makeItemIdentifier(custCode, nextItemSeqForCustomer(custCode), 0);
}
/* 표시用 계산 — 원/kg (반올림 정수) · 값 없으면 null. weight(kg) = 절단중량. */
function itemRatePerCutKg(it){
  const w = +(it?.weight||0);
  const p = +(it?.price||0);
  if(!w || !p) return null;
  return Math.round(p / w);
}
function itemRatePerProductKg(it){
  const g = +(it?.product_weight_g||0);
  const p = +(it?.price||0);
  if(!g || !p) return null;
  return Math.round(p / (g/1000));
}

/* ── 금형 파생 누적 타수 (records 기반 · G1 저장 금지 · Cav 반영) ──────── */
function _forgeQtyForItem(itemCode){
  if(!itemCode) return 0;
  return DB.query('records', r => r.plot_no && r.proc === 'FORGE')
    .filter(r => (DB.get('production_lots', r.plot_no)?.itemCode) === itemCode)
    .reduce((s,r) => s + (+r.good||0) + (+r.defect||0), 0);
}
function deriveMoldShots(mold){
  if(!mold) return 0;
  const items = mold.itemCodes || [];
  let total = 0;
  items.forEach(code => {
    const it = DB.get('items', code);
    const cav = +(it?.cav||0) > 0 ? +it.cav : 1;
    const qty = _forgeQtyForItem(code);
    total += Math.ceil(qty / cav);
  });
  return total + (+mold.offset || 0);
}
function moldLifePct(mold){
  const lim = +mold?.life_limit || 0;
  if(!lim) return 0;
  return Math.min(999, deriveMoldShots(mold) / lim * 100);
}
function getMoldLifeIssues(){
  return DB.all('molds').map(m => ({
    mold: m, shots: deriveMoldShots(m), limit: +m.life_limit||0, pct: moldLifePct(m),
  })).filter(x => x.pct >= 90).sort((a,b) => b.pct - a.pct);
}

/* ── 엑셀 임포트 (공용 1벌 · 마스터만 · 원장 문서 생성 금지) ─────────── */
const _IMPORTER_SPEC = {
  items: {
    label: '품목',
    columns: [
      { key:'code',         label:'식별번호',   required:true },

      { key:'dia',          label:'Ø',          kind:'number' },
      { key:'weight_g',     label:'절단중량(g)', kind:'number' },
      { key:'product_weight_g', label:'제품중량(g)', kind:'number' },
      { key:'price',        label:'단가(원)',   kind:'number' },
      { key:'cav',          label:'Cav',        kind:'number' },
      { key:'mold_no',      label:'금형번호' },
      { key:'default_forge_eq', label:'기본단조설비' },

    columns: [
      { key:'code',    label:'고객코드', required:true },
      { key:'name',    label:'이름',     required:true },
      { key:'contact', label:'담당자' },
      { key:'phone',   label:'전화' },
      { key:'memo',    label:'메모' },
    ],
    example: { code:'999', name:'예시산업', contact:'홍길동', phone:'055-000-0000', memo:'' },
  },
};
function _importerColumns(master){
  const base = (_IMPORTER_SPEC[master]?.columns || []).slice();
  const cfs = getMasterFields(master);
  cfs.forEach(f => base.push({ key:'cf:'+f.key, label:(f.label||f.key), custom:true, unit:f.unit, kind:(f.type==='number'?'number':'text') }));
  return base;
}
function _importerTemplateRow(master){
  const cols = _importerColumns(master);
  const example = _IMPORTER_SPEC[master]?.example || {};
  const row = {};
  cols.forEach(c => { row[c.label] = c.custom ? '' : (example[c.key]==null ? '' : example[c.key]); });
  return row;
}
function _parseImportRow(master, rawRow){
  const cols = _importerColumns(master);
  const out = {};
  const missing = [];
  const errors = [];
  cols.forEach(c => {
    const raw = rawRow[c.label];
    const val = raw==null ? '' : String(raw).trim();
    if(!val){ if(c.required) missing.push(c.label); return; }
    if(c.kind === 'number'){
      const v = +val;
      if(Number.isNaN(v)){ errors.push(`${c.label} 숫자 아님`); return; }
      if(c.custom) out['cf:'+c.key.slice(3)] = v; else out[c.key] = v;
    } else {
      if(c.custom) out['cf:'+c.key.slice(3)] = val; else out[c.key] = val;
    }
  });
  return { data: out, missing, errors };
}
function _importJudgeRow(master, parsed){
  if(parsed.missing.length) return { ok:false, reason:`필수(${parsed.missing.join(', ')}) 누락` };
  if(parsed.errors.length)  return { ok:false, reason: parsed.errors.join(' · ') };
  const d = parsed.data;
  if(master === 'items'){
    if(!isItemIdentifier(d.code) && !/^[A-Za-z0-9\-_.]+$/.test(d.code)) return { ok:false, reason:`식별번호 형식 오류 — ${d.code}` };
    if(DB.get('items', d.code)) return { ok:false, reason:`중복 식별번호 — 건너뜀` };
  } else if(master === 'customers'){
    if(!isValidCustomerCode(d.code)) return { ok:false, reason:`고객코드 형식 오류 — ${d.code}` };
    if(DB.get('customers', d.code)) return { ok:false, reason:`중복 고객코드 — 건너뜀` };
  }
  return { ok:true, reason:'등록 가능' };
}
function _importApplyRow(master, parsed){
  const d = parsed.data;
  const custom = {};
  Object.keys(d).forEach(k => { if(k.startsWith('cf:')){ custom[k.slice(3)] = d[k]; delete d[k]; } });
  if(master === 'items'){
    const p = splitItemIdentifier(d.code);
    const doc = {
      code: d.code, name: d.name || '',
      customer_ref: d.customer_ref || (p ? p.cust : ''),
      rev: p ? p.rev : 0,
      mat: d.mat || '', dia: +d.dia||0,
      weight: d.weight_g!=null ? (+d.weight_g/1000) : 0,
      product_weight_g: +d.product_weight_g || 0,
      price: +d.price || 0,
      cav: +d.cav || 1,
      cav_source: 'manual',
      mold_no: d.mold_no || '',
      default_forge_eq: d.default_forge_eq || '',
      pack_qty: (+d.pack_qty>0 ? Math.floor(+d.pack_qty) : null),
      custom, active: true,
    };
    DB.set('items', d.code, doc);
  } else if(master === 'customers'){
    DB.set('customers', d.code, {
      code: d.code, name: d.name || '',
      contact: d.contact || '', phone: d.phone || '', memo: d.memo || '',
      custom, ts: Date.now(), by: SESSION.user||'import',
      active: true, void: null,
    });
  }
}
function nextImportLogId(){
  const prefix = 'IMP-';
  const nums = DB.allRaw('import_logs').filter(x => (x.id||'').startsWith(prefix))
    .map(x => parseInt((x.id||'').slice(prefix.length))||0);
  const next = (nums.length ? Math.max(...nums) : 0) + 1;
  return `${prefix}${String(next).padStart(5,'0')}`;
}
function recordImportLog(master, filename, total, added, skipped){

/* -------------------------------------------------------------------------------------------------
   §LOT 잔량 원장 — 핵심 로직 (CLAUDE.md §4)
   잔량 = 직전공정 양품 − 현공정 누적투입.
   초과등록 차단. 병합·분할 지원. heat 상속.
   ------------------------------------------------------------------------------------------------- */
const LOT = {
  // 생산LOT 신규 (수동 plot_no)
  create({plot_no, itemCode, materialLots, qty_initial, type='normal', sourceLots=[], merge_at_proc=null}){
    if(DB.get('production_lots', plot_no)) throw new Error(`이미 존재: ${plot_no}`);
    const heats = (materialLots||[]).map(ml=>DB.get('material_lots',ml)?.heat).filter(Boolean);
    const lot = {
      plot_no, itemCode,
      material_lot_ids: materialLots||[],
      heat_nos: heats,
      type,                    // normal | merged | split
      source_lots: sourceLots,
      qty_initial: qty_initial||0,
      merge_at_proc,           // ★ v0.6.0 — 병합 자식의 시작 공정 (이전 공정 = 완료 간주)
      created: Date.now(),
    };
    return DB.set('production_lots', plot_no, lot);
  },
  // ★ v0.6.0 — 잔량 계산: BOM 라우트 기준
  //  잔량 = 직전공정 양품 − 현공정 누적 투입
  //  · 라우트에 없는 공정 → 0 (해당 공정은 이 품번에서 안 함)
  //  · merged LOT: merge_at_proc 이전 공정은 '완료'(잔량 0), merge_at_proc부터 qty_initial로 시작
  balance(plot_no, proc){
    const lot = DB.get('production_lots', plot_no);
    if(!lot) return 0;
    const route = getRoute(lot.itemCode);
    const idx = route.findIndex(r=>r.proc===proc);
    if(idx<0) return 0;  // 라우트에 없음 → 자동 스킵
    // 병합 자식: merge_at_proc 이전은 완료
    if(lot.merge_at_proc){
      const mIdx = route.findIndex(r=>r.proc===lot.merge_at_proc);
      if(mIdx>=0 && idx<mIdx) return 0;
    }
    let prevGood;
    if(idx===0 || (lot.merge_at_proc && proc===lot.merge_at_proc)){
      // 첫 공정 또는 병합 시작 공정 → qty_initial이 시작점
      prevGood = lot.qty_initial;
    } else {
      const prevProc = route[idx-1].proc;
      prevGood = LOT.totalGood(plot_no, prevProc);
    }
    const usedHere = LOT.totalInput(plot_no, proc);
    return prevGood - usedHere;
  },
  totalGood(plot_no, proc){
    return DB.query('records', r=>r.plot_no===plot_no && r.proc===proc)
             .reduce((s,r)=>s+(r.good||0)+(r.rework_returned||0), 0);
  },
  // ★ v0.6.0 — transferred(병합 이동분)도 '투입(소진)'으로 합산해 부모 잔량 0이 되도록
  totalInput(plot_no, proc){
    return DB.query('records', r=>r.plot_no===plot_no && r.proc===proc)
             .reduce((s,r)=>s+(r.good||0)+(r.defect||0)+(r.rework||0)+(r.scrap||0)+(r.transferred||0), 0);
  },
  // ★ v0.6.0 — 등록 (제1원칙: 수량검증 통과해야 함)
  //  rework_returned는 '복구분' — 잔량 검증에서는 제외 (새 투입이 아님).
  //  단, 누적 복귀 ≤ 누적 재작업 한도 검증.
  registerRecord({plot_no, proc, equipment, good=0, defect=0, rework=0, scrap=0, rework_returned=0, defect_reason='', vendor=null, type='in', shift='day', source='manual', worker=null}){
    const bal = LOT.balance(plot_no, proc);
    const newInput = good+defect+rework+scrap;
    if(newInput<=0 && rework_returned<=0) throw new Error('수량을 입력하세요.');
    if(newInput > bal) throw new Error(`초과 등록 차단 — 잔량 ${bal}ea, 등록 ${newInput}ea`);
    const proc_obj = DB.get('processes', proc);
    if(!proc_obj) throw new Error(`알 수 없는 공정: ${proc}`);
    // 라우트에 없는 공정 차단 (잘못된 QR/조작 방지)
    const lot = DB.get('production_lots', plot_no);
    if(lot && !bomHasProc(lot.itemCode, proc)) throw new Error(`${lot.itemCode} 라우트에 없는 공정: ${proc}`);
    // 재작업 복귀 한도 검증 (이번 등록의 rework도 한도에 포함)
    if(rework_returned>0){
      const recs = DB.query('records', r=>r.plot_no===plot_no && r.proc===proc);
      const cumRew = recs.reduce((s,r)=>s+(r.rework||0),0);
      const cumRet = recs.reduce((s,r)=>s+(r.rework_returned||0),0);
      if(cumRet + rework_returned > cumRew + rework){
        throw new Error(`복귀 한도 초과 — 누적 재작업 ${cumRew+rework}, 기존 복귀 ${cumRet}, 신규 ${rework_returned}`);
      }
    }
    const id = `R-${proc}-${plot_no}-${Date.now()}`;
    const rec = {
      id, plot_no, proc, equipment, vendor, type,
      good, defect, rework, scrap, rework_returned, defect_reason,
      // ★ v0.10.0 — 교대/소스 필드 (자리만, 기본값 안전 처리)
      // ★ v0.11.0 — 세션의 worker 객체도 함께 저장 (설비현황·이력서 추적)
      shift, source, worker,
      ts: Date.now(), by: worker?.emp_no || SESSION.user,
    };
    const saved = DB.set('records', id, rec);
    // ★ v0.8.0 — FORGE 실적 시 해당 품번 금형 누적타발 자동 누적 (good+defect = 타발수)
    if(proc==='FORGE'){
      const strokes = (good||0) + (defect||0);
      if(strokes>0 && lot){ accumulateMoldStrokes(lot.itemCode, strokes); }
    }
    return saved;
  },
  // ★ v0.6.0 — 병합 (버그3 해결)
  //  자식 LOT에 merge_at_proc 저장 → 자식의 이전 공정은 완료 간주.
  //  자식 qty_initial = 부모들의 병합공정 잔량 합.
  //  부모 잔량 소진 = transfer 레코드(totalInput에 합산되어 자동 0).
  merge({newPlotNo, sourcePlots, proc}){
    const sources = sourcePlots.map(p=>DB.get('production_lots',p)).filter(Boolean);
    if(sources.length<2) throw new Error('병합은 2개 이상 LOT 필요');
    const item = sources[0].itemCode;
    if(sources.some(s=>s.itemCode!==item)) throw new Error('서로 다른 품번 — 병합 불가');
    if(!bomHasProc(item, proc)) throw new Error(`${item} 라우트에 없는 공정: ${proc}`);
    if(DB.get('production_lots', newPlotNo)) throw new Error(`이미 존재: ${newPlotNo}`);
    const heats = [...new Set(sources.flatMap(s=>s.heat_nos||[]))];
    const mats  = [...new Set(sources.flatMap(s=>s.material_lot_ids||[]))];
    const totalBal = sources.reduce((s,src)=>s+LOT.balance(src.plot_no, proc),0);
    if(totalBal<=0) throw new Error('병합할 잔량 없음 (모든 부모 LOT의 해당 공정 잔량이 0)');
    // 자식: merge_at_proc 명시
    const newLot = LOT.create({
      plot_no:newPlotNo, itemCode:item, materialLots:mats,
      qty_initial:totalBal, type:'merged', sourceLots:sourcePlots,
      merge_at_proc: proc,
    });
    newLot.heat_nos = heats;
    DB.set('production_lots', newPlotNo, newLot);
    // 부모 잔량 소진: transfer 레코드 (totalInput에 합산됨)
    sources.forEach(s=>{
      const bal = LOT.balance(s.plot_no, proc);
      if(bal>0){
        const id = `R-MERGE-${s.plot_no}-${proc}-${Date.now()}`;
        DB.set('records', id, {
          id, plot_no:s.plot_no, proc,
          good:0, defect:0, rework:0, scrap:0, rework_returned:0,
          transferred:bal, transferred_to:newPlotNo,
          ts:Date.now(), by:SESSION.user,
        });
      }
    });
    return newLot;
  },
  // 분할 (절단공정 1회) — 부모LOT → 자식들 (heat 상속)
  split({parentPlotNo, parts}){
    const parent = DB.get('production_lots', parentPlotNo);
    if(!parent) throw new Error('부모 LOT 없음');
    const route = getRoute(parent.itemCode);
    const cutCode = route[0]?.proc || 'CUT';
    const bal = LOT.balance(parentPlotNo, cutCode);
    const sum = parts.reduce((s,p)=>s+(+p.qty||0),0);
    if(sum > bal) throw new Error(`분할 합계 ${sum} > 잔량 ${bal}`);
    parts.forEach(p=>{
      const child = LOT.create({plot_no:p.plot_no, itemCode:parent.itemCode, materialLots:parent.material_lot_ids, qty_initial:+p.qty, type:'split', sourceLots:[parentPlotNo]});
      child.heat_nos = parent.heat_nos;
      DB.set('production_lots', p.plot_no, child);
    });
    return true;
  },
  // ★ v0.7.0 — 분기(fork): 같은 단조품에서 후공정이 갈라져 여러 완성품으로 나뉘는 패턴
  //  · split과 달리 자식마다 itemCode가 다를 수 있음(서로 다른 완성품)
  //  · 부모/자식의 라우트 [0..fork_at_proc]가 일치해야 함(앞 공정 동일성)
  //  · merge_at_proc 매커니즘 재사용: 자식.merge_at_proc = fork_at_proc → 이전공정 완료 간주
  //  · 부모 잔량 소진: transfer 레코드(병합과 동일 패턴)
  fork({parentPlotNo, fork_at_proc, children}){
    const parent = DB.get('production_lots', parentPlotNo);
    if(!parent) throw new Error('부모 LOT 없음');
    if(!children?.length) throw new Error('자식 LOT 입력 필요');
    if(!fork_at_proc) throw new Error('분기 공정 선택 필요');
    if(!bomHasProc(parent.itemCode, fork_at_proc)) throw new Error(`부모 ${parent.itemCode} 라우트에 없는 공정: ${fork_at_proc}`);
    // 잔량 검증 — 자식 합 ≤ 부모 분기공정 잔량
    const bal = LOT.balance(parentPlotNo, fork_at_proc);
    const sum = children.reduce((s,c)=>s+(+c.qty||0), 0);
    if(sum<=0) throw new Error('자식 수량 입력 필요');
    if(sum > bal) throw new Error(`분기 합계 ${sum} > 부모 잔량 ${bal} (분기공정 ${fork_at_proc})`);
    // 자식 itemCode 중복 + plot_no 중복 차단 + 라우트 prefix 일치 검증
    const parentRoute = getRoute(parent.itemCode);
    const pIdx = parentRoute.findIndex(r=>r.proc===fork_at_proc);
    const parentPrefix = parentRoute.slice(0, pIdx+1).map(r=>r.proc).join('>');
    const seenPlots = new Set();
    children.forEach(c=>{
      if(!c.plot_no) throw new Error('자식 LOT 번호 입력 필요');
      if(seenPlots.has(c.plot_no)) throw new Error(`자식 LOT 중복: ${c.plot_no}`);
      seenPlots.add(c.plot_no);
      if(DB.get('production_lots', c.plot_no)) throw new Error(`이미 존재: ${c.plot_no}`);
      if(!c.itemCode) throw new Error('자식 완성품 품번 필요');
      if(!getBOM(c.itemCode)) throw new Error(`자식 품번 BOM 없음: ${c.itemCode}`);
      const childRoute = getRoute(c.itemCode);
      const cIdx = childRoute.findIndex(r=>r.proc===fork_at_proc);
      if(cIdx<0) throw new Error(`자식 ${c.itemCode} 라우트에 분기공정 ${fork_at_proc} 없음`);
      const childPrefix = childRoute.slice(0, cIdx+1).map(r=>r.proc).join('>');
      if(childPrefix !== parentPrefix){
        throw new Error(`라우트 불일치 — 부모[${parentPrefix}] ≠ ${c.itemCode}[${childPrefix}] (분기공정까지 공정이 동일해야 함)`);
      }
    });
    // 자식 생성 (merge_at_proc 재사용 → 이전공정 완료 간주)
    children.forEach(c=>{
      const child = LOT.create({
        plot_no: c.plot_no,
        itemCode: c.itemCode,
        materialLots: parent.material_lot_ids,
        qty_initial: +c.qty,
        type: 'forked',
        sourceLots: [parentPlotNo],
        merge_at_proc: fork_at_proc,
      });
      child.heat_nos   = parent.heat_nos;     // heat 자식 상속
      child.fork_from  = parentPlotNo;
      child.fork_at_proc = fork_at_proc;
      DB.set('production_lots', c.plot_no, child);
    });
    // 부모 잔량 소진: 자식 합만큼 transfer 레코드 (totalInput 합산되어 잔량 -= sum)
    const rid = `R-FORK-${parentPlotNo}-${fork_at_proc}-${Date.now()}`;
    DB.set('records', rid, {
      id: rid, plot_no: parentPlotNo, proc: fork_at_proc,
      good:0, defect:0, rework:0, scrap:0, rework_returned:0,
      transferred: sum, transferred_to: children.map(c=>c.plot_no).join(','),
      fork: true,
      ts: Date.now(), by: SESSION.user,
    });
    return children.map(c=>DB.get('production_lots', c.plot_no));
  },
  // ★ v0.6.0 — 라우팅 자동판정: BOM 라우트 순회, 잔량>0인 첫 공정 반환
  //  하드코딩 skippable·cond 제거 — 라우트에 없으면 자연 스킵
  nextProcess(plot_no){
    const lot = DB.get('production_lots', plot_no);
    if(!lot) return null;
    const route = getRoute(lot.itemCode);
    for(const r of route){
      const bal = LOT.balance(plot_no, r.proc);
      if(bal>0){
        const p = DB.get('processes', r.proc);
        return p ? {...p, mode:r.mode} : {code:r.proc, name:r.proc, mode:r.mode};
      }
    }
    return null;
  },
  // ★ v0.16.13 — 부분 진행: 라우트 순회하며 잔량>0 공정 전부 반환 (폰·PC 공용 1벌)
  //             balance / registerRecord 가드 불변 — 표시 계층에서 선택 폭만 확장.
  //             defaultIndex: 마지막 live 실적 공정의 '다음 공정'이 목록에 있으면 그것, 없으면 0.
  //   반환: { list:[{code,name,seq,mode,avail,inRoute:true}...], defaultIndex }
  availableProcesses(plot_no){
    const lot = DB.get('production_lots', plot_no);
    if(!lot) return { list:[], defaultIndex:0 };
    const route = getRoute(lot.itemCode);
    const list = [];
    for(const r of route){
      const bal = LOT.balance(plot_no, r.proc);
      if(bal > 0){
        const p = DB.get('processes', r.proc);
        list.push(p
          ? {...p, mode:r.mode, avail:bal}
          : {code:r.proc, name:r.proc, seq:r.seq||0, mode:r.mode, avail:bal});
      }
    }
    if(!list.length) return { list, defaultIndex:0 };
    // 기본 선택 = 마지막 live 실적 공정의 라우트상 '다음 공정'이 목록에 있으면 그것
    const recs = DB.query('records', x => x.plot_no === plot_no && !x.transferred)
                    .slice().sort((a,b) => (b.ts||0) - (a.ts||0));
    if(recs.length){
      const lastProc = recs[0].proc;
      const idx = route.findIndex(r => r.proc === lastProc);
      if(idx >= 0 && idx + 1 < route.length){
        const nextCode = route[idx + 1].proc;
        const listIdx = list.findIndex(p => p.code === nextCode);
        if(listIdx >= 0) return { list, defaultIndex: listIdx };
      }
    }
    return { list, defaultIndex: 0 };
  }
};

/* ★ v0.16.9 — 외주 반출 가능량 (소함수 1벌 · 힌트·차단 공용)
   avail = 직전 양품 A − 기투입 B − 반출 중 C
   · A−B = LOT.balance(plot,proc) — 계산 헬퍼 불변 (직전 양품 − 기투입 누계)
   · C   = live os_dispatches[plot+proc] 중 미입고 잔량 합 (dispatch.qty − Σ live os_receipts)
           이중 반출 방지 — 반출됐지만 입고 전인 물량 차감.
   반환: {A, B, C, avail} — 힌트 표시에 A/B/C 개별 노출. */
/* ★ v0.16.15 — 반출 중(미입고 잔량) 소함수 1벌 · osAvailable(C)·calcItemFlow(outAtVendor) 공용
   LOT+공정 단위: Σ live os_dispatches(plot+proc).qty − Σ live os_receipts(dispatch_id).qty (음수 방지) */
function osInFlight(plot, proc){
  if(!plot || !proc) return 0;
  return DB.query('os_dispatches', d => d.plot_no===plot && d.proc===proc)
    .reduce((sum, d) => {
      const recv = DB.query('os_receipts', r => r.dispatch_id === d.id).reduce((s,r) => s+(r.qty||0), 0);
      return sum + Math.max(0, (d.qty||0) - recv);
    }, 0);
}
function osAvailable(plot, proc){
  if(!plot || !proc) return { A:0, B:0, C:0, avail:0 };
  const lot = DB.get('production_lots', plot);
  if(!lot) return { A:0, B:0, C:0, avail:0 };
  const route = getRoute(lot.itemCode);
  const idx = route.findIndex(r => r.proc === proc);
  if(idx < 0) return { A:0, B:0, C:0, avail:0 };
  // 직전 양품 A (LOT.balance 내부와 동일 판정)
  let A;
  if(idx === 0 || (lot.merge_at_proc && proc === lot.merge_at_proc)){
    A = lot.qty_initial || 0;
  } else if(lot.merge_at_proc){
    const mIdx = route.findIndex(r => r.proc === lot.merge_at_proc);
    if(mIdx >= 0 && idx < mIdx) return { A:0, B:0, C:0, avail:0 };
    A = LOT.totalGood(plot, route[idx-1].proc);
  } else {
    A = LOT.totalGood(plot, route[idx-1].proc);
  }
  const B = LOT.totalInput(plot, proc);
  const C = osInFlight(plot, proc);   // ★ v0.16.15 소함수 공용
  return { A, B, C, avail: Math.max(0, A - B - C) };
}

/* ★ v0.16.17/18 — 외주 입출 단위 환산 유틸 (반출·입고 모달 공용 · 복사 금지)
   ea 저장은 항상 그대로. kg → floor(kg÷단중), plt → plt × pack_qty.
   기준(단중·pack_qty)이 없으면 안내만 반환 — 하드코딩·기본값 생성 금지. */
function osInputBasis(itemCode){
  const item = itemCode ? DB.get('items', itemCode) : null;
  return {
    unitW: (item?.weight  != null && +item.weight   > 0) ? +item.weight   : null,
    packQ: (item?.pack_qty!= null && +item.pack_qty > 0) ? +item.pack_qty : null,
  };
}
function osInputHelp(mode, itemCode, opts){
  const {unitW, packQ} = osInputBasis(itemCode);
  const suffix = (opts && opts.pltAutoFillNote) ? ` · <b>파렛트 수량</b> 필드도 자동 채움` : '';
  if(mode === 'ea')  return { html:'양품·불량(입고) 또는 반출 수량을 직접 입력합니다 (기본).', hasBasis:true };
  if(mode === 'kg'){
    if(unitW == null) return { html:'<b style="color:var(--amber)">품번 단중 미등록</b> — 기준정보 › 품번에서 단중(kg)을 입력하세요 · 환산 없이 직접 입력 가능', hasBasis:false };
    return { html:`무게(kg) 입력 → <b style="color:var(--cyan)">≈ N ea</b> (단중 ${unitW} kg 기준) 로 자동 채움 (수정 가능 · 저장은 ea)`, hasBasis:true };
  }
  if(mode === 'plt'){
    if(packQ == null) return { html:'<b style="color:var(--amber)">품번 포장단위 미등록</b> — 기준정보 › 품번에서 포장단위(ea/포장)를 입력하세요 · 환산 없이 직접 입력 가능', hasBasis:false };
    return { html:`파렛트 수 × <b style="color:var(--cyan)">${packQ}</b> (포장단위) 로 자동 채움 (수정 가능 · 저장은 ea)${suffix}`, hasBasis:true };
  }
  return { html:'', hasBasis:false };
}
function osInputConvert(mode, rawValue, itemCode){
  const {unitW, packQ} = osInputBasis(itemCode);
  const raw = +rawValue || 0;
  if(mode === 'kg' && unitW && raw > 0){
    const ea = Math.floor(raw / unitW);
    return { ea, hint:`≈ <b style="color:var(--cyan)">${ea.toLocaleString()} ea</b> (계근 ${raw} kg ÷ 단중 ${unitW} kg)` };
  }
  if(mode === 'plt' && packQ && raw > 0){
    const p = Math.floor(raw);
    const ea = p * packQ;
    return { ea, hint:`≈ <b style="color:var(--cyan)">${ea.toLocaleString()} ea</b> (${p} plt × 포장단위 ${packQ})`, plt:p };
  }
  return { ea:null, hint:'—' };
}
function osInputBadge(doc){
  if(doc?.input_mode==='kg' && doc?.input_value) return ` <span style="color:var(--dim);font-size:10px">(계근 ${(+doc.input_value).toLocaleString()}kg)</span>`;
  if(doc?.input_mode==='plt' && doc?.input_value) return ` <span style="color:var(--dim);font-size:10px">(${(+doc.input_value).toLocaleString()}plt)</span>`;
  return '';
}

/* ★ v0.20.2 — 공용 달력 팝업 유틸 (라이브러리 금지 · 유틸 1벌)
   attachCalendar(inputEl): 날짜 input 클릭/포커스 시 미니 달력 팝업.
   · 월 그리드(일~토) · ◀▶ 월 이동 · 오늘 강조 · 현재값 선택 표시
   · 탭 → 'YYYY-MM-DD' 채움 + input 이벤트 발화 + 닫힘
   · 팝업 밖 탭 → 닫힘(모달 바깥클릭 보호와 독립)
   · PC/폰 동일 · 터치 타깃 36px+ · 수기 입력 병행(readonly 금지)
   · 재사용 가능 — 향후 다른 날짜 입력 확장에도 그대로 붙임 */
let _calPopup = null;
function _closeCal(){
  if(_calPopup){ _calPopup.remove(); _calPopup = null; }
  document.removeEventListener('mousedown', _calOutside, true);
  document.removeEventListener('touchstart', _calOutside, true);
}
function _calOutside(e){
  if(!_calPopup) return;
  if(_calPopup.contains(e.target)) return;
  if(_calPopup._anchor === e.target) return;
  _closeCal();
}
function _renderCal(inputEl, cursor){
  const val = (inputEl.value||'').match(/^\d{4}-\d{2}-\d{2}$/) ? inputEl.value : '';
  const today = new Date(); today.setHours(0,0,0,0);
  const todayStr = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
  const yr = cursor.getFullYear(), mo = cursor.getMonth();
  const first = new Date(yr, mo, 1);
  const startDow = first.getDay();
  const cells = [];
  const gridStart = new Date(yr, mo, 1 - startDow);
  for(let i=0;i<42;i++){
    const d = new Date(gridStart); d.setDate(gridStart.getDate()+i);
    cells.push(d);
  }
  const dowLabels = ['일','월','화','수','목','금','토'];
  const monthLabel = `${yr}-${String(mo+1).padStart(2,'0')}`;
  _calPopup.innerHTML = `
    <div class="vela-cal-hd">
      <button class="vela-cal-nav" data-cal-nav="-1" aria-label="이전 달">◀</button>
      <div class="vela-cal-mo">${monthLabel}</div>
      <button class="vela-cal-nav" data-cal-nav="1" aria-label="다음 달">▶</button>
    </div>
    <div class="vela-cal-dow">${dowLabels.map((d,i)=>`<div style="color:${i===0?'var(--red)':(i===6?'var(--blue)':'var(--sub)')}">${d}</div>`).join('')}</div>
    <div class="vela-cal-grid">${cells.map(d => {
      const dstr = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
      const inMo = d.getMonth() === mo;
      const isToday = dstr === todayStr;
      const isSel = dstr === val;
      const dow = d.getDay();
      let cls = 'vela-cal-cell';
      if(!inMo) cls += ' o';
      if(isToday) cls += ' t';
      if(isSel) cls += ' s';
      const dowColor = dow===0?'var(--red)':(dow===6?'var(--blue)':'inherit');
      return `<button type="button" class="${cls}" data-cal-day="${dstr}" style="color:${inMo?dowColor:'var(--dim)'}">${d.getDate()}</button>`;
    }).join('')}</div>
    <div class="vela-cal-ft">
      <button type="button" class="vela-cal-today" data-cal-today>오늘</button>
      <button type="button" class="vela-cal-close" data-cal-close>닫기</button>
    </div>
  `;
  _calPopup.querySelectorAll('[data-cal-nav]').forEach(b => b.onclick = (e) => {
    e.stopPropagation(); e.preventDefault();
    const delta = +b.dataset.calNav;
    const nc = new Date(cursor); nc.setMonth(nc.getMonth() + delta);
    _renderCal(inputEl, nc);
  });
  _calPopup.querySelectorAll('[data-cal-day]').forEach(b => b.onclick = (e) => {
    e.stopPropagation(); e.preventDefault();
    inputEl.value = b.dataset.calDay;
    inputEl.dispatchEvent(new Event('input', { bubbles:true }));
    inputEl.dispatchEvent(new Event('change', { bubbles:true }));
    _closeCal();
  });
  _calPopup.querySelector('[data-cal-today]').onclick = (e) => {
    e.stopPropagation(); e.preventDefault();
    inputEl.value = todayStr;
    inputEl.dispatchEvent(new Event('input', { bubbles:true }));
    inputEl.dispatchEvent(new Event('change', { bubbles:true }));
    _closeCal();
  };
  _calPopup.querySelector('[data-cal-close]').onclick = (e) => {
    e.stopPropagation(); e.preventDefault();
    _closeCal();
  };
}
function _openCal(inputEl){
  _closeCal();
  const rect = inputEl.getBoundingClientRect();
  const pop = document.createElement('div');
  pop.className = 'vela-cal-pop';
  pop._anchor = inputEl;
  // 뷰포트 아래 넘침 방지 — 아래 공간 부족하면 위로 표시
  const popH = 320, popW = 260;
  const belowSpace = window.innerHeight - rect.bottom;
  const top = belowSpace >= popH + 8 ? rect.bottom + 4 : Math.max(8, rect.top - popH - 4);
  const left = Math.min(Math.max(8, rect.left), window.innerWidth - popW - 8);
  pop.style.cssText = `position:fixed;top:${top}px;left:${left}px;width:${popW}px;z-index:2500;background:var(--panel);border:1px solid var(--line);border-radius:10px;box-shadow:0 12px 40px rgba(0,0,0,.55);padding:10px;font-family:inherit;color:var(--ink)`;
  // 팝업 내부 클릭이 modal-bg 로 버블링되어 닫히지 않도록 방지 (모달 바깥클릭 보호와 독립)
  pop.addEventListener('mousedown', e => e.stopPropagation());
  pop.addEventListener('touchstart', e => e.stopPropagation(), {passive:true});
  document.body.appendChild(pop);
  _calPopup = pop;
  const cursor = (inputEl.value||'').match(/^\d{4}-\d{2}-\d{2}$/)
    ? new Date(inputEl.value + 'T00:00:00')
    : new Date();
  _renderCal(inputEl, cursor);
  setTimeout(() => {
    document.addEventListener('mousedown', _calOutside, true);
    document.addEventListener('touchstart', _calOutside, true);
  }, 0);
}
function attachCalendar(inputEl){
  if(!inputEl || inputEl._velaCalBound) return;
  inputEl._velaCalBound = true;
  // readonly 금지 — 수기 입력 병행
  const openHandler = (e) => {
    e.stopPropagation();
    // 이미 이 input 의 팝업이 열려있으면 닫기(토글)
    if(_calPopup && _calPopup._anchor === inputEl){ _closeCal(); return; }
    _openCal(inputEl);
  };
  inputEl.addEventListener('click', openHandler);
  inputEl.addEventListener('focus', openHandler);
  inputEl.addEventListener('keydown', e => { if(e.key==='Escape') _closeCal(); });
}

/* SheetJS Export — 모든 목록 화면에 공통 (CLAUDE.md §0-6)
   ★ v0.23.1 — 엑셀 결재란(승인 도장 칸) 전수 삽입
   settings/documents.approval = { on: bool, slots: ['담당','검토','승인'] } · 회사 공유값
   상단 우측 = 헤더 1행(칸명) + 서명 3행(빈칸·병합) · 좌측 세로 '결재' 라벨
   전 엑셀 내보내기(개별 export + 전체 엑셀)가 xlsxBuildSheet 를 경유(중복 삽입 금지)
   OFF 시 기존 json_to_sheet 결과와 완전 동일 (컬럼·값 불변) */
const _APPROVAL_DEFAULT_SLOTS = ['담당','검토','승인'];
function getApprovalSetting(){
  const s = DB.get('settings','documents') || {};
  const ap = s.approval || {};
  const raw = Array.isArray(ap.slots) ? ap.slots : _APPROVAL_DEFAULT_SLOTS;
  const slots = raw.map(x => String(x==null?'':x).trim()).filter(Boolean).slice(0,5);
  return { on: !!ap.on, slots: slots.length ? slots : _APPROVAL_DEFAULT_SLOTS.slice() };
}
function setApprovalSetting(patch){
  const prev = DB.get('settings','documents') || {};
  DB.set('settings','documents', { ...prev, approval: { ...(prev.approval||{}), ...patch } });
}
// 결재란 스펙 반환 — OFF 또는 칸 없음이면 null (호출측 분기 최소화)
function buildApprovalRows(){
  const st = getApprovalSetting();
  if(!st.on || !st.slots.length) return null;
  return { slots: st.slots.slice(), rows: 4, cols: 1 + st.slots.length };
}
// SheetJS 시트 1벌 — rows(json 배열) → 결재란 얹은 워크시트. OFF·rows 없음이면 json_to_sheet 그대로.
function xlsxBuildSheet(rows){
  if(!rows || !rows.length) return null;
  const ap = buildApprovalRows();
  if(!ap) return XLSX.utils.json_to_sheet(rows);
  const keys = Object.keys(rows[0] || {});
  const dataCols = Math.max(1, keys.length);
  const totalCols = Math.max(dataCols, ap.cols);
  const apStartCol = totalCols - ap.cols;
  // 4행 결재란 (0행=헤더, 1~3행=서명 병합)
  const aoa = [];
  for(let r=0; r<ap.rows; r++) aoa.push(new Array(totalCols).fill(null));
  aoa[0][apStartCol] = '결재';
  ap.slots.forEach((n,i) => { aoa[0][apStartCol+1+i] = n; });
  // 스페이서 1행 → 데이터 헤더 → 데이터
  aoa.push(new Array(totalCols).fill(null));
  aoa.push(keys.slice());
  rows.forEach(r => aoa.push(keys.map(k => r[k])));
  const ws = XLSX.utils.aoa_to_sheet(aoa);
  const merges = [];
  merges.push({ s:{r:0,c:apStartCol}, e:{r:ap.rows-1,c:apStartCol} });         // '결재' 세로 병합 (4행)
  ap.slots.forEach((_,i) => {
    merges.push({ s:{r:1,c:apStartCol+1+i}, e:{r:ap.rows-1,c:apStartCol+1+i} }); // 서명칸 3행 병합
  });
  ws['!merges'] = (ws['!merges']||[]).concat(merges);
  const wcols = ws['!cols'] || [];
  wcols[apStartCol] = { wch: 6 };
  ap.slots.forEach((_,i) => { wcols[apStartCol+1+i] = wcols[apStartCol+1+i] || { wch: 12 }; });
  ws['!cols'] = wcols;
  return ws;
}
function exportXlsx(rows, sheetName, fileName){
  // ★ v0.23.2 — 로드 상태 구분 안내: DOMContentLoaded 이전이면 '로딩 중', 이후에도 없으면 CDN 로드 실패로 판정.
  if(!window.XLSX){
    const loading = document.readyState !== 'complete';
    toast(loading ? '엑셀 라이브러리 로딩 중 — 잠시 후 다시 시도' : '엑셀 라이브러리 로드 실패 — 인터넷 연결 확인', 'warn', 3200);
    return;
  }
  if(!rows?.length){ toast('내보낼 데이터 없음', 'warn'); return; }
  const ws = xlsxBuildSheet(rows);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, sheetName||'Sheet1');
  XLSX.writeFile(wb, fileName||`vela-mes-${Date.now()}.xlsx`);
  toast('엑셀 내보내기 완료','ok');
}

/* -------------------------------------------------------------------------------------------------
   §PIN 사용자 인증 — v0.14.1 (3단 게이트: PIN 상시 + 등록 카드 병행)
   users 컬렉션 기반. PIN 패드는 항상 렌더. 등록 카드(#gate-reg)는 users.length===0 일 때만 삽입.
   첫 관리자 생성 순간 users≥1 → 다음 부팅부터 gate-reg DOM 미삽입(단방향 가드).
   ※ 클라이언트 게이트 단계로 PIN 평문 저장 — 백엔드 도입 시 해시로 전환 예정.
   ------------------------------------------------------------------------------------------------- */
let _gateKeyHandler = null;
function renderGate(){
  // 좌 패널 회사·버전 표시
  const co = getCompany();
  const nm = document.getElementById('gt-co-name');
  const st = document.getElementById('gt-co-site');
  if(co?.name && co.name.trim()){ nm.textContent = co.name; nm.hidden = false; } else { nm.hidden = true; }
  if(co?.site && co.site.trim()){ st.textContent = co.site; st.hidden = false; } else { st.hidden = true; }
  const ver = document.getElementById('gt-ver'); if(ver) ver.textContent = APP_VERSION;

  // PIN 패드는 항상 렌더
  renderPinPad();

  // 등록 카드는 users.length===0 일 때만 (단방향 가드)
  const wrap = document.querySelector('#pin-gate .gate-wrap');
  let reg = document.getElementById('gate-reg');
  if(DB.all('users').length === 0){
    if(!reg){
      reg = document.createElement('section');
      reg.id = 'gate-reg';
      reg.className = 'gate-reg';
      wrap.appendChild(reg);
    }
    renderRegisterForm();
  } else if(reg){
    reg.remove();
  }
}
function renderRegisterForm(){
  // ★ v0.22.1 — 신 정책 적용 · 저장은 SHA-256+salt(사용자 id) 해시
  document.getElementById('gate-reg').innerHTML = `
    <span class="fr-badge">최초 실행</span>
    <div class="fr-title">관리책임자 등록</div>
    <div class="fr-sub">첫 관리자를 등록하세요 · 등록 즉시 입장</div>
    <div class="fld"><label>이름</label><input id="rf-name" autocomplete="username" placeholder="예: 홍길동"></div>
    <div class="fld" style="position:relative"><label>비밀번호</label>
      <input id="rf-pw" type="password" autocomplete="new-password" spellcheck="false" placeholder="8자 이상 · 영문+숫자">
      <button type="button" class="pw-toggle" id="rf-pw-tog" style="position:absolute;right:4px;bottom:4px;background:none;border:none;color:var(--sub);cursor:pointer;font-size:15px;padding:5px 8px" title="표시/숨김">👁</button>
    </div>
    <div class="fld" style="position:relative"><label>비밀번호 확인</label>
      <input id="rf-pw2" type="password" autocomplete="new-password" spellcheck="false" placeholder="비밀번호 확인">
      <button type="button" class="pw-toggle" id="rf-pw2-tog" style="position:absolute;right:4px;bottom:4px;background:none;border:none;color:var(--sub);cursor:pointer;font-size:15px;padding:5px 8px" title="표시/숨김">👁</button>
    </div>
    <div class="pw-err" id="rf-err"></div>
    <button class="reg-btn" id="rf-save">등록하고 입장</button>
    <div class="fr-note"><b>이 카드는 최초 1회만 표시</b> — 첫 관리자 등록 후 영구 소멸<br>이후 직원 비밀번호 발급·관리는 설정 › 사용자 관리에서</div>
  `;
  const pwEl = document.getElementById('rf-pw');
  const pw2El = document.getElementById('rf-pw2');
  const errEl = document.getElementById('rf-err');
  const nameEl = document.getElementById('rf-name');
  const showErr = (m) => { errEl.textContent = m || ''; };
  const wireToggle = (inputId, btnId) => {
    const inp = document.getElementById(inputId);
    const btn = document.getElementById(btnId);
    btn.onclick = () => { const wasPw = inp.type === 'password'; inp.type = wasPw?'text':'password'; btn.textContent = wasPw?'🙈':'👁'; inp.focus(); };
  };
  wireToggle('rf-pw', 'rf-pw-tog');
  wireToggle('rf-pw2', 'rf-pw2-tog');
  pwEl.addEventListener('input', () => { const r = checkPwPolicy(pwEl.value, nameEl.value.trim()); showErr(r.ok ? '' : r.reason); });
  const doSave = async () => {
    const name = nameEl.value.trim();
    const pw   = pwEl.value || '';
    const pw2  = pw2El.value || '';
    if(!name){ showErr('이름을 입력하세요'); return; }
    if(isReservedName(name)){ showErr('예약된 이름은 사용할 수 없습니다'); return; }
    const chk = checkPwPolicy(pw, name);
    if(!chk.ok){ showErr(chk.reason); pwEl.focus(); return; }
    if(pw !== pw2){ showErr('비밀번호 확인이 일치하지 않습니다'); pw2El.focus(); return; }
    const id = `U-${String(DB.all('users').length + 1).padStart(3,'0')}`;
    try {
      const hash = await hashPassword(pw, id);
      const u = { id, name, pin: hash, role:'manager', active:true, created_at:Date.now(), last_login:null };
      DB.set('users', id, u);
      toast(`관리책임자 등록 완료 — ${name}`,'ok');
      document.getElementById('gate-reg')?.remove();
      showRecognition(u);
    } catch(e){
      console.error('[VELA] register admin failed', e);
      showErr('저장 실패 — 콘솔 확인');
    }
  };
  document.getElementById('rf-save').onclick = doSave;
  pw2El.addEventListener('keydown', e => { if(e.key==='Enter') doSave(); });
  pwEl.addEventListener('keydown', e => { if(e.key==='Enter'){ e.preventDefault(); pw2El.focus(); }});
}
/* ★ v0.22.1 — 로그인 표준 폼 (아이디 + 비밀번호) · 폰 OS 키보드 · 눈 아이콘 · Enter 로그인.
   기존 renderPinPad 함수명 유지(호출부 무수정). 숫자 키패드 제거. 배경·좌 패널 톤 불변.
   [데모 체험] 버튼 위치 보존. */
function renderPinPad(){
  const activeNames = DB.all('users').filter(u => u.active === true).map(u => u.name).filter(Boolean);
  const dlist = activeNames.map(n => `<option value="${_esc(n)}">`).join('');
  document.getElementById('pin-box').innerHTML = `
    <div class="gp-title">아이디 · 비밀번호</div>
    <div class="gp-sub">이름과 비밀번호로 접속 · 8자 이상 (영문+숫자)</div>
    <form class="gp-login-form" id="gt-form" autocomplete="on" onsubmit="return false">
      <div class="gp-fld">
        <label for="gt-name">이름</label>
        <input id="gt-name" name="username" list="gt-names" autocomplete="username" spellcheck="false"
               autocapitalize="off" enterkeyhint="next" placeholder="예: 홍길동">
        <datalist id="gt-names">${dlist}</datalist>
      </div>
      <div class="gp-fld has-toggle">
        <label for="gt-pw">비밀번호</label>
        <input id="gt-pw" name="password" type="password" autocomplete="current-password" spellcheck="false"
               autocapitalize="off" enterkeyhint="go" placeholder="비밀번호">
        <button type="button" class="pw-toggle" id="gt-pw-toggle" aria-label="비밀번호 표시/숨김" title="비밀번호 표시/숨김">👁</button>
      </div>
      <div class="pw-err" id="gt-err"></div>
      <button type="submit" class="gp-login-btn" id="gt-login">로그인</button>
      <div class="pw-hint">초기 비밀번호 <b style="color:var(--cyan)">000000</b> · 첫 로그인 시 새 정책으로 변경</div>
    </form>
    <!-- ★ v0.22.0 — 데모 체험 진입 (보조 스타일 · 주 동선 방해 금지) -->
    <button class="gate-demo-btn" type="button" onclick="onDemoClick()" title="샘플 데이터로 전 기능 체험 (실데이터·서버와 완전 분리)">▶ 데모 체험</button>
  `;
  const nameEl = document.getElementById('gt-name');
  const pwEl   = document.getElementById('gt-pw');
  const errEl  = document.getElementById('gt-err');
  const btnEl  = document.getElementById('gt-login');
  const toggleEl = document.getElementById('gt-pw-toggle');
  const showErr = (msg) => { errEl.textContent = msg || ''; };
  // 눈 아이콘 토글
  toggleEl.onclick = () => {
    const isPw = pwEl.type === 'password';
    pwEl.type = isPw ? 'text' : 'password';
    toggleEl.textContent = isPw ? '🙈' : '👁';
    pwEl.focus();
  };
  async function submit(){
    showErr('');
    const nameRaw = (nameEl.value || '').trim();
    const pw      = pwEl.value || '';
    if(!nameRaw){ showErr('이름을 입력하세요'); nameEl.focus(); return; }
    if(!pw){     showErr('비밀번호를 입력하세요'); pwEl.focus(); return; }
    btnEl.disabled = true;
    try {
      const norm = _normName(nameRaw);
      // 개발자(벤더) 분기 — 저장 pin 이 sha256 이면 해시 비교, 아니면 legacy 평문 비교
      if(norm === 'juns' || norm === '개발자'){
        const v = await verifyPassword(pw, { stored: getVendorPin(), salt: 'VENDOR' });
        if(!v.match){ showErr('이름 또는 비밀번호가 올바르지 않습니다'); btnEl.disabled = false; return; }
        // legacy(구 6자리 평문) → 강제 변경 (해시 승격 + 새 정책 적용)
        if(v.legacy){
          openForcePwChange({ id:'VENDOR', name:'개발자(JUNS)', role:'vendor' }, { reason: getVendorPin() === '000000' ? '초기 비밀번호 변경' : '보안 정책 강화 — 새 비밀번호 설정' });
          return;
        }
        showRecognition({ id:'VENDOR', name:'개발자(JUNS)', role:'vendor' });
        return;
      }
      // 사용자 — 이름 일치 필터 후 비밀번호 검증
      const cand = DB.all('users').find(x => x.active === true && String(x.name||'').trim() === nameRaw);
      if(!cand){ showErr('이름 또는 비밀번호가 올바르지 않습니다'); btnEl.disabled = false; return; }
      const v = await verifyPassword(pw, { stored: cand.pin, salt: cand.id });
      if(!v.match){ showErr('이름 또는 비밀번호가 올바르지 않습니다'); btnEl.disabled = false; return; }
      if(v.legacy){
        // 초기 000000 이거나 구 평문 → 강제 변경
        const reason = (cand.pin === '000000') ? '초기 비밀번호 변경' : '보안 정책 강화 — 새 비밀번호 설정';
        openForcePwChange(cand, { reason });
        return;
      }
      showRecognition(cand);
    } catch(e){
      console.error('[VELA] login error', e);
      showErr('로그인 처리 오류 — 콘솔 확인');
      btnEl.disabled = false;
    }
  }
  btnEl.onclick = submit;
  document.getElementById('gt-form').addEventListener('submit', submit);
  pwEl.addEventListener('keydown', e => { if(e.key === 'Enter'){ e.preventDefault(); submit(); }});
  nameEl.addEventListener('keydown', e => { if(e.key === 'Enter'){ e.preventDefault(); pwEl.focus(); }});
  // 게이트 window keydown handler 는 표준 폼에선 불필요 (input 이 자체 처리)
  detachGateKey();
  setTimeout(() => nameEl?.focus(), 60);
}
function detachGateKey(){
  if(_gateKeyHandler){ window.removeEventListener('keydown', _gateKeyHandler); _gateKeyHandler = null; }
}
function showRecognition(u){
  detachGateKey();
  // v0.15.4 — vendor 배지 분기 추가
  const isVendor = u.role === 'vendor';
  const isMgr    = u.role === 'manager';
  const badgeCls = isVendor ? 'vd' : (isMgr ? 'mgr' : 'op');
  const badgeTxt = isVendor ? '개발자(JUNS)' : (isMgr ? '관리책임자' : '일반');
  document.getElementById('pin-box').innerHTML = `
    <div class="reco-card">
      <div class="rc-ic">${ico('check')}</div>
      <div class="rc-name">${_esc(u.name)}</div>
      <span class="rc-badge ${badgeCls}">${badgeTxt}</span>
      <div class="rc-hint">입장합니다…</div>
    </div>
  `;
  setTimeout(()=>enterAsUser(u), 800);
}
/* ★ v0.22.1 — 강제 비밀번호 변경 모달 (신 정책 · 해시 저장 · 벤더 겸용)
   진입 계기: (a) 초기 000000 첫 로그인 (b) legacy 평문 로그인 성공 후 해시 승격.
   저장: 사용자 → DB.set('users', id, { pin: 'sha256:hex' }) · 벤더 → DB.set('settings','vendor', { pin }).
   구 함수명(openForcePinChange) 을 별칭으로 유지해 외부 호출 무영향. */
function openForcePwChange(u, opts){
  const reason = (opts && opts.reason) || '초기 비밀번호 변경';
  const isVendor = (u && u.id === 'VENDOR');
  detachGateKey();
  openModal(`
    <h2>${_esc(reason)} — ${_esc(u.name)}</h2>
    <div class="body">
      <div style="color:var(--sub);font-size:11.5px;line-height:1.7">

          ? '최초 접속입니다 — 새 비밀번호를 설정해야 입장할 수 있습니다.'
          : '보안 정책이 강화되었습니다 — 새 정책에 맞춘 비밀번호로 변경 후 입장하세요.'}<br>
        <span style="color:var(--dim)">정책: 8자 이상 · 영문 1자 이상 · 숫자 1자 이상 · 이름 포함/반복(000000)/순차(123456) 금지</span>

        <button type="button" class="pw-toggle" id="fp-pw-tog" title="표시/숨김">👁</button>
      </div>
      <div class="gp-fld has-toggle" style="margin-top:8px">
        <label>비밀번호 확인</label>
        <input id="fp-pw2" type="password" autocomplete="new-password" spellcheck="false" placeholder="새 비밀번호 확인">
        <button type="button" class="pw-toggle" id="fp-pw2-tog" title="표시/숨김">👁</button>
      </div>
      <div class="pw-err" id="fp-err"></div>
      <div class="actions">
        <button class="btn primary" id="fp-ok">${ico('save')}변경하고 ${isVendor?'접속':'입장'}</button>
      </div>
    </div>
  `);
  const pwEl  = document.getElementById('fp-pw');
  const pw2El = document.getElementById('fp-pw2');
  const errEl = document.getElementById('fp-err');
  const okEl  = document.getElementById('fp-ok');
  const showErr = (m) => { errEl.textContent = m || ''; };
  const wireToggle = (inputId, btnId) => {
    const inp = document.getElementById(inputId);
    const btn = document.getElementById(btnId);
    btn.onclick = () => { const wasPw = inp.type === 'password'; inp.type = wasPw?'text':'password'; btn.textContent = wasPw?'🙈':'👁'; inp.focus(); };
  };
  wireToggle('fp-pw', 'fp-pw-tog');
  wireToggle('fp-pw2', 'fp-pw2-tog');
  // 실시간 정책 힌트
  pwEl.addEventListener('input', () => {
    const r = checkPwPolicy(pwEl.value, u.name);
    showErr(r.ok ? '' : r.reason);
  });
  const doSave = async () => {
    const p  = pwEl.value || '';
    const p2 = pw2El.value || '';
    const chk = checkPwPolicy(p, u.name);
    if(!chk.ok){ showErr(chk.reason); pwEl.focus(); return; }
    if(p !== p2){ showErr('비밀번호 확인이 일치하지 않습니다'); pw2El.focus(); return; }
    okEl.disabled = true;
    try {
      const salt = isVendor ? 'VENDOR' : u.id;
      const hash = await hashPassword(p, salt);
      if(isVendor){
        DB.set('settings', 'vendor', { pin: hash });
      } else {
        DB.set('users', u.id, { pin: hash });
      }
      closeModal();
      toast('비밀번호 변경 완료 — 입장합니다', 'ok');
      showRecognition({ ...u, pin: hash });
    } catch(e){
      console.error('[VELA] force pw change failed', e);
      showErr('저장 실패 — 콘솔 확인');
      okEl.disabled = false;
    }
  };
  okEl.onclick = doSave;
  pw2El.addEventListener('keydown', e => { if(e.key === 'Enter') doSave(); });
  pwEl.addEventListener('keydown', e => { if(e.key === 'Enter'){ e.preventDefault(); pw2El.focus(); }});
  setTimeout(() => pwEl.focus(), 60);
}

      try {
