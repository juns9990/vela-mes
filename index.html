<!-- ★ v0.21.4 — 테마 (다크/라이트) · 기기별 취향(로컬 전용 키 vela_theme) · 폰 상태바 theme-color 동기.
     head 초기 스크립트로 CSS 적용 전 data-theme 세팅 → FOUC 방지. -->
<meta name="theme-color" id="meta-theme-color" content="#08090b">
<script>
(function(){
  try {
    var t = localStorage.getItem('vela_theme');
    if(t !== 'light' && t !== 'dark') t = 'dark';
    document.documentElement.setAttribute('data-theme', t);
    var m = document.getElementById('meta-theme-color');
    if(m) m.setAttribute('content', t === 'light' ? '#f5f7fa' : '#08090b');
  } catch(e){ document.documentElement.setAttribute('data-theme','dark'); }
})();
</script>

/* ============================================================
   디자인 토큰 — vela-mes-dashboard.html v0.1.6 그대로 승계
   ============================================================ */
:root{
  --bg:#08090b;--bg2:#0c0e11;--panel:#121419;--panel2:#161922;
  --line:#23262f;--line2:#2c3038;--ink:#eef0f4;--sub:#8b909c;--dim:#5a5f6b;
  --cyan:#5eead4;--cyan-dim:#2dd4bf;--heat:#ff7a45;--heat2:#ffab40;
  --green:#4ade80;--red:#f87171;--amber:#fbbf24;--blue:#7dd3fc;
}
/* ★ v0.21.5 — 라이트 테마 (표면/텍스트 계열만 재정의)
   ★ v0.21.6 — --cyan 만 짙은 틸(#0d9488, 흰 배경 대비 4.52:1) 로 재정의 (라이트 전용 · 다크 불변)
   · 나머지 포인트 색(--amber/--red/--green/--blue/--heat/--cyan-dim)은 두 테마 공통 = 정체성 유지
   · 다크 :root 는 v0.21.3 픽셀 동일 (건드리지 않음) */
html[data-theme="light"]{
  --bg:#f4f6fa;--bg2:#ffffff;--panel:#ffffff;--panel2:#f7f9fc;
  --line:#e2e6ec;--line2:#cfd4dd;--ink:#14181f;
  /* ★ v0.22.2 — --sub / --dim 어둡게 (라이트 메뉴·힌트 대비 확보 · 4.5:1+ 목표)
     이전: --sub #4a5262(7.75:1), --dim #8a91a0(3.4:1 · WCAG 미달) → 현재: sub 8.5:1+, dim 4.8:1+ */
  --sub:#3d4451; --dim:#6b7280;
  --cyan:#0d9488;
}
/* ★ v0.21.5 — 라이트 국소 보정 (다크 하드코딩 색이 밝은 배경에서 깨지는 최소 지점만)
   원칙: 로직 무변화 · 배경/텍스트 반전 필요한 스팟만 · 변수 안 쓰는 인라인은 그대로 둠(불가피). */
html[data-theme="light"] input:focus,
html[data-theme="light"] select:focus,
html[data-theme="light"] textarea:focus,
html[data-theme="light"] .fld input:focus,
html[data-theme="light"] .gp-name-fld input:focus{background:#ffffff}
html[data-theme="light"] input[readonly]{background:#f2f4f8;color:var(--sub)}
html[data-theme="light"] body::before{
  background-image:linear-gradient(rgba(0,0,0,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,0,0,.03) 1px,transparent 1px);
}
/* 브랜드 마크 — 다크는 흰 텍스트+검정 그림자, 라이트는 반전(검정 텍스트+연회색 그림자) */
html[data-theme="light"] .vela-mark.primary{color:#14181f;text-shadow:1px 1px 0 #cfd4dd,2px 2px 0 #cfd4dd,3px 3px 0 #cfd4dd,4px 4px 0 #cfd4dd;-webkit-text-stroke:1.2px #cfd4dd}
/* 회색 pill — 다크 배경 하드코딩 → 라이트에서는 옅은 회색 배경 */
html[data-theme="light"] .pill.gray{background:#eef1f6}
/* toast 경계 — 다크 브라운 하드코딩 → 라이트에서는 옅은 대비색 */
html[data-theme="light"] #toast.err{border-color:#fecaca}
html[data-theme="light"] #toast.warn{border-color:#fde68a}
html[data-theme="light"] .btn.warn{border-color:#fecaca}
/* 포인트색 "텍스트 용도" 국소 보정 — 판독 불가한 곳만 (면·배지 배경 원색 유지 · 변수는 불변)
   ★ v0.21.6 — .pill.cyan 은 --cyan 재정의로 자동 처리(중복 제거). 나머지 포인트색은 그대로. */
html[data-theme="light"] .pill.green{color:#047857}
html[data-theme="light"] .pill.blue{color:#0369a1}
html[data-theme="light"] .pill.red{color:#b91c1c}
html[data-theme="light"] .pill.amber{color:#92400e}
html[data-theme="light"] .pill.heat{color:#c2410c}
*{margin:0;padding:0;box-sizing:border-box}
html,body{background:var(--bg);color:var(--ink);font-family:'Inter','Apple SD Gothic Neo','Malgun Gothic',sans-serif;-webkit-font-smoothing:antialiased;height:100%;}
body{background:radial-gradient(1200px 600px at 80% -10%, rgba(94,234,212,.06), transparent 60%),radial-gradient(1000px 500px at 0% 110%, rgba(125,211,252,.045), transparent 55%),var(--bg);min-height:100vh;padding-bottom:90px;overflow-x:hidden}
body::before{content:"";position:fixed;inset:0;pointer-events:none;z-index:0;background-image:linear-gradient(rgba(255,255,255,.015) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.015) 1px,transparent 1px);background-size:44px 44px;}
button,input,select,textarea{font-family:inherit;color:inherit}
input,select,textarea{background:var(--bg2);border:1px solid var(--line);border-radius:8px;padding:10px 12px;color:var(--ink);font-size:14px;width:100%;outline:none;transition:.18s}
input:focus,select:focus,textarea:focus{border-color:var(--cyan-dim);background:#0a0c10}
input[readonly]{color:var(--sub);background:#0a0b0e}
label{display:block;font-size:11px;color:var(--sub);font-weight:600;letter-spacing:.4px;margin-bottom:6px}

/* === Vela 마크 (매거진 v0.18.2 규격 그대로) === */
.vela-mark{font-family:'Fraunces','Pretendard',Georgia,serif;font-style:italic;font-weight:900;letter-spacing:-0.03em;line-height:0.9;display:inline-block;font-size:30px}
.vela-mark.primary{color:#fff;text-shadow:1px 1px 0 #0a0a0a,2px 2px 0 #0a0a0a,3px 3px 0 #0a0a0a,4px 4px 0 #0a0a0a;-webkit-text-stroke:1.2px #0a0a0a}
.vela-mark .accent{color:#5eead4}
.sys{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:800;letter-spacing:4px;color:var(--cyan-dim);padding:4px 9px;border:1px solid var(--line2);border-radius:6px;background:rgba(94,234,212,.05)}

/* ============================================================
   v0.14.0 — 스플래시 (앱 실행 시 브랜드 오버레이)
   ============================================================ */
#splash{position:fixed;inset:0;background:radial-gradient(900px 500px at 50% 40%, rgba(94,234,212,.05), transparent 60%),var(--bg);z-index:2000;display:flex;align-items:center;justify-content:center;transition:opacity .55s ease}
#splash.gone{opacity:0;pointer-events:none}
.sp-center{text-align:center;display:flex;flex-direction:column;align-items:center;gap:0;padding:20px}
.sp-brand{display:flex;flex-direction:column;align-items:center;gap:8px;margin-bottom:22px}
.sp-brand .vela-mark{font-size:76px;line-height:.9}
.sp-sys{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:800;letter-spacing:9px;color:var(--cyan-dim);padding:4px 10px;border:1px solid var(--line2);border-radius:6px;background:rgba(94,234,212,.05);margin-top:2px}
.sp-co-name{font-size:14px;font-weight:700;color:var(--ink);letter-spacing:.2px}
.sp-co-site{font-size:12px;color:var(--sub);margin-top:2px;letter-spacing:.4px}
.sp-loader{width:220px;height:3px;background:var(--panel);border:1px solid var(--line);border-radius:2px;overflow:hidden;margin-top:28px}
.sp-bar{width:0;height:100%;background:linear-gradient(90deg,var(--cyan),var(--cyan-dim));transition:width 1.5s ease-out}
.sp-bar.go{width:100%}
.sp-hint{font-size:10.5px;color:var(--dim);letter-spacing:3px;margin-top:12px;text-transform:uppercase}

/* ============================================================
   v0.14.1 — 3단 진입 게이트 (브랜드 · PIN 패드 상시 · 등록 카드 조건부)
   ============================================================ */
#pin-gate{position:fixed;inset:0;background:radial-gradient(900px 500px at 50% 30%, rgba(94,234,212,.05), transparent 60%),var(--bg);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px}
#pin-gate.hide{display:none}
.gate-wrap{display:flex;width:min(1080px,100%);border:1px solid var(--line);border-radius:22px;overflow:hidden;background:linear-gradient(160deg,var(--panel2),var(--panel));box-shadow:0 20px 80px rgba(0,0,0,.55)}

/* 좌 — 브랜드 */
.gate-left{flex:1;min-width:260px;position:relative;padding:36px 34px;display:flex;flex-direction:column;justify-content:space-between;gap:22px;border-right:1px solid var(--line);background:linear-gradient(160deg,rgba(94,234,212,.04),rgba(8,9,11,0) 55%),var(--panel2);overflow:hidden}
.gate-left::before{content:"";position:absolute;inset:0;pointer-events:none;background-image:linear-gradient(rgba(255,255,255,.014) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.014) 1px,transparent 1px);background-size:32px 32px}
.gate-left > *{position:relative;z-index:1}
.gate-brand{display:flex;align-items:baseline;gap:11px}
.gate-brand .vela-mark{font-size:44px;line-height:.9}
.gate-sys{font-family:'JetBrains Mono',monospace;font-size:10.5px;font-weight:800;letter-spacing:7px;color:var(--cyan-dim);padding:3px 9px;border:1px solid var(--line2);border-radius:6px;background:rgba(94,234,212,.05)}
.gate-co-name{font-size:18px;font-weight:700;color:var(--ink);letter-spacing:.2px}
.gate-co-site{font-size:12px;color:var(--sub);margin-top:3px}
.gate-clock{margin-top:0}
.gate-t{font-family:'JetBrains Mono',monospace;font-weight:800;font-size:38px;color:var(--cyan);letter-spacing:2px;line-height:1}
.gate-d{font-family:'JetBrains Mono',monospace;font-size:12.5px;color:var(--sub);margin-top:6px;letter-spacing:1px}
.gate-status{display:flex;align-items:center;gap:14px;font-size:11px;color:var(--sub);letter-spacing:.4px;flex-wrap:wrap}
.gs-dot{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 8px rgba(74,222,128,.6);flex-shrink:0;display:inline-block;margin-right:6px}
.gate-status .gs-sep{display:none}

/* 중앙 — PIN 패드 (상시) */
.gate-pin{width:330px;background:var(--panel);padding:32px 30px;display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0}
.gp-title{font-size:11px;color:var(--sub);font-weight:600;letter-spacing:2px}
.gp-sub{font-size:11.5px;color:var(--dim);margin:5px 0 16px}
.pin-display{font-family:'JetBrains Mono',monospace;font-size:32px;letter-spacing:14px;color:var(--cyan);height:52px;width:220px;display:flex;align-items:center;justify-content:center;padding-left:14px;border-bottom:1px solid var(--line);margin-bottom:20px}
.pin-display.err{color:var(--red);animation:shake .4s}
/* ★ v0.16.22 — 게이트 이름 입력칸 (PIN 위) · 220px 정렬 · 폰 키보드 대응 */
.gp-name-fld{width:220px;margin-bottom:14px}
.gp-name-fld label{display:block;font-size:10px;color:var(--sub);font-weight:600;margin-bottom:5px;letter-spacing:.3px;text-align:left}
.gp-name-fld input{width:100%;background:var(--bg2);border:1px solid var(--line2);border-radius:9px;padding:10px 12px;color:var(--ink);font-size:14px;font-family:inherit;outline:none;transition:.15s;box-sizing:border-box}
.gp-name-fld input:focus{border-color:var(--cyan-dim);background:#0a0c10}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
.pin-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;width:220px}
.pin-pad button{background:var(--bg2);border:1px solid var(--line);border-radius:12px;padding:14px 0;font-size:18px;font-weight:700;color:var(--ink);cursor:pointer;font-family:'JetBrains Mono',monospace;transition:.15s}
.pin-pad button:hover{background:var(--panel);border-color:var(--cyan-dim);color:var(--cyan)}
.pin-pad button.act{background:var(--cyan);color:#06201c;border-color:var(--cyan)}
.gp-hint{font-size:10px;color:var(--dim);margin-top:14px;text-align:center;line-height:1.6;letter-spacing:.3px}

/* 우 — 관리책임자 등록 (최초 1회, users.length===0) */
.gate-reg{width:330px;background:var(--panel);padding:26px 26px;display:flex;flex-direction:column;border-left:1px dashed var(--line2);flex-shrink:0}
.fr-badge{font-size:10px;font-weight:700;letter-spacing:1px;color:var(--amber);background:rgba(251,191,36,.1);border:1px solid rgba(251,191,36,.3);border-radius:99px;padding:3px 11px;align-self:center}
.fr-title{font-size:15px;font-weight:800;text-align:center;margin-top:9px;color:var(--ink)}
.fr-sub{font-size:10.5px;color:var(--dim);text-align:center;margin-top:3px;margin-bottom:14px;line-height:1.5}
.fld{margin-bottom:10px}
.fld label{display:block;font-size:10px;color:var(--sub);font-weight:600;margin-bottom:5px;letter-spacing:.3px}
.fld input{width:100%;background:var(--bg2);border:1px solid var(--line2);border-radius:9px;padding:10px 12px;color:var(--ink);font-size:13px;font-family:inherit;outline:none;transition:.15s}
.fld input:focus{border-color:var(--cyan-dim);background:#0a0c10}
.fld input.mono{font-family:'JetBrains Mono',monospace;letter-spacing:6px;font-size:15px;font-weight:700}
.reg-btn{width:100%;border:none;border-radius:11px;padding:12px 0;font-size:13px;font-weight:700;background:var(--cyan);color:#06201c;cursor:pointer;margin-top:6px;transition:.15s;font-family:inherit}
.reg-btn:hover{background:var(--cyan-dim)}
.fr-note{font-size:9.8px;color:var(--dim);text-align:center;margin-top:10px;line-height:1.6}
.fr-note b{color:var(--amber);font-weight:600}

/* 인식 카드 (showRecognition — #pin-box 안에 그려짐) */
.reco-card{width:100%;max-width:280px;text-align:center;padding:24px 20px;background:linear-gradient(160deg,rgba(94,234,212,.09),rgba(94,234,212,.02));border:1px solid var(--cyan-dim);border-radius:16px;animation:reco-in .28s ease-out}
@keyframes reco-in{from{opacity:0;transform:translateY(8px) scale(.98)}to{opacity:1;transform:translateY(0) scale(1)}}
.rc-ic{width:46px;height:46px;margin:0 auto 12px;border-radius:50%;background:rgba(94,234,212,.14);display:flex;align-items:center;justify-content:center;color:var(--cyan)}
.rc-ic svg{width:24px;height:24px;stroke:currentColor;fill:none;stroke-width:2.6}
.rc-name{font-size:22px;font-weight:800;color:var(--ink);letter-spacing:.2px;margin-bottom:10px}
.rc-badge{display:inline-block;padding:4px 12px;border-radius:99px;font-size:10.5px;font-weight:700;letter-spacing:.5px}
.rc-badge.mgr{background:rgba(251,191,36,.14);color:var(--amber);border:1px solid rgba(251,191,36,.35)}
.rc-badge.op{background:rgba(94,234,212,.12);color:var(--cyan);border:1px solid rgba(94,234,212,.3)}
/* v0.15.4 — 판매자(벤더) 배지 */
.rc-badge.vd{background:rgba(125,211,252,.14);color:var(--blue);border:1px solid rgba(125,211,252,.35)}
.rc-hint{font-size:11px;color:var(--sub);margin-top:14px;letter-spacing:.5px}

/* 모바일 — 세로 스택: 브랜드 → PIN → 등록 */
@media(max-width:920px){
  .gate-wrap{flex-direction:column;width:100%;max-width:420px}
  .gate-left{flex:none;border-right:none;border-bottom:1px solid var(--line);padding:24px}
  .gate-brand .vela-mark{font-size:38px}
  .gate-t{font-size:30px}
  .gate-pin{width:100%;padding:26px 24px}
  .gate-reg{width:100%;border-left:none;border-top:1px dashed var(--line2);padding:22px 24px}
  .sp-brand .vela-mark{font-size:60px}
}

/* ============================================================
   App shell
   ============================================================ */
.wrap{position:relative;z-index:1;max-width:1320px;margin:0 auto;padding:0 18px}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 0;border-bottom:1px solid var(--line);margin-bottom:18px;flex-wrap:wrap;gap:8px}
.brand{display:flex;align-items:baseline;gap:10px}
.factory{font-size:12px;color:var(--sub)} .factory b{color:var(--ink)}
.clock{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--sub);text-align:right;line-height:1.5}
.clock b{color:var(--ink);font-weight:700}
/* v0.15.2 — topbar 우측: 사용자 pill + 시계 묶음 */
.topbar-right{display:flex;align-items:center;gap:14px}
.user-pill{display:inline-flex;align-items:center;gap:9px;background:var(--panel2);border:1px solid var(--line);border-radius:99px;padding:4px 14px 4px 4px;cursor:pointer;font-family:inherit;color:var(--ink);transition:.15s;line-height:1}
.user-pill:hover{border-color:var(--cyan-dim);background:var(--panel)}
.up-avatar{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;background:rgba(94,234,212,.12);color:var(--cyan);border:1px solid rgba(94,234,212,.3);flex-shrink:0}
.up-avatar.mgr{background:rgba(251,191,36,.14);color:var(--amber);border-color:rgba(251,191,36,.35)}
/* v0.15.4 — 판매자 pill 아바타 */
.up-avatar.vd{background:rgba(125,211,252,.14);color:var(--blue);border-color:rgba(125,211,252,.35)}
.up-info{display:flex;flex-direction:column;gap:2px;text-align:left}
.up-name{font-size:12.5px;font-weight:700;color:var(--ink);line-height:1}
.up-badge{font-size:9.5px;font-weight:700;letter-spacing:.4px;line-height:1}
.up-badge.mgr{color:var(--amber)} .up-badge.op{color:var(--sub)} .up-badge.vd{color:var(--blue)}
/* ★ v0.20.0 — 동기화 상태 pill (2막 STEP 1 · 슬롯) */
.sync-pill{display:inline-flex;align-items:center;gap:7px;background:var(--panel2);border:1px solid var(--line);border-radius:99px;padding:5px 12px;font-size:11px;color:var(--sub);letter-spacing:.3px}
/* ★ v0.22.0 — DEMO 배지 (헤더 · amber) · 데모 체험 모드에서만 노출 */
.demo-badge{display:inline-flex;align-items:center;gap:5px;background:rgba(251,191,36,.14);color:var(--amber);border:1px solid rgba(251,191,36,.4);border-radius:99px;padding:5px 12px;font-size:11px;font-weight:800;letter-spacing:1.3px}
.demo-badge::before{content:"●";font-size:8px;line-height:1}
/* ★ v0.22.0 — 게이트 [데모 체험] 버튼 (보조 스타일) */
.gate-demo-btn{display:inline-flex;align-items:center;gap:6px;margin-top:14px;background:transparent;border:1px dashed var(--line2);color:var(--sub);border-radius:99px;padding:8px 16px;font-size:11.5px;font-weight:600;cursor:pointer;transition:.15s;font-family:inherit;align-self:center;letter-spacing:.3px}
.gate-demo-btn:hover{border-color:var(--amber);color:var(--amber);background:rgba(251,191,36,.06)}
/* ★ v0.22.1 — 로그인 표준 폼 (아이디 + 비밀번호 · 눈 아이콘 · 정책 위반 사유) */
.gp-login-form{display:flex;flex-direction:column;gap:12px;width:100%;max-width:320px}
.gp-fld{position:relative}
.gp-fld label{display:block;font-size:10.5px;font-weight:700;color:var(--sub);margin-bottom:5px;letter-spacing:.6px}
.gp-fld input{width:100%;background:var(--bg2);border:1px solid var(--line2);border-radius:10px;padding:11px 14px;color:var(--ink);font-size:14px;font-family:inherit;outline:none;transition:.15s}
.gp-fld input:focus{border-color:var(--cyan-dim);background:var(--bg2)}
.gp-fld.has-toggle input{padding-right:44px}
.gp-fld .pw-toggle{position:absolute;right:6px;bottom:6px;background:none;border:none;color:var(--sub);cursor:pointer;font-size:16px;padding:6px 8px;line-height:1;border-radius:6px;transition:.15s}
.gp-fld .pw-toggle:hover{color:var(--ink);background:var(--panel2)}
.gp-login-btn{width:100%;border:none;border-radius:11px;padding:12px 0;font-size:13px;font-weight:800;background:var(--cyan);color:#06201c;cursor:pointer;transition:.15s;font-family:inherit;margin-top:4px;letter-spacing:.5px}
.gp-login-btn:hover{background:var(--cyan-dim)}
.gp-login-btn:disabled{opacity:.5;cursor:not-allowed}
.pw-err{font-size:10.5px;color:var(--red);margin-top:5px;line-height:1.4;min-height:14px}
.pw-hint{font-size:10.5px;color:var(--dim);margin-top:4px;line-height:1.5}
/* ★ v0.21.4 — 테마 토글 버튼 (헤더 pill 옆) */
.theme-toggle{display:inline-flex;align-items:center;justify-content:center;width:34px;height:34px;background:var(--panel2);border:1px solid var(--line);border-radius:99px;color:var(--ink);font-size:15px;cursor:pointer;transition:.15s;padding:0;line-height:1}
.theme-toggle:hover{background:var(--panel);border-color:var(--line2)}
.sync-pill .sync-dot{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 6px rgba(74,222,128,.55);flex-shrink:0}
.sync-pill.warn{color:var(--amber)} .sync-pill.warn .sync-dot{background:var(--amber);box-shadow:0 0 6px rgba(251,191,36,.55)}
.sync-pill.err{color:var(--red)}   .sync-pill.err  .sync-dot{background:var(--red);  box-shadow:0 0 6px rgba(248,113,113,.55)}

/* v0.15.2 — 사용자·PIN 관리 (설정) */
.usr-sw{position:relative;display:inline-block;width:42px;height:24px;flex-shrink:0}
.usr-sw input{opacity:0;width:0;height:0}
.usr-sw span{position:absolute;inset:0;background:var(--line2);border-radius:99px;transition:.2s;cursor:pointer}
.usr-sw span::after{content:'';position:absolute;top:2px;left:2px;width:20px;height:20px;border-radius:50%;background:var(--sub);transition:.2s}
.usr-sw input:checked + span{background:var(--cyan)}
.usr-sw input:checked + span::after{left:20px;background:#06201c}
.usr-quit{color:var(--red)!important;border-color:rgba(248,113,113,.32)!important}
tr.usr-off td{opacity:.5}
.pill.amber{background:rgba(251,191,36,.14);color:var(--amber)}

/* Tab nav */
.tabnav{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:18px;padding:6px;background:var(--panel);border:1px solid var(--line);border-radius:14px;overflow-x:auto}
.tabnav button{background:none;border:none;color:var(--sub);padding:9px 14px;font-size:12.5px;font-weight:600;border-radius:9px;cursor:pointer;transition:.15s;white-space:nowrap;display:flex;align-items:center;gap:6px}
.tabnav button:hover{color:var(--ink);background:var(--bg2)}
.tabnav button.on{background:var(--cyan);color:#06201c}
.tabnav button.on svg{stroke:#06201c}
.tabnav svg{width:14px;height:14px;stroke-width:2;stroke:currentColor;fill:none}

/* Page header */
.pghead{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;gap:10px;flex-wrap:wrap}
.pgtitle{font-size:18px;font-weight:700;letter-spacing:-.2px;display:flex;align-items:center;gap:10px}
.pgtitle .ic{width:20px;height:20px;stroke:var(--cyan);fill:none;stroke-width:2}
.pgtools{display:flex;gap:8px;flex-wrap:wrap}

/* Buttons */
.btn{background:var(--bg2);border:1px solid var(--line);border-radius:8px;padding:9px 14px;font-size:12.5px;font-weight:600;color:var(--ink);cursor:pointer;transition:.15s;display:inline-flex;align-items:center;gap:6px}
.btn:hover{border-color:var(--cyan-dim);color:var(--cyan)}
.btn.primary{background:var(--cyan);color:#06201c;border-color:var(--cyan);font-weight:700}
.btn.primary:hover{background:var(--cyan-dim);color:#06201c}
.btn.warn{border-color:#5a3a3a;color:var(--red)}
.btn.ghost{background:transparent}
.btn svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2}
.btn[disabled]{opacity:.45;cursor:not-allowed}
.btn-big{padding:14px 18px;font-size:14px}

/* Cards */
.card{background:linear-gradient(160deg,var(--panel2),var(--panel));border:1px solid var(--line);border-radius:14px;padding:16px;margin-bottom:14px}
.card h3{font-size:13px;font-weight:700;letter-spacing:.3px;display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.card h3 .tag{font-size:11px;color:var(--sub);font-weight:600}
.grid{display:grid;gap:12px}
.g2{grid-template-columns:repeat(2,1fr)} .g3{grid-template-columns:repeat(3,1fr)} .g4{grid-template-columns:repeat(4,1fr)}
@media(max-width:780px){.g2,.g3,.g4{grid-template-columns:1fr}}

/* Tables */
table{width:100%;border-collapse:collapse;font-size:12.5px}
th,td{text-align:left;padding:10px 8px;border-bottom:1px solid var(--line)}
th{font-size:10.5px;color:var(--sub);font-weight:700;letter-spacing:1px;background:var(--bg2)}
td{color:var(--ink)}
tr:hover td{background:rgba(94,234,212,.03)}
td.num,th.num{text-align:right;font-family:'JetBrains Mono',monospace;font-weight:700}
td.muted{color:var(--sub)}
.tbl-wrap{overflow-x:auto;border:1px solid var(--line);border-radius:10px}
.empty{padding:30px;text-align:center;color:var(--dim);font-size:12.5px}

/* Toast */
#toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-100px);background:var(--panel);border:1px solid var(--line2);border-radius:12px;padding:14px 22px;z-index:2000;transition:.3s;font-size:13px;font-weight:600;box-shadow:0 10px 40px rgba(0,0,0,.6);max-width:90vw}
#toast.show{transform:translateX(-50%) translateY(0)}
#toast.ok{border-color:var(--cyan-dim);color:var(--cyan)}
#toast.err{border-color:#5a3a3a;color:var(--red)}
#toast.warn{border-color:#5a4a2a;color:var(--amber)}

/* Modal */
.modal-bg{position:fixed;inset:0;background:rgba(8,9,11,.86);z-index:1500;display:none;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px)}
.modal-bg.show{display:flex}
.modal{background:linear-gradient(160deg,var(--panel2),var(--panel));border:1px solid var(--line);border-radius:16px;padding:22px;max-width:560px;width:100%;max-height:90vh;overflow-y:auto}
.modal h2{font-size:16px;font-weight:700;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center}
.modal h2 .x{cursor:pointer;color:var(--sub);font-size:18px;background:none;border:none}
.modal .body{display:grid;gap:12px}
.modal .actions{display:flex;gap:8px;justify-content:flex-end;margin-top:18px;padding-top:14px;border-top:1px solid var(--line)}

/* ★ v0.20.2 — 공용 달력 팝업 (attachCalendar) — 라이브러리 금지·유틸 1벌 */
.vela-cal-pop{font-size:12px}
.vela-cal-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.vela-cal-hd .vela-cal-mo{font-family:'JetBrains Mono',monospace;font-weight:700;color:var(--cyan);font-size:13px}
.vela-cal-nav{background:var(--bg2);border:1px solid var(--line);color:var(--ink);width:36px;height:36px;border-radius:8px;cursor:pointer;font-size:12px}
.vela-cal-nav:hover{background:var(--panel2);border-color:var(--cyan)}
.vela-cal-dow{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:4px;font-size:10px;text-align:center;font-weight:600;letter-spacing:.3px}
.vela-cal-dow>div{padding:6px 0}
.vela-cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.vela-cal-cell{background:transparent;border:1px solid transparent;color:var(--ink);height:36px;border-radius:6px;cursor:pointer;font-size:12px;font-family:'JetBrains Mono',monospace;padding:0;display:flex;align-items:center;justify-content:center}
.vela-cal-cell:hover{background:var(--bg2);border-color:var(--cyan)}
.vela-cal-cell.o{opacity:.35}
.vela-cal-cell.t{border-color:var(--amber);color:var(--amber)}
.vela-cal-cell.s{background:var(--cyan);color:#08090b;font-weight:700}
.vela-cal-ft{display:flex;justify-content:space-between;margin-top:8px;padding-top:8px;border-top:1px solid var(--line)}
.vela-cal-today,.vela-cal-close{background:var(--bg2);border:1px solid var(--line);color:var(--sub);padding:6px 12px;border-radius:6px;cursor:pointer;font-size:11px;height:32px}
.vela-cal-today:hover{color:var(--cyan);border-color:var(--cyan)}
.vela-cal-close:hover{color:var(--red);border-color:var(--red)}

/* v0.15.0 — 기준정보 비활성 행 */
tr.mst-off td{opacity:.45}

/* v0.14.4 — 출하 모달 공정흐름 참고 스트립 (재고 화면 amber 재공 · green 완성품 축약) */
.fl-strip{display:flex;align-items:center;flex-wrap:wrap;gap:6px;font-size:11.5px;background:var(--bg2);border:1px solid var(--line);border-radius:10px;padding:10px 12px;color:var(--sub)}
.fl-strip .fl-step{color:var(--sub)}
.fl-strip .fl-step b{color:var(--amber);font-family:'JetBrains Mono',monospace;font-weight:800;margin-left:3px}
.fl-strip .fl-fin{color:var(--sub)}
.fl-strip .fl-fin b{color:var(--green);font-family:'JetBrains Mono',monospace;font-weight:800;margin-left:3px}
.fl-strip .fl-ship{color:var(--sub);margin-left:auto}
.fl-strip .fl-ship b{color:var(--ink);font-family:'JetBrains Mono',monospace;font-weight:800;margin-left:3px}
.fl-strip .fl-arr{color:var(--dim);font-family:'JetBrains Mono',monospace}
.fl-strip .fl-empty{color:var(--dim);font-style:italic}
.fl-warn{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;color:var(--red);background:rgba(248,113,113,.08);border:1px solid rgba(248,113,113,.28);border-radius:8px;padding:7px 10px;margin-top:6px;font-weight:600}

/* Pill / badge */
.pill{display:inline-block;padding:3px 9px;border-radius:99px;font-size:10.5px;font-weight:700;letter-spacing:.4px}
.pill.cyan{background:rgba(94,234,212,.12);color:var(--cyan)}
.pill.green{background:rgba(74,222,128,.12);color:var(--green)}
.pill.heat{background:rgba(255,171,64,.12);color:var(--heat2)}
.pill.red{background:rgba(248,113,113,.13);color:var(--red)}
.pill.gray{background:#1a1d24;color:var(--sub)}
.pill.blue{background:rgba(125,211,252,.12);color:var(--blue)}

/* Footer */
.foot{display:flex;align-items:center;justify-content:space-between;margin-top:24px;padding:16px 0;border-top:1px solid var(--line);font-size:11px;color:var(--dim)}
.foot .made{font-weight:700;letter-spacing:1px;color:var(--sub)}
.foot .ver{font-family:'JetBrains Mono',monospace}

/* KPI mini (대시보드용) */
.kpi-mini{position:relative;background:linear-gradient(160deg,var(--panel2),var(--panel));border:1px solid var(--line);border-radius:14px;padding:14px;overflow:hidden}
.kpi-mini .lab{font-size:11px;color:var(--sub);font-weight:600;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.kpi-mini .lab svg{width:14px;height:14px;stroke-width:2;fill:none}
.kpi-mini .val{font-family:'JetBrains Mono',monospace;font-weight:800;font-size:24px;line-height:1}
.kpi-mini .val.c{color:var(--cyan)}.kpi-mini .val.h{color:var(--heat2)}.kpi-mini .val.g{color:var(--green)}.kpi-mini .val.r{color:var(--red)}
.kpi-mini .sub{font-size:11px;color:var(--sub);margin-top:8px}

/* Scan stage */
.scan-stage{display:grid;grid-template-columns:1fr 1.1fr;gap:14px}
@media(max-width:880px){.scan-stage{grid-template-columns:1fr}}
.qr-area{position:relative;background:#000;border:1px solid var(--line);border-radius:12px;overflow:hidden;aspect-ratio:1/1;min-height:240px;display:flex;align-items:center;justify-content:center;color:var(--sub);font-size:12px}
#qr-reader{width:100%}
#qr-reader video{border-radius:10px}
.scan-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.scan-row .field{background:var(--bg2);border:1px solid var(--line);border-radius:10px;padding:11px 13px}
.scan-row .field .k{font-size:10px;color:var(--sub);font-weight:600;letter-spacing:.6px;margin-bottom:4px}
.scan-row .field .v{font-family:'JetBrains Mono',monospace;font-weight:800;font-size:15px;color:var(--ink)}
.scan-row .field .v.dim{color:var(--dim);font-size:12px;font-weight:500}
.scan-row .field.hilite{border-color:var(--cyan-dim);background:rgba(94,234,212,.06)}
.scan-row .field.hilite .v{color:var(--cyan)}
.balance-bar{margin-top:10px;background:var(--bg2);border:1px solid var(--line);border-radius:10px;padding:13px}
.balance-bar .l{font-size:11px;color:var(--sub);margin-bottom:6px}
.balance-bar .v{font-family:'JetBrains Mono',monospace;font-weight:800;font-size:22px;color:var(--cyan)}
.balance-bar .v.warn{color:var(--amber)} .balance-bar .v.err{color:var(--red)}
.qty-row{display:flex;gap:8px;align-items:flex-end;margin-top:10px}
.qty-row .qty-in{flex:1}
.qty-in input{font-family:'JetBrains Mono',monospace;font-size:24px;font-weight:800;text-align:center;padding:14px;color:var(--cyan)}
.split-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.split-3 input{font-family:'JetBrains Mono',monospace;text-align:center;font-weight:700}
.split-3 label{text-align:center}

/* Feature flag matrix */
.flag-grid{display:grid;grid-template-columns:1fr;gap:10px}
.flag-mod{background:var(--bg2);border:1px solid var(--line);border-radius:10px;padding:14px}
.flag-mod h4{font-size:13px;font-weight:700;color:var(--ink);margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
.flag-mod h4 .desc{font-size:10.5px;color:var(--sub);font-weight:500;letter-spacing:0}
.flag-items{display:flex;flex-wrap:wrap;gap:8px}
.toggle{display:inline-flex;align-items:center;gap:8px;background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:7px 11px;cursor:pointer;font-size:12px;transition:.15s;user-select:none}
.toggle:hover{border-color:var(--line2)}
.toggle.on{border-color:var(--cyan-dim);background:rgba(94,234,212,.06);color:var(--cyan)}
.toggle .sw{width:24px;height:14px;background:var(--dim);border-radius:99px;position:relative;transition:.18s}
.toggle .sw::after{content:"";position:absolute;width:10px;height:10px;background:#fff;border-radius:50%;left:2px;top:2px;transition:.18s}
.toggle.on .sw{background:var(--cyan)}
.toggle.on .sw::after{left:12px}
.toggle.locked{opacity:.55;cursor:not-allowed}

/* Print */
@media print{
  body{background:#fff;color:#000;padding:0}
  body::before{display:none}
  .tabnav,.topbar,.foot,.pghead .pgtools,.no-print{display:none!important}
  .wrap{max-width:100%;padding:8mm}
  .card{background:#fff;color:#000;border:1px solid #aaa;box-shadow:none;page-break-inside:avoid}
  table,th,td{color:#000;border-color:#888}
  th{background:#eee;color:#000}
  .print-only{display:block!important}
}
.print-only{display:none}
.print-doc{padding:8mm;background:#fff;color:#000;font-size:12px;border:1px dashed var(--line);margin-bottom:14px}
.print-doc h1{font-size:18px;margin-bottom:10px;text-align:center;letter-spacing:2px}
.print-doc table th,.print-doc table td{color:#000;border-bottom:1px solid #888;padding:6px 8px}
.print-doc .doc-head{display:flex;justify-content:space-between;border-bottom:2px solid #000;padding-bottom:6px;margin-bottom:10px}
.print-doc .doc-sign{display:flex;justify-content:flex-end;gap:30px;margin-top:24px;font-size:11px}
.print-doc .qr-stamp{width:80px;height:80px;background:#eee;display:flex;align-items:center;justify-content:center;font-size:9px;border:1px solid #888}

/* Activity feed */
.feed{display:flex;flex-direction:column;gap:8px;max-height:380px;overflow-y:auto}
.feed-row{display:grid;grid-template-columns:80px 1fr auto;gap:10px;padding:10px;background:var(--bg2);border:1px solid var(--line);border-radius:10px;font-size:12px;align-items:center}
.feed-row .t{font-family:'JetBrains Mono',monospace;color:var(--sub);font-size:11px}
.feed-row .e{color:var(--ink)}
.feed-row .q{font-family:'JetBrains Mono',monospace;font-weight:700;color:var(--cyan)}

/* Wizard chip row */
.chip-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px}
.chip{font-size:11px;padding:5px 10px;border-radius:99px;background:var(--bg2);border:1px solid var(--line);color:var(--sub);cursor:pointer;transition:.15s}
.chip:hover{border-color:var(--cyan-dim);color:var(--cyan)}
.chip.on{background:var(--cyan);color:#06201c;border-color:var(--cyan);font-weight:700}

/* Small responsive tweaks */
@media(max-width:560px){
  .vela-mark{font-size:24px}
  .pgtitle{font-size:16px}
  .clock{font-size:11px}
  .tabnav button{padding:8px 10px;font-size:11.5px}
  .card{padding:14px}
}

/* ============================================================
   ★ v0.9.0 — 대시보드 시안 v2 스타일 (dash-v2.html에서 가져옴)
   대시보드 전용 클래스. 다른 화면 영향 없음.
   ============================================================ */
:root{ --c1:#5eead4;--c2:#7dd3fc;--c3:#a5b4fc;--c4:#f0abfc;--c5:#86efac; --c6:#fbbf24; }
.dash-hint{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--cyan-dim);background:rgba(94,234,212,.06);border:1px solid rgba(94,234,212,.18);border-radius:9px;padding:8px 13px;margin:0 0 18px}
.clk{cursor:pointer;position:relative;transition:.18s}
.clk:hover{transform:translateY(-2px);border-color:var(--cyan-dim) !important}
.clk:hover .goarrow{opacity:1;transform:translateX(0)}
.goarrow{position:absolute;top:13px;right:13px;font-size:11px;color:var(--cyan);opacity:0;transform:translateX(-4px);transition:.18s;font-weight:700;pointer-events:none}

.hero{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:14px}
.dkpi{position:relative;background:linear-gradient(160deg,var(--panel2),var(--panel));border:1px solid var(--line);border-radius:16px;padding:18px;overflow:hidden}
.dkpi .lab{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--sub);font-weight:600;margin-bottom:12px}
.dkpi .lab svg{width:15px;height:15px;stroke-width:2;fill:none}
.dkpi .val{font-family:'JetBrains Mono',monospace;font-weight:800;font-size:30px;line-height:1;letter-spacing:-1px}
.dkpi .val.c{color:var(--cyan)} .dkpi .val.h{color:var(--heat2)} .dkpi .val.w{color:var(--ink)} .dkpi .val.g{color:var(--green)}
.dkpi .unit{font-size:13px;color:var(--sub);font-weight:600;margin-left:3px}
.dkpi .sub{display:flex;align-items:center;gap:6px;margin-top:11px;font-size:12px;color:var(--sub)}
.chg{font-weight:700;font-family:'JetBrains Mono',monospace}
.up{color:var(--green)} .down{color:var(--red)}
.nodata{color:var(--dim);font-size:11px}

.dgrid2{display:grid;grid-template-columns:1fr 1.25fr;gap:14px;margin-bottom:14px}
.prog{display:flex;flex-direction:column;gap:14px;margin-top:16px}
.prow .ph{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:7px}
.prow .pn{font-size:13px;font-weight:600}
.prow .pn span{color:var(--sub);font-weight:500;font-size:11px;margin-left:6px}
.prow .pf{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--sub)}
.prow .pf b{color:var(--ink);font-weight:800}
.track{height:13px;background:var(--bg2);border:1px solid var(--line);border-radius:8px;overflow:hidden;position:relative}
.track i{display:block;height:100%;border-radius:7px;background:linear-gradient(90deg,var(--cyan-dim),var(--cyan));position:relative}
.track i.a{background:linear-gradient(90deg,#d97706,var(--amber))}
.track i.h{background:linear-gradient(90deg,var(--heat),var(--heat2))}
.pct-end{position:absolute;right:9px;top:50%;transform:translateY(-50%);font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:800;color:#08090b}
.ptot{display:flex;justify-content:space-between;align-items:center;margin-top:16px;padding-top:14px;border-top:1px solid var(--line)}
.ptot .l{font-size:12px;color:var(--sub)}
.ptot .r{font-family:'JetBrains Mono',monospace;font-weight:800;font-size:21px;color:var(--cyan)}

.seg{display:inline-flex;background:var(--bg2);border:1px solid var(--line);border-radius:9px;padding:3px;gap:2px}
.seg button{font-family:inherit;font-size:11px;font-weight:700;color:var(--sub);background:none;border:none;padding:5px 12px;border-radius:7px;cursor:pointer}
.seg button.on{background:var(--cyan);color:#06201c}
.chartbox{position:relative;height:200px;margin-top:14px;display:flex;align-items:center;justify-content:center}
.chart-empty{text-align:center;color:var(--dim)}
.chart-empty .big{font-size:13px;color:var(--sub);margin-bottom:4px}
.chart-empty .sm{font-size:11px}
.linechart{width:100%;height:100%}

.flow{display:flex;gap:0;margin-bottom:14px;background:linear-gradient(160deg,var(--panel2),var(--panel));border:1px solid var(--line);border-radius:16px;padding:16px 8px}
.step{flex:1;text-align:center;position:relative;padding:4px 6px;cursor:pointer;border-radius:10px;transition:.16s}
.step:hover{background:rgba(94,234,212,.05)}
.step:not(:last-child)::after{content:"";position:absolute;right:-1px;top:18px;width:2px;height:42px;background:linear-gradient(var(--line2),transparent)}
.step .sn{font-size:11px;color:var(--sub);font-weight:600;margin-bottom:7px}
.step .sv{font-family:'JetBrains Mono',monospace;font-weight:800;font-size:20px}
.step .su{font-size:10px;color:var(--dim);margin-top:2px}
.step .bar{height:3px;border-radius:2px;background:var(--line2);margin:9px 10px 0;overflow:hidden}
.step .bar i{display:block;height:100%;background:linear-gradient(90deg,var(--cyan-dim),var(--cyan))}
.step.out .sv{color:var(--cyan)}

.eqgrid{display:grid;grid-template-columns:1fr 1fr;gap:14px 30px;margin-top:16px}
.eq .eh{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px}
.eq .en{font-size:13px;font-weight:600}
.eq .en small{color:var(--dim);font-weight:500;font-family:'JetBrains Mono',monospace;font-size:10px;margin-left:7px}
.eq .ep{font-family:'JetBrains Mono',monospace;font-weight:800;font-size:14px}
.eq .ep .ar{font-size:10px;font-weight:700;margin-left:3px}
.eqtrack{height:15px;background:var(--bg2);border:1px solid var(--line);border-radius:9px;overflow:hidden;position:relative}
.eqtrack .cap100{position:absolute;left:76.9%;top:0;bottom:0;width:2px;background:repeating-linear-gradient(var(--dim),var(--dim) 3px,transparent 3px,transparent 6px);opacity:.6;z-index:2}
.eqtrack i{display:block;height:100%;border-radius:8px}
.eqtrack i.g{background:linear-gradient(90deg,#16a34a,var(--green))}
.eqtrack i.h{background:linear-gradient(90deg,var(--heat),var(--red))}
.eq .ok{color:var(--green)} .eq .hot{color:var(--red)}
.caphint{font-size:10px;color:var(--dim);margin-top:5px;font-family:'JetBrains Mono',monospace}

.kgrid{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:14px}
.kc{position:relative;background:linear-gradient(160deg,var(--panel2),var(--panel));border:1px solid var(--line);border-radius:14px;padding:15px;overflow:hidden}
.kc .kl{font-size:11px;color:var(--sub);font-weight:600;margin-bottom:9px;display:flex;align-items:center;gap:6px}
.kc .kl svg{stroke-width:2;fill:none}
.kc .kv{font-family:'JetBrains Mono',monospace;font-weight:800;font-size:22px;line-height:1}
.kc .ks{font-size:10.5px;color:var(--sub);margin-top:8px}

.secttl{font-size:12px;font-weight:700;letter-spacing:2px;color:var(--cyan-dim);margin:22px 0 12px;display:flex;align-items:center;gap:10px}
.secttl::after{content:"";flex:1;height:1px;background:var(--line)}

.sales-hero{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.salesgrid{display:grid;grid-template-columns:1.1fr 1.4fr 1fr;gap:14px}
.mbars{display:flex;align-items:flex-end;gap:7px;height:150px;margin-top:10px}
.mbar-sum{display:flex;justify-content:space-between;align-items:baseline;margin-top:14px;font-size:11px;color:var(--sub)}
.mbar-sum b{font-family:'JetBrains Mono',monospace;color:var(--ink);font-weight:800;font-size:13px;margin-left:3px}
.mbar-peak b{color:var(--amber)}
.mbar .bamt{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;color:var(--sub);margin-bottom:3px}
.mbar .bamt.cur{color:var(--amber)}
.mbar{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;height:100%;justify-content:flex-end}
.mbar .b{width:100%;border-radius:5px 5px 0 0;background:linear-gradient(180deg,var(--cyan),var(--cyan-dim));min-height:3px;opacity:.85}
.mbar .b.cur{opacity:1;box-shadow:0 0 12px rgba(94,234,212,.45)}
.mbar .b.future{background:var(--line2);opacity:.4}
.mbar .ml{font-size:9.5px;color:var(--dim);font-family:'JetBrains Mono',monospace}
.ybars{display:flex;align-items:flex-end;gap:14px;height:130px;margin-top:18px;padding:0 6px}
.ybar{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;height:100%;justify-content:flex-end}
.ybar .yb{width:100%;border-radius:6px 6px 0 0;min-height:4px}
.ybar .yamt{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:800;color:var(--ink)}
.ybar .yamt.cur{color:var(--amber)}
.ybar .yl{font-size:10px;color:var(--dim);font-family:'JetBrains Mono',monospace}
.ybar .yl small{font-size:8px;color:var(--dim);vertical-align:super}
.ynote{font-size:10px;color:var(--dim);margin-top:12px;text-align:center}
.crow{margin-top:13px}.crow:first-child{margin-top:18px}
.ch{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px}
.ch .cn{font-size:12.5px;font-weight:600}
.ch .cn small{color:var(--dim);font-weight:500;font-size:10px;margin-left:5px}
.ch .cv{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:800}
.ctrack{height:9px;background:var(--bg2);border-radius:6px;overflow:hidden;border:1px solid var(--line)}
.ctrack i{display:block;height:100%;border-radius:6px}

/* 대시보드 반응형 */
@media(max-width:980px){
  .hero{grid-template-columns:repeat(2,1fr)}
  .kgrid{grid-template-columns:repeat(2,1fr)}
  .dgrid2{grid-template-columns:1fr}
  .salesgrid{grid-template-columns:1fr}
  .sales-hero{grid-template-columns:1fr}
}
@media(max-width:560px){
  .hero{grid-template-columns:1fr}
  .kgrid{grid-template-columns:1fr}
  .eqgrid{grid-template-columns:1fr;gap:14px}
  .dkpi .val{font-size:24px}
  .flow{flex-wrap:wrap;gap:6px}
  .step{flex:1 1 30%}
}

/* ============================================================
   ★ v0.10.0 — 대시보드 핵심존 (dash-core2.html) + 설비현황 (eq-*.html)
   ============================================================ */
:root{ --night:#818cf8; --purp:#a5b4fc; }
/* ① 수주 3단계 */
.core-card{margin-bottom:14px}
.order-total{display:flex;align-items:baseline;justify-content:space-between;margin:16px 0 14px}
.order-total .lab{font-size:12px;color:var(--sub)}
.order-total .amt{font-family:'JetBrains Mono',monospace;font-weight:800;font-size:28px;color:var(--ink)}
.order-total .amt small{font-size:13px;color:var(--sub);font-weight:600;margin-left:6px}
.stage3{height:28px;border-radius:9px;overflow:hidden;display:flex;border:1px solid var(--line);background:var(--bg)}
.stage3 .s{height:100%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;font-family:'JetBrains Mono',monospace;color:#06201c;overflow:hidden;white-space:nowrap;padding:0 4px}
.stage3 .s.done{background:linear-gradient(90deg,var(--cyan-dim),var(--cyan))}
.stage3 .s.prog{background:linear-gradient(90deg,#d97706,var(--amber));color:#3a2800}
.stage3 .s.wait{background:var(--line2);color:var(--sub)}
.stage-legend{display:flex;gap:18px;margin-top:14px;flex-wrap:wrap}
.sl{flex:1;min-width:130px}
.sl .slh{display:flex;align-items:center;gap:7px;font-size:11px;color:var(--sub);margin-bottom:5px}
.sl .dot-sq{width:9px;height:9px;border-radius:3px}
.sl .slv{font-family:'JetBrains Mono',monospace;font-weight:800;font-size:18px}
.sl .sls{font-size:10px;color:var(--dim);margin-top:2px}

/* ② 진도 4칸 */
.prog4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-top:16px}
.pcard{background:var(--bg);border:1px solid var(--line);border-radius:13px;padding:16px;cursor:pointer;transition:.16s;position:relative}
.pcard:hover{border-color:var(--cyan-dim);transform:translateY(-2px)}
.pcard .parrow{position:absolute;top:12px;right:13px;font-size:10px;color:var(--cyan);opacity:0;transition:.16s}
.pcard:hover .parrow{opacity:1}
.pcard .pper{font-size:12px;color:var(--sub);font-weight:700;margin-bottom:11px}
.pcard .ppct{font-family:'JetBrains Mono',monospace;font-weight:800;font-size:30px;line-height:1;margin-bottom:4px}
.pcard .pqty{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--sub);margin-bottom:11px}
.pcard .pqty b{color:var(--ink);font-weight:700}
.pcard .ptrack{height:7px;background:var(--panel);border-radius:4px;overflow:hidden}
.pcard .ptrack i{display:block;height:100%;border-radius:4px}
.pcard.day .ppct{color:var(--cyan)} .pcard.day .ptrack i{background:linear-gradient(90deg,var(--cyan-dim),var(--cyan))}
.pcard.week .ppct{color:var(--green)} .pcard.week .ptrack i{background:linear-gradient(90deg,#16a34a,var(--green))}
.pcard.month .ppct{color:var(--amber)} .pcard.month .ptrack i{background:linear-gradient(90deg,#d97706,var(--amber))}
.pcard.year .ppct{color:var(--blue)} .pcard.year .ptrack i{background:linear-gradient(90deg,#0ea5e9,var(--blue))}
@media(max-width:780px){.prog4{grid-template-columns:repeat(2,1fr)}}
@media(max-width:480px){.prog4{grid-template-columns:1fr}}

/* ============================================================
   ★ v0.11.0 — 실적 등록 폰 UX (scan-phone.html + session-setup.html 시안)
   ============================================================ */
.scan-shell{max-width:480px;margin:0 auto;display:flex;flex-direction:column;gap:13px}
@media(min-width:481px){.scan-shell{background:var(--bg);border:1px solid var(--line);border-radius:24px;padding:18px;box-shadow:0 20px 60px rgba(0,0,0,.35)}}

.scan-title{font-size:17px;font-weight:800;display:flex;align-items:center;gap:9px}
.scan-title .zer{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:800;letter-spacing:.5px;color:var(--cyan-dim);border:1px solid var(--line2);padding:3px 7px;border-radius:5px}
.scan-title .right{margin-left:auto;display:flex;gap:6px}

/* 세션 바 */
.sess-bar{background:linear-gradient(160deg,rgba(129,140,248,.1),var(--panel));border:1px solid rgba(129,140,248,.35);border-radius:13px;padding:11px 14px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.sess-chip{display:flex;align-items:center;gap:5px;font-size:13px;font-weight:700}
.sess-chip svg{width:14px;height:14px;fill:none;stroke-width:2}
.sess-chip.shift-day{color:var(--cyan)} .sess-chip.shift-day svg{stroke:var(--cyan)}
.sess-chip.shift-night{color:var(--night)} .sess-chip.shift-night svg{stroke:var(--night)}
.sess-chip.worker{color:var(--cyan)} .sess-chip.worker svg{stroke:var(--cyan)}
.sess-chip.eq{color:var(--blue)} .sess-chip.eq svg{stroke:var(--blue)}
.sess-sep{color:var(--dim);font-size:11px}
.sess-change{margin-left:auto;font-size:11px;color:var(--sub);border:1px solid var(--line2);padding:6px 11px;border-radius:8px;background:var(--bg2);cursor:pointer;font-weight:600}
.sess-change:hover{border-color:var(--cyan-dim);color:var(--cyan)}

/* 카메라 (큰 정사각형) */
.cam-big{aspect-ratio:1;background:radial-gradient(circle at center,#0d0f13,#070809);border:1px solid var(--line2);border-radius:16px;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center}
.cam-big #qr-reader{width:100%;height:100%}
.cam-big #qr-reader video{width:100%;height:100%;object-fit:cover;border-radius:15px}
.cam-corner{position:absolute;width:34px;height:34px;border:3px solid var(--cyan);pointer-events:none;z-index:2}
.cam-corner.c1{top:14%;left:14%;border-right:none;border-bottom:none;border-radius:10px 0 0 0}
.cam-corner.c2{top:14%;right:14%;border-left:none;border-bottom:none;border-radius:0 10px 0 0}
.cam-corner.c3{bottom:14%;left:14%;border-right:none;border-top:none;border-radius:0 0 0 10px}
.cam-corner.c4{bottom:14%;right:14%;border-left:none;border-top:none;border-radius:0 0 10px 0}
.cam-scanline{position:absolute;left:18%;right:18%;height:2px;background:linear-gradient(90deg,transparent,var(--cyan),transparent);top:50%;animation:scanline 2.2s ease-in-out infinite;z-index:2;pointer-events:none}
@keyframes scanline{0%,100%{top:18%}50%{top:82%}}
.cam-txt{position:absolute;bottom:18px;left:0;right:0;text-align:center;font-size:13px;color:var(--sub);z-index:3;pointer-events:none}
.cam-warn{position:absolute;inset:8px;background:rgba(248,113,113,.08);border:1px dashed rgba(248,113,113,.4);border-radius:13px;display:flex;align-items:center;justify-content:center;padding:18px;text-align:center;font-size:12px;color:var(--red);font-weight:600;line-height:1.6;z-index:4}

/* 연속 스캔 토글 */
.cont-row{display:flex;align-items:center;gap:10px;font-size:12px;color:var(--sub);padding:0 2px}
.cont-row .lbl{flex:1}
.sw-toggle{width:40px;height:22px;background:var(--line2);border-radius:11px;position:relative;flex-shrink:0;cursor:pointer;transition:.18s;border:none;padding:0}
.sw-toggle::after{content:"";position:absolute;width:18px;height:18px;background:#fff;border-radius:50%;top:2px;left:2px;transition:.18s}
.sw-toggle.on{background:var(--cyan)}
.sw-toggle.on::after{left:20px}

/* 자동판정 행 */
.auto-row{background:var(--panel2);border:1px solid var(--line);border-radius:11px;padding:12px 15px;display:flex;align-items:center;justify-content:space-between;gap:10px}
.auto-row .l{font-size:11px;color:var(--sub);font-weight:600;letter-spacing:.4px}
.auto-row .v{font-size:15px;font-weight:700;font-family:'JetBrains Mono',monospace;color:var(--ink);text-align:right}
.auto-row .v.name{font-family:Inter,'Malgun Gothic',sans-serif}
.auto-row .v.dim{color:var(--dim);font-weight:500}

.bal-big{background:rgba(94,234,212,.07);border:1px solid rgba(94,234,212,.25);border-radius:11px;padding:13px 16px;text-align:center}
.bal-big .bl{font-size:11px;color:var(--sub);margin-bottom:4px}
.bal-big .bv{font-family:'JetBrains Mono',monospace;font-size:24px;font-weight:800;color:var(--cyan)}
.bal-big .bv.warn{color:var(--amber)} .bal-big .bv.err{color:var(--red)}

/* 양품/불량/재작업 타입 선택 */
.qtype-row{display:flex;gap:8px}
.qt-btn{flex:1;padding:12px 0;border-radius:10px;border:1px solid var(--line2);background:var(--panel2);text-align:center;font-size:13px;font-weight:700;cursor:pointer;color:var(--ink);transition:.15s}
.qt-btn:hover{border-color:var(--line)}
.qt-btn.on.good{border-color:var(--green);background:rgba(74,222,128,.12);color:var(--green)}
.qt-btn.on.def{border-color:var(--amber);background:rgba(251,191,36,.12);color:var(--amber)}
.qt-btn.on.rew{border-color:var(--blue);background:rgba(125,211,252,.12);color:var(--blue)}

/* 큰 숫자 값 */
.qval-big{background:var(--bg);border:2px solid var(--cyan);border-radius:13px;padding:14px;text-align:center;font-family:'JetBrains Mono',monospace;font-size:38px;font-weight:800;color:var(--cyan);min-height:64px;line-height:1.1}
.qval-big.def{border-color:var(--amber);color:var(--amber)}
.qval-big.rew{border-color:var(--blue);color:var(--blue)}

/* 폰 키패드 */
.keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:9px}
.key{padding:16px 0;border-radius:12px;background:var(--panel2);border:1px solid var(--line2);text-align:center;font-size:22px;font-weight:700;font-family:'JetBrains Mono',monospace;cursor:pointer;color:var(--ink);user-select:none;transition:.1s}
.key:active{transform:scale(.95);background:var(--bg2)}
.key.act{color:var(--red)}

.submit-big{padding:17px;border-radius:14px;background:var(--cyan);color:#06201c;border:none;font-weight:800;font-size:15px;text-align:center;cursor:pointer;width:100%;font-family:inherit}
.submit-big:disabled{background:var(--line2);color:var(--dim);cursor:not-allowed}
.submit-big.next{background:linear-gradient(90deg,var(--cyan),var(--cyan-dim))}

.reason-input{background:var(--bg2);border:1px solid var(--line);border-radius:10px;padding:10px 13px;font-size:13px;width:100%;color:var(--ink)}

/* 세션 설정 화면 */
.setup-shell{max-width:480px;margin:0 auto;display:flex;flex-direction:column;gap:16px}
@media(min-width:481px){.setup-shell{background:var(--bg);border:1px solid var(--line);border-radius:24px;padding:20px;box-shadow:0 20px 60px rgba(0,0,0,.35)}}

.setup-head{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
.setup-head .t{font-size:17px;font-weight:800}
.setup-head .s{font-size:11px;color:var(--sub);margin-top:4px}
.step-ind{display:flex;gap:6px;margin-top:8px}
.step-ind .si{flex:1;height:4px;border-radius:2px;background:var(--line2)}
.step-ind .si.on{background:var(--cyan)}
.step-ind .si.done{background:var(--cyan-dim)}

.sec-label{font-size:12px;color:var(--sub);font-weight:700;display:flex;align-items:center;gap:8px}
.sec-label .n{width:22px;height:22px;border-radius:6px;background:rgba(94,234,212,.12);color:var(--cyan);font-size:11px;font-weight:800;display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace}
.sec-label .hint{color:var(--dim);font-weight:500;font-size:11px;margin-left:auto}

/* 교대 큰 버튼 */
.shift-pick{display:flex;gap:10px}
.sp-btn{flex:1;padding:16px 10px;border-radius:13px;border:1px solid var(--line2);background:var(--panel2);text-align:center;cursor:pointer;transition:.16s}
.sp-btn:hover{border-color:var(--line)}
.sp-btn svg{width:22px;height:22px;margin-bottom:7px;fill:none;stroke-width:2;stroke:var(--sub)}
.sp-btn .spn{font-size:14px;font-weight:700}
.sp-btn .spt{font-size:10px;color:var(--dim);margin-top:3px;font-family:'JetBrains Mono',monospace}
.sp-btn.on.day{border-color:var(--cyan);background:rgba(94,234,212,.1)}
.sp-btn.on.day svg{stroke:var(--cyan)}
.sp-btn.on.day .spn{color:var(--cyan)}
.sp-btn.on.night{border-color:var(--night);background:rgba(129,140,248,.12)}
.sp-btn.on.night svg{stroke:var(--night)}
.sp-btn.on.night .spn{color:var(--night)}

/* 작업자/설비 픽 카드 */
.pick-box{background:var(--panel2);border:1px solid var(--line);border-radius:13px;padding:14px}
.pick-cur{display:flex;align-items:center;gap:11px;margin-bottom:12px;min-height:40px}
.pc-ic{width:38px;height:38px;border-radius:10px;background:var(--bg);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.pc-ic svg{width:19px;height:19px;fill:none;stroke-width:2}
.pick-cur.worker .pc-ic svg{stroke:var(--cyan)}
.pick-cur.eq .pc-ic svg{stroke:var(--blue)}
.pc-name{font-size:15px;font-weight:700;line-height:1.3}
.pc-sub{font-size:11px;color:var(--dim);margin-top:2px}
.pc-none{font-size:14px;color:var(--dim);font-weight:600}
.pick-actions{display:flex;gap:8px}
.pa-btn{flex:1;padding:11px;border-radius:10px;text-align:center;font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;border:none;font-family:inherit}
.pa-btn.qr{background:var(--cyan);color:#06201c}
.pa-btn.list{background:var(--bg);border:1px solid var(--line2);color:var(--ink)}
.pa-btn svg{width:15px;height:15px;fill:none;stroke:currentColor;stroke-width:2}

/* 드롭다운 목록 */
.list-open{margin-top:10px;border:1px solid var(--line2);border-radius:11px;overflow:hidden;background:var(--bg)}
.lo-search{padding:11px 14px;border-bottom:1px solid var(--line);font-size:12px;color:var(--ink);background:var(--bg2);display:flex;align-items:center;gap:8px}
.lo-search input{background:transparent;border:none;flex:1;color:var(--ink);outline:none;font-size:12px;padding:0;width:auto}
.lo-list{max-height:240px;overflow-y:auto}
.lo-item{padding:12px 14px;font-size:14px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:10px;cursor:pointer;transition:.1s}
.lo-item:last-child{border-bottom:none}
.lo-item:hover{background:var(--bg2)}
.lo-item.sel{background:rgba(94,234,212,.08);color:var(--cyan);font-weight:700}
.lo-dot{width:7px;height:7px;border-radius:50%;background:var(--dim);flex-shrink:0}
.lo-item.sel .lo-dot{background:var(--cyan);box-shadow:0 0 6px var(--cyan)}
.lo-meta{margin-left:auto;font-size:11px;color:var(--dim);font-family:'JetBrains Mono',monospace}

.setup-summary{background:rgba(94,234,212,.06);border:1px solid rgba(94,234,212,.2);border-radius:11px;padding:12px 14px;font-size:12px;color:var(--cyan);text-align:center;line-height:1.6}
.setup-summary b{font-weight:800}
.setup-summary.warn{background:rgba(251,191,36,.06);border-color:rgba(251,191,36,.2);color:var(--amber)}

/* 오늘 등록 요약 (스캔 화면 하단) */
.scan-feed{margin-top:6px}
.scan-feed h4{font-size:12px;font-weight:700;color:var(--sub);margin-bottom:8px;letter-spacing:.5px}

/* === 설비현황 — 소규모(detail) === */
.es-pgtitle{font-size:17px;font-weight:800;margin-bottom:14px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.es-pgtitle .es-when{font-size:12px;color:var(--sub);font-weight:500}
.eqcard{background:linear-gradient(160deg,var(--panel2),var(--panel));border:1px solid var(--line);border-radius:16px;padding:18px;margin-bottom:14px}
.eqcard.idle{opacity:.75}
.eqhead{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;padding-bottom:13px;border-bottom:1px solid var(--line);gap:14px;flex-wrap:wrap}
.eqname{font-size:15px;font-weight:800;display:flex;align-items:center;gap:9px}
.eqpill{font-size:10px;font-weight:700;padding:3px 9px;border-radius:6px}
.eqpill.run{color:var(--green);background:rgba(74,222,128,.12)}
.eqpill.idle{color:var(--dim);background:rgba(90,95,107,.15)}
.eqpill.stop{color:var(--red);background:rgba(248,113,113,.12)}
.eqmeta{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--sub);margin-top:5px}
.eqtotal{text-align:right}
.eqtotal .et{font-family:'JetBrains Mono',monospace;font-weight:800;font-size:17px}
.eqtotal .es{font-size:10px;color:var(--sub)}
.eqitem-table{width:100%;border-collapse:collapse}
.eqitem-table th{text-align:left;font-size:10px;color:var(--sub);font-weight:600;padding:7px 10px;border-bottom:1px solid var(--line);letter-spacing:.5px}
.eqitem-table th.num{text-align:right}
.eqitem-table td{padding:11px 10px;font-size:13px;border-bottom:1px solid rgba(35,38,47,.5);color:var(--ink)}
.eqitem-table tr:last-child td{border-bottom:none}
.eqitem-table td.num{text-align:right;font-family:'JetBrains Mono',monospace;font-weight:700}
.eqitem-table .item-name{font-weight:700}
.eqitem-table .item-name span{color:var(--sub);font-weight:500;font-size:11px;margin-left:5px}
.shift-cell{font-family:'JetBrains Mono',monospace;font-weight:700}
.shift-cell .day{color:var(--cyan)} .shift-cell .night{color:var(--night)} .shift-cell .sep{color:var(--dim);margin:0 4px}
.ct-bar{display:inline-block;width:70px;height:7px;background:var(--bg);border-radius:4px;overflow:hidden;vertical-align:middle;margin-right:8px;border:1px solid var(--line)}
.ct-bar i{display:block;height:100%;background:linear-gradient(90deg,var(--cyan-dim),var(--cyan));border-radius:4px}
.ct-bar i.full{background:var(--green)}
.ct-pct{font-family:'JetBrains Mono',monospace;font-weight:800;font-size:12px}
.productivity{font-size:10px;color:var(--dim);font-family:'JetBrains Mono',monospace}
.eqcard .no-work{text-align:center;color:var(--dim);font-size:12px;padding:14px 0}

/* === 설비현황 — 대규모(group/row) === */
.sumstrip{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:16px}
.sumc{background:linear-gradient(160deg,var(--panel2),var(--panel));border:1px solid var(--line);border-radius:12px;padding:14px}
.sumc .sl{font-size:11px;color:var(--sub);margin-bottom:7px}
.sumc .sv{font-family:'JetBrains Mono',monospace;font-weight:800;font-size:24px;line-height:1}
.sumc .ss{font-size:10px;color:var(--dim);margin-top:5px}
@media(max-width:780px){.sumstrip{grid-template-columns:repeat(3,1fr)}}
@media(max-width:480px){.sumstrip{grid-template-columns:repeat(2,1fr)}}

.es-controls{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.es-search{flex:1;min-width:180px;display:flex;align-items:center;gap:8px;background:var(--bg);border:1px solid var(--line);border-radius:9px;padding:9px 13px}
.es-search input{flex:1;background:none;border:none;color:var(--ink);font-family:inherit;font-size:13px;outline:none;padding:0}
.es-search input::placeholder{color:var(--dim)}
.es-search svg{width:15px;height:15px;stroke:var(--dim);fill:none;stroke-width:2}
.es-filt{display:flex;gap:6px;flex-wrap:wrap}
.fchip{font-size:11px;font-weight:600;color:var(--sub);background:var(--bg);border:1px solid var(--line);border-radius:8px;padding:8px 12px;cursor:pointer;transition:.15s}
.fchip:hover{border-color:var(--cyan-dim)}
.fchip.on{color:#06201c;background:var(--cyan);border-color:var(--cyan)}
.fchip.hot.on{background:var(--red);border-color:var(--red);color:#fff}
.es-sortby{font-size:11px;color:var(--ink);background:var(--bg);border:1px solid var(--line);border-radius:8px;padding:8px 12px;width:auto}

.pgroup{margin-bottom:14px}
.ghead{display:flex;align-items:center;gap:10px;padding:11px 15px;background:linear-gradient(160deg,var(--panel2),var(--panel));border:1px solid var(--line);border-radius:12px 12px 0 0;cursor:pointer;flex-wrap:wrap}
.ghead .gname{font-size:14px;font-weight:800}
.ghead .gname .out-tag{font-size:10px;color:var(--cyan-dim);margin-left:5px}
.ghead .gcount{font-size:11px;color:var(--sub);font-family:'JetBrains Mono',monospace}
.ghead .gload{margin-left:auto;display:flex;align-items:center;gap:10px}
.ghead .gload .gl-bar{width:120px;height:8px;background:var(--bg);border-radius:5px;overflow:hidden;border:1px solid var(--line)}
.ghead .gload .gl-bar i{display:block;height:100%}
.ghead .gload .gl-pct{font-family:'JetBrains Mono',monospace;font-weight:800;font-size:13px}
.gchev{color:var(--dim);font-size:12px;min-width:14px;text-align:right}
.collapsed .eqtable{display:none}
.collapsed .ghead{border-radius:12px}

.eqtable{background:var(--panel);border:1px solid var(--line);border-top:none;border-radius:0 0 12px 12px;overflow:hidden}
.eqrow{display:grid;grid-template-columns:1.6fr 0.8fr 1fr 0.8fr 1.3fr 0.9fr;gap:10px;padding:11px 15px;align-items:center;border-bottom:1px solid rgba(35,38,47,.5);font-size:12.5px}
.eqrow:last-child{border-bottom:none}
.eqrow.head{font-size:10px;color:var(--sub);font-weight:600;background:var(--bg);letter-spacing:.5px}
.eqrow .en{font-weight:700;display:flex;align-items:center;gap:8px}
.statusdot{width:7px;height:7px;border-radius:50%;flex-shrink:0;display:inline-block}
.statusdot.run{background:var(--green);box-shadow:0 0 6px var(--green)}
.statusdot.idle{background:var(--dim)}
.statusdot.stop{background:var(--red)}
.eqrow .num{font-family:'JetBrains Mono',monospace;font-weight:700;text-align:right}
.eqrow .ld{display:flex;align-items:center;gap:8px;justify-content:flex-end}
.ld-bar{width:60px;height:7px;background:var(--bg);border-radius:4px;overflow:hidden;border:1px solid var(--line)}
.ld-bar i{display:block;height:100%}
.ld-pct{font-family:'JetBrains Mono',monospace;font-weight:800;font-size:11px;min-width:38px;text-align:right}
.ld.g .ld-bar i{background:linear-gradient(90deg,#16a34a,var(--green))} .ld.g .ld-pct{color:var(--green)}
.ld.a .ld-bar i{background:linear-gradient(90deg,#d97706,var(--amber))} .ld.a .ld-pct{color:var(--amber)}
.ld.h .ld-bar i{background:linear-gradient(90deg,var(--heat),var(--red))} .ld.h .ld-pct{color:var(--red)}
.eqrow .prod{font-size:10px;color:var(--dim);font-family:'JetBrains Mono',monospace;text-align:right}
.eqrow.muted .en, .eqrow.muted .num{color:var(--dim)}
@media(max-width:780px){
  .eqrow{grid-template-columns:1.6fr 0.8fr 1fr;font-size:11.5px}
  .eqrow > :nth-child(n+4){display:none}
}

     v0.14.0 — 스플래시 (앱 실행 시 브랜드 오버레이, 1.5s → 페이드)

<!-- =================================================================

       - PIN 패드는 항상 표시 → 직원은 언제나 PIN만 입력해 입장

<div id="pin-gate">

    <section class="gate-pin" id="pin-box"><!-- renderPinPad() / showRecognition() 렌더 --></section>

<script>
/* =================================================================================================
   VELA MES SYSTEM — MVP 프로토타입
   v0.5.0 · 2026-06-25 · MADE BY JUNS
   설계기준: CLAUDE.md (제1원칙 ZERO-ERROR BY QR / 2단계 모듈화 / LOT잔량원장)
   단일 HTML PWA. 데이터: localStorage stub (Firestore 어댑터는 §데이터레이어 참조).
   ================================================================================================= */

const APP_VERSION = 'v0.26.0';
const APP_DATE    = '2026-07-22';

/* ★ v0.21.4 — 테마 (다크/라이트) · 로컬 전용 키 vela_theme · 기본 dark
   head 초기 스크립트가 <html data-theme> 이미 설정 · 여기선 토글/설정 UI 헬퍼만.
   applyTheme(theme) 1벌 — 속성·로컬 키·meta theme-color·헤더 아이콘 갱신. */
const _THEME_KEY = 'vela_theme';
function getTheme(){
  const t = document.documentElement.getAttribute('data-theme');
  return (t === 'light') ? 'light' : 'dark';
}
function applyTheme(theme){
  const t = (theme === 'light') ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', t);
  try { localStorage.setItem(_THEME_KEY, t); } catch {}
  const m = document.getElementById('meta-theme-color');
  if(m) m.setAttribute('content', t === 'light' ? '#f5f7fa' : '#08090b');
  const ic = document.getElementById('theme-icon');
  if(ic) ic.textContent = (t === 'light') ? '☀' : '🌙';
  // 설정 화면 라디오가 열려 있으면 반영
  document.querySelectorAll('input[name="theme-radio"]').forEach(r => { r.checked = (r.value === t); });
}
function toggleTheme(){
  applyTheme(getTheme() === 'light' ? 'dark' : 'light');
}
// 부팅 시 아이콘 초기 표시 (head 스크립트가 data-theme 은 이미 설정)

/* =================================================================================================
   ★ v0.12.2 — QR 생성 라이브러리 (qrcode-generator · v0.23.2 부터 cdnjs)
   자체 인코더는 표준과 셀 불일치(123/441) 발견되어 폐기. 검증된 qrcode-generator 사용.
   window.qrcode(typeNumber, errorCorrectionLevel) 전역 함수 제공.
   ================================================================================================= */
function qrDataURL(text, opts){
  opts = opts || {};
  var ecl = opts.ecl || 'M';                                    // 'L','M','Q','H'
  var cell = opts.cell || opts.scale || 4;                      // 셀 픽셀
  var margin = (opts.margin!=null) ? opts.margin : 4;           // ★ quiet zone 4 필수
  if(typeof window.qrcode !== 'function'){
    throw new Error('QR 라이브러리(qrcode-generator) 로드 실패 — 인터넷 연결 확인');
  }
  var qr = window.qrcode(0, ecl);                               // type 0 = 자동 버전
  qr.addData(String(text==null?'':text));                       // UTF-8 자동
  qr.make();
  return qr.createDataURL(cell, margin);
}
function qrImg(payload, size){
  size = size || 84;
  var text = (typeof payload==='string') ? payload : JSON.stringify(payload);
  // size px에 맞춰 cell 픽셀 자동 (대략 33셀 기준), quiet zone은 항상 4
  var cell = Math.max(2, Math.round(size/33));
  return `<img src="${qrDataURL(text, {cell:cell, margin:4})}" style="width:${size}px;height:${size}px;display:block">`;
}

/* ★ v0.21.2 — 관대한 firebaseConfig 파서 (콘솔 스니펫 원문 그대로 붙여넣기 통과)
   허용: 'const xxx = {...};', 'var/let ... = {...}', 후행 세미콜론, 따옴표 없는 키.
   반환: 유효 config 객체 (projectId+apiKey 필수) 또는 null. 실패는 콘솔 경고만 — 호출자가 안내. */
function parseFirebaseConfig(text){
  if(text == null) return null;
  let s = String(text).trim();
  if(!s) return null;
  // 1) 'const/var/let 이름 = ' 접두 제거
  s = s.replace(/^\s*(?:const|let|var)\s+[A-Za-z_$][\w$]*\s*=\s*/, '');
  // 2) 후행 세미콜론·쉼표 제거
  s = s.replace(/[;,]\s*$/, '').trim();
  // 3) 시도 1 — 있는 그대로 JSON.parse
  const tryParse = (str) => {
    try {
      const obj = JSON.parse(str);
      if(obj && typeof obj === 'object' && obj.projectId && obj.apiKey) return obj;
      return null;
    } catch { return null; }
  };
  let obj = tryParse(s);
  if(obj) return obj;
  // 4) 따옴표 없는 키 → 큰따옴표 감싸기 (예: {apiKey: "..."} → {"apiKey": "..."})
  //    문자열/주석 내부 오인식 방지: /* */, // 주석은 먼저 제거
  let s2 = s.replace(/\/\*[\s\S]*?\*\//g, '').replace(/(^|[^:])\/\/[^\n]*/g, '$1');
  //    작은따옴표 값 → 큰따옴표
  s2 = s2.replace(/'([^'\\]*(?:\\.[^'\\]*)*)'/g, (_,g) => `"${g.replace(/"/g,'\\"')}"`);
  //    키 따옴표 보정 — 객체 리터럴 안에서 식별자 키만 대상
  s2 = s2.replace(/([{,]\s*)([A-Za-z_$][\w$]*)\s*:/g, '$1"$2":');
  //    후행 쉼표 제거 (JSON 불허)
  s2 = s2.replace(/,\s*([}\]])/g, '$1');
  obj = tryParse(s2);
  return obj;
}

const DB = (() => {
  // state 는 const object — restore 는 in-place 교체(참조 유지)
  const state = _ACTIVE_ADAPTER.loadAll();
  _ACTIVE_ADAPTER.init && _ACTIVE_ADAPTER.init(state);
  const ensure = c => { if(!state[c]) state[c]={}; };
  const persist = (col, id, doc) => {
    try { _ACTIVE_ADAPTER.write(col, id, doc); }
    catch(e){ console.warn('[VELA] backend write failed', col, id, e); }
  };
  return {
    _backend: _ACTIVE_ADAPTER.name,   // 'local' | (STEP 2) 'firestore'
    _firebaseConfig: null,
    _adapter: _ACTIVE_ADAPTER,
    // ★ v0.16.0 — all/query 기본 void 제외 (집계 지점 개별 필터 금지 · 이중 필터 금지)
    all(col){ ensure(col); return Object.values(state[col]).filter(x=>!x.void); },
    // DB.get(단건)은 void 포함 유지 — 직접 참조·이름 조회·복원용 (변경 금지)
    get(col,id){ ensure(col); return state[col][id]||null; },
    set(col,id,doc){
      ensure(col);
      const prev = state[col][id]||null;
      const next = {...(prev||{}), ...doc, id, _updated: Date.now()};
      // increment-only 로그 트레일
      next._logs = (prev?._logs||[]).concat([{ts:Date.now(), op: prev?'update':'create', by: SESSION.user||'system'}]).slice(-50);
      state[col][id] = next;
      persist(col, id, next);
      return next;
    },
    // 보정 레코드 (원본 보존). 수정 = 새 레코드 누적
    correct(col,id,fields,reason){
      const prev = state[col][id];
      if(!prev) return null;
      const corr = {...prev, ...fields, _corrected: true, _correction_reason: reason||'', _updated: Date.now()};
      corr._logs = (prev._logs||[]).concat([{ts:Date.now(),op:'correct',by:SESSION.user||'system',reason}]).slice(-50);
      state[col][id] = corr;
      persist(col, id, corr);
      return corr;
    },
    query(col,fn){ ensure(col); return Object.values(state[col]).filter(x=>!x.void).filter(fn); },
    // ★ v0.16.0 — void 포함 Raw 조회 (이력 표시·복원 UI 전용)
    allRaw(col){ ensure(col); return Object.values(state[col]); },
    queryRaw(col,fn){ ensure(col); return Object.values(state[col]).filter(fn); },
    // export/import for SheetJS or backup
    snapshot(){ return JSON.parse(JSON.stringify(state)); },
    restore(s){
      // 참조 유지 in-place 교체 → 어댑터의 _state 도 자동 동기 (같은 객체)
      Object.keys(state).forEach(k => delete state[k]);
      Object.assign(state, s||{});
      // ★ v0.21.0 — 로컬: whole-state 재직렬화 (기존 동작). 파이어스토어: 문서별 setDoc(merge) 이관.
      if(_ACTIVE_ADAPTER.name === 'local'){
        persist(null, null, null);
      } else {
        Object.keys(state).forEach(col => {
          Object.keys(state[col] || {}).forEach(id => {
            persist(col, id, state[col][id]);
          });
        });
      }
    },
    // 모든 컬렉션 키
    cols(){ return Object.keys(state); },
    // ★ v0.21.0 — 어댑터 접근 (파이어스토어 부팅·이관 도구 전용, 화면 헬퍼 사용 금지)
    _adapterObj(){ return _ACTIVE_ADAPTER; },
  };

   · 이후 스냅샷은 in-place merge (state 참조 유지). 입력 중 모달 유지 = router() 재호출만·모달 DOM 은 건드리지 않음. */
const _FS_STATE = { ready:false, online:navigator.onLine, initError:null, snapshotRoundsDone:0 };
function _syncPillMark(reason){
  // renderSyncPill 이 정의되기 전에 호출될 수 있어 예약만 두고 renderSyncPill 있으면 실행
  try { if(typeof renderSyncPill === 'function') renderSyncPill(reason); } catch {}
}
function _loadScript(src){
  return new Promise((res, rej) => {
    const s = document.createElement('script');
    s.src = src; s.async = true;
    s.onload = () => res();
    s.onerror = () => rej(new Error('SDK 로드 실패: ' + src));
    document.head.appendChild(s);
  });
}
async function _bootFirestore(){
  if(_ACTIVE_ADAPTER.name !== 'firestore') return;
  const adapter = _ACTIVE_ADAPTER;
  const cfg = adapter._cfg || loadFirestoreConfig();
  if(!cfg){ _FS_STATE.initError = 'config 없음'; _syncPillMark(); return; }
  try {
    // compat 빌드 CDN (10.14 · window.firebase 노출) — local 모드는 이 경로를 타지 않아 네트워크 0 유지
    const V = '10.14.1';
    await _loadScript(`https://www.gstatic.com/firebasejs/${V}/firebase-app-compat.js`);
    await _loadScript(`https://www.gstatic.com/firebasejs/${V}/firebase-auth-compat.js`);
    await _loadScript(`https://www.gstatic.com/firebasejs/${V}/firebase-firestore-compat.js`);
    const fb = window.firebase;
    if(!fb || !fb.initializeApp) throw new Error('firebase SDK 노출 실패');
    if(!fb.apps || !fb.apps.length) fb.initializeApp(cfg);
    const fs = fb.firestore();
    adapter._fs = fs;
    // 오프라인 퍼시스턴스 (다탭 지원 시도 · 오류 시 경고 후 계속)
    try {
      await fs.enablePersistence({ synchronizeTabs: true });
    } catch(e){
      const code = e && e.code;
      if(code === 'failed-precondition'){
        console.warn('[VELA] 파이어스토어 다탭 열림 — 이 탭은 퍼시스턴스 없이 진행');
      } else if(code === 'unimplemented'){
        console.warn('[VELA] 브라우저가 IndexedDB 퍼시스턴스 미지원 — 온라인 전용 진행');
      } else {
        console.warn('[VELA] 퍼시스턴스 활성 실패 — 계속', e);
      }
    }
    // 익명 인증 (규칙: request.auth != null)
    await fb.auth().signInAnonymously();
    // 준비 완료 표시 + 대기 큐 flush (SDK 오프라인 큐가 이어서 담당)
    adapter._ready = true;
    const pending = adapter._pending.slice();
    adapter._pending.length = 0;
    pending.forEach(({col,id,doc}) => {
      try { fs.collection(col).doc(String(id)).set(doc, { merge:true }); }
      catch(e){ console.warn('[VELA] flush write fail', col, id, e); }
    });
    // 컬렉션 구독 — 첫 스냅샷 라운드가 다 도착하면 router() 재호출
    const expected = _FS_COLLECTIONS.length;
    const seen = new Set();
    _FS_COLLECTIONS.forEach(col => {
      fs.collection(col).onSnapshot(snap => {
        // in-place merge — 참조 유지 (기존 화면 재렌더로 반영)
        const state = adapter._state;
        if(!state) return;
        if(!state[col]) state[col] = {};
        snap.docChanges().forEach(chg => {
          const d = chg.doc;
          const data = d.data();
          if(chg.type === 'removed'){
            // 규칙에서 delete 금지되지만, 콘솔 등에서 제거 시 대응
            delete state[col][d.id];
          } else {
            state[col][d.id] = { ...(data||{}), id: d.id };
          }
        });
        if(!seen.has(col)){
          seen.add(col);
          if(seen.size === expected){
            _FS_STATE.snapshotRoundsDone++;
            // 첫 스냅샷 라운드 완료 → 리렌더
            try {
              if(SESSION.loggedIn){ renderNav(); router(); }
              else if(typeof renderGate === 'function'){ renderGate(); }   // PIN 게이트 (users 스냅샷 반영)
            } catch(e){ console.warn('[VELA] 스냅샷 후 리렌더 실패', e); }
          }
        } else {
          // 증분 반영 — 현재 화면 리렌더 (모달 DOM 은 미터치)
          try {
            if(SESSION.loggedIn) router();
            else if(typeof renderGate === 'function') renderGate();
          } catch(e){}
        }
        _syncPillMark();
      }, err => {
        console.warn('[VELA] onSnapshot 오류', col, err);
        _syncPillMark();
      });
    });
    _FS_STATE.ready = true;
    _syncPillMark();
  } catch(e){
    console.error('[VELA] firestore 부팅 실패', e);
    _FS_STATE.initError = String(e.message||e);
    _syncPillMark();
  }
}
window.addEventListener('online',  () => { _FS_STATE.online = true;  _syncPillMark(); });
window.addEventListener('offline', () => { _FS_STATE.online = false; _syncPillMark(); });
window.addEventListener('load', () => { _bootFirestore(); });

/* ★ v0.21.1 — 단말 코드는 로컬 전용 키 (firestore 동기 대상 아님 · 단말 간 덮어씀 방지)

      혼동 문자 제외 알파벳 (O/0/I/1) · 코드 1~3자 허용 (기존 A/B/C 단말 완전 불변).

const _DEVICE_CODE_KEY = 'vela_device_code';
const _DEV_ALPHABET = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';   // A-Z0-9 minus O/0/I/1 (32자)
function _normalizeDev(raw){
  // 대문자 · 영숫자만 · 1~3자. 유효 값이 아니면 빈 문자열 반환(호출자가 대체값 결정).
  const s = String(raw||'').toUpperCase().replace(/[^A-Z0-9]/g,'').slice(0,3);
  return /^[A-Z0-9]{1,3}$/.test(s) ? s : '';
}
function _genDeviceCode(){
  let out = '';
  for(let i=0;i<2;i++){
    out += _DEV_ALPHABET.charAt(Math.floor(Math.random() * _DEV_ALPHABET.length));
  }
  return out;
}
function getDeviceCode(){
  // ★ v0.22.0 — 데모 모드는 단말 'D' 고정 (로컬 device 키 미변경 — 종료 후 원래 코드 복원)
  if(isDemoMode()) return 'D';
  try {
    const local = localStorage.getItem(_DEVICE_CODE_KEY);
    if(local){
      const norm = _normalizeDev(local);
      if(norm) return norm;
    }
    // 구버전 폴백 — settings/system.device 있으면 로컬 키로 1회 이관 후 그 값 사용 (기존 A/B/C 단말 불변)
    const sys = (typeof DB !== 'undefined') ? DB.get('settings','system') : null;
    if(sys && sys.device){
      const norm = _normalizeDev(sys.device);
      if(norm){
        try { localStorage.setItem(_DEVICE_CODE_KEY, norm); } catch {}
        return norm;
      }
    }
    // 자동 발급 — 첫 접속 (로컬 키·구 폴백 모두 없음). 저장 후 1회 toast 예약.
    const gen = _genDeviceCode();
    try { localStorage.setItem(_DEVICE_CODE_KEY, gen); } catch(e){ console.warn('[VELA] 단말 코드 자동 발급 저장 실패', e); }
    setTimeout(() => {
      try {
        if(typeof toast === 'function' && document.getElementById('toast')){
          toast(`이 기기 단말 코드: ${gen} (설정에서 변경 가능)`, 'ok', 4200);
        }
      } catch {}
    }, 1500);
    return gen;
  } catch {}
  return 'A';
}
function setDeviceCode(dev){
  const norm = _normalizeDev(dev) || 'A';
  try { localStorage.setItem(_DEVICE_CODE_KEY, norm); } catch(e){ console.warn('[VELA] 단말 코드 저장 실패', e); }
  return norm;
}
function nextDocNo(prefix){
  const year = new Date().getFullYear();
  const device = getDeviceCode();
  const col = _PREFIX_TO_COL[prefix];
  const rx = new RegExp('^' + prefix + '-' + year + '-' + device + '(\\d{3,})$');
  const ids = col ? DB.allRaw(col).map(x => x.id||'') : [];
  let max = 0;
  ids.forEach(id => {
    const m = String(id).match(rx);
    if(m){ const n = parseInt(m[1],10) || 0; if(n > max) max = n; }
  });
  return `${prefix}-${year}-${device}${String(max + 1).padStart(3, '0')}`;
}
// 채번 문서 생성 모달의 번호 칸 렌더 (자동 미리보기 · 편집 허용 · mono)
function docNoField(prefix, elId, label){
  const suggested = nextDocNo(prefix);
  const cap = label || '번호 (자동 · 수정 가능)';
  return `<div class="fld"><label>${_esc(cap)}</label>
    <input id="${_esc(elId)}" value="${_esc(suggested)}" placeholder="${_esc(suggested)}"
           style="font-family:'JetBrains Mono',monospace;letter-spacing:.3px" autocomplete="off"></div>`;
}
// 저장 시 사용: 입력 트림 → 빈 값이면 자동 채번 · 컬렉션 전체(allRaw void 포함)에서 중복 검사

  const col = _PREFIX_TO_COL[prefix];

  const raw = String(el?.value || '').trim();
  const id  = raw || nextDocNo(prefix);

}

/* ★ v0.22.1 — 비밀번호 정책 · 해시 · 검증 (설정·게이트·강제변경 공용 1벌)
   정책 (checkPwPolicy): 8자 이상, 영문 1자 이상, 숫자 1자 이상, 이름 포함 금지,
        단일 문자 반복(000000/aaaa…) 금지, 순차(123456/abcdef 등 A→B 5+연속) 금지.
   해시 (hashPassword): 저장 형식 'sha256:<64hex>' — salt = 사용자 id (벤더는 'VENDOR').

        legacy=true 반환 시 호출자가 강제 변경 흐름으로 승격. */
function checkPwPolicy(pw, name){
  const s = String(pw==null?'':pw);
  if(s.length < 8) return { ok:false, reason:'8자 이상 필요' };
  if(!/[A-Za-z]/.test(s)) return { ok:false, reason:'영문 1자 이상 필요' };
  if(!/\d/.test(s))       return { ok:false, reason:'숫자 1자 이상 필요' };
  if(name){
    const n = String(name).trim();
    if(n && n.length >= 2 && s.toLowerCase().includes(n.toLowerCase())){
      return { ok:false, reason:'이름을 비밀번호에 포함할 수 없음' };
    }
  }
  // 동일 문자 반복 — 전체 반복(000000) 또는 4자 이상 연속 동일(aaaa1111 의 'aaaa' 검출)
  if(/^(.)\1+$/.test(s))  return { ok:false, reason:'동일 문자 반복 사용 불가 (000000/aaaaaaaa 등)' };
  if(/(.)\1{3,}/.test(s)) return { ok:false, reason:'동일 문자 4회 이상 연속 사용 불가 (aaaa 등)' };
  // 순차 (6자 이상 연속 증가/감소) — 123456/abcdef/98765 4 는 통과, 'abc12345' 는 통과 (5자 순차)
  const seqRun = 6;
  let runInc = 1, runDec = 1;
  for(let i=1;i<s.length;i++){
    const d = s.charCodeAt(i) - s.charCodeAt(i-1);
    runInc = (d === 1) ? runInc + 1 : 1;
    runDec = (d === -1) ? runDec + 1 : 1;
    if(runInc >= seqRun || runDec >= seqRun) return { ok:false, reason:'순차 문자열 6자 이상(123456/abcdef 등) 사용 불가' };
  }
  return { ok:true };
}
